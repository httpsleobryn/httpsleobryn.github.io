 recent infection. 26 character of the node is most consistent with malignancy C. The finding is abnormal and requires immediate excision biopsy D. This is a normal finding in a child of this age Source: https://pmc.ncbi.nlm.nih.gov/articles/PMC7135029/"}, {"id": "q614", "pdfPage": 322, "originalNumber": "48", "question": "A 9 month old child was brought into the clinic for a routine check up. The clinician puts the child in a sitting position and observes that the child can sit briefly without support. Which of the following is most consistent with developmental milestones for age?", "options": [{"letter": "A", "text": "Pulls up to stand"}, {"letter": "B", "text": "Sits without Support"}, {"letter": "C", "text": "Able to walk with one hand held"}, {"letter": "D", "text": "Mature Pincer Grip"}], "answer": "B", "answerText": "Sits without Support", "explanation": "48. ANSWER: B A. Wrong - This milestone is usually achieved at around 9–10 months of age and is more advanced than briefly sitting unsupported. B. Is CORRECT because by around 8–9 months, most infants can sit steadily without support, which matches the developmental stage described. C. Wrong - This milestone usually appears later, around 12 months of age. D. Wrong - A mature pincer grasp typically develops at about 10–12 months of age. Source: Nelson Textbook of Pediatrics, p 66"}, {"id": "q615", "pdfPage": 323, "originalNumber": "49", "question": "A 6y/o child went in for check-up. Clinician asks child to say “ah”, observing symmetrical elevation of soft palate. What cranial nerve/s is responsible for this?", "options": [{"letter": "A", "text": "Cranial nerve V"}, {"letter": "B", "text": "Cranial nerve VII"}, {"letter": "C", "text": "Cranial nerve IX and X"}, {"letter": "D", "text": "Cranial nerve XII"}], "answer": "C", "answerText": "Cranial nerve IX and X", "explanation": "49. ANSWER: C A. Wrong - CN 5 provides the sensory information for most of the face and controls the muscles for chewing B. Wrong - CN 7 provides taste, facial expression, and secretion of tears and saliva C. Is CORRECT because both CNs are involved in speech and swallowing D. Wrong - CN 12 controls movements of the tongue"}, {"id": "q616", "pdfPage": 323, "originalNumber": "50", "question": "During a physical examination of a healthy 3 year old child, the clinician uses an otoscope to examine the tympanic membrane. Which is considered a normal tympanic membrane appearance?", "options": [{"letter": "A", "text": "Bulging and erythematous"}, {"letter": "B", "text": "Dull gray with absent landmarks"}, {"letter": "C", "text": "Retracted with air fluid level"}, {"letter": "D", "text": "Pearly gray with visible landmarks"}], "answer": "D", "answerText": "Pearly gray with visible landmarks", "explanation": "50. ANSWER: D A. Wrong - This is a hallmark sign of acute purulent otitis media B. Wrong - A \"dull\" appearance often indicates a thickened tympanic membrane or the presence of fluid in the middle ear, which obscures the standard landmarks. In acute otitis media, landmarks are typically lost as the drum becomes distorted C. Wrong - An air-fluid level, often appearing as a line between air and amber-colored fluid, is characteristic of a serous effusion D. Is CORRECT because a normal tympanic membrane (TM) as being pinkish gray or pearly gray. Key characteristics and visible landmarks of a healthy TM include:the malleus and the cone of light."}, {"id": "q617", "pdfPage": 324, "originalNumber": "51", "question": "During a lung examination of a child with suspected pneumonia, which percussion finding is most likely over an area of consolidation?", "options": [{"letter": "A", "text": "Hyperresonance"}, {"letter": "B", "text": "Tympanic"}, {"letter": "C", "text": "Dullness"}, {"letter": "D", "text": "Diffuse resonance"}], "answer": "C", "answerText": "Dullness", "explanation": "51. ANSWER: C A. Wrong - Hyperresonance indicated trapped air (asthma, COPD, emphysema, pneumothorax); produces a louder, lower-pitched sound than normal resonance B. Wrong - Tympanic indicate large tension pneumothorax; produces a hollow, drum-like sound C. CORRECT - When a patient has pneumonia, the alveoli (air sacs) in the lungs become filled with fluid, pus, and cellular debris instead of air. This process is called consolidation. Percussing over an air-filled structure (like a normal lung) produces a clear, long-lasting \"resonant\" sound. However, percussing over a solid or fluid-filled area (like the liver or consolidated lung tissue) produces a short, high-pitched, thud-like sound known as dullness. D. Wrong - Diffuse resonance would be expected in a healthy child without lung pathology."}, {"id": "q618", "pdfPage": 325, "originalNumber": "52", "question": "A 6-year-old child is noted to have increased tactile fremitus and bronchial breath sounds over the right lower posterior lung field on physical examination. Which of the following best explains these findings?", "options": [{"letter": "A", "text": "Air trapping within the pleural cavity"}, {"letter": "B", "text": "Pulmonary consolidation affecting sound transmission"}, {"letter": "C", "text": "Pleural fluid causing transmitted sound changes"}, {"letter": "D", "text": "Generalized bronchospasm affecting both lungs"}], "answer": "B", "answerText": "Pulmonary consolidation affecting sound transmission", "explanation": "52. ANSWER: B A. This describes a pneumothorax, where air in the pleural space separates the lung from the chest wall. It typically causes decreased tactile fremitus and decreased breath sounds, not increased transmission of sound. B. In consolidation (commonly due to pneumonia), alveoli are filled with fluid and exudate, allowing sound to travel more efficiently through lung tissue. This leads to increased tactile fremitus and bronchial breath sounds over the affected area. C. Pleural effusion dampens sound transmission because fluid in the pleural space blocks vibration from reaching the chest wall. This typically results in decreased tactile fremitus and diminished breath sounds. D. Bronchospasm, as seen in asthma, causes diffuse wheezing and reduced airflow, not localized findings. It would not produce focal increased fremitus or bronchial breath sounds in a single lung field. Source: Bates’ Physical Diagnosis, Ch 25: Children: Infancy through Adolescence"}, {"id": "q619", "pdfPage": 325, "originalNumber": "53", "question": "A 2-year-old child with cough and colds is being examined. The clinician observes the respiration before touching the child. What is the proper 53. ANSWER: D", "options": [{"letter": "A", "text": "Wrong - Crying artificially increases respiratory rate."}, {"letter": "B", "text": "Wrong - Alters normal breathing pattern."}, {"letter": "C", "text": "Wrong - Do not rush to the stethoscope. Instead, observe the"}], "answer": null, "answerText": "", "explanation": "53. ANSWER: D A. Wrong - Crying artificially increases respiratory rate. B. Wrong - Alters normal breathing pattern. C. Wrong - Do not rush to the stethoscope. Instead, observe the"}, {"id": "q620", "pdfPage": 325, "originalNumber": "30", "question": "way to count respiratory rate?", "options": [{"letter": "A", "text": "Count respiration after the child cries"}, {"letter": "B", "text": "Repeatedly ask child to take deep breaths"}, {"letter": "C", "text": "Count respiration after auscultation"}, {"letter": "D", "text": "Count respiration when calm and quiet infant carefully. Handling/exam may agitate the child."}], "answer": "D", "answerText": "Count respiration when calm and quiet infant carefully. Handling/exam may agitate the child.", "explanation": "D. Is CORRECT because during inspection, carefully assess respirations and breathing patterns. Inspection is easiest when infants are not crying; thus, work with the parents to settle the child."}, {"id": "q621", "pdfPage": 326, "originalNumber": "54", "question": "An 8-year-old febrile child diagnosed with dengue has petechiae and a positive tourniquet test. What is the underlying mechanism?", "options": [{"letter": "A", "text": "Increased platelet destruction"}, {"letter": "B", "text": "Capillary fragility/permeability"}, {"letter": "C", "text": "Peripheral vasoconstriction"}, {"letter": "D", "text": "Increased erythropoiesis"}], "answer": "B", "answerText": "Capillary fragility/permeability", "explanation": "54. ANSWER: B A. Wrong - Partly contributes to bleeding tendency, but not the primary mechanism tested by the tourniquet test.- B. Is CORRECT because A positive tourniquet test—i.e., the detection of 10 or more new petechiae in one square inch of the upper arm after a 5-min blood pressure cuff inflation to midway between systolic and diastolic pressure—may demonstrate microvascular fragility associated with dengue but is more likely to be associated with severe disease. C. Wrong - Not the mechanism of petechiae/tourniquet positivity. D. Wrong - Unrelated Source: Harrison’s Principles of Internal Medicine 22nd Ed. Chapter 215, page 1668"}, {"id": "q622", "pdfPage": 326, "originalNumber": "31", "question": "intercostal retraction and grunting. O2 sat mildly decreased. What is the MOST appropriate explanation?", "options": [{"letter": "A", "text": "Increased work of breathing"}, {"letter": "B", "text": "Inflammation of the upper airways"}, {"letter": "C", "text": "Anxiety induced hyperventilation"}, {"letter": "D", "text": "Normal"}], "answer": "A", "answerText": "Increased work of breathing", "explanation": "A. Is CORRECT because nasal flaring, intercostal retractions, and grunting are classic signs of increased work of breathing and respiratory distress in children. The mildly decreased oxygen saturation further supports impaired ventilation and increased respiratory effort. B. Wrong - Inflammation of the upper airways may cause symptoms such as stridor or hoarseness, but the findings of retractions, grunting, and nasal flaring are more indicative of lower respiratory compromise and increased respiratory effort. C. Wrong - Anxiety-induced hyperventilation may cause rapid breathing, but it does not typically produce objective signs of respiratory distress such as nasal flaring, intercostal retractions, grunting, and decreased oxygen saturation. D. Wrong - These findings are not normal in a 4-year-old child and suggest clinically significant respiratory distress requiring prompt evaluation. Source: Bates Chapter 18, p. 830"}, {"id": "q623", "pdfPage": 327, "originalNumber": "56", "question": "A 3-year-old child with fever develops a generalized seizure. The child has postictal drowsiness, but after 20 minutes, responsiveness is restored. Which of the following physical examination findings would MOST suggest a CNS infection instead of a simple febrile seizure?", "options": [{"letter": "A", "text": "Transient postictal drowsiness"}, {"letter": "B", "text": "Symmetrical movement of limbs"}, {"letter": "C", "text": "Tachycardia associated with fever"}, {"letter": "D", "text": "Mild to moderate volume depletion with preserved compensatory mechanisms NOT SURE"}], "answer": "C", "answerText": "Tachycardia associated with fever", "explanation": "56. ANSWER: C A. Wrong - Postictal drowsiness with full recovery within 30–60 minutes is typical of simple febrile seizures, not CNS infection. B. Wrong - Symmetrical limb movements indicate a generalized seizure (simple febrile); focal deficits would suggest CNS infection. C. Is CORRECT because tachycardia alone does not specifically suggest CNS infection, but among the options, A, B, and D all point toward benign febrile seizure or dehydration. The finding that would suggest CNS infection (e.g., nuchal rigidity, bulging fontanelle, persistent altered mental status) is not listed, so by elimination, C is the least inconsistent with infection, though it is nonspecific. D. Wrong - Mild dehydration with preserved compensatory mechanisms is common in febrile illnesses and does not indicate CNS infection. Bates’ does not directly answer this question because none of the listed options (A–D) are the classic physical exam findings for CNS infection. According to Bates, the findings that suggest CNS infection (meningitis/encephalitis) in a post-seizure child are nuchal rigidity, Kernig’s sign, Brudzinski’s sign, bulging fontanelle (if open), or persistent altered mental status beyond 60 minutes. Since these are not provided, the answer is derived by elimination, with C selected as the least nonspecific finding. Source: Bates’ Guide to Physical Examination and History Taking 13th Ed."}, {"id": "q624", "pdfPage": 328, "originalNumber": "57", "question": "A 5 y.o boy was assessed by the clinician and asked to walk using tip toe and heel. What is the physician assessing?", "options": [{"letter": "A", "text": "Coordination"}, {"letter": "B", "text": "Muscle strength and balance"}, {"letter": "C", "text": "Sensation proprioception"}], "answer": "B", "answerText": "Muscle strength and balance", "explanation": "57. ANSWER: B A. Wrong, even if it still assessed coordination, it should be together with balance and muscle strength. And most of the time it uses rapid alternating movements. B. Is CORRECT C. Is wrong because it does not assess proprioception because it is not solely sensory D. Sorry unrecalled Bates"}, {"id": "q625", "pdfPage": 328, "originalNumber": "58", "question": "A child with chronic cough examined in the emergency room. Upon percussion of left lower lung field exhibit dullness and auscultation has reduced breath sounds on the same area. What is the best mechanism that explains both findings", "options": [{"letter": "A", "text": "Increased upper airway through narrowed bronchi"}, {"letter": "B", "text": "Fluid accumulation reducing sound transmission"}, {"letter": "C", "text": "Hyperinflation causing alveolar overdistention"}, {"letter": "D", "text": "Upper airway edema producing referred sounds"}], "answer": "B", "answerText": "Fluid accumulation reducing sound transmission", "explanation": "58. ANSWER: B A. Wrong - Narrowed bronchi, as seen in conditions like asthma or chronic bronchitis, typically produce wheezing due to rapid airflow through the narrowed space. While severe obstruction can lead to decreased breath sounds (the \"silent chest\"), it does not explain localized dullness on percussion unless it leads to secondary collapse (atelectasis) B. Is CORRECT because According to the sources, dullness replaces resonance when fluid or solid tissue replaces air-containing lungs or occupies the pleural space. Specifically, in a pleural effusion, fluid accumulates in the pleural space and separates the lung from the chest wall, which blocks the transmission of breath sounds, leading to the reduced or absent sounds heard during auscultation. C. Wrong - Hyperinflation, common in COPD or acute asthma attacks, results in hyperresonance on percussion, which is a very loud, lower-pitched sound. Alveolar overdistention is the opposite of the \"dullness\" (medium-pitched, thud-like sound) found in this patient. D. Wrong - Upper airway edema or obstruction usually produces stridor, an ominous, high-pitched whistling sound loudest over the neck. While these sounds can sometimes be transmitted to the chest, they are \"added\" sounds rather than a reduction of normal breath sounds, and they would not cause localized percussion dullness in the lower lung field. Chapter 15"}, {"id": "q626", "pdfPage": 328, "originalNumber": "59", "question": "A 14-month old with Acute Gastroenteritis was sent for dehydration evaluation. He is irritable, drinks eagerly, with mild sunken eyes. Which of the following is appropriate? 59. ANSWER: D", "options": [{"letter": "A", "text": "Incorrect; severe dehydration usually presents with lethargy, inability to drink, very sunken eyes, and poor perfusion rather than eagerness to drink."}, {"letter": "B", "text": "Incorrect; irritability, eager drinking, and mildly sunken eyes are clinical signs consistent with dehydration. Unche… 33"}], "answer": "A", "answerText": "Incorrect; severe dehydration usually presents with lethargy, inability to drink, very sunken eyes, and poor perfusion rather than eagerness to drink.", "explanation": "A. Severe dehydration that needs immediate resuscitation B. Normal for his age C. Neurological emergency due to electrolytes deficiency D. Mild to moderate dehydration with preserved compensatory mechanism C. Incorrect; there are no signs such as seizures, altered consciousness, or focal deficits suggesting a neurological emergency. D. Correct; irritability, thirst, and mildly sunken eyes indicate some dehydration while circulation and compensatory responses remain intact. Source: StatPearls https://www.ncbi.nlm.nih.gov/books/NBK555956/"}, {"id": "q627", "pdfPage": 329, "originalNumber": "60", "question": "Which of the following describes a normal anterior fontanelle in a 4-month-old infant?", "options": [{"letter": "A", "text": "Bulging"}, {"letter": "B", "text": "Sunken/depressed"}, {"letter": "C", "text": "Tense and pulsatile"}, {"letter": "D", "text": "Soft and flat"}], "answer": "C", "answerText": "Tense and pulsatile", "explanation": "60. ANSWER: C A. Wrong - Suggests increased intracranial pressure or meningitis. B. Wrong - Suggests dehydration. C. Wrong - Tense/bulging is abnormal. D. Is CORRECT because this is the normal finding. Source: Bate’s Unche…"}, {"id": "q628", "pdfPage": 329, "originalNumber": "61", "question": "Indicators of dehydration of acute gastroenteritis", "options": [{"letter": "A", "text": "Dry mucosa"}, {"letter": "B", "text": "Sunken eyes"}, {"letter": "C", "text": "Delayed capillary refill time"}, {"letter": "D", "text": "A&C"}, {"letter": "E", "text": "All of the above"}], "answer": "E", "answerText": "All of the above", "explanation": "61. ANSWER: E A. Wrong - Under the Review of Systems, clinicians are instructed to ask about \"dry mouth\". During the physical exam, clinicians must inspect the lips and observe their color and moisture. In a dehydrated state, the normal moisture is replaced by dryness. B. Wrong - sunken eyes are a primary indicator of moderate to severe dehydration in children C. Wrong - the guide establishes the use of delayed capillary refill as a marker for decreased systemic perfusion. D. Wrong - it leaves option B as an option since all of them are indicators E. IS CORRECT Unche…"}, {"id": "q629", "pdfPage": 330, "originalNumber": "62", "question": "Which is/are physical sign/s of dehydration in a child with Acute Gastroenteritis (AGE)?", "options": [{"letter": "A", "text": "Dry mucous membrane"}, {"letter": "B", "text": "Sunken eyes"}, {"letter": "C", "text": "Prolonged Capillary Refill time"}, {"letter": "D", "text": "All of the above"}, {"letter": "E", "text": "B&C"}], "answer": "D", "answerText": "All of the above", "explanation": "62. ANSWER: D A. Correct - Dry mucous membrane – Indicates decreased body water, leading to reduced salivary and mucosal secretions. B. Correct - Sunken eyes – Occurs due to loss of interstitial fluid and is a common sign of moderate to severe dehydration. C. Correct - Prolonged capillary refill time – Reflects poor peripheral perfusion from intravascular volume depletion. D. Is THE BEST ANSWER because A, B & C are signs of dehydration E. Wrong - A is also included as an answer"}, {"id": "q630", "pdfPage": 331, "originalNumber": "63", "question": "In the assessment of goiter, a bruit was heard upon auscultation of the thyroid gland. Most commonly suggests:", "options": [{"letter": "A", "text": "Thyroid cancer"}, {"letter": "B", "text": "Hashimoto's thyroiditis"}, {"letter": "C", "text": "Graves disease"}, {"letter": "D", "text": "Multinodular Goiter"}], "answer": "C", "answerText": "Graves disease", "explanation": "63. ANSWER: C A. Wrong because it usually presents with a solitary nodule, not a hypervascular diffuse gland with bruit. B. Wrong because it is usually firm, irregular, and enlarged thyroid, not hypervascular with bruit. C. Is CORRECT because the gland is diffusely enlarged and there is marked hypervascularity and bruit upon auscultation. D. Wrong because they are irregular enlargement with nodules and no bruit associated."}, {"id": "q631", "pdfPage": 331, "originalNumber": "64", "question": "Which lymphatic chain is most involved in the spread of thyroid carcinoma?", "options": [{"letter": "A", "text": "Posterior cervical lymph node"}, {"letter": "B", "text": "Deep cervical lymph node"}, {"letter": "C", "text": "Subandibular lymph node"}, {"letter": "D", "text": "Supraclavicular lymph node"}], "answer": "B", "answerText": "Deep cervical lymph node", "explanation": "64. ANSWER: B A. Wrong - the posterior cervical LN may be involved later, but not the primary drainage B. Is CORRECT because thyroid carcinomas commonly spread through the lymphatics to the central compartment nodes (pretracheal, paratracheal) then to the deep cervical lymph nodes along the internal jugular vein C. Wrong - the submandibular LN drain oral cavity and face, not thyroid D. Wrong - the supraclavicular LN can be involved in advanced disease but are not the main chain"}, {"id": "q632", "pdfPage": 332, "originalNumber": "65", "question": "A 32-year-old woman presents with a painless, firm 2-cm thyroid nodule on the right lobe. She has no prior history of thyroid disease. On examination, the nodule is firm with minimal movement on swallowing, and there are multiple palpable right cervical lymph nodes. Which of the following is the most appropriate documentation and management?", "options": [{"letter": "A", "text": "Document “firm thyroid nodule with cervical lymphadenopathy suspicious for malignancy” and refer for ultrasound-guided fine-needle aspiration biopsy"}, {"letter": "B", "text": "Document “diffuse thyroid enlargement consistent with Hashimoto thyroiditis” and reassure the patient"}], "answer": "A", "answerText": "Document “firm thyroid nodule with cervical lymphadenopathy suspicious for malignancy” and refer for ultrasound-guided fine-needle aspiration biopsy", "explanation": "65. ANSWER: A A. Is CORRECT because a firm thyroid nodule, especially with cervical lymphadenopathy and decreased mobility, raises concern for thyroid malignancy (commonly papillary thyroid carcinoma). The next appropriate step is thyroid ultrasound and FNA B. Wrong - Hashimoto thyroiditis usually presents with a diffusely enlarged, often rubbery thyroid, not a solitary firm nodule with suspicious lymph nodes. C. Wrong - benign adenoma is typically mobile, well-circumscribed, and not associated with cervical lymphadenopathy. Suspicious findings require further workup, not observation alone. D. Wrong - A simple thyroid cyst is usually soft or fluctuant, and empiric levothyroxine is not appropriate management for a suspicious thyroid mass with lymph node involvement 37 C. Document “benign mobile thyroid adenoma” and advise annual follow-up only D. Document “simple thyroid cyst” and start empiric levothyroxine therapy Bates Ch7 Head & Neck page 299"}, {"id": "q633", "pdfPage": 333, "originalNumber": "66", "question": "A patient with a very large goiter complains of feeling dizzy and facial flushing when reaching for items on high shelves. On examination, you ask them to raise both arms (Pemberton’s sign) which elicits inspiratory stridor. This indicates?", "options": [{"letter": "A", "text": "Allergic reaction on exam"}, {"letter": "B", "text": "Primary hyperparathyroidis m"}, {"letter": "C", "text": "Carotid sinus hypersensitivity"}, {"letter": "D", "text": "Thoracic inlet obstruction"}], "answer": "D", "answerText": "Thoracic inlet obstruction", "explanation": "66. ANSWER: D A. Wrong. Would present with urticaria, wheezing, or anaphylaxis rather than positional venous obstruction. B. Wrong. Causes hypercalcemia-related symptoms, not stridor with arm elevation. C. Wrong. Causes bradycardia/syncope from carotid stimulation, not facial flushing and stridor during Pemberton maneuver. D. CORRECT. Raising the arms worsens compression of the trachea and venous structures by the substernal goiter."}, {"id": "q634", "pdfPage": 333, "originalNumber": "67", "question": "You are performing a Thyroid Examination on a patient and notices her being anxious and restless. Which of the following should be done to ensure \"Patient Safety, Privacy, and Autonomy\"?", "options": [{"letter": "A", "text": "Perform the examination quickly to save time."}, {"letter": "B", "text": "Allow the patient to stand up in order for everyone else to see the proper techniques of thyroid examination."}, {"letter": "C", "text": "Accompany the patient in a quiet, private, well-lit room, and perform the thyroid examination there."}, {"letter": "D", "text": "Skip the thyroid examination entirely."}], "answer": "C", "answerText": "Accompany the patient in a quiet, private, well-lit room, and perform the thyroid examination there.", "explanation": "67. ANSWER: C A. Wrong because rushing the examination to save time may compromise patient comfort, proper technique, and informed participation, which are important components of patient-centered care. B. Wrong because exposing the patient unnecessarily in front of others violates patient privacy and may increase anxiety and discomfort, especially in a patient who is already anxious and restless. C. Is CORRECT because ensuring patient dignity, comfort, privacy, and autonomy involves accompanying the patient to a quiet, private, and properly lit environment where the thyroid examination can be performed respectfully and safely while minimizing distress and maintaining confidentiality. D. Wrong because patient anxiety is not an indication to omit a necessary physical examination; instead, the examiner should modify the environment and approach to improve patient comfort and cooperation. Here’s the closest mention of patient privacy related to the question, in Bates:"}, {"id": "q635", "pdfPage": 334, "originalNumber": "68", "question": "A newly-wed female patient presents with a diffuse, soft thyroid enlargement without nodules. They report cold intolerance, weight gain and dry skin. This likely points to:", "options": [{"letter": "A", "text": "Hashimoto Thyroiditis (hypothyroidism)"}, {"letter": "B", "text": "Graves’s disease (hyperthyroidism)"}, {"letter": "C", "text": "Anaplastic Thyroid Carcinoma"}, {"letter": "D", "text": "Physiological thyroid of pregnancy"}], "answer": "A", "answerText": "Hashimoto Thyroiditis (hypothyroidism)", "explanation": "68. ANSWER: A A. Is CORRECT because the patient’s symptoms are classic manifestations of hypothyroidism, most commonly caused by Hashimoto thyroiditis. The diffuse, soft, non-nodular thyroid enlargement is consistent with a diffuse goiter seen in autoimmune thyroid disease. B. B. Is wrong because Graves’ disease causes hyperthyroidism, which typically presents with heat intolerance, weight loss, moist skin, palpitations, and hyperactivity, not hypothyroid symptoms. C. C. Is wrong because anaplastic thyroid carcinoma usually presents as a rapidly enlarging hard neck mass with compressive symptoms such as dysphagia or hoarseness, not a soft diffuse enlargement with hypothyroid manifestations. D. Is wrong because physiologic thyroid enlargement in pregnancy is usually mild and not associated with significant symptoms of hypothyroidism such as cold intolerance and weight gain."}, {"id": "q636", "pdfPage": 334, "originalNumber": "69", "question": "A 2 yo child gas sunken eyes and depressed anterior fontanelle. In writing the history, which is “succinct yet comprehensive” in recording fluid intake?", "options": [{"letter": "A", "text": "“The child isn't drinking much today”"}, {"letter": "B", "text": "“Mother reports child drank 60ml of"}], "answer": "B", "answerText": "“Mother reports child drank 60ml of", "explanation": "69. ANSWER: B A. Is wrong because it uses vague language (“isn’t drinking much”) rather than the specific quantitative data required for a clear and professional clinical record B. Is CORRECT because it provides precise measurements (60 ml), a clear timeframe (12 hours), and includes the specific output (1 wet diaper) as a pertinent associated manifestation, which is essential for documenting fluid balance in a sick child C. Is wrong because it offers a general comparison without providing the specific, objective data needed to support a clinical 39 Pedialyte in 12 hours and had 1 wet diaper” C. “Fluid intake is decreased compared to yesterday when he was healthy” D. “Child is thirsty but keeps throwing up everything” assessment of the severity of the patient's condition D. Is wrong because while it identifies \"associated manifestations\" (vomiting), it fails to quantify the actual intake or timeframe, which is necessary for a comprehensive history of the present illness"}, {"id": "q637", "pdfPage": 335, "originalNumber": "70", "question": "While interviewing a mother whose child just had a seizure, she is visibly crying and is blaming herself. Which demonstrates \"Empathetic listening skill\"?", "options": [{"letter": "A", "text": "Tell the mother \"Stop crying, it is just a simple seizure \""}, {"letter": "B", "text": "Continue writing on the chart, not looking up to ensure accurate documentation."}, {"letter": "C", "text": "Pause the interview, offer tissue and tell the mother \" I understand how frightening this is for you\""}, {"letter": "D", "text": "Immediately ask the mother about the child's vaccination record to stay on"}], "answer": "C", "answerText": "Pause the interview, offer tissue and tell the mother \" I understand how frightening this is for you\"", "explanation": "70. ANSWER: C A. Wrong - This minimizes the mother’s feelings and lacks empathy and emotional support. B. Wrong - This shows poor eye contact and lack of emotional acknowledgment, which weakens therapeutic communication. C. Is CORRECT because This demonstrates empathetic listening by recognizing the mother’s emotions, showing concern, and providing emotional support. D. Wrong - Although important clinically, it ignores the mother’s emotional distress and does not demonstrate empathy."}, {"id": "q638", "pdfPage": 336, "originalNumber": "71", "question": "Physical exam maneuver used to assess acute cholecystitis.", "options": [{"letter": "A", "text": "Rovsing sign"}, {"letter": "B", "text": "Psoas sign"}, {"letter": "C", "text": "Murphy’s sign"}, {"letter": "D", "text": "Grey turner’s sign"}], "answer": "C", "answerText": "Murphy’s sign", "explanation": "71. ANSWER: C A. Wrong - Rovsing sign is associated with acute appendicitis, producing right lower quadrant pain when the left lower quadrant is palpated. B. Wrong - Psoas sign suggests retrocecal appendicitis due to irritation of the psoas muscle. C. Is CORRECT because Murphy’s sign is elicited by palpating the right upper quadrant during inspiration, causing pain and inspiratory arrest in acute cholecystitis. D. Wrong - Grey Turner’s sign refers to flank ecchymosis seen in hemorrhagic pancreatitis or retroperitoneal bleeding. Source: Bates - Chapter 19"}, {"id": "q639", "pdfPage": 336, "originalNumber": "72", "question": "Hematochezia means", "options": [{"letter": "A", "text": "Fatty, foul-smelling stool"}, {"letter": "B", "text": "Black tarry stool"}, {"letter": "C", "text": "Passage of bright red blood per rectum"}, {"letter": "D", "text": "Vomiting of blood"}], "answer": "C", "answerText": "Passage of bright red blood per rectum", "explanation": "72. ANSWER: C A. Wrong - Steatorrhea B. Wrong - Melena C. Is CORRECT because Hematochezia is the passage of fresh, bright red blood from the anus, typically indicating acute bleeding in the lower gastrointestinal (GI) tract D. Wrong - Hematemesis Unche…"}, {"id": "q640", "pdfPage": 337, "originalNumber": "73", "question": "Which of the following metabolic abnormalities is mostly associated with generalized muscle weakness and ileus on abdominal exam?", "options": [{"letter": "A", "text": "Hypokalemia"}, {"letter": "B", "text": "Hypoglycemia"}, {"letter": "C", "text": "Hypercalcemia"}, {"letter": "D", "text": "Hypernatremia"}], "answer": "A", "answerText": "Hypokalemia", "explanation": "73. ANSWER: A A. Is CORRECT because low potassium causes cellular hyperpolarization, making action potentials harder to fire. This directly suppresses both skeletal muscle (causing generalized flaccid weakness) and smooth muscle in the GI tract (causing decreased peristalsis and paralytic ileus) as observed on the abdominal exam. B. Wrong - because low blood sugar primarily affects the central and autonomic nervous systems. It presents with sympathetic activation (diaphoresis, tachycardia, tremors) and neuroglycopenia (confusion, lethargy, seizures), rather than profound muscle paralysis or ileus. C. Wrong - because high calcium decreases neuromuscular excitability. While it can cause mild weakness and severe 42 constipation, the distinct combination of sudden generalized weakness and a frank paralytic ileus is the classic hallmark of hypokalemia. D. Wrong - because high sodium drives osmotic fluid shifts, drawing water out of cells (particularly in the brain). Its primary manifestations are neurological (irritability, altered mental status, coma, seizures) rather than gastrointestinal or isolated muscle weakness. Source: Schwartz 11th Ed., Chapter 3, p. 89"}, {"id": "q641", "pdfPage": 338, "originalNumber": "74", "question": "In evaluating hydration of a patient with diarrhea, a “scaphoid” abdomen is one that is?", "options": [{"letter": "A", "text": "Asymmetric"}, {"letter": "B", "text": "Distended with gas"}, {"letter": "C", "text": "Sunken or concave"}, {"letter": "D", "text": "Protuberant with fat"}], "answer": "C", "answerText": "Sunken or concave", "explanation": "74. ANSWER: C A. Wrong - this describes the abdomen as having a visible or palpable unevenness in its contours which may signify hernia or enlargement of an organ or presence of a mass B. Wrong - the abdomen distended with gas may appear protuberant and midsection may expand beyond its normal size C. Is CORRECT because scaphoid abdomen is characterized by an anterior abdominal wall that is sunken giving the abdomen a hollow, “boat-like” shape and indicates an abnormal decrease in abdominal contents or severe muscle and fat loss D. Wrong - an abdomen with protuberant fat has a thick abdominal wall wherein the umbilicus may appear sunken and does not have a scaphoid contour"}, {"id": "q642", "pdfPage": 338, "originalNumber": "75", "question": "What is the standard screening test for early detection of BPH?", "options": [{"letter": "A", "text": "Ultrasound"}, {"letter": "B", "text": "Percussion of abdomen"}, {"letter": "C", "text": "Direct rectal exam"}, {"letter": "D", "text": "Palpation of the inguinal ring"}], "answer": "C", "answerText": "Direct rectal exam", "explanation": "75. ANSWER: C A. Wrong - Diagnostic or supportive tool, not standard screening test for early BPH. B. Wrong - May detect bladder distention, but is not used for BPH screening. C. Is CORRECT because direct rectal exam (DRE) is used for early evaluation of benign prostatic hyperplasia (BPH), the standard bedside screening method. D. Wrong - Used for hernia examination, not for prostate assessment."}, {"id": "q643", "pdfPage": 339, "originalNumber": "76", "question": "40 yr old female presents with severe RUQ pain that radiates to the R shoulder after a fatty meal. On exam, no fever and Murphy sign is absent but very tender on RUQ. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Acute cholecystitis"}, {"letter": "B", "text": "Cholelithiasis"}, {"letter": "C", "text": "Kidney stones"}, {"letter": "D", "text": "Breast CA metastases"}], "answer": "B", "answerText": "Cholelithiasis", "explanation": "76. ANSWER: B A. Wrong - This occurs when the obstruction is persistent, leading to inflammation. This would typically present with fever, leukocytosis, and a positive Murphy sign). B. Is CORRECT because This involves transient obstruction. The pain is typically episodic and triggered by \"fatty meals\" (which stimulate gallbladder contraction). Importantly, the patient is afebrile and the Murphy sign is absent because there is no active inflammation or infection of the gallbladder wall yet C. Wrong - Renal colic typically presents with flank pain that radiates to the groin (labia in females), not the shoulder. It is often associated with hematuria D. Wrong - While cancer can metastasize to the liver, it usually presents with chronic, dull weight loss and systemic symptoms rather than acute, post-prandial sharp pain."}, {"id": "q644", "pdfPage": 340, "originalNumber": "77", "question": "A px with CKD is being interviewed. The student notices the patient being frustrated, \"the Doctor keeps poking me and nothing gets better.\" The student responds, \"I notice you are frustrated with the process, can you tell me more about it?\" This is an example of:", "options": [{"letter": "A", "text": "Unrecalled"}, {"letter": "B", "text": "Ignoring the patient's mood and continue history"}, {"letter": "C", "text": "Professional behavior by setting boundaries"}, {"letter": "D", "text": "Ethical sympathizing and building rapport"}], "answer": "D", "answerText": "Ethical sympathizing and building rapport", "explanation": "77. ANSWER: D A. Unrecalled B. Wrong - the student did the exact opposite where they paused to address the patient’s emotional state instead of redirecting immediately back to medical questions. C. Wrong - setting boundaries means limiting inappropriate behavior or maintaining professional distance. Here, the student is primarily demonstrating empathy and rapport-building, not boundary-setting. D. Is CORRECT because the student recognized the patient’s emotion, acknowledged it empathetically and encouraged further expression. Bates’, Chapter 2, page 128"}, {"id": "q645", "pdfPage": 340, "originalNumber": "45", "question": "This is highly suspicious of?", "options": [{"letter": "A", "text": "Prostatitis"}, {"letter": "B", "text": "Prostatic cancer"}, {"letter": "C", "text": "Urinary bladder stones"}, {"letter": "D", "text": "Benign Prostatic Hyperplasia"}], "answer": "B", "answerText": "Prostatic cancer", "explanation": "B. Is CORRECT because prostate cancer is classically associated on DRE with hard, irregular, nontender prostate nodule with obliteration of the median sulcus located in the posterior or lateral lobe C. Wrong - not diagnosed by prostate DRE findings D. Wrong - prostate is typically smooth, firm/rubbery, enlarged, and symmetric with preserved median sulcus in the early stage"}, {"id": "q646", "pdfPage": 341, "originalNumber": "79", "question": "A patient presents with acute, colicky flank pain that radiates to the groin. It was observed that the patient would frequently shift positions and can't stay still. This is commonly seen in:", "options": [{"letter": "A", "text": "Peritonitis"}, {"letter": "B", "text": "Cholecystitis"}, {"letter": "C", "text": "Appendicitis"}, {"letter": "D", "text": "Ureterolithiasis"}], "answer": "D", "answerText": "Ureterolithiasis", "explanation": "79. ANSWER: D A. Wrong - Although patients with peritonitis usually prefer to lie still (+ rigidity), peritonitis presents with aching pain localized over its structure, typically aggravated by movement or coughing. This is not characterized as colicky pain with frequent shifting of positions. B. Wrong - Cholecystitis presents with RUQ or abdominal pain, not flank pain. C. Wrong - Appendicitis presents as RLQ pain, not flank pain. Tenderness over the McBurney’s point may also be present or peritoneal signs of acute abdomen. D. Is CORRECT because Ureterolithiasis presents with acute, colicky flank pain that radiates to the groin. A. Peritonitis B. Cholecystitis C. Appendicitis 46 D. Ureterolithiasis"}, {"id": "q647", "pdfPage": 342, "originalNumber": "80", "question": "A patient presents with sudden \"tea-colored urine\" and edema. (+) History of patient was diagnosed with CKD. To provide a \"succinct medical report\" the student should document:", "options": [{"letter": "A", "text": "“Patients pee is weird and they are puffy\""}, {"letter": "B", "text": "\"Patient is unhappy with their kidney function.\""}, {"letter": "C", "text": "\"CKD patients has \"tea-colored urine\""}], "answer": null, "answerText": "", "explanation": "80. ANSWER: D A. Wrong - This report is incomplete and not succinct. B. Wrong - This report is incomplete and not succinct. C. Wrong - This report is incomplete and not succinct. D. CORRECT - This report is succinct and complete. 47 because they don't drink enough water.\" D. \"History of CKD, reports 2 days of hematuria and bilateral pitting pedal edema.\" BATE'S 12THED CH3 PG66"}, {"id": "q648", "pdfPage": 343, "originalNumber": "81", "question": "A 60-year-old male presents with increased urinary frequency, urgency, & weak stream. On digital rectal examination (DRE), the prostate is enlarged, smooth, and rubbery. What do these findings signify?", "options": [{"letter": "A", "text": "Benign prostatic hyperplasia (BPH)"}, {"letter": "B", "text": "Prostate cancer"}, {"letter": "C", "text": "Acute proctitis"}, {"letter": "D", "text": "Bladder stone"}], "answer": "A", "answerText": "Benign prostatic hyperplasia (BPH)", "explanation": "81. ANSWER: A A. BPH commonly causes irritative symptoms (urgency, frequency, nocturia) and obstructive symptoms (weak stream, incomplete emptying, straining). On DRE, the prostate is typically symmetrically enlarged, smooth, firm, and slightly elastic/rubbery. B. Prostate cancer is suggested by an area of hardness or a hard irregular nodule. The gland may feel irregular and can extend beyond the prostate. C. Acute proctitis primarily causes rectal pain, inflammation, and discomfort, not a smooth enlarged prostate on DRE. D. Bladder stones may cause urinary symptoms, but they do not cause a smooth, symmetrically enlarged, rubbery prostate on examination. Bates 12ed Ch. 15 Table 15-3"}, {"id": "q649", "pdfPage": 343, "originalNumber": "82", "question": "Palpation of breast on a 50 yr old woman, findings include hard, fixed mass with skin dimpling (peau d’ orange), suspicious of?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Breast abscess"}], "answer": null, "answerText": "", "explanation": "82. ANSWER: C A. Wrong - fibroadenoma is typically a benign, mobile, well-circumscribed mass, not hard, fixed, or associated with skin changes. B. Wrong - breast abscess presents with pain, warmth, erythema, and fluctuance, not a hard fixed mass with peau d’orange. 48 C. Breast cancer D. Mammary duct ectasia C. Is CORRECT because a hard, fixed breast mass with skin dimpling (peau d’orange) is classic for breast carcinoma, due to invasion and lymphatic obstruction causing skin tethering and edema. D. Wrong - mammary duct ectasia typically presents with nipple discharge and periductal inflammation, not a fixed hard mass with skin changes. Source: Bates, Chapter 18"}, {"id": "q650", "pdfPage": 344, "originalNumber": "83", "question": "Patient with history of \"bladder stones\" presents with suprapubic pain with interrupted urinary stream. To build rapport, patient should.", "options": [{"letter": "A", "text": "Ask why patient didn't come in earlier"}, {"letter": "B", "text": "Tell the patient the pain is \"all in his head\""}, {"letter": "C", "text": "Focus only on the computer to ensure all details are typed correctly"}, {"letter": "D", "text": "Address patient by preferred name and maintain eye contact while discussing symptoms"}], "answer": "D", "answerText": "Address patient by preferred name and maintain eye contact while discussing symptoms", "explanation": "83. ANSWER: D A. Wrong - may sound judgmental and can make the patient defensive B. Wrong - dismisses the patient’s symptoms and is inappropriate C. Wrong - reduces interpersonal connection and makes the patient feel ignored D. Is CORRECT because it shows good physician-patient rapport-building through respect, empathy, and active engagement"}, {"id": "q651", "pdfPage": 345, "originalNumber": "85", "question": "A 62 year old female with a long history of tobacco use and unintentional weight loss presents with hematochezia. During DRE, notes a firm, palpable mass approximately 4cm from the anal verge. Which clinical reasoning best explains these findings?", "options": [{"letter": "A", "text": "The mass is like a stool impaction causing “overflow” bleeding."}, {"letter": "B", "text": "The patient likely has internal hemorrhoids the has become fibrotic"}, {"letter": "C", "text": "The bleeding is like from a proximal gastric source that has undergone in rapid transit."}, {"letter": "D", "text": "The presentation is highly suspicious of lower GI malignancy, likely rectal cancer. o"}], "answer": "D", "answerText": "The presentation is highly suspicious of lower GI malignancy, likely rectal cancer. o", "explanation": "85. ANSWER: D A. Wrong - Stool impaction may cause leakage or minor irritation, but a firm palpable rectal mass with weight loss and tobacco history strongly suggests malignancy rather than impaction. B. Wrong - Internal hemorrhoids usually cause painless bright red bleeding and are typically soft/compressible, not a firm irregular mass. They also do not explain unintentional weight loss. C. Wrong - Upper GI bleeding more commonly causes melena (black tarry stool). Hematochezia from an upper source occurs mainly with massive brisk bleeding, and would not explain a palpable rectal mass. D. Is CORRECT because Classic red flags include: ● Age > 60 ● Long smoking history ● Unintentional weight loss ● Hematochezia ● Firm rectal mass on DRE near the anal verge"}, {"id": "q652", "pdfPage": 346, "originalNumber": "86", "question": "According to Bates, the \"Naegele's Rule\" for estimating the EDD is calculated by:", "options": [{"letter": "A", "text": "Adding 7 days to the LMP, subtracting 3 months, adding 1 year"}, {"letter": "B", "text": "Subtracting 7 days to the LMP, adding 9 months"}, {"letter": "C", "text": "Adding 7 days to the LMP and 7 months"}, {"letter": "D", "text": "Adding 9 months and 14 days to the LMP"}], "answer": "A", "answerText": "Adding 7 days to the LMP, subtracting 3 months, adding 1 year", "explanation": "86. ANSWER: A A. Is CORRECT because This is the standard Naegele’s Rule for estimating the expected date of delivery (EDD). B. Wrong.The direction of the 7-day adjustment is wrong. C. Wrong. Naegele’s Rule uses 9 months (or subtract 3 months), not 7 months. D. Wrong. This is not the standard formula for EDD calculation. Source: Bate's"}, {"id": "q653", "pdfPage": 346, "originalNumber": "87", "question": "At approximately how many weeks gestation does the uterine fundus typically reach the level of the umbilicus?", "options": [{"letter": "A", "text": "12 weeks"}, {"letter": "B", "text": "16 weeks"}, {"letter": "C", "text": "20 weeks"}, {"letter": "D", "text": "24 weeks"}], "answer": "C", "answerText": "20 weeks", "explanation": "87. ANSWER: C A. Wrong - too early B. Wrong - too early C. Is CORRECT D. Wrong - Too long Bates Chapter 26 The Pregananant woman"}, {"id": "q654", "pdfPage": 346, "originalNumber": "88", "question": "88.) Benign skin change during pregnancy characterized by brown black line over midline of abdomen is called", "options": [{"letter": "A", "text": ") Chloasum"}, {"letter": "B", "text": ") Striae gravidum"}, {"letter": "C", "text": ") Linea nigra"}, {"letter": "D", "text": ") something recti"}], "answer": "C", "answerText": ") Linea nigra", "explanation": "88. ANSWER: C A. Wrong - B. Wrong - C. Is CORRECT because ratio D. Wrong - Unche…"}, {"id": "q655", "pdfPage": 347, "originalNumber": "89", "question": "Which is a normal physiologic finding in pregnancy:", "options": [{"letter": "A", "text": "Diastolic murmur"}, {"letter": "B", "text": "decreased heart rate"}, {"letter": "C", "text": "Generalize peripheral edema"}, {"letter": "D", "text": "Systolic ejection murmur Stage II/VI"}], "answer": "D", "answerText": "Systolic ejection murmur Stage II/VI", "explanation": "89. ANSWER: D A. Wrong - because: A diastolic murmur is usually considered pathologic, not a normal finding in pregnancy. Diastolic murmurs suggest conditions like valvular heart disease and require evaluation. B. Wrong - because: Pregnancy normally causes a slight increase in heart rate (about 10–20 bpm) due to increased metabolic demands and circulating blood volume. Therefore, decreased heart rate is not expected. C. Wrong - because: Mild dependent edema of the lower extremities can occur in pregnancy, but generalized peripheral edema is abnormal and may suggest conditions such as preeclampsia or other pathology. D. CORRECT - because: Pregnancy normally causes increased blood volume and cardiac output, leading to increased blood flow across the heart valves. This commonly produces a soft systolic ejection murmur (usually grade I–II/VI), especially over the pulmonic area. It is considered a physiologic/flow murmur in pregnancy. Source: Bates - Chapter 26, Techniques of examination, Heart"}, {"id": "q656", "pdfPage": 347, "originalNumber": "90", "question": "What is the frequency of FHR using a doppler in a healthy pregnant woman after 10-12 weeks", "options": [{"letter": "A", "text": "60-100 bpm"}, {"letter": "B", "text": "80-120 bpm"}, {"letter": "C", "text": "110-160 bpm"}, {"letter": "D", "text": "180-200 bpm"}], "answer": "C", "answerText": "110-160 bpm", "explanation": "90. ANSWER: C A. Wrong - below normal rate B. Wrong - below normal rate C. Is CORRECT because it is the usual range for FHR D. Wrong - above normal rate"}, {"id": "q657", "pdfPage": 348, "originalNumber": "91", "question": "You performed a focused interview on a 34-year-old G1P0 at 12 weeks, she expresses intense anxiety about miscarriage. Which response best demonstrates empathic listening?", "options": [{"letter": "A", "text": "“Anxiety is bad for the baby, so stay calm.”"}, {"letter": "B", "text": "“Don’t worry, most pregnancies turn out fine.”"}, {"letter": "C", "text": "“Let’s focus on taking your vitals first, then we can talk about it later.”"}, {"letter": "D", "text": "“I hear you’re very worried; can you talk to me about what’s on your mind.”"}], "answer": "D", "answerText": "“I hear you’re very worried; can you talk to me about what’s on your mind.”", "explanation": "91. ANSWER: D A. Is wrong because this uses a shaming approach causing only added stress to the patient, and discouraging open communication. B. Is wrong because this only gives the patient false reassurance. C. Is wrong because this may make the patient feel that her concerns are not a priority. D. Is CORRECT because it first recognizes the patient’s feelings then following up with an invitation to share emotional content. Source: Bates’ 13th ed. Chap 2, p 138"}, {"id": "q658", "pdfPage": 348, "originalNumber": "92", "question": "Third Leopold's maneuver: hard, round, ballotable mass in the lower uterine segment. First maneuver: soft, irregular mass on the fundus", "options": [{"letter": "A", "text": "Cephalic presentation"}, {"letter": "B", "text": "Breech presentation"}, {"letter": "C", "text": "Multiple gestation"}, {"letter": "D", "text": "Transverse lie"}], "answer": "C", "answerText": "Multiple gestation", "explanation": "92. ANSWER: C A. Is CORRECT because a hard, round, ballotable mass in lower uterine segment = head is down. A soft irregular mass in fundus = breech is up. This means fetus is head-down (cephalic). B. Wrong - Would show soft mass in lower segment (buttocks), not hard round mass. C. Wrong - Would have multiple fetal parts, not a single presenting head. D. Wrong - if fetus lies sideways there will be no clear head in thr lower segment."}, {"id": "q659", "pdfPage": 349, "originalNumber": "93", "question": "32 weeks fundic height 26cm. Indicates?", "options": [{"letter": "A", "text": "LMP & px unreliable"}, {"letter": "B", "text": "Within 10cm range"}, {"letter": "C", "text": "Normal"}, {"letter": "D", "text": "Assess px while standing"}], "answer": "A", "answerText": "LMP & px unreliable", "explanation": "93. ANSWER: A A. Is CORRECT because When there is a major gap between the expected weeks and the actual fundal height, the very first thing a clinician must consider is an error in dating. The patient's recalled Last Menstrual Period (LMP) might be incorrect, or the patient might be an unreliable historian. The next immediate step is an ultrasound to establish accurate dating and rule out intrauterine growth restriction (IUGR) or oligohydramnios. B. Wrong - The acceptable normal variance for fundal height is a 2 cm range from the gestational age, not a 10 cm range. A 10 cm discrepancy would represent an extreme, life-threatening pathology or massive dating error. C. Wrong - A 26 cm fundal height at 32 weeks is distinctly abnormal. It sits far below the lower limit of normal (30 cm) and indicates a lag of 6 weeks. D. Wrong - Fundal height must always be measured with the patient in the supine position (with a wedge under the right hip to prevent supine hypotensive syndrome) after emptying their bladder. Measuring a patient while standing alters abdominal muscle tone and gravity, making the measurement inaccurate and non-standardized. Unche…"}, {"id": "q660", "pdfPage": 349, "originalNumber": "94", "question": "A pregnant patient showing a “mask of pregnancy” (hyperpigmentation of the face). Record this finding as", "options": [{"letter": "A", "text": "Melasma or Chloasma"}, {"letter": "B", "text": "Erythema infectiosum"}, {"letter": "C", "text": "Jaundice"}, {"letter": "D", "text": "Cyanosis"}], "answer": "A", "answerText": "Melasma or Chloasma", "explanation": "94. ANSWER: A A. Is CORRECT because Melasma or Chloasma: Commonly referred to as the \"mask of pregnancy,\" chloasma (or melasma) is a benign condition characterized by symmetrical, blotchy, brown-to-tan patches of hyperpigmentation on the face, typically affecting the cheeks, forehead, bridge of the nose, and upper lip. It is triggered by the surge of pregnancy hormones—specifically estrogen, progesterone, and melanocyte-stimulating hormone (MSH)—which stimulate melanocytes to overproduce melanin upon exposure to ultraviolet (UV) light. B. Wrong - Erythema infectiosum: Also known as \"Fifth Disease,\" this is a contagious viral infection caused by Parvovirus B19. It typically presents in children as a bright red, \"slapped-cheek\" rash on the face rather than brown or tan hyperpigmentation. C. Wrong - Jaundice: This is a yellowish discoloration of the skin, mucous membranes, and sclera (the whites of the eyes) caused by elevated bilirubin levels in the blood. It indicates underlying hepatic, biliary, or hemolytic pathology rather than normal hormonal shifts. D. Wrong - Cyanosis: This is a bluish or purplish discoloration of the skin and mucous membranes caused by an increased concentration of deoxygenated hemoglobin in the blood. It"}, {"id": "q661", "pdfPage": 350, "originalNumber": "95", "question": "Patient of 38 weeks of gestation reports that her baby is moving less than usual. Priority action should be:", "options": [{"letter": "A", "text": "Tell the patient that its normal as the baby runs out of room"}, {"letter": "B", "text": "Schedule for follow-up next 2 weeks"}, {"letter": "C", "text": "Record history and wait for the attending"}, {"letter": "D", "text": "Perform focused interview on fetal movements and immediately assess fetal heart tone"}], "answer": "D", "answerText": "Perform focused interview on fetal movements and immediately assess fetal heart tone", "explanation": "95. ANSWER: D E. Wrong - Although movement quality may change late in pregnancy, decreased fetal movement should never be assumed normal without assessment F. Wrong - At 38 weeks, waiting is unsafe because decreased movement may indicate fetal distress. G. Wrong- Delaying assessment is inappropriate; initial fetal assessment is the priority. H. Is CORRECT because At 38 weeks gestation, decreased fetal movement is a warning sign of possible fetal compromise/hypoxia and requires immediate assessment, not reassurance. Source: Bates 12th ed. Pg. 944"}, {"id": "q662", "pdfPage": 351, "originalNumber": "96", "question": "A physician suspects meningitis in a febrile 4-month infant with poor feeding and irritability. Which of the following physical conditions is most concerning of increased intracranial pressure and possible meningitis in this age group?", "options": [{"letter": "A", "text": "Hyperactive deep tendon reflexes"}, {"letter": "B", "text": "Bulging anterior fontanelle"}, {"letter": "C", "text": "Positive Babinski Reflex"}, {"letter": "D", "text": "Slight tachycardia"}, {"letter": "E", "text": "Transient hypotonia during sleep"}], "answer": "B", "answerText": "Bulging anterior fontanelle", "explanation": "96. ANSWER: B A. Wrong - because:Hyperactive deep tendon reflexes are nonspecific and may occur in various neurologic conditions. They are not a classic key finding pointing strongly toward meningitis with increased ICP in a 4-month-old infant. B. CORRECT - because:In infants, the cranial sutures and fontanelles are still open. Increased intracranial pressure from conditions like meningitis can cause the anterior fontanelle to bulge. In a febrile infant with irritability and poor feeding, this is a highly concerning sign for CNS infection and raised ICP. C. Wrong - because:A positive Babinski reflex is normal in infants due to incomplete corticospinal tract myelination. It is physiologic up to about 1–2 years of age. D. Wrong - because:Slight tachycardia commonly occurs with fever, crying, dehydration, or stress. It is nonspecific and not a hallmark sign of increased intracranial pressure. E. Wrong - because: Transient hypotonia during sleep can be physiologic in infants and is not a classic concerning sign for meningitis or elevated ICP. Source: Ch 25"}, {"id": "q663", "pdfPage": 351, "originalNumber": "97", "question": "The patient is suspected of meningitis. The examiner flexed the patients hip and knees 90 degrees and also extending the knee, which causes pain.", "options": [{"letter": "A", "text": "Compression of spinal and meninges"}, {"letter": "B", "text": "Vestibular dysfunction"}, {"letter": "C", "text": "Corticospinal tract injury"}, {"letter": "D", "text": "Cerebellar dysfunction"}, {"letter": "E", "text": "Basal ganglia dysfunction"}], "answer": "A", "answerText": "Compression of spinal and meninges", "explanation": "97. ANSWER: A The maneuver described is Kernig’s sign, a sign of meningeal irritation seen in meningitis. A. Compression of spinal and meninges – correct; stretching inflamed meninges causes pain/resistance. B. Vestibular dysfunction – causes balance and vertigo problems, not Kernig’s sign. C. Corticospinal tract injury – causes weakness/spasticity, not meningeal pain. D. Cerebellar dysfunction – causes ataxia and coordination problems. E. Basal ganglia dysfunction – causes movement disorders like tremors/rigidity"}, {"id": "q664", "pdfPage": 352, "originalNumber": "98", "question": "A physician is obtaining history from the parents of a child with recurrent seizures. Which historical question best helps in distinguishing epileptical seizures from psychogenic nonepileptic events?", "options": [{"letter": "A", "text": "“Does the child eat before the seizure?”"}, {"letter": "B", "text": "“How many siblings does the child have?”"}, {"letter": "C", "text": "“Is there loss of bladder control and postictal confusion?”"}, {"letter": "D", "text": "“Does the child prefer sports or reading?”"}, {"letter": "E", "text": "“What is the child’s vaccination history?”"}], "answer": "C", "answerText": "“Is there loss of bladder control and postictal confusion?”", "explanation": "98. ANSWER: C A. Wrong - Meal patterns are not reliable features for distinguishing epileptic from psychogenic events. B. Wrong - Family size has no diagnostic value in differentiating seizure types. C. Is CORRECT because Postictal confusion and urinary incontinence are classic features that strongly support true epileptic seizures over psychogenic nonepileptic events. D. Wrong - Personal interests are unrelated to seizure characterization. E. Wrong - Vaccination history may relate to febrile illnesses but does not distinguish epileptic from psychogenic events. Source: Bates’ Guide to Physical Examination and History Taking, p1449 Unche…"}, {"id": "q665", "pdfPage": 352, "originalNumber": "57", "question": "examination of an acute stroke patient, the clinician strokes the lateral side of the sole of the foot and dorsiflexion of the great toe and fanning of the other toes. Which is likely a", "options": [{"letter": "A", "text": "Lower motor neuron lesion"}, {"letter": "B", "text": "Cerebellar dysfunction"}, {"letter": "C", "text": "Peripheral neuropathy"}, {"letter": "D", "text": "Corticospinal tract dysfunction"}, {"letter": "E", "text": "Basal ganglia disease"}], "answer": "D", "answerText": "Corticospinal tract dysfunction", "explanation": "99. ANSWER: D A. Wrong - Lower motor neuron lesions are typically associated with flaccid paralysis, hyporeflexia, fasciculations, and muscle atrophy rather than an extensor plantar response. B. Wrong - Cerebellar dysfunction commonly presents with ataxia, dysmetria, intention tremor, and impaired coordination, not a positive Babinski sign. C. Wrong - Peripheral neuropathy usually causes sensory loss, weakness, and reduced reflexes, but does not produce dorsiflexion of the great toe with fanning of the other toes. D. Is CORRECT because dorsiflexion of the great toe with fanning of the other toes after stroking the sole describes a positive Babinski sign, which indicates corticospinal tract (upper motor neuron) dysfunction commonly seen in acute stroke. E. Wrong - Basal ganglia disease typically causes movement disorders such as tremors, rigidity, bradykinesia, or chorea rather than a Babinski response. Source: Bates Chapter 17, p.764"}, {"id": "q666", "pdfPage": 353, "originalNumber": "100", "question": "This maneuver (#99) elicits what reflex?", "options": [{"letter": "A", "text": "Kernig's"}, {"letter": "B", "text": "Dysarthria"}, {"letter": "C", "text": "Moro"}, {"letter": "D", "text": "Babinski"}, {"letter": "E", "text": "Chaddocks"}], "answer": "D", "answerText": "Babinski", "explanation": "100. ANSWER: D A. Wrong - this reflex is a sign of meningeal irritation wherein the patient lies supine and hip and knee are flexed at 90 degrees and examiner attempts to extend the knee. A positive result occurs when there is pain or resistance during knee extension due to hamstring spasm B. Wrong - this is a motor speech disorder caused by impaired control of speech muscles. This may be caused by stroke, parkinson’s disease, cerebellar disease or cranial nerve lesions C. Wrong - this is a primitive neonatal reflex seen in infants elicited by a sudden loss of support or a startle stimulus. The normal response is when there is abduction and extension of arms then flexion or adduction. This is usually present at birth and disappears by 4 months. D. Is CORRECT because the maneuver elicited an abnormal plantar reflex in adults and the fanning of the toes is termed as a positive Babinski reflex 58 E. Wrong - this is a variant of Babinski elicited by stroking the lateral malleolus or lateral dorsum instead of the sole with the same positive response as Babinski"}, {"id": "q667", "pdfPage": 355, "originalNumber": "1", "question": "A 4-year old has fever and cough. Which history question is … of respiratory compromise?", "options": [{"letter": "A", "text": "Presence of chest pain"}, {"letter": "B", "text": "Reduced fluid intake over the past day"}, {"letter": "C", "text": "Exposure to sick people"}, {"letter": "D", "text": "Caregiver-observed labored breathing at rest"}], "answer": "D", "answerText": "Caregiver-observed labored breathing at rest", "explanation": "1. ANSWER: D A. Is wrong because chest pain can occur with coughing or pneumonia but is less predictive or respiratory failure. B. Is wrong because reduced fluid intake suggests dehydration or illness severity, not specifically respiratory compromise. C. Is wrong because exposure to sick people helps identify infectious cause but not severity. D. Is CORRECT because caregiver-observed labored breathing at rest is most concerning for respiratory compromise because increased work of breathing and dyspnea are key manifestations of significant lower respiratory illness in children, including pneumonia and asthma. Source: Bates 13th Ed. Ch.25 p. 1743"}, {"id": "q668", "pdfPage": 355, "originalNumber": "2", "question": "A child with a cough is evaluated. Which indicated lower respiratory involvement?", "options": [{"letter": "A", "text": "Nasal congestion"}, {"letter": "B", "text": "Audible wheezing and noisy breathing"}, {"letter": "C", "text": "Sore throat"}, {"letter": "D", "text": "Intermittent sneezing"}], "answer": "B", "answerText": "Audible wheezing and noisy breathing", "explanation": "2. ANSWER: B A. Is wrong because it involves upper respiratory tract (nose, sinuses) B. Is CORRECT because Wheezing is a classic sign of lower respiratory tract involvement (bronchi and lungs), often seen in conditions like bronchiolitis or asthma. It reflects airway narrowing or obstruction in the lower airways. C. Is wrong because it involves upper respiratory tract (pharynx) D. Is wrong because it involves upper respiratory tract (nasal mucosa irritation)"}, {"id": "q669", "pdfPage": 356, "originalNumber": "3", "question": "During examination, which finding reflects hard and labored breathing?", "options": [{"letter": "A", "text": "Tachycardia immediate to fever"}, {"letter": "B", "text": "Mild appetite"}, {"letter": "C", "text": "Intercostal retractions with nasal flaring"}, {"letter": "D", "text": "Moist mucous membranes"}], "answer": "C", "answerText": "Intercostal retractions with nasal flaring", "explanation": "3. ANSWER: C A. Is wrong because tachycardia secondary to fever is a nonspecific physiologic response and does not directly indicate increased work of breathing. B. Is wrong because mild appetite is unrelated to respiratory effort and is not a clinical sign of respiratory distress. C. Is CORRECT because intercostal retractions with nasal flaring are classic signs of increased work of breathing and respiratory distress, indicating hard and labored breathing. D. Is wrong because moist mucous membranes reflect adequate hydration status and are not indicators of respiratory distress or labored breathing. Bates 13th ed. Ch. 15, p. 775"}, {"id": "q670", "pdfPage": 356, "originalNumber": "4", "question": "A febrile child with cough presents in the clinic. Which of the following is a critical vital sign parameter to determine severity?", "options": [{"letter": "A", "text": "Blood pressure"}, {"letter": "B", "text": "Temperature trend"}, {"letter": "C", "text": "Weight percentage"}, {"letter": "D", "text": "Respiratory rate adjusted for age"}], "answer": "D", "answerText": "Respiratory rate adjusted for age", "explanation": "4. ANSWER: D A. Is wrong because this is often a late sign of deterioration in children. Pediatric patients can maintain a normal blood pressure through compensation until they are very ill (decompensated shock). B. Is wrong because in children, the \"height\" or \"trend\" of a fever is often a poor predictor of how sick they actually are. A child with a mild viral upper respiratory infection (a common cold) can have a very high fever while a child with life-threatening bacterial pneumonia or sepsis might only have a low-grade fever or even a sub-normal temperature (hypothermia). C. Is wrong because while it is helpful for long-term health tracking or hydration status, it is not an acute indicator of respiratory distress or immediate severity in a cough/fever presentation. D. Is CORRECT because respiratory rate is the most important indicator of pneumonia and respiratory distress in children. In relation to the case, this is the most distinguishing vital sign that indicates progression or therefore severity of the disease."}, {"id": "q671", "pdfPage": 357, "originalNumber": "5", "question": "On auscultation, which indicates parenchymal (alveolar) involvement?", "options": [{"letter": "A", "text": "Fine crackles in one lung field"}, {"letter": "B", "text": "Transmitted upper airway"}, {"letter": "C", "text": "Vesicular breath sounds bilaterally"}, {"letter": "D", "text": "Equal air entry without added sounds"}], "answer": "A", "answerText": "Fine crackles in one lung field", "explanation": "5. ANSWER: A A. Is CORRECT. Fine crackles (crepitations) are the hallmark of alveolar or parenchymal involvement. They are produced by the explosive opening of small airways and alveoli that have collapsed due to fluid, inflammation, or fibrosis. Hearing them in one lung field suggests a localized parenchymal process, such as pneumonia. B. Is wrong. This is a clinical finding of normal respiratory health. C. Is wrong. Vesicular sounds are normal breath sounds heard over most of the lung fields D. Is wrong. This is a clinical finding of normal respiratory health. Source: Bates 13th Ed., Ch15, p811"}, {"id": "q672", "pdfPage": 357, "originalNumber": "6", "question": "A child presents with cough, fever, and difficulty in breathing. Which of the following history elements suggests chronic airway disease?", "options": [{"letter": "A", "text": "Family history of asthma and atopy"}, {"letter": "B", "text": "Antibiotic use"}, {"letter": "C", "text": "Duration of current fever"}, {"letter": "D", "text": "Change of appetite"}], "answer": "A", "answerText": "Family history of asthma and atopy", "explanation": "6. ANSWER: A A. Family history of asthma and atopy — CORRECT because a family history of asthma or allergic conditions strongly suggests an underlying chronic airway disease such as asthma. B. Antibiotic use — Incorrect because it does not specifically indicate chronic airway disease. C. Duration of current fever — Incorrect because fever duration is more helpful in assessing infection rather than chronic airway disease. D. Change of appetite — Incorrect because it is a nonspecific symptom and not a strong indicator of chronic airway disease."}, {"id": "q673", "pdfPage": 358, "originalNumber": "7", "question": "On general inspection, the child is quiet, minimally interactive and refuses liquids. What is the most appropriate interpretation?", "options": [{"letter": "A", "text": "Normal variation in behavior"}, {"letter": "B", "text": "Mild illness"}, {"letter": "C", "text": "Concerning for systemic illness severity"}, {"letter": "D", "text": "Sleepiness due to fever alone"}], "answer": "C", "answerText": "Concerning for systemic illness severity", "explanation": "7. ANSWER: C A. Is wrong because while behavior can vary normally in children, a quiet child who is minimally interactive and refusing liquids demonstrates more than simple temperament variation and may indicate illness severity. B. Is wrong because children with mild illness are usually still reasonably interactive and able to maintain oral intake, so refusal of liquids is a concerning sign. C. Is CORRECT because a child’s general appearance, level of interaction, and willingness to drink are key parts of the initial pediatric assessment; minimal interaction and refusal of liquids suggest possible dehydration or systemic illness and warrant concern. D. Is wrong because although fever can cause fatigue, Bates emphasizes that decreased responsiveness and poor intake should not be attributed to fever alone without considering more serious illness."}, {"id": "q674", "pdfPage": 359, "originalNumber": "8", "question": "A 9 years old, 3 days history of high fever. Which history points to dengue?", "options": [{"letter": "A", "text": "Recent unpasteurized milk intake"}, {"letter": "B", "text": "Recent URTI symptoms"}, {"letter": "C", "text": "Regular exposure mosquito-prone environments"}, {"letter": "D", "text": "Recent antibiotic use"}], "answer": "C", "answerText": "Regular exposure mosquito-prone environments", "explanation": "8. ANSWER: C A. Is wrong because it is more associated with bacterial infection like brucellosis B. Is wrong because this suggest viral upper respiratory tract infection rather than dengue C. Is CORRECT because dengue fever is transmitted by Aedes mosquito so exposure to mosquito prone area strongly suggest dengue infection D. Is wrong because this is not a specific risk factor for dengue Source: Harrison Chapter 204 page 1640"}, {"id": "q675", "pdfPage": 360, "originalNumber": "9", "question": "On day 4 of fever, the child developed abdominal pain and vomiting. Which history question is the most important to ask next?", "options": [{"letter": "A", "text": "Presence of skin or mucosal bleeding"}, {"letter": "B", "text": "Character of abdominal pain"}, {"letter": "C", "text": "Timing of meals"}, {"letter": "D", "text": "Bowel movement frequency"}], "answer": "A", "answerText": "Presence of skin or mucosal bleeding", "explanation": "9. ANSWER: A A. Is CORRECT because in a febrile child with abdominal pain and vomiting, asking about bleeding is most important because these are warning signs of severe dengue and possible progression to dengue hemorrhagic fever. B. Is wrong because the character of pain is helpful but is less urgent than identifying signs of bleeding that may indicate severe disease. C. Is wrong because meal timing is not the priority in evaluating a potentially worsening febrile illness. D. Is wrong because Bowel habits may provide additional information but are less critical than assessing for hemorrhagic manifestations. Source: Harrison’s Principles of Internal Medicine, 21st Edition, Page 1641"}, {"id": "q676", "pdfPage": 360, "originalNumber": "10", "question": "During a physical exam, which finding best reflects capillary fragility?", "options": [{"letter": "A", "text": "Generalized flushing"}, {"letter": "B", "text": "Petechiae on the skin or positive tourniquet test"}, {"letter": "C", "text": "Warm extremities"}, {"letter": "D", "text": "Dry skin"}], "answer": "B", "answerText": "Petechiae on the skin or positive tourniquet test", "explanation": "10. ANSWER: B A. Is wrong because it reflects vasodilation and increased blood flow, not capillary wall fragility. B. Is CORRECT because petechiae (<2 mm) are due to blood leaking through poorly supported (fragile) capillaries into the dermis, which directly reflects capillary fragility. The tourniquet test (Rumpel-Leede test) similarly demonstrates this by inducing petechiae under pressure. C. Is wrong because it indicates good perfusion rather than weakness of capillary walls. D. Is wrong because it is related to skin hydration and not to capillary integrity."}, {"id": "q677", "pdfPage": 361, "originalNumber": "11", "question": "A patient is febrile, unresponsive and irritable. What does this clinical appearance indicate?", "options": [{"letter": "A", "text": "Possible clinical deterioration"}, {"letter": "B", "text": "Behavioral variation"}, {"letter": "C", "text": "Normal"}, {"letter": "D", "text": "Hunger"}], "answer": "A", "answerText": "Possible clinical deterioration", "explanation": "11. ANSWER: A A. Is CORRECT because a patient who is febrile, unresponsive, and irritable is displaying abnormal general appearance and mental status, which are red flags for serious illness and possible clinical deterioration. Fever may be due to infection, unresponsiveness may include CNS involvement, and being irritable may be a sign of distress. B. Is wrong because being unresponsive is not a normal behavioral variation. C. Is wrong because a normal patient should be alert, interactive, and consolable. Unresponsiveness and irritability, especially with fever, are abnormal and concerning. D. Is wrong because may cause mild irritability but it does not cause unresponsiveness and fever. Source: Bates’ Guide to Physical Examination and History Taking"}, {"id": "q678", "pdfPage": 361, "originalNumber": "12", "question": "What abdominal finding is most relevant to assess dengue?", "options": [{"letter": "A", "text": "Hyperactive bowel sounds"}, {"letter": "B", "text": "Umbilical contour"}, {"letter": "C", "text": "Tympanitic on percussion"}, {"letter": "D", "text": "Hepatomegaly with tenderness"}], "answer": "D", "answerText": "Hepatomegaly with tenderness", "explanation": "12. ANSWER: D A. Is wrong because Hyperactive bowel sounds — Nonspecific finding and not a key assessment feature in dengue. B. Umbilical contour — Has little clinical relevance in evaluating dengue severity. C. Tympanitic on percussion — Usually reflects bowel gas and is not characteristic of dengue. D. Is CORRECT because Hepatomegaly with tenderness — liver enlargement and tenderness are common in dengue and may indicate severe disease involvement."}, {"id": "q679", "pdfPage": 362, "originalNumber": "13", "question": "Vital signs show narrowing of pulse pressure. What is the clinical implication?", "options": [{"letter": "A", "text": "Circulation something"}, {"letter": "B", "text": "Normal finding in fever"}, {"letter": "C", "text": "Measurement error"}, {"letter": "D", "text": "Early hemodynamic disturbance"}], "answer": "D", "answerText": "Early hemodynamic disturbance", "explanation": "13. ANSWER: D A. Is wrong because this is too vague; narrow pulse pressure specifically indicates reduced stroke volume or cardiac output, not a normal circulatory variation. B. Is wrong because fever typically causes widened pulse pressure due to increased cardiac output, not narrowing. C. Is wrong because while errors can occur, persistent narrow pulse pressure suggests a true physiologic abnormality rather than measurement artifact. D. Is CORRECT because a narrow pulse pressure reflects reduced stroke volume, commonly seen in early shock or cardiac dysfunction, indicating early hemodynamic compromise. Source: Bates’ Guide to Physical Examination and History Taking, Chap 25"}, {"id": "q680", "pdfPage": 362, "originalNumber": "14", "question": "1 yo presents after a seizure with fever. Which history detail is most important initially?", "options": [{"letter": "A", "text": "Feeding pattern before event"}, {"letter": "B", "text": "Recent travel history"}, {"letter": "C", "text": "Duration of seizure"}, {"letter": "D", "text": "Sleeping pattern"}], "answer": "C", "answerText": "Duration of seizure", "explanation": "14. ANSWER: C A. Is wrong because feeding history is not immediately relevant in evaluating acute febrile seizure severity or classification. B. Is wrong because travel history may help identify infections but is not the most critical immediate detail in acute seizure assessment. C. Is CORRECT because seizure duration is the most important initial history detail, as prolonged seizures (>5 minutes) may indicate status epilepticus and higher risk of complications. D. Is wrong because sleep history is not essential in the acute evaluation of a febrile seizure episode. OLDCARTS"}, {"id": "q681", "pdfPage": 363, "originalNumber": "15", "question": "Which history feature best helps characterize seizure type?", "options": [{"letter": "A", "text": "Presence of focal vs. generalized movements"}, {"letter": "B", "text": "Appetite before the event"}, {"letter": "C", "text": "Time of day"}, {"letter": "D", "text": "Recent vaccination"}], "answer": "A", "answerText": "Presence of focal vs. generalized movements", "explanation": "15. ANSWER: A A. Is CORRECT because distinguishing focal versus generalized seizure activity is key to classifying seizure type based on history and eyewitness description. B. Is wrong because appetite changes are not relevant to seizure classification. C. Is wrong because while some seizures may have circadian patterns, time of occurrence does not define se
