he mass in the scrotum"}], "answer": "C", "answerText": "Transillumination", "explanation": "C. Transillumination"}, {"id": "q77", "pdfPage": 26, "originalNumber": "84", "question": "Hydrocele space", "options": [{"letter": "A", "text": "parietal"}, {"letter": "B", "text": "visceral"}, {"letter": "C", "text": "parietal and visceral"}, {"letter": "D", "text": "inguinal canal"}], "answer": "C", "answerText": "parietal and visceral", "explanation": "c."}, {"id": "q78", "pdfPage": 27, "originalNumber": "85", "question": "Proper palpation of the scrotum:", "options": [{"letter": "A", "text": "Palpate each testis and epididymis between your thumb and first 2 fingers"}, {"letter": "B", "text": "Always use two hands, cradle the testis at both poles in the thumb and 2 fingers"}, {"letter": "C", "text": "Palpate scrotal contents using transillumination, slide them back and forth from the fingertips of one hand and the other, frequently changing the position of your hands"}, {"letter": "D", "text": "AOTA"}], "answer": "A", "answerText": "Palpate each testis and epididymis between your thumb and first 2 fingers", "explanation": "A. Palpate each testis and epididymis between your thumb and first"}, {"id": "q79", "pdfPage": 27, "originalNumber": "86", "question": "which of the ff shows malignancy (prostate cancer) gist", "options": [{"letter": "A", "text": "Firm, nodular, rolled edges"}, {"letter": "B", "text": "Firm, nodular with irregular borders"}, {"letter": "C", "text": "Firm to hard nodular smth rectal shelf"}, {"letter": "D", "text": "A&b"}, {"letter": "E", "text": "Aota"}], "answer": "A", "answerText": "Firm, nodular, rolled edges", "explanation": "A. Firm, nodular, rolled edges Unsa to na number si Daisy with the STD? Murag wrong number ako ma memo B: Colorectal CA C: —- CA basta dli prostate"}, {"id": "q80", "pdfPage": 27, "originalNumber": "87", "question": "42yo Female G4P4 LMP December 6. PMP October 16, November 10", "options": [{"letter": "A", "text": "Polymenorrhea"}, {"letter": "B", "text": "Menometrorrhagia"}, {"letter": "C", "text": "Menorrhagia"}, {"letter": "D", "text": "Metrorrhagia"}], "answer": "A", "answerText": "Polymenorrhea", "explanation": "A. Polymenorrhea"}, {"id": "q81", "pdfPage": 28, "originalNumber": "89", "question": "28 yo, housewife presents with pain on the lateral aspect of elbow upon wrist extension after she carried a loaded clutch handed grocery bag for an hour. (+) Cozen’s test. What muscle is the source of pain?", "options": [{"letter": "A", "text": "Flexor carpi radialis"}, {"letter": "B", "text": "Flexor digitorum profundus"}, {"letter": "C", "text": "Extensor carpi radialis brevis"}, {"letter": "D", "text": "Flexor digitorum superficialis"}], "answer": "C", "answerText": "Extensor carpi radialis brevis", "explanation": "C. Extensor carpi radialis brevis"}, {"id": "q82", "pdfPage": 28, "originalNumber": "90", "question": "Px sought consult for red and swollen knee assoc. w/ fever & chills. Hx of laceration to the area 2 weeks prior. On PE, area was warm. Test/s performed for effusion in the area?", "options": [{"letter": "A", "text": "Bulge test"}, {"letter": "B", "text": "Ballooning test"}, {"letter": "C", "text": "A&B"}, {"letter": "D", "text": "NOTA"}], "answer": "C", "answerText": "A&B", "explanation": "C. A&B"}, {"id": "q83", "pdfPage": 28, "originalNumber": "91", "question": "A tailor complains of pain on the lateral aspect of his wrist. The pain was aggravated when you ulnarly deviate the affected wrist with the thumb fully flexed and the hand closed. The Finkelstein test was positive. Which of the following muscles is most likely the source of pain?", "options": [{"letter": "A", "text": "Abductor pollicis longus"}, {"letter": "B", "text": "Flexor digitorum profundus"}, {"letter": "C", "text": "Extensor carpi radialis longus"}, {"letter": "D", "text": "Flexor digitorum superficialis"}], "answer": "A", "answerText": "Abductor pollicis longus", "explanation": "A. Abductor pollicis longus"} "Ask about weakness in getting up from the chair"}, {"letter": "D", "text": "Ask about strength in opening the jar"}], "answer": "D", "answerText": "Ask about strength in opening the jar", "explanation": "D. Ask about strength in opening the jar"}, {"id": "q89", "pdfPage": 31, "originalNumber": "0", "question": "Patient victim of motor vehicular accident. Eyes = no response Speech = no response Motor = decerebrate What is the GCS score?", "options": [{"letter": "A", "text": "3"}, {"letter": "B", "text": "4"}, {"letter": "C", "text": "5"}, {"letter": "D", "text": "6"}], "answer": "B", "answerText": "4", "explanation": "B BM 1 of 1st semester MEDICINE 1 (PD) BIMONTHLY EXAM 1 October 8, 2025 COVERAGE LECTURER Lesson Lesson Lesson Dr. Dr. Dr. QUESTION RATIONALE & SOURCE *for check er only:"}, {"id": "q90", "pdfPage": 32, "originalNumber": "1", "question": "What is the chief complaint (CC)?", "options": [{"letter": "A", "text": "Doctor’s summary of findings"}, {"letter": "B", "text": "Patient’s interpretation of problem"}, {"letter": "C", "text": "Patient’s reason for visit, in own words"}, {"letter": "D", "text": "Primary diagnosis"}], "answer": "C", "answerText": "Patient’s reason for visit, in own words", "explanation": "1. ANSWER: C A. Is wrong because the doctor’s summary of findings is part of the assessment, not the chief complaint. B. Is wrong because the chief complaint is not how the patient interprets or explains their illness but rather what symptom or concern brought them to seek care. C. Is CORRECT because the chief complaint (CC) is a brief statement of why the patient sought medical attention, recorded exactly or nearly as the patient expresses it. D. Is wrong because the primary diagnosis is the physician’s final clinical conclusion after evaluation Source: Bates 13th Edition, Chapter 3 “Health History”"}, {"id": "q91", "pdfPage": 32, "originalNumber": "2", "question": "Which component belongs to present illness section?", "options": [{"letter": "A", "text": "Family history"}, {"letter": "B", "text": "OLDCART Description of symptoms"}, {"letter": "C", "text": "Childhood illness"}, {"letter": "D", "text": "Review of Systems"}], "answer": "B", "answerText": "OLDCART Description of symptoms", "explanation": "2. ANSWER: B A. Is wrong because Family history is a separate section of adult medical history like the Present illness B. Is CORRECT because the history of present illness includes the 7 attributes of a symptom (OLDCART) C. Is wrong because Childhood illness is under the Past medical history section D. Is wrong because the same with Family history, Review of Systems is a separate section of an adult medical history"}, {"id": "q92", "pdfPage": 33, "originalNumber": "3", "question": "OLD CART", "options": [{"letter": "A", "text": "onset location duration character associated factors radiation timing"}, {"letter": "B", "text": "origin length degree character area radiation treatment"}, {"letter": "C", "text": "onset level duration character association relief type"}, {"letter": "D", "text": "onset location diagnosis character association radiation timing"}], "answer": "A", "answerText": "onset location duration character associated factors radiation timing", "explanation": "3. ANSWER: A A. Is CORRECT because this is the standard and complete version used to assess symptoms B. Is wrong because origin, length, degree, and area is not part of OLD CARTS C. Is wrong because level and type is not part of OLD CARTS D. Is wrong because diagnosis is not part of OLD CARTS"}, {"id": "q93", "pdfPage": 34, "originalNumber": "4", "question": "When should you use a focused interview rather than a comprehensive one?", "options": [{"letter": "A", "text": "New patient"}, {"letter": "B", "text": "Emergency patient"}, {"letter": "C", "text": "Annual physical"}, {"letter": "D", "text": "Unrecalled"}], "answer": "B", "answerText": "Emergency patient", "explanation": "4. ANSWER: B A. Is wrong because this requires a comprehensive interview to gather full medical, family, and social history. B. Is CORRECT because only problem-specific information is gathered quickly for immediate care. C. Is wrong because it needs a comprehensive interview to review overall health and preventive measures. D. Unrecalled. Source: Bates’ Guide to Physical tory Taking Examination and History Taking 13th edition, Chapter 3"}, {"id": "q94", "pdfPage": 34, "originalNumber": "5", "question": "The review of systems (ROS) is primarily:", "options": [{"letter": "A", "text": "Physical exam technique"}, {"letter": "B", "text": "Screening for additional symptoms across body symptoms"}, {"letter": "C", "text": "Exploration of Chief complaint"}, {"letter": "D", "text": "Summary if assessment"}], "answer": "B", "answerText": "Screening for additional symptoms across body symptoms", "explanation": "5. ANSWER: B A. Is wrong because because the physical exam involves direct observation and palpation, not verbal questioning. B. Is CORRECT because because the review of systems screens for additional symptoms across different body systems to identify related or hidden conditions. C. Is wrong because exploring the chief complaint focuses only on the main concern, not all systems. D. Is wrong because the summary of assessment comes after data collection, not during symptom screening. Source: Bates’ Guide to Physical tory Taking Examination and History Taking 13th edition, Chapter 3, page 201"}, {"id": "q95", "pdfPage": 34, "originalNumber": "6", "question": "Which section in the history do you document allergies and medications?", "options": [{"letter": "A", "text": "Past Medical History"}, {"letter": "B", "text": "Family History"}, {"letter": "C", "text": "Social History"}, {"letter": "D", "text": "Review of Systems"}], "answer": "A", "answerText": "Past Medical History", "explanation": "6. ANSWER: A A. Is CORRECT because medications and allergies may be placed in the Past Medical History. B. Is wrong because Family History is the section that includes the history of disease in the family not including the patient’s own history. C. Is wrong because Social History is the section that documents sexual history, use of illicit drugs, education, lifestyle, and etc. D. Is wrong because Review of Systems is the section of the Patient"}, {"id": "q96", "pdfPage": 35, "originalNumber": "7", "question": "What type of questioning begins the interview effectively?", "options": [{"letter": "A", "text": "Close-ended"}, {"letter": "B", "text": "Leading"}, {"letter": "C", "text": "Open-ended"}, {"letter": "D", "text": "Rapid checklist"}], "answer": "C", "answerText": "Open-ended", "explanation": "7. ANSWER: C A. Is wrong because limits responses to “yes” or “no,” preventing patients from sharing important details early on. Best used later for clarification or confirmation. B. Is wrong because it suggests a preferred answer or biases the patient’s response (e.g., “You don’t smoke, do you?”). This can distort information and damage rapport. C. Is CORRECT because it draws on a range of techniques to cue patients to tell their stories—active listening, guided questioning, nonverbal affirmation, empathic responses, validation, reassurance, and partnering. These techniques are especially valuable when eliciting the patient’s chief concerns and the History of the Present Illness. D. Is wrong because it feels mechanical and impersonal; may overwhelm or alienate the patient at the start. Best reserved for later when gathering specific data. Source: Bate’s 12th Ed., Ch 3, p 66"}, {"id": "q97", "pdfPage": 35, "originalNumber": "8", "question": "Patient during interview behavior: shows nonverbal cues with crossed arms and with minimal responses. What would best enhance communication? (Gist)", "options": [{"letter": "A", "text": "Introduce and control pace of interview"}, {"letter": "B", "text": "Ask a leading question"}, {"letter": "C", "text": "Pause and explore patients feelings with an open ended question"}, {"letter": "D", "text": "Reassure the patient"}], "answer": "C", "answerText": "Pause and explore patients feelings with an open ended question", "explanation": "8. ANSWER: C A. Is wrong because although this is important when starting a patient interview it will not address the silence of the patient. Furthermore this is during a patient interview so introducing yourself again would be redundant and break the pace of the interview. B. Is wrong because it suggests a specific response. The patient’s response is truncated instead of including details about what he or she experienced. C. Is CORRECT because the best way to improve communication is to acknowledge the behavior and gently explore their feelings. This encourages trust and openness. D. Is wrong because reassurance without exploration can minimize feelings and shut down communication"}, {"id": "q98", "pdfPage": 36, "originalNumber": "9", "question": "38 year-old man with chronic pain, seems frustrated stating \"Nothing helps me\". Which response best demonstrates empathy?", "options": [{"letter": "A", "text": "\"Let's focus on your current medications\""}, {"letter": "B", "text": "\"You seem discouraged because your pain persists\""}, {"letter": "C", "text": "\"That's not true, many treatments can help\""}, {"letter": "D", "text": "\"We'll refer you in a pain clinic\""}], "answer": "B", "answerText": "\"You seem discouraged because your pain persists\"", "explanation": "9. ANSWER: B A. Is wrong because it focuses on medication, not emotional state. B. Is CORRECT because this response demonstrates empathy by acknowledging the patient's emotional state (discouraged) and validating their experience (pain persists).This response shows understanding and compassion, helping the patient feel heard. C. Is wrong because it dismisses patient's feelings D. Is wrong because while referring to a pain clinic might be helpful, it doesn't address the patient's emotional state. Source: Bate’s 12th Ed., p69"}, {"id": "q99", "pdfPage": 36, "originalNumber": "10", "question": "During history, the patient begins to cry discussing a recent diagnosis. What is the next appropriate step?", "options": [{"letter": "A", "text": "Change the topic to avoid distress"}, {"letter": "B", "text": "Offer tissue and allow silence"}, {"letter": "C", "text": "Explain the medical"}], "answer": "B", "answerText": "Offer tissue and allow silence", "explanation": "10. ANSWER: B A. Is wrong because it dismisses the patient’s feelings by changing the topic B. Is CORRECT because it shows empathy towards the patient C. Is wrong because it does not fall to the under the empathic response D. Is wrong because the patient might think his feelings are not valid 5 details immediately D. End the interview briefly by ending the interview immediately"}, {"id": "q100", "pdfPage": 37, "originalNumber": "11", "question": "When exploring sensitive topics (e.g. sexual abuse and drug use), the most appropriate approach is to", "options": [{"letter": "A", "text": "Start with open ended questions"}, {"letter": "B", "text": "Delay examination"}, {"letter": "C", "text": "Use normalization statements"}, {"letter": "D", "text": "Ask yes or no questions"}], "answer": "C", "answerText": "Use normalization statements", "explanation": "11. ANSWER: C A. A is wrong because while open-ended questions are generally useful, they may be too broad or intimidating when starting sensitive topics like sexual abuse or drug use. B. B is wrong because delaying the examination can undermine trust and rapport, and miss an opportunity to address serious issues early. C. C is CORRECT because normalization statements (e.g., “Many people have tried drugs at some point...”) help reduce stigma, make the patient feel less judged, and encourage honest disclosure. D. D is wrong because starting with yes/no questions can shut down communication and may not provide enough context or comfort to the patient. Source: Bates’ Guide to Physical tory Taking Examination and History Taking 13th edition, Chapter 2"}, {"id": "q101", "pdfPage": 38, "originalNumber": "13", "question": "Which muscle is responsible for the flexion of the neck?", "options": [{"letter": "A", "text": "SCM"}, {"letter": "B", "text": "Trapezius"}, {"letter": "C", "text": "Platysma"}, {"letter": "D", "text": "Levator scapulae"}], "answer": "A", "answerText": "SCM", "explanation": "13. ANSWER: A A. Is CORRECT because the sternocleidomastoid (SCM) muscle, when both sides (bilateral contraction) act together, flexes the neck and draws the head forward. When acting unilaterally, it rotates the head to the opposite side and tilts it toward the same side. B. Is wrong because the trapezius primarily extends the neck (especially the upper fibers) and elevates, retracts, or rotates the scapula — it does not flex the neck. C. Is wrong because the platysma is a superficial facial muscle that tenses the skin of the neck and depresses the mandible; it does not cause neck flexion. 7 D. Is wrong because the levator scapulae elevates the scapula and assists in lateral flexion of the neck, but not in neck flexion. Bate’s Guide to Physical Examination and History Taking, Chapter 16, Page 672"}, {"id": "q102", "pdfPage": 39, "originalNumber": "14", "question": "Location of the thyroid gland", "options": [{"letter": "A", "text": "Below sternum"}, {"letter": "B", "text": "Anterior to trachea"}, {"letter": "C", "text": "Posterior to SCM"}, {"letter": "D", "text": "Above hyoid bone"}], "answer": "B", "answerText": "Anterior to trachea", "explanation": "14. ANSWER: B A. Is wrong because the thyroid is above the sternum, not below it. B. Is CORRECT because the thyroid gland is located anterior to the trachea, spanning the level of C5 to T1, with its lobes lying on either side of the trachea. C. Is wrong because the gland is deep to (not posterior to) the sternocleidomastoid (SCM) muscle. D. Is wrong because the thyroid lies below the hyoid bone. Source: Bate’s 12th Ed., Ch 7, p 258"}, {"id": "q103", "pdfPage": 39, "originalNumber": "15", "question": "What lymph node is found at the angle of the mandible", "options": [{"letter": "A", "text": "Submental"}, {"letter": "B", "text": "Submandibular"}, {"letter": "C", "text": "Post cervical"}, {"letter": "D", "text": "Preauricular"}], "answer": "B", "answerText": "Submandibular", "explanation": "15. ANSWER: B A. Is wrong because it is located in the midline a centimeters behind the tip of the mandible B. Is CORRECT because because it is located midway between the angle and the tip of the mandible C. Is wrong because it is located along the anterior edge of the trapezius D. Is wrong because it is located in front of the ear"}, {"id": "q104", "pdfPage": 40, "originalNumber": "16", "question": "A 52 y/o man with progressive painless growth and hoarseness. Palpation reveals firm non-tender thyroid nodule. Finding that best supports CA?", "options": [{"letter": "A", "text": "Diffuse growth"}, {"letter": "B", "text": "Mobility upon swallowing"}, {"letter": "C", "text": "Firmness w/ cervical lymphadenopathy"}, {"letter": "D", "text": "Thyroid bruit"}], "answer": "C", "answerText": "Firmness w/ cervical lymphadenopathy", "explanation": "16. ANSWER: C A. Is wrong because this is more typical of goiter or thyroiditis, not carcinoma. B. Is wrong because this is normal for benign and malignant nodules (since thyroid moves with swallowing) C. Is CORRECT because firmness and lymphadenopathy is suggestive of metastasis due to the proximity of the cervical LN to the thyroid D. Is wrong because this suggests Graves disease, not cancer Source: Bates Chap. 11 Head and Neck pp. 564-565"}, {"id": "q105", "pdfPage": 40, "originalNumber": "17", "question": "Patient presents with tender, enlarged submandibular lymph node. There are no other lymphadenopathies detected. Which findings supports an acute local infection as the cause?", "options": [{"letter": "A", "text": "Firm, rubbery consistency"}, {"letter": "B", "text": "Matting of nodes"}, {"letter": "C", "text": "Fluctuance and warmth"}, {"letter": "D", "text": "Non-tender enlargement"}], "answer": "C", "answerText": "Fluctuance and warmth", "explanation": "17. ANSWER: C A. Is wrong because a firm, rubbery node is characteristic of lymphoma or chronic lymphoproliferative disease, not acute suppurative infection. B. Is wrong because Matting (nodes matted together) suggests chronic infections such as tuberculosis or metastatic cancer with extracapsular spread rather than an acute localized infection. C. Is CORRECT because Fluctuance indicates pus/abscess formation and warmth is a sign of acute inflammation; together with tenderness they strongly point to an acute local bacterial infection. D. Is wrong because Painless (non-tender) lymphadenopathy is more typical of malignancy or chronic disease; acute infections are usually painful/tender."}, {"id": "q106", "pdfPage": 41, "originalNumber": "18", "question": "Upon palpating the thyroid, the gland moves freely with swallowing but not with tongue protrusion. This is confirmatory of:", "options": [{"letter": "A", "text": "Goiter d/t iodine deficiency"}, {"letter": "B", "text": "Thyroglossalduct cyst"}, {"letter": "C", "text": "Ectopic thyroid gland"}, {"letter": "D", "text": "Normal finding"}], "answer": "A", "answerText": "Goiter d/t iodine deficiency", "explanation": "18. ANSWER: A A. Is CORRECT because the thyroid gland is attached to the pretracheal fascia and larynx, so it moves during swallowing but not with tongue movement. B. Is wrong because the cyst is attached to the foramen cecum via the thyroglossal tract, so it moves with both swallowing and tongue protrusion. C. Is wrong because an ectopic thyroid is outside the normal location and does not move like a normal thyroid D. Is wrong because the thyroid gland was distinctly palpable — you could actually feel it. → Normally, in most people, the thyroid is not palpable, or only the isthmus (the thin bridge) is barely felt. So, if the whole gland or a noticeable swelling is palpable, that’s not normal — it suggests thyroid enlargement, most commonly Source: Bates’ Guide to Physical Examination and History Taking 12th Edition, Chapter 7: The Head and Neck, p. 231."}, {"id": "q107", "pdfPage": 41, "originalNumber": "19", "question": "The Snellen chart is used to assess:", "options": [{"letter": "A", "text": "Visual fields"}, {"letter": "B", "text": "Visual acuity"}, {"letter": "C", "text": "Pupillary response"}, {"letter": "D", "text": "Accommodation"}], "answer": "B", "answerText": "Visual acuity", "explanation": "19. ANSWER: B A. Is wrong because this is assessed using confrontation testing (e.g., static finger wiggle test). B. Is CORRECT because the Snellen chart measures the sharpness or clarity of vision (ability to discern letters or symbols at a standardized distance). C. Is wrong because this is evaluated using a pupillary light reflex test (e.g., direct and consensual reaction). D. Is wrong because it is tested by shifting focus between near and distant objects."}, {"id": "q108", "pdfPage": 42, "originalNumber": "20", "question": "Which part of the eye is examined for papilledema?", "options": [{"letter": "A", "text": "Retina"}, {"letter": "B", "text": "Lens"}, {"letter": "C", "text": "Cornea"}, {"letter": "D", "text": "Optic Disc"}], "answer": "D", "answerText": "Optic Disc", "explanation": "20. ANSWER: D A. Is wrong because the retina is examined for many conditions (e.g., diabetic retinopathy), but papilledema specifically involves the optic disc. B. Is wrong because it is examined in cataracts; not involved in papilledema. C. Is wrong because it is involved in conditions like keratitis or corneal ulcers; not related to papilledema. D. Is CORRECT because Papilledema is the swelling of the optic disc due to increased intracranial pressure (ICP).It is observed during fundoscopic (ophthalmoscopic) examination of the optic disc, not other parts of the eye. Source: Bates’ Guide to Physical Examination and History Taking 13th Edition, Chapter 12 : Eyes"}, {"id": "q109", "pdfPage": 42, "originalNumber": "21", "question": "Constriction of both eyes when light is shown in one eye.", "options": [{"letter": "A", "text": "Direct light reflex"}, {"letter": "B", "text": "Consensual light reflex"}, {"letter": "C", "text": "Accommodation"}, {"letter": "D", "text": "Convergence"}], "answer": "B", "answerText": "Consensual light reflex", "explanation": "21. ANSWER: B A. Is wrong because Constriction of the same eye that light is shone into. B. Is CORRECT because Constriction of the opposite eye when light is shone in one eye. C. Is wrong because Pupil constriction when focusing on a near object, along with lens thickening and eye convergence. It’s a near response, not a reaction to light. D. Is wrong because Movement of both eyes medially to focus on a near object. It’s part of the accommodation reflex, involving extraocular muscles, not direct pupillary response to light."}, {"id": "q110", "pdfPage": 43, "originalNumber": "22", "question": "A 50-year old man with diabetes has blurred vision and difficulty in focusing near objects. He has a normal pupillary reaction. What is the most likely condition?", "options": [{"letter": "A", "text": "Macular Degeneration"}, {"letter": "B", "text": "Presbyopia"}, {"letter": "C", "text": "Diabetic Neuropathy"}, {"letter": "D", "text": "Optic Neuritis"}], "answer": "B", "answerText": "Presbyopia", "explanation": "22. ANSWER: B A. Is wrong because this causes loss of central vision, not just difficulty in focusing near objects. B. Is CORRECT because this is an age-related loss of lens elasticity. This involves difficulty with near vision and normal pupils. C. Is wrong because this causes ptosis, diplopia, and sometimes, pupil involvement - not just difficulty with near vision. D. Is wrong because this produces pain on eye movement, central scotoma, and abnormal pupillary reaction."}, {"id": "q111", "pdfPage": 43, "originalNumber": "23", "question": "In ophthalmoscopy, blurred rim, optic disc elevated, no spontaneous venous pulsation.", "options": [{"letter": "A", "text": "Optic neuritis"}, {"letter": "B", "text": "Papilledema increased ICP"}, {"letter": "C", "text": "Central vein occlusion"}, {"letter": "D", "text": "Glaucomatous cupping"}], "answer": "B", "answerText": "Papilledema increased ICP", "explanation": "23. ANSWER: B A. Is wrong because not seen in optic neuritis B. Is CORRECT because absence of spontaneous venous pulsations is observed in papilledema C. Is wrong because not seen in occlusions D. Is wrong because not seen in glaucoma"}, {"id": "q112", "pdfPage": 43, "originalNumber": "24", "question": "Patient complains of diplopia when looking to the right. Upon examination, right eye fails to move laterally. What CN is affected?", "options": [{"letter": "A", "text": "CN III"}, {"letter": "B", "text": "CN IV"}, {"letter": "C", "text": "CN VI"}, {"letter": "D", "text": "CN V1"}], "answer": "C", "answerText": "CN VI", "explanation": "24. ANSWER: C A. Is wrong because it controls most other eye movements (medial, upward, downward) and eyelid elevation. A lesion causes ptosis, “down and out” eye position, and pupil dilation, not isolated loss of lateral movement. B. Is wrong because it Innervates the superior oblique muscle, which moves the eye downward and inward. Damage causes vertical diplopia, especially when looking down (e.g., walking downstairs), not failure of lateral movement. C. Is CORRECT because The abducens nerve innervates the lateral 12 rectus muscle, which abducts the eye (moves it laterally). If the right CN VI is damaged, the right eye cannot move laterally, leading to horizontal diplopia (double vision) that worsens when looking toward the affected side. D. Is wrong because it provides sensory innervation to the cornea, forehead, and upper eyelid. It does not control eye movement, so it cannot cause diplopia. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 12, Pages 591"}, {"id": "q113", "pdfPage": 44, "originalNumber": "25", "question": "Cone of light in the right ear is seen in which position?", "options": [{"letter": "A", "text": "3 o’clock"}, {"letter": "B", "text": "5 o’clock"}, {"letter": "C", "text": "7 o’clock"}, {"letter": "D", "text": "9 o’clock"}], "answer": "B", "answerText": "5 o’clock", "explanation": "25. ANSWER: B A. Is wrong because the cone of light is not seen at the 3 o’clock position because this lies too horizontally on the tympanic membrane and does not correspond to the normal anterior-inferior light reflex. B. Is CORRECT because in the right ear, the cone of light normally appears at the 5 o’clock position, radiating downward and anteriorly from the umbo. C. Is wrong because the 7 o’clock position is where the cone of light appears in the left ear, not the right. D. Is wrong because the 9 o’clock position lies laterally and does not correspond to the normal direction of the light reflex on the tympanic membrane."}, {"id": "q114", "pdfPage": 45, "originalNumber": "26", "question": "What is the common cause of conductive hearing loss?", "options": [{"letter": "A", "text": "Presbycusis"}, {"letter": "B", "text": "Noise exposure"}, {"letter": "C", "text": "Cerumen"}, {"letter": "D", "text": "Ototoxic Drug"}], "answer": "C", "answerText": "Cerumen", "explanation": "26. ANSWER: C A. Is wrong because presbycusis is an age-related sensorineural hearing loss due to degeneration of hair cells in the cochlea not a conductive cause. B. Is wrong because noise exposure causes sensorineural hearing loss from cochlear hair cell damage; affects high frequencies first. C. Is CORRECT because cerumen (earwax) impaction is the most common cause of conductive hearing loss, as it mechanically obstructs sound transmission in the external auditory canal. D. Is wrong because ototoxic drugs cause sensorineural loss by damaging the inner ear (e.g., aminoglycosides, loop diuretics, cisplatin). Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 13, Page 660."}, {"id": "q115", "pdfPage": 45, "originalNumber": "27", "question": "The more anterior nasal sinuses are", "options": [{"letter": "A", "text": "Ethmoid"}, {"letter": "B", "text": "Sphenoid"}, {"letter": "C", "text": "Maxillary"}, {"letter": "D", "text": "Frontal"}], "answer": "D", "answerText": "Frontal", "explanation": "27. ANSWER: D A. Is wrong because ethmoid sinuses are between the eyes, deeper and more medial not the most anterior. B. Is wrong because sphenoid sinuses are the most posterior sinuses, located deep in the skull behind the ethmoid sinuses. C. Is wrong because maxillary sinuses are also anterior but located below the eyes in the maxillary bones slightly posterior compared to the frontal sinuses. D. Is CORRECT because frontal sinuses are located anteriorly, just above the orbits behind the eyebrows, making them the most anterior paranasal sinuses."}, {"id": "q116", "pdfPage": 46, "originalNumber": "28", "question": "Weber Test, lateralization on left ear. Rinne Test bone>air. What type of hearing loss?", "options": [{"letter": "A", "text": "Right sensorineural"}, {"letter": "B", "text": "Left conductive"}, {"letter": "C", "text": "Bilateral sensorineural"}, {"letter": "D", "text": "Left sensorineural"}], "answer": "B", "answerText": "Left conductive", "explanation": "28. ANSWER: B A. Is wrong because the right sensorineural would show Weber lateralizing to the right (good) ear and Rinne AC > BC bilaterally. B. Is CORRECT because in conductive hearing loss, Weber lateralizes to the affected (poorer) ear because background noise from the environment is reduced, making bone-conducted sound seem louder. C. Is wrong because the bilateral sensorineural would show no lateralization on Weber and AC > BC in both ears. D. Is wrong because the left sensorineural would show Weber lateralizing to the right (good) ear, not left, and AC > BC still. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 13, Page 680."}, {"id": "q117", "pdfPage": 46, "originalNumber": "15", "question": "over 10 days. What is likely the diagnosis?", "options": [{"letter": "A", "text": "Allergic rhinitis"}, {"letter": "B", "text": "Chronic rhinosinusitis"}, {"letter": "C", "text": "Acute viral rhinitis"}, {"letter": "D", "text": "Deviated septum"}], "answer": "A", "answerText": "Allergic rhinitis", "explanation": "A. Is wrong because allergic rhinitis produces clear, watery rhinorrhea, itchy eyes, and sneezing, without purulent discharge or facial pain. B. Is CORRECT because chronic rhinosinusitis commonly presents with purulent nasal discharge, nasal obstruction, facial pain/pressure, and decreased or lost sense of smell (anosmia). Since symptoms have lasted over 10 days (often meaning persistent or worsening beyond a typical viral course), and include purulence, pain, and anosmia, CRS or bacterial sinusitis is likely. C. Is wrong because acute viral rhinitis “common cold,” lasts <7–10 days, typically with clear to mucoid discharge and mild congestion not purulent and prolonged. D. Is wrong because deviated septum causes chronic nasal obstruction but not purulent discharge, pain, or anosmia. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 13, Page 685."}, {"id": "q118", "pdfPage": 47, "originalNumber": "30", "question": "A 14 y.o student presented himself to you with ear pain which occurred after starting a swimming lesson. Your diagnosis is Acute Otitis Externa. What physical findings are consistent with the diagnosis?", "options": [{"letter": "A", "text": "Tug Test Positive"}, {"letter": "B", "text": "Ear canal is erythematous, swelling, moist, tender"}, {"letter": "C", "text": "Retraction of Tympanic Membrane with white keratinized Mass behind it."}, {"letter": "D", "text": "A&B"}], "answer": "D", "answerText": "A&B", "explanation": "30. ANSWER: D A. Is wrong because choice B is also correct. But this statement is correct because pain with movement of the auricle or tragus is highly suggestive of otitis externa, since the inflammation involves the external canal. B. Is wrong because choice A is also correct.But this statement is correct because this is a classic otoscopic finding for otitis externa. C. Is wrong because this describes cholesteatoma, not otitis externa; it’s a middle ear condition often from chronic otitis media. D. Is CORRECT because both choices A and B are true about acute otitis externa. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 13, Page 671 & 675."}, {"id": "q119", "pdfPage": 48, "originalNumber": "31", "question": "Tonsils are located between which two structures?", "options": [{"letter": "A", "text": "Hard palate and Soft palate"}, {"letter": "B", "text": "Anterior pillar and posterior pillar"}, {"letter": "C", "text": "Tongue and uvula"}, {"letter": "D", "text": "Soft palate and uvula"}], "answer": "B", "answerText": "Anterior pillar and posterior pillar", "explanation": "31. ANSWER: B A. Is wrong because the hard and soft palate are structures of the roof of the mouth. B. Is CORRECT because anterior pillar and posterior pillar are the arches that surround the tonsillar fossa. C. Is wrong because the tongue is below and the uvula is above. D. Is wrong because the soft palate and uvula are close to each other at the roof of the mouth. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 14, Page 711."}, {"id": "q120", "pdfPage": 48, "originalNumber": "32", "question": "Common cause of Pharyngitis:", "options": [{"letter": "A", "text": "Viral"}, {"letter": "B", "text": "Bacterial"}, {"letter": "C", "text": "Fungal"}, {"letter": "D", "text": "Parasitic"}], "answer": "A", "answerText": "Viral", "explanation": "32. ANSWER: A A. Is CORRECT because viral infections are the most common cause of pharyngitis (sore throat), accounting for about 70–90% of cases in adults and 50–80% in children. Common viral agents caused by respiratory viruses include adenovirus, rhinovirus, coronavirus, Epstein–Barr virus (EBV), and influenza virus. B. Is wrong because bacterial causes, especially Group A Streptococcus, are less common and usually present with high fever, tonsillar exudates, and tender lymph nodes. C. Is wrong because fungal pharyngitis is rare and generally occurs in immunocompromised patients (e.g., those with HIV or on prolonged antibiotics). D. Is wrong because parasitic infections almost never cause pharyngitis and are not considered in routine differential diagnoses. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 14, Page 713."}, {"id": "q121", "pdfPage": 49, "originalNumber": "34", "question": "A smoker presents with a painless ulcer on the lateral tongue persisting >2 weeks. What is the most concerning diagnosis", "options": [{"letter": "A", "text": "Aphthous ulcer"}, {"letter": "B", "text": "Squamous cell carcinoma"}, {"letter": "C", "text": "Herpetic lesion"}, {"letter": "D", "text": "Traumatic ulcer"}], "answer": "B", "answerText": "Squamous cell carcinoma", "explanation": "34. ANSWER: B A. Is wrong because aphthous ulcer is a painful, round or oval ulcer with erythematous border and yellowish center; heals within 1–2 weeks. B. Is CORRECT because squamous cell carcinoma is a painless, indurated ulcer or mass, often on the lateral tongue; persists beyond 2 weeks. C. Is wrong because herpetic lesions are painful vesicles that rupture to form shallow ulcers; usually on lips or hard palate. D. Is wrong because traumatic ulcer is caused by irritation (e.g., biting, sharp tooth edge); heals within 1–2 weeks once trauma is removed. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 14, Page 748."}, {"id": "q122", "pdfPage": 49, "originalNumber": "35", "question": "During oral exam, you noticed white curd-like plaque that can be scraped off revealing erythematous mucosa. What condition is this?", "options": [{"letter": "A", "text": "Leukoplakia"}, {"letter": "B", "text": "Oral Candidaiasis"}, {"letter": "C", "text": "Lichen planus"}, {"letter": "D", "text": "Geographic tongue"}], "answer": "B", "answerText": "Oral Candidaiasis", "explanation": "35. ANSWER: B A. Is wrong because leukoplakia appears to have a white patch that cannot be scraped off; may be premalignant. B. Is CORRECT because oral candidiasis appears to have a white, curd-like plaques that can be scraped off, leaving an erythematous base. C. Is wrong because lichen planus appears to have a white, lacy (reticular) streaks (Wickham’s striae) on mucosa; chronic inflammatory lesion. D. Is wrong because geographic tongue appears to have map-like red areas with white borders; pattern changes over time."}, {"id": "q123", "pdfPage": 50, "originalNumber": "36", "question": "Midline swelling on the neck that moves with tongue protrusion. Diagnosis?", "options": [{"letter": "A", "text": "Branchial cleft cyst"}, {"letter": "B", "text": "Thyroglossal duct cyst"}, {"letter": "C", "text": "Goiter"}, {"letter": "D", "text": "Submandibular lymphadenopathy"}], "answer": "B", "answerText": "Thyroglossal duct cyst", "explanation": "36. ANSWER: B A. Is wrong because branchial cleft cyst presents with a lateral neck mass, usually anterior to the sternocleidomastoid muscle. B. Is CORRECT because thyroglossal duct cyst presents at the midline neck mass that moves with tongue protrusion or swallowing. C. Is wrong because goiter presents with an enlargement of the thyroid gland, also in the midline, but moves only with swallowing, not with tongue protrusion. D. Is wrong because submandibular lymphadenopathy presents usually below the mandible, may be tender and firm; does not move with tongue. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 25, Page1646."}, {"id": "q124", "pdfPage": 50, "originalNumber": "37", "question": "Quadrant of breast that is most common site of carcinoma", "options": [{"letter": "A", "text": "Upper inner"}, {"letter": "B", "text": "Upper outer"}, {"letter": "C", "text": "Lower outer"}, {"letter": "D", "text": "Lower inner"}], "answer": "B", "answerText": "Upper outer", "explanation": "37. ANSWER: B A. Is wrong B. Is CORRECT because breast carcinomas usually arise in the upper outer quadrant and typically disseminate first to the axillary lymph nodes and then to infraclavicular and supraclavicular lymph nodes C. Is wrong D. Is wrong Source: Robbins & Contran Pathologic Basis of Disease, 10th edition, Chapter 7: Neoplasia, page. 275"}, {"id": "q125", "pdfPage": 50, "originalNumber": "38", "question": "Lymph node that primarily drains breast", "options": [{"letter": "A", "text": "Cervical"}, {"letter": "B", "text": "Inguinal"}, {"letter": "C", "text": "Axillary"}], "answer": "C", "answerText": "Axillary", "explanation": "38. ANSWER: C A. Is wrong because the cervical LN are located in the neck and primarily drain the head and neck B. Is wrong because the inguinal LN are located in the groin and 19 D. Supraclavicular drain the lower extremities, genitals, and lower abdomen C. Is CORRECT because the axillary or central LN receive about ¾ of the lymphatic drainage of the breast D. Is wrong because located above the clavicle and although it also receives some drainage from the breast, majority of the drainage is received by the axillary LN Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 18, Page 981-982."}, {"id": "q126", "pdfPage": 51, "originalNumber": "39", "question": "Nipple location", "options": [{"letter": "A", "text": "Above inframammary fold"}, {"letter": "B", "text": "4th intercostal space"}, {"letter": "C", "text": "Above sternal fold"}, {"letter": "D", "text": "Near midclavicular line only"}], "answer": "B", "answerText": "4th intercostal space", "explanation": "39. ANSWER: B A. Is wrong B. Is CORRECT because the nipple line is at the level of the 4th or 5th intercostal space C. Is wrong D. Is wrong Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 15, Page 756."}, {"id": "q127", "pdfPage": 51, "originalNumber": "40", "question": "In examining the axilla, where do you start?", "options": [{"letter": "A", "text": "High in apex"}, {"letter": "B", "text": "Along the lateral chest wall"}, {"letter": "C", "text": "Lateral to breast"}, {"letter": "D", "text": "Supraclavicular line"}], "answer": "A", "answerText": "High in apex", "explanation": "40. ANSWER: A A. Is CORRECT because when assessing the axilla, one must reach as high as one can towards the apex of the axilla B. Is wrong C. Is wrong D. Is wrong"}, {"id": "q128", "pdfPage": 52, "originalNumber": "41", "question": "A 45y.o female presents painless lump on her right breast. On exam, it is hard, irregular and …. It has a peau d’ orange skin. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Cyst"}, {"letter": "C", "text": "Infiltrating ductal carcinoma"}, {"letter": "D", "text": "Fat necrosis"}], "answer": "C", "answerText": "Infiltrating ductal carcinoma", "explanation": "41. ANSWER: C A. Is wrong because fibroadenoma is a benign tumor B. Is wrong because cysts do not present with peau d’orange C. Is CORRECT because peau d’orange which is characterized by thickened and prominent pores is suggestive of breast cancer D. Is wrong because can mimic cancer but often follows trauma Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 15, Page 988"}, {"id": "q129", "pdfPage": 52, "originalNumber": "42", "question": "A 25-year-old woman presents with firm, mobile, non-tender mass on the upper outer quadrant of the breast. It is well-circumscribed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Fibrocystic changes"}, {"letter": "B", "text": "Fibroadenoma"}, {"letter": "C", "text": "Carcinoma"}, {"letter": "D", "text": "Abscess"}], "answer": "B", "answerText": "Fibroadenoma", "explanation": "42. ANSWER: B A. Is wrong because fibrocystic changes are often bilateral, painful, and vary with the menstrual cycle. May present as multiple nodular areas, not a single well-circumscribed, mobile mass B. Is CORRECT because are usually firm, well delineated and very mobile C. Is wrong because carcinomas are usually hard, irregular, and non-mobile. May be associated with skin dimpling, nipple retraction, or peau d’orange D. Is wrong because abscesses are usually painful, red, warm, and associated with signs of infection. Often occurs in lactating women"}, {"id": "q130", "pdfPage": 53, "originalNumber": "43", "question": "A 32-year-old woman presents with premenstrual breast pain and multiple tender nodules bilaterally. There is no major mass. What is the diagnosis?", "options": [{"letter": "A", "text": "Fibrocystic changes"}, {"letter": "B", "text": "Mastitis"}, {"letter": "C", "text": "Carcinoma"}, {"letter": "D", "text": "Lipoma"}], "answer": "A", "answerText": "Fibrocystic changes", "explanation": "43. ANSWER: A A. Is CORRECT because fibrocystic changes are commonly palpable as nodular, rope-like densities in women aged 25-50 years and may be tender or painful. They are considered benign and not a risk factor for breast cancer B. Is wrong because mastitis usually occurs in lactating women. Usually accompanied by unilateral, with pain, redness, warmth, and often fever. C. Is wrong because carcinomas are usually hard, irregular, and non-mobile. May be associated with skin dimpling, nipple retraction, or peau d’orange D. Is wrong because lipoma is usually soft, painless, well-circumscribed, and non-tender. It is not affected by the menstrual cycle and is typically a single mass, not multiple nodules Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 18, Page 1006"}, {"id": "q131", "pdfPage": 53, "originalNumber": "44", "question": "On exam you find enlarged, firm, non-tender, left axillary node. No breast mass palpated. Appropriate next step?", "options": [{"letter": "A", "text": "Reassure and observe"}, {"letter": "B", "text": "Reexamine"}, {"letter": "C", "text": "Examine left breast and Chest wall thoroughly"}, {"letter": "D", "text": "Antibiotics for infection"}], "answer": "C", "answerText": "Examine left breast and Chest wall thoroughly", "explanation": "44. ANSWER: C A. Is wrong because not appropriate since the patient’s presenting condition may be indicative of malignancy and must therefore be thoroughly examined B. Is wrong because is vague C. Is CORRECT because the presence of enlarged, firm, non-tender left axillary nodes may be indicative of malignancy and therefore a thorough examination of the left breast and chest wall must be done. The enlargement of the axillary lymph node may be the first sign of an underlying breast or chest wall malignancy. D. Is wrong because there are no signs of infection (e.g., warmth, tenderness, fever), and the node is non-tender and firm, not typical of reactive nodes. Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 10, Page 441"}, {"id": "q132", "pdfPage": 54, "originalNumber": "45", "question": "You observe nipple retraction during breast inspection. Which underlying pathology does this suggest?", "options": [{"letter": "A", "text": "Prior trauma"}, {"letter": "B", "text": "Benign cyst"}, {"letter": "C", "text": "Fibrotic strand from carcinoma pulling the skin"}, {"letter": "D", "text": "Hormonal engorgement"}], "answer": "C", "answerText": "Fibrotic strand from carcinoma pulling the skin", "explanation": "45. ANSWER: C A. Is wrong because prior trauma may cause localized fat necrosis or scarring, but less commonly leads to nipple retraction unless extensive. B. Is wrong because benign cysts do not typically cause retraction of the nipple C. Is CORRECT because cancers with fibrous strands are attached to the skin and fascia over the pectoral muscles may cause inward dimpling of the skin during muscular contraction D. Is wrong because hormonal engorgement can cause breast fullness and tenderness, especially premenstrually, but not retraction. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 18, Page 989"}, {"id": "q133", "pdfPage": 54, "originalNumber": "46", "question": "A 45-year-old woman presents with a mole that has changed in appearance. Which of the following strongly suggests malignancy?", "options": [{"letter": "A", "text": "Symmetrical + Uniform color"}, {"letter": "B", "text": "Uniform color + Diameter <6mm"}, {"letter": "C", "text": "Irregular border with multiple colors"}, {"letter": "D", "text": "Raised surface with central hair growth"}], "answer": "C", "answerText": "Irregular border with multiple colors", "explanation": "46. ANSWER: C A. Is wrong because a mole that is symmetrical and uniform in color in typically benign, not malignant B. Is wrong because a mole that is symmetrical and diameter that is <6mm does not rule out malignancy but is not strongly suggestive of malignancy C. Is CORRECT because irregular borders with multiple colors strongly suggests malignancy D. Is wrong because presence of hair often suggests a benign lesion like a dermal nevus Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 10, Page 494"}, {"id": "q134", "pdfPage": 55, "originalNumber": "47", "question": "A 9-year-old child presents with multiple light brown patches on the skin of the extremities. These café-au-lait spots are most consistent with which of the following conditions?", "options": [{"letter": "A", "text": "Psoriasis"}, {"letter": "B", "text": "Neurofibromatosis type 1"}, {"letter": "C", "text": "Atopic dermatitis"}, {"letter": "D", "text": "Tinea versicolor"}], "answer": "B", "answerText": "Neurofibromatosis type 1", "explanation": "47. ANSWER: B A. Is wrong because psoriasis is characterized by red plaques with silvery scales, not café-au-lait spots. B. Is CORRECT because neurofibromatoses 1 is characterized by cafe-au-lait spots and freckling in the axillae C. Is wrong because atopic dermatitis presents with itchy, red, inflamed skin, often in flexural areas. Not associated with café-au-lait spots. D. Is wrong because tinea versicolor is a fungal infection causing hypo- or hyperpigmented patches, often on the trunk. Not the same as café-au-lait macules. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 10, Page 535"}, {"id": "q135", "pdfPage": 55, "originalNumber": "48", "question": "A 27-year-old woman reports several months of diffuse, non-scarring hair thinning. Which of the following findings is most consistent with telogen effluvium rather than alopecia areata or tinea capitis?", "options": [{"letter": "A", "text": "Exclamation mark hairs"}, {"letter": "B", "text": "Well-demarcated, circular patches of hair loss"}, {"letter": "C", "text": "Areas of thinning with broken hairs or black dots"}, {"letter": "D", "text": "Shedding of hair 2-5 months after a stressful event"}], "answer": "D", "answerText": "Shedding of hair 2-5 months after a stressful event", "explanation": "48. ANSWER: D"}, {"id": "q136", "pdfPage": 55, "originalNumber": "49", "question": "A 55-year old farmer has a rough, scaly patch on his forearm. What feature would raise suspicion for progression to squamous cell carcinoma?", "options": [{"letter": "A", "text": "Lesion that is tender and bleeds easily"}, {"letter": "B", "text": "Flaky, scale like feel"}, {"letter": "C", "text": "Small, flesh-colored macule"}, {"letter": "D", "text": "Lesion emerging from sun-exposed area (idea)"}], "answer": "A", "answerText": "Lesion that is tender and bleeds easily", "explanation": "49. ANSWER: A A. Most probably the answer: case is describing actinic keratosis, add the bleeding and tenderness (see photo below) B. Is wrong because it is describing plain actinic keratosis C. I think is wrong because majority of macules described in Bate’s are benign D. I think is also wrong; sun exposure is such a huge factor for SCC but sun exposure alone does not automatically mean malignant transformation agad (lesions like solar lentigines, or poikiloderma) Unsure"}, {"id": "q137", "pdfPage": 56, "originalNumber": "50", "question": "A 60 year old man presents with thickened, yellow, brittle nails. Which condition?", "options": [{"letter": "A", "text": "Hypothyroidism"}, {"letter": "B", "text": "Diabetes Mellitus"}, {"letter": "C", "text": "Chronic lung disease or lymphedema"}, {"letter": "D", "text": "Iron deficiency anemia"}], "answer": "A", "answerText": "Hypothyroidism", "explanation": "50. ANSWER: A A. Is CORRECT because Hypothyroidism is characterized by dry, rough and pale skin; coarse and brittle hair; myxedema; alopecia; skin cool to touch; and thin and brittle nails B. Is wrong because Diabetes is characterized by pruritus, diabetic dermopathy, acanthosis nigricans, candidiasisneuropathic ulcers, necrobiosis lipoidica, eruptive xanthomas C. Is wrong because clubbing of the fingers (a bulbous swelling of the soft tissue at the nail base, increasing the angle between the nail and proximal nail fold to 180 degrees or more) occurs in chronic lung diseases such as interstitial lung disease and lung cancer, as well as bronchiectasis D. Is wrong because it is associated with pallor. No nail characteristics were mentioned in the book. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 10"}, {"id": "q138", "pdfPage": 56, "originalNumber": "51", "question": "A 10 yr old has itchy rashes over the flexural surfaces of his elbows. Which finding suggests atopic dermatitis rather than psoriasis?", "options": [{"letter": "A", "text": "Lesions over extensor areas"}, {"letter": "B", "text": "Silvery white scales"}, {"letter": "C", "text": "Intensely pruritic lesions over flexural areas"}, {"letter": "D", "text": "Substantially demarcated"}], "answer": "C", "answerText": "Intensely pruritic lesions over flexural areas", "explanation": "51. ANSWER: C A. Wrong. Lesions over extensor areas are more characteristic of psoriasis, not atopic dermatitis, which typically affects flexural surfaces (like elbows and knees' inner folds). B. Wrong. Silvery white scales are a hallmark of psoriasis, not atopic dermatitis, where lesions are usually dry, red, and itchy without thick scaling. C. CORRECT. Intensely pruritic lesions over flexural areas are classic for atopic dermatitis, which often presents with severe itching and involvement of flexural regions such as the elbows, knees, and neck. D. Wrong. Substantially demarcated erythematous plaques describe psoriasis, where lesions have well-defined borders, unlike the poorly demarcated lesions seen in atopic dermatitis."}, {"id": "q139", "pdfPage": 57, "originalNumber": "52", "question": "A 65-year-old man with long-standing diabetes mellitus presents with a non-healing ulcer on his foot. On examination, which of the following findings most strongly suggests that the ulcer is arterial in origin, rather than neuropathic or venous?", "options": [{"letter": "A", "text": "Painless ulcer located near a callus."}, {"letter": "B", "text": "Ulcer with intact peripheral pulses, located near a callus."}, {"letter": "C", "text": "Ulcer located near the medial malleolus."}, {"letter": "D", "text": "Painful ulcer with punched-out edges and diminished peripheral pulses."}], "answer": "D", "answerText": "Painful ulcer with punched-out edges and diminished peripheral pulses.", "explanation": "52. ANSWER: D A. Is wrong because this is neuropathic. Common in diabetics; occurs at pressure points (metatarsal heads, heel). Sensory loss makes it painless. B. Is wrong because this is neuropathic. Pulses usually remain intact unless peripheral arterial disease coexists. Surrounded by thick callus. C. Is wrong because this is venous. Typical site for venous stasis ulcer; shallow, irregular edges, associated with edema and hyperpigmentation. D. Is CORRECT because this is arterial. Painful, deep, well-defined “punched-out” edges; usually at toes, foot margins, or lateral malleolus; pulses diminished or absent due to poor perfusion. RATIONALE:"}, {"id": "q140", "pdfPage": 58, "originalNumber": "53", "question": "Pitting of the nails. Associated condition?", "options": [{"letter": "A", "text": "Psoriasis"}, {"letter": "B", "text": "Onychomycosis"}, {"letter": "C", "text": "Lichen planus"}, {"letter": "D", "text": "SLE"}], "answer": "A", "answerText": "Psoriasis", "explanation": "53. ANSWER: A A. Is CORRECT because punctate depressions of the nail plate caused by defective layering of the superficial nail plate by the proximal nail matrix. Usually associated with psoriasis. B. Is wrong because the most common cause of nail thickening and subungual debris is onychomycosis C. Is wrong because Lichen planus affects the nail matrix but causes longitudinal ridging, thinning, and dorsal pterygium D. Is wrong because SLE mainly causes periungual telangiectasia, erythema, and nail fold changes due to vascular inflammation — not pitting"}, {"id": "q141", "pdfPage": 59, "originalNumber": "54", "question": "Skin lesion, flat, less than 1cm", "options": [{"letter": "A", "text": "Papule"}, {"letter": "B", "text": "Macule"}, {"letter": "C", "text": "Nodule"}, {"letter": "D", "text": "Plaque"}], "answer": "B", "answerText": "Macule", "explanation": "54. ANSWER: B A. Is wrong because a papule is a small solid elevation of the skin <1 cm in diameter. B. Is CORRECT because a macule is a circumscribed flat area of change in color of the skin <1 cm in diameter. C. Is wrong because a nodule is a solid elevation of the skin >1 cm in diameter that usually extends into the deeper skin layers D. Is wrong because a plaque is a large flatter elevation of the skin, sometimes formed by papules coalescing."}, {"id": "q142", "pdfPage": 60, "originalNumber": "55", "question": "Which type of hair is fine, short, and unpigmented. Found in children and other body parts.", "options": [{"letter": "A", "text": "Lanugo"}, {"letter": "B", "text": "Vellus"}, {"letter": "C", "text": "Follicular"}, {"letter": "D", "text": "Terminal"}], "answer": "B", "answerText": "Vellus", "explanation": "55. ANSWER: B A. Is wrong because lanugo hair is the fine, soft, unpigmented hair that covers a fetus and is usually shed before birth or shortly after; it is not typically found in children or adults. B. Is CORRECT because vellus hair is fine, short, soft, and unpigmented, found on most body surfaces of children and adults, except on areas like the palms, soles, and lips. C. Is wrong because “follicular” refers to anything related to the hair follicle, not a type of hair itself. D. Is wrong because terminal hair is coarse, long, and pigmented, found in the scalp, beard, axilla, and pubic regions, not the fine type seen in children. Source: Bates Guide to Physical Examination, 13th Edition, Ch 10,"}, {"id": "q143", "pdfPage": 60, "originalNumber": "56", "question": "Koilonychia refers to what nail abnormality?", "options": [{"letter": "A", "text": "Thickened, yellow nails"}, {"letter": "B", "text": "Pitting of nails"}, {"letter": "C", "text": "Spoon shaped nails"}, {"letter": "D", "text": "Clubbing of nails"}], "answer": "C", "answerText": "Spoon shaped nails", "explanation": "56. ANSWER: C A. A Is wrong because thickened, yellow nails are characteristic of a fungal infection (onychomycosis) or yellow nail syndrome, which is associated with chronic lung disease and lymphedema. This is a different clinical entity from koilonychia. B. B Is wrong because pitting of the nails describes multiple small depressions in the nail plate and is a classic finding in psoriasis, not the spoon-shaped concavity of koilonychia. C. C Is CORRECT because koilonychia is the medical term for spoon-shaped nails, where the nail is abnormally thin and concave with everted edges. Bates specifically describes this as a finding associated with iron deficiency anemia. D. D Is wrong because clubbing refers to an increase in the angle between the nail and the nail base (>180 degrees), loss of the normal nail bed angle, and a spongy nail bed consistency. It is associated with cardiopulmonary diseases and is the opposite morphological finding of the thin, concave koilonychia. Source: Cleveland Clinic"}, {"id": "q144", "pdfPage": 60, "originalNumber": "57", "question": "Raised, solid, greater than 1cm lesion 57. ANSWER: B 29", "options": [{"letter": "A", "text": "Patch"}, {"letter": "B", "text": "Nodule"}, {"letter": "C", "text": "Macule"}, {"letter": "D", "text": "Papule"}], "answer": "A", "answerText": "Patch", "explanation": "A. Is wrong because it is a flat, non-palpable lesion larger than 1 cm, not raised or solid. B. Is CORRECT because it is a raised, solid lesion greater than 1 cm in diameter, often extending deeper into the dermis or subcutaneous tissue. C. Is CORRECT because it is a flat, non-palpable area of color change, less than 1 cm in diameter. D. Is wrong because it is a raised, solid lesion less than 1 cm in diameter, smaller than a nodule."}, {"id": "q145", "pdfPage": 61, "originalNumber": "58", "question": "A flat lesion circumscribed changed of color that is greater than 1 cm", "options": [{"letter": "A", "text": "Papule"}, {"letter": "B", "text": "Macule"}, {"letter": "C", "text": "Plaque"}, {"letter": "D", "text": "Patch"}], "answer": "D", "answerText": "Patch", "explanation": "58. ANSWER: D A. Is wrong because a papule is a small solid elevation of the skin <1 cm in diameter B. Is wrong because a macule is a circumscribed flat area of the skin < 1cm in diameter C. Is wrong because a plaque is a larger flatter elevation of the skin, sometimes formed by papules coalescing D. Is CORRECT because a patch is a flat lesion that is >1 cm Source: Bates Guide to Physical Examination, 13th Edition, Ch 10, page 502"}, {"id": "q146", "pdfPage": 61, "originalNumber": "59", "question": "Nail condition cause by chronic hypoxia", "options": [{"letter": "A", "text": "Koilonychia"}, {"letter": "B", "text": "Clubbing"}, {"letter": "C", "text": "Onychomycosis"}, {"letter": "D", "text": "Pitting"}], "answer": "B", "answerText": "Clubbing", "explanation": "59. ANSWER: B A. Is wrong because it is caused by iron-deficiency anemia B. Is CORRECT because it involves vasodilatation with increased blood flow to the distal portion of the digits and changes in connective tissue, possibly from hypoxia, changes in innervation, genetics, or a platelet- derived growth factor from fragments of platelet clumps C. Is wrong because it is caused most often from the dermatophyte Trichophyton rubrum, but also from other dermatophytes and some molds such as Alternaria and Fusarium species. Onychomycosis affects 1 in 5 over age 60. The best prevention is to treat and prevent tinea pedis. Only half of all nail dystrophies are caused by onychomycosis, so a positive fungal culture, potassium hydroxide exam, or pathologic evaluation of nail clippings is recommended before treating with oral antifungals. D. Is wrong because Punctate depressions of the nail plate caused by defective layering of the superficial nail plate by the proximal"}, {"id": "q147", "pdfPage": 62, "originalNumber": "60", "question": "A 60 yo man has a nonhealing ulcer on lower lip. It is firm to the touch, raised on the edges and slowly growing for months. which condition is most likely being described?", "options": [{"letter": "A", "text": "Squamous cell carcinoma"}, {"letter": "B", "text": "Basal cell carcinoma"}, {"letter": "C", "text": "Actinic keratosis"}, {"letter": "D", "text": "Malignant melanoma"}], "answer": "C", "answerText": "Actinic keratosis", "explanation": "60. ANSWER: C A. Is CORRECT because a nonhealing, indurated (firm), ulcerated lesion with raised edges on the lower lip is classic for squamous cell carcinoma, especially in older men with sun exposure or smoking history. B. Is wrong because basal cell carcinoma commonly occurs on sun-exposed areas such as the upper lip, nose, or eyelids, but rarely affects the lower lip. It also tends to be pearly, with rolled borders and telangiectasia, not a firm, ulcerated lesion. C. Is wrong because actinic keratosis presents as rough, scaly patches on sun-exposed skin and is premalignant, not yet forming an ulcer or raised, firm lesion. D. Is wrong because malignant melanoma usually presents as a pigmented lesion with irregular borders and color variation, not as a nonhealing ulcer on the lip. Source: https://www.webpathology.com/images/head-and-neck/oral-cavity-or opharynx-and-neck/epithelial-pathology/34030"}, {"id": "q148", "pdfPage": 62, "originalNumber": "31", "question": "frenitus. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Chronic bronchitis"}, {"letter": "D", "text": "Emphysema (same decreased breath sounds and tactile fremitus)."}], "answer": "B", "answerText": "Pleural effusion", "explanation": "B. Is the correct answer C. Is wrong because chronic bronchitis presents with Resonance, vesicular breath sounds, and normal tactile fremitus. D. Is wrong because emphysema presents with hyperresonance."}, {"id": "q149", "pdfPage": 63, "originalNumber": "62", "question": "Which of the following findings best differentiates lobar pneumonia from pleural effusion?", "options": [{"letter": "A", "text": "Decreased tactile fremitus"}, {"letter": "B", "text": "Dullness in percussion"}, {"letter": "C", "text": "Increased breath sounds with bronchophony"}, {"letter": "D", "text": "Decreased vesicular"}], "answer": "C", "answerText": "Increased breath sounds with bronchophony", "explanation": "62. ANSWER: C A. Is wrong because this occurs in pleural effusion, where fluid in the pleural space dampens vibration transmission B. Is wrong because both pneumonia and pleural effusion show dullness to percussion, so it does not differentiate them C. Is CORRECT because in lobar pneumonia, the alveoli are filled with inflammatory exudate, creating lung consolidation. Consolidated lung tissue conducts sound better, resulting in bronchial breath sounds, bronchophony, egophony, and increased tactile fremitus D. Is wrong because this is typical of pleural effusion, not lobar"}, {"id": "q150", "pdfPage": 64, "originalNumber": "63", "question": "During auscultation, you hear high-pitched, loud sound with a distinct pause between inspiration and expiration over the periphery of the lung. What is the significance?", "options": [{"letter": "A", "text": "Normal breath sound"}, {"letter": "B", "text": "Suggests bronchial breathe sound in abnormal location"}, {"letter": "C", "text": "Indicative of pleural rub"}, {"letter": "D", "text": "Characteristic of a vesicular breath sound"}], "answer": "B", "answerText": "Suggests bronchial breathe sound in abnormal location", "explanation": "63. ANSWER: B A. Is wrong because normal breath sounds have soft and lower pitch. B. Is CORRECT because bronchial breath sounds are higher in pitch and located over the manubrium or larger proximal airways C. Is wrong because pleural rub have coarse, grating, biphasic sounds heard primarily during expiration. D. Is wrong because vesicular breath sound is an example of a normal breath sound, and it has a soft and lower pitch sound."}, {"id": "q151", "pdfPage": 65, "originalNumber": "64", "question": "A 65 y.o man suffering from COPD with barrel chest. What physical finding best describes the condition?", "options": [{"letter": "A", "text": "Dullness on percussion"}, {"letter": "B", "text": "Increased fremitus"}, {"letter": "C", "text": "Hyperresonance on percussion"}, {"letter": "D", "text": "Late inspiratory crackles"}], "answer": "C", "answerText": "Hyperresonance on percussion", "explanation": "64. ANSWER: C A. Is wrong because dullness is heard when fluid or solid tissue replaces air-containing lung or occupies the pleural space B. Is wrong because increased fremitus is heard through consolidated tissue such as in pneumonia C. Is CORRECT because generalized hyperresonance is common over the hyperinflated lungs of COPD D. Is wrong because late inspiratory crackles are heard in abnormal lung tissue such as in pulmonary fibrosis Source: Bates Guide to Physical Examination, 13th Edition, Ch 15, page 781"}, {"id": "q152", "pdfPage": 65, "originalNumber": "65", "question": "Combination finding for Pneumothorax", "options": [{"letter": "A", "text": "Dullness percussion, increased fremitus, crackles"}, {"letter": "B", "text": "Hyperresonance, decreased breath sounds, tracheal deviation"}, {"letter": "C", "text": "Resonant, increased fremitus, wheezes"}, {"letter": "D", "text": "Dull, bronchial breath sounds, Egophony"}], "answer": "B", "answerText": "Hyperresonance, decreased breath sounds, tracheal deviation", "explanation": "65. ANSWER: B A. Is wrong because this describes Lobar Pneumonia B. Is CORRECT because it is pneumothorax C. Is wrong because it is not pneumothorax and supposed to be asthma however increased fremitus makes it wrong D. Is wrong because this also describes Lobar Pneumonia A. B. C. D."}, {"id": "q153", "pdfPage": 66, "originalNumber": "67", "question": "Egophony is often used for the diagnosis of which condition?", "options": [{"letter": "A", "text": "Bronchitis"}, {"letter": "B", "text": "Pleural Effusion"}, {"letter": "C", "text": "Lobar Pneumonia"}, {"letter": "D", "text": "Asthma"}], "answer": "C", "answerText": "Lobar Pneumonia", "explanation": "67. ANSWER: C A. Is wrong because bronchitis primarily affects the bronchi and produces diffuse wheezes or rhonchi, not the localized voice changes characteristic of egophony. B. Is wrong because pleural effusion usually causes decreased or absent breath sounds and dullness to percussion, not egophony over the effusion itself. C. Is CORRECT because egophony—where “E” sounds like “A”—occurs over areas of lung consolidation, classically seen in lobar pneumonia. D. Is wrong because asthma involves widespread airway narrowing and wheezing, not localized consolidation that produces egophony."}, {"id": "q154", "pdfPage": 67, "originalNumber": "68", "question": "Which clinical scenario best describes bronchophony?", "options": [{"letter": "A", "text": "Patient whispers “99” and the sound is muffled"}, {"letter": "B", "text": "Patient says “E” and is heard as “E”"}, {"letter": "C", "text": "Patient says “99” and is heard clearly and loudly"}, {"letter": "D", "text": "Patient breathes rapidly and shallowly"}], "answer": "C", "answerText": "Patient says “99” and is heard clearly and loudly", "explanation": "68. ANSWER: C A. Is wrong because it describes pectoriloquy B. Is wrong because it describes egophony C. Is CORRECT because it describes bronchophony D. Is wrong because it does not describe bronchophony"}, {"id": "q155", "pdfPage": 67, "originalNumber": "69", "question": "Tactile fremitus is increased in:", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Lobar pneumonia with consolidation"}, {"letter": "D", "text": "Emphysema"}], "answer": "C", "answerText": "Lobar pneumonia with consolidation", "explanation": "69. ANSWER: C A. Is wrong because tactile fremitus is decreased or absent when the transmission of vibrations from the larynx to the surface of the chest is impeded by air (pneumothorax) B. Is wrong because tactile fremitus is decreased or absent when the transmission of vibrations is impeded by pleural effusion. (Pleural accumulations of serous fluid (pleural effusion) typically cause dullness upon percussion and impede the transmission of vocal vibrations). C. Is CORRECT because lobar pneumonia involves consolidation, in which the alveoli are filled with fluid and blood cells. This solid tissue replaces air-containing lung. Unlike conditions such as pneumothorax, pleural effusion, or COPD which decrease or abolish fremitus, consolidation generally enhances the transmission of palpable vibrations, leading to an increase in tactile fremitus (although the sources do not explicitly use the phrase \"increased fremitus,\" they confirm the dense pathology of consolidation and exclude the other options as causes of decreased fremitus). D. Is wrong because tactile fremitus is decreased or absent when the transmission of vibrationsnis impeded by COPD (Chronic Obstructive Pulmonary Disease, which includes emphysema)"}, {"id": "q156", "pdfPage": 68, "originalNumber": "71", "question": "Asymmetric chest rise, decreased breath sounds on one side after trauma. Interpretation?", "options": [{"letter": "A", "text": "Bronchitis"}, {"letter": "B", "text": "Flail chest"}, {"letter": "C", "text": "Unilateral diaphragmatic paralysis"}, {"letter": "D", "text": "Tension pneumothorax"}], "answer": "D", "answerText": "Tension pneumothorax", "explanation": "71. ANSWER: D A. Is wrong because bronchitis causes bilateral wheezing or coarse breath sounds, not asymmetry. B. Is wrong because flail chest presents with paradoxical chest movement (a segment moves inward during inspiration) but breath sounds are usually equal unless associated with pneumothorax. C. Is wrong because unilateral diaphragmatic paralysis causes elevated hemidiaphragm and reduced excursion, not decreased breath sounds with trauma or acute asymmetry. D. Is CORRECT because asymmetric chest rise and decreased or absent breath sounds on one side after trauma indicate air trapped in the pleural space, causing lung collapse and mediastinal shift — classic for tension pneumothorax, a life-threatening emergency. Source: Bates Guide to Physical Examination, 13th Edition, Ch 11"}, {"id": "q157", "pdfPage": 69, "originalNumber": "72", "question": "Which of the following would let you hear wheezes throughout all lung fields?", "options": [{"letter": "A", "text": "Lobar pneumonia"}, {"letter": "B", "text": "Asthma"}, {"letter": "C", "text": "Pneumothorax (or Pleural effusion di ko sure)"}, {"letter": "D", "text": "Pulmonary Embolism"}], "answer": "B", "answerText": "Asthma", "explanation": "72. ANSWER: B A. Is wrong because is wrong because it affects a localized area of the lung, producing crackles and bronchial breath sounds, not diffuse wheezes B. Is CORRECT because in asthma, there is generalized (diffuse) airway obstruction due to bronchospasm, mucus plugging, and inflammation. This causes wheezes heard throughout all lung fields, especially during expiration. C. Is wrong because pneumothorax/pleural effusion cause decreased or absent breath sounds, not wheezing D. Is wrong because it typically causes clear lungs on auscultation (no wheezes), though the patient may be dyspneic due to vascular obstruction"}, {"id": "q158", "pdfPage": 69, "originalNumber": "73", "question": "What is the rationale for percussing the lungs from apex to base?", "options": [{"letter": "A", "text": "To assess diaphragmatic descent"}, {"letter": "B", "text": "To follow anatomic progression of consolidation"}, {"letter": "C", "text": "To hear egophonic changes"}, {"letter": "D", "text": "To hear sounds in the apex before fatigue sets in"}], "answer": "B", "answerText": "To follow anatomic progression of consolidation", "explanation": "73. ANSWER: B A. Is wrong because, while percussion can help assess lung position relative to the diaphragm, its primary purpose is not to directly measure diaphragmatic descent. B. Is CORRECT because it allows clinicians to identify the extent of consolidation as it typically progresses downwards due to gravity. C. Is wrong because it is a change in the quality of spoken voice sounds heard during auscultation (listening with a stethoscope), not percussion. D. Is wrong because percussing from apex to base is a systematic approach to assess lung conditions, not to prioritize hearing sounds in the apex before fatigue. Bates Guide to Physical Examination, 13th Edition, Ch 15"}, {"id": "q159", "pdfPage": 69, "originalNumber": "32", "question": "breaths/min with shallow breaths. Which pattern does this BEST describe?", "options": [{"letter": "A", "text": "Cheyne-stokes"}, {"letter": "B", "text": "Hyperpnea"}, {"letter": "C", "text": "Tachypnea"}, {"letter": "D", "text": "Kussmaul’s"}], "answer": "C", "answerText": "Tachypnea", "explanation": "74. ANSWER: C A. Is wrong because Cheyne-Stokes is characterized by alternate periods of deep breathing and apnea (no breathing) and patient in case shows absence of apnea B. Is wrong because rapid DEEP breathing occurs in response to metabolic demand from causes like exercise, high altitude, sepsis, and anemia. Question stem does not mention this C. Is CORRECT because tachypnea is described as rapid 38 SHALLOW breathing which matches patient in the case D. Is wrong because Kussmaul’s is a COMPENSATORY form of overbreathing due to systemic acidosis and may be fast, normal or slow. The patient in the case shows absence of systemic acidosis. Source: Bates’ Guide to Physical Examination, 13th Edition, Ch. 15, Table 15-4"}, {"id": "q160", "pdfPage": 70, "originalNumber": "75", "question": "The patient is experiencing frequent coughs with chronic respiratory infections. Increased AP diameter and decreased breath sounds.", "options": [{"letter": "A", "text": "Pulmonary edema"}, {"letter": "B", "text": "Pulmonary embolism"}, {"letter": "C", "text": "COPD"}, {"letter": "D", "text": "Upper airway obstruction"}], "answer": "C", "answerText": "COPD", "explanation": "75. ANSWER: C A. Is wrong because this usually presents acutely with dyspnea, crackles, and frothy sputum, not chronic cough or barrel chest. B. Is wrong because in pulmonary embolism, there is a sudden onset of chest pain and shortness of breath; lungs usually clear on auscultation. C. Is CORRECT because increase in AP diameter or barrel chest often accompanies COPD. There is also a decrease to absent breath sounds in COPD. D. Is wrong because it usually causes stridor and inspiratory difficulty, not decreased breath sounds or hyperinflated chest. Source: Bates 13th Edition, Thorax, Page 404 & 407"}, {"id": "q161", "pdfPage": 71, "originalNumber": "77", "question": "Correct examination for posterior thorax and lungs:", "options": [{"letter": "A", "text": "Inspection > Auscultation > Palpation > Percussion"}, {"letter": "B", "text": "Inspection > Palpation > Percussion > Auscultation"}, {"letter": "C", "text": "Auscultation > Inspection > Palpation > Percussion"}, {"letter": "D", "text": "Percussion > Palpation > Auscultation > Inspection"}], "answer": "B", "answerText": "Inspection > Palpation > Percussion > Auscultation", "explanation": "77. ANSWER: B A. Is wrong because auscultation comes too early. You should not listen before you palpate or percuss, since these can change how the chest sounds or feels. B. Is CORRECT because it is the correct order for examining the posterior thorax and lungs. C. Is wrong because the method starts with inspection, not auscultation. D. Is wrong because it is in the wrong order. Bates’ 13th ed.; Ch15 Thorax and Lungs"}, {"id": "q162", "pdfPage": 71, "originalNumber": "78", "question": "Crackles over bones, joints, and skin with or without pain during palpation", "options": [{"letter": "A", "text": "Crackles"}, {"letter": "B", "text": "Bony step offs"}, {"letter": "C", "text": "Crepitus"}, {"letter": "D", "text": "A&C"}], "answer": "C", "answerText": "Crepitus", "explanation": "78. ANSWER: C A. Is wrong because crackles are a type of adventitious breath sounds heard during AUSCULTATION B. Is wrong because bony step offs are irregularities in the normal contour of bones palpated over FRACTURED RIB C. Is CORRECT because it is defined as a crackling or grating sound palpated over fractures or joints D. Is wrong because only C is the best correct answer Bates’ Guide to Physical Examination & History Taking 13
