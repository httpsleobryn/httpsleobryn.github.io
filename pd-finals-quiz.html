"explanation": "100. ANSWER: D A. Wrong. This pertains to positive nuchal rigidity B. Wrong. C. Wrong. This pertains to positive Kernig sign D. CORRECT. Hip and knee flexion upon neck flexion is a positive Brudzinski sign"}, {"id": "q320", "pdfPage": 159, "originalNumber": "1", "question": "Which of the following arteries is palpated just lateral to the larynx at the level of the cricoid cartilage?", "options": [{"letter": "A", "text": "Brachial artery"}, {"letter": "B", "text": "Carotid artery"}, {"letter": "C", "text": "Radial artery"}, {"letter": "D", "text": "Femoral artery"}], "answer": "B", "answerText": "Carotid artery", "explanation": "1. ANSWER: B A. Is wrong because brachial artery is palpated at the bend of the elbow just medial to the biceps tendon B. Is CORRECT because carotid artery is palpated just lateral to the larynx at the level of the cricoid cartilage. C. Is wrong because radial artery is palpated on the lateral flexor surface D. Is wrong because femoral artery is palpated below the inguinal ligament, midway between the anterior superior iliac spine and the symphysis pubis Source: Bate’s 13th Ed. Chap 16, page 848"}, {"id": "q321", "pdfPage": 160, "originalNumber": "2", "question": "The Allen's test is used to assess the patency of which arteries", "options": [{"letter": "A", "text": "brachial and ulnar arteries"}, {"letter": "B", "text": "radial and ulnar arteries"}, {"letter": "C", "text": "carotid and subclavian arteries"}, {"letter": "D", "text": "femoral and popliteal arteries"}], "answer": "B", "answerText": "radial and ulnar arteries", "explanation": "2. ANSWER: B A. Is wrong because the test is not designed to assess the brachial artery. B. Is CORRECT because the Allen’s test evaluates the patency of the radial and ulnar arteries to ensure adequate collateral circulation before procedures like radial artery puncture. C. Is wrong because these supply the head and upper limb but aren’t tested by Allen’s test. D. Is wrong because these are arteries of the lower limb, not the wrist. Source: Bate’s"}, {"id": "q322", "pdfPage": 160, "originalNumber": "3", "question": "A bounding carotid pulse is associated with which of the following conditions?", "options": [{"letter": "A", "text": "Aortic Stenosis"}, {"letter": "B", "text": "Aortic Regurgitation"}, {"letter": "C", "text": "Cardiogenic Shock"}, {"letter": "D", "text": "Hypovolemia"}], "answer": "B", "answerText": "Aortic Regurgitation", "explanation": "3. ANSWER: B A. Is wrong because thrills of aortic stenosis are transmitted to carotid arteries as well as delayed carotid upstroke B. Is CORRECT because bounding carotid and radial pulses are present in aortic regurgitation C. Is wrong because carotid pulses are weak in cardiogenic shock D. Is wrong because hypovolemia is more associated with low stroke volume"}, {"id": "q323", "pdfPage": 161, "originalNumber": "4", "question": "A difference in BP of more than 10 mmHg in both arms indicate?", "options": [{"letter": "A", "text": "Peripheral neuropathy"}, {"letter": "B", "text": "Coarctation of aorta"}, {"letter": "C", "text": "Subclavian steal syndrome"}, {"letter": "D", "text": "Venous insufficiency"}], "answer": "C", "answerText": "Subclavian steal syndrome", "explanation": "4. ANSWER: C A. Is wrong because it affects nerve function, not blood pressure B. Is wrong because it causes BP difference between upper and lower extremities, not between arms. C. Is CORRECT because in this syndrome, subclavian artery (usually the left) becomes narrowed or obstructed before the origin of the vertebral artery. This causes reduced blood flow to the affected arm → lower BP on that side. D. Is wrong because it affects venous return, not arterial pressure differences. Source: Bate’s 13th Ed. Chap 8, page 368"}, {"id": "q324", "pdfPage": 161, "originalNumber": "5", "question": "Upon examination, painful, pale, cold right foot with no dorsalis pedis pulse.", "options": [{"letter": "A", "text": "Apply warm compress"}, {"letter": "B", "text": "Elevate limb at heart level"}, {"letter": "C", "text": "Refer urgently for vascular assessment"}], "answer": "C", "answerText": "Refer urgently for vascular assessment", "explanation": "5. ANSWER: C A. Is wrong because applying a warm compress, which might increase metabolic demand in an already ischemic limb B. Is wrong because elevating the limb at heart level might not be sufficient; the limb is typically kept at a dependent position to maximize perfusion pressure C. Is CORRECT because acute arterial occlusion from embolism or thrombosis causes pain and numbness or tingling. The limb distal 3 D. Massage to the occlusion becomes cold, pale, and pulseless. Pursue emergency treatment. D. Is wrong because massaging the limb, which could potentially dislodge a clot Source: Bates’ 13th Ed, Ch17, p954"}, {"id": "q325", "pdfPage": 162, "originalNumber": "6", "question": "Diabetic woman experiences pain in walking that disappears at rest. Decreased pulse is also noted. This is most commonly seen in", "options": [{"letter": "A", "text": "Chronic venous insufficiency"}, {"letter": "B", "text": "Arterial thrombosis"}, {"letter": "C", "text": "Intermittent claudication"}, {"letter": "D", "text": "Cellulitis"}], "answer": "B", "answerText": "Arterial thrombosis", "explanation": "6. ANSWER: B A. Is incorrect because chronic venous insufficiency causes leg swelling and skin changes, not pain relieved by rest. B. Is CORRECT because arterial thrombosis causes intermittent claudication—pain on walking that disappears with rest and decreased pulses. C. Is incorrect because gangrene is a late complication of severe ischemia, not the initial presentation of intermittent claudication. D. Is incorrect because cellulitis presents with localized redness, warmth, and tenderness, not exertional leg pain relieved by rest. Source: Bates’ 13th Ed, Ch17, Table 17-4 Source: Robbins 10th ed., Ch3, p.110"}, {"id": "q326", "pdfPage": 162, "originalNumber": "7", "question": "Man has pitting edema in both legs that worsens in the evening. No signs of infection or tenderness. What mechanism best explains this?", "options": [{"letter": "A", "text": "Increased plasma oncotic pressure"}, {"letter": "B", "text": "Lymphatic obstruction"}, {"letter": "C", "text": "Increased venous pressure"}], "answer": "C", "answerText": "Increased venous pressure", "explanation": "7. ANSWER: C A. Is wrong because it states that decreased oncotic pressure (from low albumin) causes edema, not increased. B. Is wrong because it causes non-pitting edema that does not typically worsen throughout the day. C. Is CORRECT because prolonged standing causes dependent pitting edema due to increased hydrostatic pressure in veins and capillaries. D. Is wrong because it reduces blood flow and causes ischemia, not venous pooling or edema. 4 D. Arterial spasm Source: Bate’s, 12th Ed., Ch 12, p533"}, {"id": "q327", "pdfPage": 163, "originalNumber": "8", "question": "48 yo woman present with varicose veins and brown pigmentation on the medial ankle. If left untreated, what complication may arise?", "options": [{"letter": "A", "text": "Arterial Ulcer"}, {"letter": "B", "text": "Venous Ulcer"}, {"letter": "C", "text": "Gangrene"}, {"letter": "D", "text": "Cellulitis"}], "answer": "B", "answerText": "Venous Ulcer", "explanation": "8. ANSWER: B A. Is wrong because arterial ulcers are usually associated with tissue ischemia and are pale on elevation or dusky red on dependency. Locations are on the toes and lateral malleolus. B. Is CORRECT because in varicose veins there is venous stasis leading to venous hypertension. There is capillary leaking and RBC breakdown resulting in the brownish discoloration and usually occur in medial malleolus. C. Is wrong because it is a complication of severe arterial disease, not venous D. Is wrong because it may be a complication but usually caused by a secondary infection after ulceration Source: Bates’ 12th editionChapter 12 p. 537"}, {"id": "q328", "pdfPage": 163, "originalNumber": "9", "question": "Patient has Ankle Brachial Index(ABI) of 0.5. How would you interpret this?", "options": [{"letter": "A", "text": "Normal arterial flow"}, {"letter": "B", "text": "Mild arterial occlusion"}, {"letter": "C", "text": "Moderate arterial occlusion"}, {"letter": "D", "text": "Severe arterial"}], "answer": "C", "answerText": "Moderate arterial occlusion", "explanation": "9. ANSWER: C A. Is wrong because since the patient’s ABI is 0.5, this is well below normal and indicates arterial obstruction. B. Is wrong because The patient’s ABI (0.5) is below 0.60, indicating more significant obstruction. C. Is CORRECT because ABI of 0.5 falls squarely within this range. D. Is wrong because The patient’s ABI (0.5) is above this cutoff, so it does not indicate severe ischemia."}, {"id": "q329", "pdfPage": 164, "originalNumber": "10", "question": "After assessing the patient, (+) cold feet, delayed capillary refill time. You conclude Peripheral Arterial Disease is likely. What is the next best step?", "options": [{"letter": "A", "text": "Prescribe compression stockings"}, {"letter": "B", "text": "Elevate leg above heart level"}, {"letter": "C", "text": "Recommend smoking cessation & physical exercise"}, {"letter": "D", "text": "Advice prolonged bed rest"}], "answer": "C", "answerText": "Recommend smoking cessation & physical exercise", "explanation": "10. ANSWER: C A. Is wrong because compression stockings are used for venous insufficiency, not arterial disease.Applying compression in PAD can worsen ischemia because it further restricts already reduced arterial flow.Therefore, compression stockings are contraindicated in significant PAD. B. Is wrong because patients with PAD often experience increased pain or pallor when the leg is elevated because this position further decreases arterial perfusion pressure.The correct approach is the reverse — keep legs dependent (below heart level) to enhance blood flow to the feet. C. Is CORRECT because Bates’ emphasizes risk-factor modification as the first-line management of PAD: - Smoking cessation — the single most important intervention to slow disease progression and reduce cardiovascular risk. - Supervised exercise therapy — improves collateral circulation and walking distance in claudication. These interventions directly address the underlying atherosclerotic process and improve functional outcomes. - After lifestyle measures, diagnostic confirmation with Ankle–Brachial Index (ABI) or vascular imaging may follow. D. Is wrong because immobility in PAD patients is discouraged because it worsens circulation and increases the risk of venous thrombosis and muscle deconditioning. Physical activity, rather than bed rest, is recommended to promote collateral blood flow. Clinical context: Your patient presents with cold feet and delayed capillary refill, both classic signs of impaired arterial perfusion to the lower extremities. This suggests Peripheral Arterial Disease (PAD) — a condition caused by atherosclerotic narrowing of peripheral arteries, leading to reduced blood flow to the limbs."}, {"id": "q330", "pdfPage": 165, "originalNumber": "11", "question": "Best describes classic angina pectoris", "options": [{"letter": "A", "text": "Relieved by antacids and belching"}, {"letter": "B", "text": "Squeezing sensation aggravated by exertion"}, {"letter": "C", "text": "Sharplike; aggravated by breathing"}, {"letter": "D", "text": "Ripping sensation, abrupt onset; aggravated by hypertension"}], "answer": "B", "answerText": "Squeezing sensation aggravated by exertion", "explanation": "11. ANSWER: B A. Is wrong because Suggests gastroesophageal reflux disease (GERD) or dyspepsia B. Is correct because Classic (stable) angina pectoris is due to transient myocardial ischemia caused by an imbalance between oxygen supply and demand—usually from atherosclerotic narrowing of the coronary arteries. C. Is wrong because Suggests pleuritic pain (pleurisy, pericarditis, pulmonary embolism) D. Is wrong because Characteristic of aortic dissection"}, {"id": "q331", "pdfPage": 165, "originalNumber": "12", "question": "Which of the following will least likely result to edema:", "options": [{"letter": "A", "text": "Pulmonary hypertension"}, {"letter": "B", "text": "Liver cirrhosis"}, {"letter": "C", "text": "Aortic Dissection"}, {"letter": "D", "text": "Nephrotic syndrome"}], "answer": "C", "answerText": "Aortic Dissection", "explanation": "12. ANSWER: C A. Is wrong because this choice results to edema B. Is wrong because liver failure-lowering protein synthesis causes edema C. Is CORRECT because it least likely causes edema due to absence of protein abnormalities D. Is wrong because protein nephropathy can induce edema Chapter 16- CVS"}, {"id": "q332", "pdfPage": 165, "originalNumber": "13", "question": "True of interviewing patients with syncope 13. ANSWER: D 7", "options": [{"letter": "A", "text": "Must undergo immediate brain imaging"}, {"letter": "B", "text": "Common cause is seizure disorder"}, {"letter": "C", "text": "Cardiac arrhythmias account for 50% of cases"}, {"letter": "D", "text": "Interviewing eye witness/es is reliable for Hx taking"}], "answer": "A", "answerText": "Must undergo immediate brain imaging", "explanation": "A. Is wrong because routine brain imaging is not required for all cases of syncope unless there are focal neurologic signs or symptoms suggesting a central nervous system cause. B. Is wrong because seizure is an uncommon cause of transient loss of consciousness; most cases of syncope are vasovagal or cardiac in origin. C. Is wrong because while cardiac arrhythmias are important to consider, they do not account for half of all syncope cases; neurocardiogenic (vasovagal) causes are the most frequent. D. Is CORRECT because eyewitness accounts are valuable and reliable, as patients often have amnesia surrounding the syncopal episode; observers can describe onset, duration, and recovery more accurately. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 24, Page 1148."}, {"id": "q333", "pdfPage": 166, "originalNumber": "14", "question": "What is considered as the second step in the assessment of CVD risk factors?", "options": [{"letter": "A", "text": "Calculate the 10-year & Lifetime Global CVD Risk using a Web-Based Calculator"}, {"letter": "B", "text": "Proper techniques in getting VD"}, {"letter": "C", "text": "Screen for Individual CV"}, {"letter": "D", "text": "Address Individual Risk Factors"}], "answer": "A", "answerText": "Calculate the 10-year & Lifetime Global CVD Risk using a Web-Based Calculator", "explanation": "14. ANSWER: A A. Is CORRECT because fter identifying traditional cardiovascular risk factors, the second step is to quantify overall cardiovascular risk using a global risk calculator (such as the ACC/AHA ASCVD Risk Estimator) to guide prevention and management strategies. B. Is wrong because this refers to obtaining vital data or blood pressure, which is part of initial data gathering, not the second step in overall CVD risk assessment. C. Is wrong because this is the first step, not the second, in the assessment process. D. Is wrong because addressing or managing identified risk factors comes after calculating the patient’s global cardiovascular risk; it is a subsequent step following risk estimation."}, {"id": "q334", "pdfPage": 167, "originalNumber": "15", "question": "Which of the ff is true of the goals in assessing individual cardiovascular risk factors.", "options": [{"letter": "A", "text": "Moderate cigarette smoking"}, {"letter": "B", "text": "Low calorie diet"}, {"letter": "C", "text": "Moderate-intense exercise"}, {"letter": "D", "text": "BMI < 30 kg/mg2"}], "answer": "C", "answerText": "Moderate-intense exercise", "explanation": "15. ANSWER: C A. Is wrong because there is no safe level of cigarette smoking; complete smoking cessation is recommended to reduce cardiovascular risk. B. Is wrong because a balanced, heart-healthy diet (rich in fruits, vegetables, whole grains, and low in saturated fat and sodium) is recommended, but “low calorie” alone does not specifically address cardiovascular protection. C. Is CORRECT because regular moderate to vigorous physical activity (at least 150 minutes per week of moderate or 75 minutes per week of vigorous exercise) is proven to reduce cardiovascular risk and improve lipid and blood pressure profiles. D. Is wrong because the goal is to maintain a BMI < 25 kg/m² (normal range 18.5–24.9 kg/m²); a BMI < 30 kg/m² still includes overweight individuals and does not meet optimal risk reduction standards. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 886."}, {"id": "q335", "pdfPage": 167, "originalNumber": "16", "question": "Considered as an individual cardiovascular risk", "options": [{"letter": "A", "text": "Diabetes mellitus"}, {"letter": "B", "text": "Anxiety disorder"}, {"letter": "C", "text": "Seizure disorder"}, {"letter": "D", "text": "Vegetarian diet"}], "answer": "A", "answerText": "Diabetes mellitus", "explanation": "16. ANSWER: A A. Is CORRECT because diabetes mellitus is a major individual cardiovascular risk factor, as chronic hyperglycemia accelerates atherosclerosis and significantly increases the risk of coronary artery disease, stroke, and peripheral vascular disease. B. Is wrong because although stress and anxiety can transiently elevate blood pressure and heart rate, they are not classified as primary cardiovascular risk factors in formal assessments. C. Is wrong because seizure disorders are neurological, not cardiovascular conditions, and are not linked to increased cardiovascular risk. D. Is wrong because a vegetarian diet is generally cardioprotective, as it is often lower in saturated fats and cholesterol, thus reducing rather than increasing cardiovascular risk."}, {"id": "q336", "pdfPage": 168, "originalNumber": "17", "question": "Considered as the base of the heart", "options": [{"letter": "A", "text": "The left border of the left ventricle"}, {"letter": "B", "text": "The right border of the right ventricle"}, {"letter": "C", "text": "The posterior aspect of the right atrium"}, {"letter": "D", "text": "The superior border where the great vessels are"}], "answer": "D", "answerText": "The superior border where the great vessels are", "explanation": "17. ANSWER: D A. Is wrong because this forms the left lateral border of the heart, not the base; it corresponds to the apex beat area on physical examination. B. Is wrong because the right ventricle forms most of the anterior (sternocostal) surface of the heart, not the base. C. Is wrong because the posterior aspect is part of the heart’s base anatomically, but functionally, the “base of the heart” in surface anatomy refers to the upper border where the great vessels emerge. D. Is CORRECT because the base of the heart is located at the superior border, opposite the apex, and includes the left atrium, part of the right atrium, and the origins of the great vessels (aorta, pulmonary arteries, and superior vena cava). Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 819."}, {"id": "q337", "pdfPage": 168, "originalNumber": "18", "question": "Forms apex of the heart", "options": [{"letter": "A", "text": "Left atrium"}, {"letter": "B", "text": "Left ventricle"}, {"letter": "C", "text": "Right atrium"}, {"letter": "D", "text": "Right ventricle"}], "answer": "B", "answerText": "Left ventricle", "explanation": "18. ANSWER: B A. Is wrong because the left atrium forms most of the posterior surface (base) of the heart, not the apex. B. Is CORRECT because the apex of the heart is formed by the tip of the left ventricle, located in the 5th intercostal space at or just medial to the midclavicular line; it’s the point where the apical impulse (PMI) is felt. C. Is wrong because the right atrium forms the right border of the heart but does not contribute to the apex. D. Is wrong because the right ventricle forms most of the anterior surface of the heart, but the apex belongs to the left ventricle."}, {"id": "q338", "pdfPage": 169, "originalNumber": "19", "question": "Which of the following best describes ventricular relaxation?", "options": [{"letter": "A", "text": "Closure of AV valves"}, {"letter": "B", "text": "Something ventricular ejection"}, {"letter": "C", "text": "S2-S1"}, {"letter": "D", "text": "S1- S2"}], "answer": "C", "answerText": "S2-S1", "explanation": "19. ANSWER: C A. Is wrong because closure of AV valves → S1 → beginning of systole (ventricular contraction) B. Is wrong because ventricular ejection occurs during systole C. Is CORRECT because the interval between S2 and the next S1 represents ventricular diastole, when the ventricle relaxes and fills with blood. S2 marks the closure of the SL valves and the start of relaxation, while the next S1 marks the closure of the AV valves and the start of the next contraction D. Is wrong because S1-S2 corresponds to systole Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 824-825."}, {"id": "q339", "pdfPage": 169, "originalNumber": "20", "question": "What systolic murmur is better heard when asking the patient to lean forward and listening after the patient exhales?", "options": [{"letter": "A", "text": "Aortic Regurgitation"}, {"letter": "B", "text": "Mitral Regurgitation"}, {"letter": "C", "text": "Mitral Stenosis"}, {"letter": "D", "text": "Pulmonary Regurgitation"}], "answer": "A", "answerText": "Aortic Regurgitation", "explanation": "20. ANSWER: A A. Is CORRECT because the murmur of aortic regurgitation is best heard when the pt leans forward and exhales, which brings the aortic valve closer to the chest wall and enhances the early diastolic decrescendo murmur along the left sternal border B. Is wrong; heard at the apex, left lateral decubitus, no special leaning maneuver needed. C. Is wrong; heard at the apex, left lateral decubitus, accentuated in end expiration. D. Is wrong; heard at the left upper sternal border, accentuated with inspiration, not leaning forward."}, {"id": "q340", "pdfPage": 169, "originalNumber": "21", "question": "50 yo px with loud systolic murmur at the apical area radiating to the left axilla", "options": [{"letter": "A", "text": "Mitral stenosis"}, {"letter": "B", "text": "Aortic stenosis"}], "answer": null, "answerText": "", "explanation": "21. ANSWER: C A. Wrong. Mitral stenosis is a diastolic rumbling murmur with opening snap, best heard at the apex B. Wrong. Aortic stenosis is a systolic ejection murmur at the right 11 C. Mitral regurgitation D. Aortic regurgitation upper sternal border radiating to carotids C. CORRECT D. Wrong. Aortic regurgitation is an early diastolic decrescendo murmur at the left sternal border Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 9 Page 410."}, {"id": "q341", "pdfPage": 170, "originalNumber": "22", "question": "Which of the ff. clinical condition shows a JVP more than 3cm from sternal angle; patient with", "options": [{"letter": "A", "text": "severe dehydration"}, {"letter": "B", "text": "tricuspid stenosis"}, {"letter": "C", "text": "acute pericarditis"}, {"letter": "D", "text": "CHF"}], "answer": "D", "answerText": "CHF", "explanation": "22. ANSWER: D A. Wrong. Low JVP due to reduced intravascular volume B. Wrong. Tricuspid stenosis can cause a prominent a wave, but overall JVP is not consistently elevated; usually normal or only mildly elevated C. Wrong. JVP is typically normal D. CORRECT. Causes elevated JVP due to increased right-sided pressures and volume overload Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 9 Page 377."}, {"id": "q342", "pdfPage": 170, "originalNumber": "23", "question": "A 40 y.o presents with a prominent opening snap upon physical examination. What is your diagnosis?", "options": [{"letter": "A", "text": "Aortic regurgitation"}, {"letter": "B", "text": "Mitral valve stenosis"}, {"letter": "C", "text": "Uncontrolled systemic hypertension"}, {"letter": "D", "text": "Pulmonic hypertension"}], "answer": "B", "answerText": "Mitral valve stenosis", "explanation": "23. ANSWER: B A. Is wrong B. Is CORRECT - Mitral Valve Stenosis causes an opening snap caused by abrupt deceleration. C. Is wrong D. Is wrong Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 9 Page 407."}, {"id": "q343", "pdfPage": 171, "originalNumber": "24", "question": "A 65 year old patient presents with chronic dyspnea and chest pain. You highly suspect severe aortic stenosis. What clinical finding is most likely found with your primary diagnosis?", "options": [{"letter": "A", "text": "Loud systolic murmur heard at the base of the heart"}, {"letter": "B", "text": "??"}, {"letter": "C", "text": "S3 Gallop"}, {"letter": "D", "text": "S4 Gallop"}], "answer": "A", "answerText": "Loud systolic murmur heard at the base of the heart", "explanation": "24. ANSWER: A A. CORRECT - A loud systolic murmur at the base of the heart (2nd & 3rd Interspaces) is a more consistent finding for Aortic Stenosis B. Wrong C. Wrong - More common due to decreased myocardial contractility, heart failure, and ventricular volume overload from aortic or mitral regurgitation, and left-to-right shunts. D. Wrong? - While presence of S4 may be a sign of Aortic Stenosis, it is often rarely heard and is a less consistent finding compared to Choice A. A. D. Source: Bates 12th Ed, Chap 9 Page 407 Unsure"}, {"id": "q344", "pdfPage": 171, "originalNumber": "25", "question": "A diastolic murmur that is faint but audible upon auscultation:", "options": [{"letter": "A", "text": "Grade 1/4"}, {"letter": "B", "text": "Grade 2/4"}, {"letter": "C", "text": "Grade 3/4"}, {"letter": "D", "text": "Grade 4/4"}], "answer": "B", "answerText": "Grade 2/4", "explanation": "25. ANSWER: B A. Is wrong because Grade ¼ is described as barely audible B. Is CORRECT because Grade 2/4 is described as faint but immediately audible C. Is wrong because Grade ¾ is described as easily heard. D. Is wrong because Grade 4/4 is described as very loud. Bates 13th Edition. Chapter 16, Cardiovascular"}, {"id": "q345", "pdfPage": 172, "originalNumber": "26", "question": "What is the correct sequence in doing the abdominal examination?", "options": [{"letter": "A", "text": "Inspection, Auscultation, Palpation, Percussion"}, {"letter": "B", "text": "Inspection, Auscultation, Percussion, Palpation"}, {"letter": "C", "text": "Inspection, Percussion, Palpation, Auscultation"}, {"letter": "D", "text": "Inspection, Palpation, Percussion, Auscultation"}], "answer": "B", "answerText": "Inspection, Auscultation, Percussion, Palpation", "explanation": "26. ANSWER: B A. Wrong B. CORRECT. The correct sequence for an abdominal examination is Inspection, Auscultation, Percussion, Palpation. This sequence is used because palpation and percussion can stimulate or alter peristalsis (bowel sounds), leading to inaccurate auscultation findings if performed first. C. Wrong D. Wrong Source: Chapter 19, Bates’ Physical Examination 13th Ed"}, {"id": "q346", "pdfPage": 172, "originalNumber": "27", "question": "To assess liver span percussion is performed along", "options": [{"letter": "A", "text": "Left MCL"}, {"letter": "B", "text": "Right MCL"}, {"letter": "C", "text": "Midsternal line"}, {"letter": "D", "text": "Anterior axillary line"}], "answer": "B", "answerText": "Right MCL", "explanation": "27. ANSWER: B A. Wrong. The Left Midclavicular Line (MCL) is over the left lung and is used in the examination of the spleen, not the liver span. B. CORRECT. To assess the liver span, percussion is performed along the Right Midclavicular Line (MCL). The normal span in this line is approximately 6 to 12 cm. C. Wrong. The Midsternal line is over the sternum and is used to measure the vertical span of the liver in a less common, narrower measurement (normal range 4−8 cm), but the standard and most reliable line is the Right MCL. D. Wrong. The Anterior Axillary Line is lateral to the Right MCL and is not the standard line used for measuring the vertical liver span."}, {"id": "q347", "pdfPage": 173, "originalNumber": "28", "question": "A positive Murphy’s sign is indicative of", "options": [{"letter": "A", "text": "Appendicitis"}, {"letter": "B", "text": "Cholecystitis"}, {"letter": "C", "text": "Pancreatitis"}, {"letter": "D", "text": "Gastritis"}], "answer": "B", "answerText": "Cholecystitis", "explanation": "28. ANSWER: B A. Wrong. Appendicitis is primarily indicated by localized tenderness at McBurney’s point in the right lower quadrant (RLQ) and often positive Rovsing's or Psoas signs. B. CORRECT. A positive Murphy's sign—which is a sharp, sudden inspiratory arrest during deep palpation of the right upper quadrant (RUQ)—is the classic indicator of acute cholecystitis(inflammation of the gallbladder). C. Wrong. Pancreatitis involves severe epigastric pain that often radiates to the back and is diagnosed through lab work (amylase/lipase) and imaging. D. Wrong. Gastritis (stomach lining inflammation) presents with burning or aching in the upper abdomen and is not associated with this specific physical maneuver. Source: Bates’ Physical Examination 12th Edition, Chapter 11: The Abdomen, page 503"}, {"id": "q348", "pdfPage": 173, "originalNumber": "29", "question": "Pain in RLQ when pressed down at the LLQ", "options": [{"letter": "A", "text": "Rovsing sign"}, {"letter": "B", "text": "Murphy sign"}, {"letter": "C", "text": "McBurney sign"}, {"letter": "D", "text": "Burgney sign"}], "answer": "A", "answerText": "Rovsing sign", "explanation": "29. ANSWER: A A. CORRECT. Rovsing sign is a physical examination finding where palpation (pressing down) on the Left Lower Quadrant (LLQ) causes pain in the Right Lower Quadrant (RLQ). This is a classic sign of acute appendicitis. 15 B. Wrong. Murphy sign is pain and sudden inspiratory arrest during deep palpation of the Right Upper Quadrant (RUQ), indicative of acute cholecystitis. C. Wrong. McBurney sign refers to tenderness or pain localized to McBurney’s point in the RLQ itself (not referred pain from the LLQ), which is the most common finding for appendicitis. D. Wrong. Burgney sign is not a recognized medical sign in standard physical diagnosis. Source: Bates’ Physical Examination 12th Edition, Chapter 11: The Abdomen,"}, {"id": "q349", "pdfPage": 174, "originalNumber": "30", "question": "Visible peristalsis and abdominal distention", "options": [{"letter": "A", "text": "Ileus"}, {"letter": "B", "text": "Intestinal obstruction"}, {"letter": "C", "text": "Peritonitis"}, {"letter": "D", "text": "Cholecystitis"}], "answer": "B", "answerText": "Intestinal obstruction", "explanation": "30. ANSWER: B A. Wrong. Ileus (adynamic or paralytic ileus) is a temporary loss of intestinal muscle movement. It typically presents with abdominal distention but lacks visible peristalsis because the bowel is not actively trying to push contents past a blockage. B. CORRECT. Visible peristalsis (wave-like muscular contractions of the intestine) combined with abdominal distention is a classic sign of intestinal obstruction. The peristaltic waves become exaggerated as the bowel attempts to force contents past the point of blockage. C. Wrong. Peritonitis (inflammation of the peritoneum) causes a rigid, board-like abdomen and often leads to paralytic ileus, meaning peristalsis is usually absent (a silent abdomen). D. Wrong. Cholecystitis (gallbladder inflammation) is localized to the Right Upper Quadrant (RUQ) and does not cause generalized abdominal distention or visible peristalsis. Source: Bates’ Physical Examination 12th Edition, Chapter 11: The Abdomen,"}, {"id": "q350", "pdfPage": 174, "originalNumber": "31", "question": "Presence of shifting dullness", "options": [{"letter": "A", "text": "Tumor"}, {"letter": "B", "text": "Ascites"}, {"letter": "C", "text": "Obstruction"}, {"letter": "D", "text": "Peritonitis"}], "answer": "B", "answerText": "Ascites", "explanation": "31. ANSWER: B A. Wrong. A Tumor is a solid mass that would cause a fixed area of dullness to percussion, not a dullness that shifts when the patient changes position. B. CORRECT. Shifting dullness is a classic and reliable sign elicited on abdominal percussion that indicates the presence of Ascites (free fluid in the peritoneal cavity). When the patient turns, the fluid moves by gravity, causing the area of dullness to shift to the dependent side. C. Wrong. Obstruction (such as a small bowel obstruction) causes tympanitic (resonant/drum-like) percussion over the gas-filled, distended loops of bowel, not shifting dullness. D. Wrong. Peritonitis causes abdominal rigidity and often a paralytic ileus, resulting in generalized tympanic percussion due to gas, though it may cause a fixed dullness if an abscess or massive consolidation is present, but not shifting dullness."}, {"id": "q351", "pdfPage": 175, "originalNumber": "32", "question": "The most appropriate examiner behavior during abdominal palpation is:", "options": [{"letter": "A", "text": "Cold hands, firm pressure"}, {"letter": "B", "text": "Warm hands, gentle pressure, explain procedure"}, {"letter": "C", "text": "Press firmly"}, {"letter": "D", "text": "Avoid eye contact"}], "answer": "B", "answerText": "Warm hands, gentle pressure, explain procedure", "explanation": "32. ANSWER: B A. is wrong because hands must be warm and pressure must be gentle B. is the most appropriate examiner behavior C. is wrong because the examiner must approach the patient calmly and not make any quick, unexpected movements. D. is wrong because the examiner must observe the patient's face for any signs of pain and discomfort."}, {"id": "q352", "pdfPage": 175, "originalNumber": "33", "question": "The signs that make peritonitis four times more likely is:", "options": [{"letter": "A", "text": "Guarding"}, {"letter": "B", "text": "Rigidity"}, {"letter": "C", "text": "Percussion tenderness"}, {"letter": "D", "text": "Rebound tenderness"}], "answer": "B", "answerText": "Rigidity", "explanation": "33. ANSWER: B A. Is wrong but can still be a sign; Guarding is a voluntary contraction of the abdominal wall, often accompanied by a grimace that may diminish when the patient is distracted B. Is CORRECT; It is an involuntary reflex contraction of the abdominal wall from peritoneal inflammation that persists over several examinations C. Is wrong but can still be a sign; Percussion tenderness refers to pain expressed by patient after examiner gently percusses area of tenderness D. Is wrong but can still be a sign; Rebound tenderness refers to pain expressed by the patient after the examiner presses down on an area of tenderness and suddenly removes the hand."}, {"id": "q353", "pdfPage": 176, "originalNumber": "34", "question": "Liver span of 15 cm", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Hepatomegaly"}, {"letter": "C", "text": "Atrophy"}, {"letter": "D", "text": "Ascites"}], "answer": "B", "answerText": "Hepatomegaly", "explanation": "34. ANSWER: B A. Is wrong B. Is CORRECT because normal liver span in the MCL is 6-12 cm C. Is wrong D. Is wrong Bates 13th ed Ch19"}, {"id": "q354", "pdfPage": 177, "originalNumber": "35", "question": "To enhance relaxation of the abdominal wall during palpation:", "options": [{"letter": "A", "text": "Patient in supine position, arms at the side, and if needed, flex hips and legs"}, {"letter": "B", "text": "Patient in left lateral position, hips and legs flexed, head lying on the left arm"}, {"letter": "C", "text": "Ask patient to take"}], "answer": "A", "answerText": "Patient in supine position, arms at the side, and if needed, flex hips and legs", "explanation": "a deep breath and count to 3 D. Palpate only when patient is distracted 35. ANSWER: A A. Is CORRECT because this position relaxes the abdominal wall muscles, making palpation easier and more accurate B. Is wrong because the left lateral position is used for rectal examination C. Is wrong because asking the patient to take a deep breath and count to three may increase muscle tension or cause guarding instead of relaxation D. Is wrong because distraction may help reduce anxiety but does not ensure muscle relaxation as effectively as proper positioning Source: Bates 13th Edition. Chapter 19. Abdomen"}, {"id": "q355", "pdfPage": 177, "originalNumber": "36", "question": "In examining the abdomen, draping should:", "options": [{"letter": "A", "text": "Expose the thorax and abdomen at once"}, {"letter": "B", "text": "Expose only the area examined"}, {"letter": "C", "text": "Not to be used"}, {"letter": "D", "text": "Cover the entire abdomen"}], "answer": "B", "answerText": "Expose only the area examined", "explanation": "36. ANSWER: B A. Is wrong because thoughtful draping aims to expose only the area being examined (the abdomen) while maintaining patient comfort and modesty B. Is CORRECT because thoughtful draping preserves the patient's modesty and helps the examiner focus on the area being examined C. Is wrong because draping is necessary to preserve the patient's modesty, convey respect for their vulnerability, and maximize patient comfort during the physical examination D. Is wrong because the abdomen must be exposed to perform the techniques of physical examination, such as inspection, auscultation, percussion, and palpation"}, {"id": "q356", "pdfPage": 177, "originalNumber": "19", "question": "done to assess the presence of:", "options": [{"letter": "A", "text": "Bowel obstruction"}, {"letter": "B", "text": "Ascites"}, {"letter": "C", "text": "Tumor"}, {"letter": "D", "text": "Hernia"}], "answer": "B", "answerText": "Ascites", "explanation": "37. ANSWER: B A. Is wrong because it is assessed through abdominal distention, high-pitched bowel sounds, and imaging, not by shifting dullness. B. Is CORRECT because the shifting dullness test detects free fluid in the peritoneal cavity that moves with changes in patient position. C. Is wrong because a solid mass produces a fixed area of dullness that does not shift with position. D. Is wrong because hernias are localized protrusions of tissue through a defect, identified by inspection and palpation, not by percussion for shifting dullness. Bates 13th Edition. Chapter 19. Abdomen"}, {"id": "q357", "pdfPage": 178, "originalNumber": "38", "question": "Patient has hepatitis with spider angioma and hepatomegaly. This cluster of findings suggest:", "options": [{"letter": "A", "text": "Cirrhosis"}, {"letter": "B", "text": "Cholecystitis"}, {"letter": "C", "text": "Peptic Ulcer Disease"}, {"letter": "D", "text": "Pancreatitis"}], "answer": "A", "answerText": "Cirrhosis", "explanation": "38. ANSWER: A A. Is CORRECT because it strongly suggests chronic liver disease, classically cirrhosis. Spider angiomas (spider nevi or vascular spiders) are superficial lesions caused by increased estrogen levels due to impaired liver metabolism - a hallmark of cirrhosis. Hepatomegaly is frequently documented in patients with chronic liver disease. B. Is wrong because cholecystitis is an inflammation of the gallbladder with symptoms of RUQ or epigastrium pain that may radiate to right shoulder or interscapular area and (+) murphy’s sign C. Is wrong because causes epigastric pain that may radiate straight to the back; relieved or aggravated by meals D. Is wrong because it presents with severe epigastric pain that may radiate straight to the back or other areas of the abdomen; does not cause spider angioma or chronic liver stigmata."}, {"id": "q358", "pdfPage": 179, "originalNumber": "39", "question": "In assessing abdominal tenderness. What should be done?", "options": [{"letter": "A", "text": "Start with the tender area."}, {"letter": "B", "text": "Start away from the tender area"}, {"letter": "C", "text": "Palpate deeply once"}, {"letter": "D", "text": "Press lightly"}], "answer": "B", "answerText": "Start away from the tender area", "explanation": "39. ANSWER: B A. Is wrong because tender areas should be palpated last B. Is CORRECT because palpation should start with nontender areas C. Is wrong because deep palpation may be done more than once D. Is wrong because examiner should press lightly first then deeply"}, {"id": "q359", "pdfPage": 180, "originalNumber": "40", "question": "Infection control before performing DRE:", "options": [{"letter": "A", "text": "Ungloved hands"}, {"letter": "B", "text": "Hand hygiene and clean gloves"}, {"letter": "C", "text": "Double gloves always"}, {"letter": "D", "text": "Sterile gloves"}], "answer": "B", "answerText": "Hand hygiene and clean gloves", "explanation": "40. ANSWER: B A. Is wrong because it poses a contamination threat to examiner B. Is CORRECT because hand hygiene ensures that hands are clean and donning clean gloves prevents cross-contamination C. Is wrong because double gloves are used for high risk or highly infectious procedures and not a routine examination like DRE D. Is wrong because DRE is a clean procedure and does not require sterile gloves Source: Bates’ Guide to Physical Examination and History Taking, 13th ed., Chapter 22 Source: Doc Busico’s PPT"}, {"id": "q360", "pdfPage": 180, "originalNumber": "41", "question": "Which is the best position for male rectal exam?", "options": [{"letter": "A", "text": "Supine"}, {"letter": "B", "text": "Lateral decubitus"}], "answer": "B", "answerText": "Lateral decubitus", "explanation": "41. ANSWER: B A. Is wrong because it limits the access to the anal area B. Is CORRECT because it provides comfort to the patient, good 22 C. Prone D. Lithotomy exposure to the anal area that needs to be examined, easy access to rectum and prostate C. Is wrong because it is rarely used for rectal exams and provides discomfort to the patient D. Is wrong because this is usually used for female pelvic examinations and less dignified"}, {"id": "q361", "pdfPage": 181, "originalNumber": "42", "question": "Firm, nodular findings during BRE means?", "options": [{"letter": "A", "text": "Normal findings"}, {"letter": "B", "text": "BPH"}, {"letter": "C", "text": "Prostate carcinoma"}, {"letter": "D", "text": "Prostatitis"}], "answer": "C", "answerText": "Prostate carcinoma", "explanation": "42. ANSWER: C A. Is wrong because the normal prostate is smooth, firm, slightly elastic, and nontender. No nodules. B. Is wrong because BPH is enlarged, firm but smooth and slightly elastic; usually symmetric; nodules are not typical. C. Is CORRECT because these findings are suspicious for prostate cancer D. Is wrong because prostatitis is tender, swollen, sometimes firm, usually painful; nodularity is not a hallmark. Bates 12th Edition. Chapter 15. Anus, Rectum, Prostate. Page 619"}, {"id": "q362", "pdfPage": 181, "originalNumber": "43", "question": "In DRE, the examiner palpates the anterior rectal wall to assess:", "options": [{"letter": "A", "text": "Rectal ampulla"}, {"letter": "B", "text": "Prostate gland"}, {"letter": "C", "text": "Internal sphincter"}, {"letter": "D", "text": "External sphincter"}], "answer": "B", "answerText": "Prostate gland", "explanation": "43. ANSWER: B A. Is wrong because the dilated lower part of the rectum where stool collects; its walls are palpated generally for masses, but the specific anterior wall palpation in males targets the prostate. B. Is CORRECT because the main mass of the prostate lies against the anterior rectal wall which the examiner palpates during DRE. C and D are wrong because the internal and external sphincters are assessed for tone and function (by asking the patient to squeeze the finger) around the anal canal, not specifically by palpating the anterior rectal wall deeper in the rectum. The prostate lies anteriorly, further up in the rectum. Bates 13th Edition. Chapter 22. Anus, Rectum, Prostate"}, {"id": "q363", "pdfPage": 181, "originalNumber": "23", "question": "margin. Diagnosis?", "options": [{"letter": "A", "text": "Hemorrhoids"}, {"letter": "B", "text": "Anal fissure"}, {"letter": "C", "text": "Rectal Carcinoma"}, {"letter": "D", "text": "Fistula"}], "answer": "B", "answerText": "Anal fissure", "explanation": "B. Is CORRECT because it mentioned pain during defecation + bright red blood streaks on stool + linear tear at the anal margin → classic for anal fissure C. Is wrong because it is an irregular mass, not a simple linear tear. D. Is wrong because it is an abnormal tract with discharge, not a tear. Bates 13th Edition. Chapter 22. Anus, Rectum, Prostate"}, {"id": "q364", "pdfPage": 182, "originalNumber": "45", "question": "The upper part of the anal canal is drained by:", "options": [{"letter": "A", "text": "Inferior rectal vein"}, {"letter": "B", "text": "Superior rectal vein"}, {"letter": "C", "text": "Median sacral vein"}, {"letter": "D", "text": "Internal pudendal vein"}], "answer": "B", "answerText": "Superior rectal vein", "explanation": "45. ANSWER: b A. Is wrong because the Inferior Rectal vein drains the lower part of the anal canal B. Is CORRECT because the Superior Rectal Vein drains the upper part of the anal canal C. Is wrong because the median sacral vein drains the ventral surface of the sacrum D. Is wrong because the internal pudendal vein drains the reproductive organs and part of the rectum."}, {"id": "q365", "pdfPage": 184, "originalNumber": "46", "question": "What is the most appropriate statement to say to the patient before performing DRE.", "options": [{"letter": "A", "text": "I'm going to check your rectum; please relax."}, {"letter": "B", "text": "This will hurt a lot."}, {"letter": "C", "text": "Lie down. I’ll be quick"}, {"letter": "D", "text": "Say nothing"}], "answer": "A", "answerText": "I'm going to check your rectum; please relax.", "explanation": "46. ANSWER: A A. Is correct because you have to inform your px of every thing you are going to do as this is a sensitive procedure B. Is wrong because a rectal exam does not hurt C. Is wrong because you will need to thoroughly examine your px and not be in a hurry but still mindful D. Is wrong because there is failure in communication"}, {"id": "q366", "pdfPage": 185, "originalNumber": "47", "question": "A soft, enlarged, smooth prostate", "options": [{"letter": "A", "text": "Prostatitis"}, {"letter": "B", "text": "BPH"}, {"letter": "C", "text": "Carcinoma"}, {"letter": "D", "text": "Abscess"}], "answer": "B", "answerText": "BPH", "explanation": "47. ANSWER: B A. Is wrong because it would feel tender, swollen, “boggy” and warm. B. Is CORRECT because benign prostatic hyperplasia is characterized as symmetrically enlarged, smooth, firm, and slightly elastic. C. Is wrong because it would be felt as a distinct hard nodule or firmness and subsequently irregular as cancer progresses. D. Is wrong because it would present with a purulent urethral discharge, painful DRE, and fluctuant areas in the prostate. Bates’ Guide Chapter 22, p. 1237 Reddivari AKR, Mehta P. Prostatic Abscess. [Updated 2023 May 8]. In: StatPearls [Internet]. Treasure Island (FL): StatPearls Publishing; 2025 Jan-. Available from: https://www.ncbi.nlm.nih.gov/books/NBK551663/"}, {"id": "q367", "pdfPage": 185, "originalNumber": "48", "question": "Ensuring adequate lighting and privacy before examination demonstrates .", "options": [{"letter": "A", "text": "Empathy only"}, {"letter": "B", "text": "Professionalism and safety"}, {"letter": "C", "text": "Time manager"}, {"letter": "D", "text": "None"}], "answer": "B", "answerText": "Professionalism and safety", "explanation": "48. ANSWER: B A. A is wrong because empathy refers to understanding and sharing the patient’s feelings, but ensuring lighting and privacy goes beyond emotional understanding. B. B is CORRECT because preparing adequate lighting ensures patient safety and accurate assessment, while providing privacy reflects professionalism and respect for the patient’s dignity and confidentiality. C. C is wrong because time management focuses on efficiency and scheduling, not on environmental preparation or patient comfort. D. D is wrong because the action clearly demonstrates important aspects of professional and safe clinical practice."}, {"id": "q368", "pdfPage": 186, "originalNumber": "49", "question": "Presence of mucus and blood on glove post-DRE warrants:", "options": [{"letter": "A", "text": "Ignore"}, {"letter": "B", "text": "Document findings accurately"}, {"letter": "C", "text": "Repeat immediately"}, {"letter": "D", "text": "Wash glove only"}], "answer": "B", "answerText": "Document findings accurately", "explanation": "49. ANSWER: B A. Is wrong because the presence of mucus and blood on the examining glove after a digital rectal examination (DRE) is a significant clinical finding. B. Is CORRECT because proper clinical practice requires that all findings including abnormal ones like blood, mucus, or masses C. Is wrong because repeating the exam right away is unnecessary and potentially uncomfortable for the patient. D. Is wrong because while cleaning up after the procedure is necessary, do not forget your patient! Source: Doc Busico’s PPT"}, {"id": "q369", "pdfPage": 186, "originalNumber": "50", "question": "After rectal examination, the student performed handwashing. This demonstrates", "options": [{"letter": "A", "text": "Infection control compliance"}, {"letter": "B", "text": "Time management"}], "answer": "A", "answerText": "Infection control compliance", "explanation": "50. ANSWER: A A. Is correct B. Is wrong C. Is wrong D. Is wrong 28 C. hehe D. Irrelevant action Bates 12th Edition. Chapter 4 Page 226-227"}, {"id": "q370", "pdfPage": 188, "originalNumber": "1", "question": "Which of the following is the normal location of the urethral meatus of adult males?", "options": [{"letter": "A", "text": "ventral surface of the glans"}, {"letter": "B", "text": "tip of the glans penis"}, {"letter": "C", "text": "dorsal shaft of the penis"}, {"letter": "D", "text": "junction of the frenulum and corona"}], "answer": "B", "answerText": "tip of the glans penis", "explanation": "1. ANSWER: B A. Is wrong because a meatus located on the ventral surface suggests hypospadias, an abnormal ventral placement. B. Is CORRECT because in a normal adult male, the urethral meatus is located at the tip (apex) of the glans penis, usually as a vertical slit. This is the standard anatomical position. C. Is wrong because a dorsal location is abnormal and suggests epispadias, where the meatus opens on the dorsal (upper) surface. This is a congenital anomaly, not normal. D. Is wrong because this is a ventral position below the tip, also consistent with an abnormal urethral opening"}, {"id": "q371", "pdfPage": 189, "originalNumber": "2", "question": "Which structure is normally palpated as cord like nodular and non tender ridge on the posterior surface of the testes", "options": [{"letter": "A", "text": "spermatic cord"}, {"letter": "B", "text": "cremasteric muscle"}, {"letter": "C", "text": "epididymis"}, {"letter": "D", "text": "tunica albuginea"}], "answer": "C", "answerText": "epididymis", "explanation": "2. ANSWER: C A. Is wrong because the spermatic cord lies above the testis in the inguinal–scrotal region and does not form a cord-like ridge on the posterior testicular surface. B. Is wrong because the cremasteric muscle is a thin muscle surrounding the spermatic cord and is not palpable as a nodular ridge on the testis itself. C. Is CORRECT because the epididymis normally feels like a soft, cord-like, nodular, non-tender ridge along the posterior surface of the testis. D. Is wrong because the tunica albuginea is a smooth, firm capsule encasing the testis and is not felt as a separate cord-like or nodular structure. Source: Bates"}, {"id": "q372", "pdfPage": 189, "originalNumber": "3", "question": "Proper technique in palpation of the scrotum:", "options": [{"letter": "A", "text": "Using one hand, palpate each testis between your thumb and first two fingers"}, {"letter": "B", "text": "Always use 2 hands, cradle the testis at both poles in the thumb and both fingers"}, {"letter": "C", "text": "Palpate the scrotal contents with light and deep palpation frequently changing the position of your hands"}, {"letter": "D", "text": "AOTA"}], "answer": "A", "answerText": "Using one hand, palpate each testis between your thumb and first two fingers", "explanation": "3. ANSWER: A or B (not sure wording is weird) I think B is false due to there being “ALWAYS” A. is CORRECT because it is the correct technique to palpating the testis up to the epididymis B. Is wrong because it’s not always the case to use both hands. A single hand may be a better option. However, the technique is correct. C. Is wrong because your hands should never change positions when palpating. D. Is wrong because B & C are incorrect Unsure"}, {"id": "q373", "pdfPage": 190, "originalNumber": "4", "question": "NP 32/M comes in complaining of pain in his penis. On inspection, you noticed a tight retracted prepuce with surrounding swelling/edema. What do you call this finding?", "options": [{"letter": "A", "text": "Phimosis"}, {"letter": "B", "text": "Balanitis"}, {"letter": "C", "text": "Paraphimosis"}, {"letter": "D", "text": "Balanoposthitis"}], "answer": "C", "answerText": "Paraphimosis", "explanation": "4. ANSWER: C A. Is wrong because Phimosis is a tight prepuce that cannot be retracted over the glans B. Is wrong because Balanitis means inflammation of the glans C. Is CORRECT because Paraphimosis is a tight prepuce that, once retracted, cannot be returned and edema ensues D. Is wrong because Balanoposthitis is inflammation of the glans and prepuce Source: Bate’s 13th Edition Chapter 20"}, {"id": "q374", "pdfPage": 190, "originalNumber": "5", "question": "22 yo male with sudden severe testicular pain. On exam, affected testis is elevated, tender and absent cremasteric reflex. What is the diagnosis?", "options": [{"letter": "A", "text": "Epididymitis"}, {"letter": "B", "text": "Testicular torsion"}, {"letter": "C", "text": "Varicocele"}, {"letter": "D", "text": "Hydrocele"}], "answer": "B", "answerText": "Testicular torsion", "explanation": "5. ANSWER: B A. Is wrong because epididymitis usually presents with gradual pain, swelling, and tenderness, not sudden severe pain. B. Is CORRECT because testicular torsion produces sudden severe pain, elevated testis, tenderness, and absent cremasteric reflex C. Is wrong because varicocele doesn't typically cause severe pain. D. Is wrong because hydrocele is a fluid buildup and is usually painless Source: Bate’s 13th Ed., Ch20, p1150"}, {"id": "q375", "pdfPage": 191, "originalNumber": "7", "question": "27/M presents with scrotal swelling. Mass can be transilluminated and is non reducible. Spermatic cord palpable above mass. Which finding distinguishes it from inguinal hernia", "options": [{"letter": "A", "text": "Presence of pain when lifting scrotum"}, {"letter": "B", "text": "Ability to hear bowel sounds through edema"}, {"letter": "C", "text": "Failure of swelling to reduce in supine position"}, {"letter": "D", "text": "Positive transillumination test"}], "answer": "D", "answerText": "Positive transillumination test", "explanation": "7. ANSWER: D A. Is wrong because pain on lifting the scrotum (Prehn sign) relates to epididymitis, not differentiation from hernia.pain on lifting the scrotum (Prehn sign) relates to epididymitis, not differentiation from hernia. B. Is wrong because hearing bowel sounds would actually suggest a hernia, not a hydrocele. C. Is wrong because an inguinal hernia may also fail to reduce in the supine position, so it does not reliably distinguish the conditions. D. Is CORRECT because a positive transillumination test indicates a fluid-filled mass such as a hydrocele, which distinguishes it from an inguinal hernia.a positive transillumination test indicates a fluid-filled mass such as a hydrocele, which distinguishes it from an inguinal hernia. Source: Bates 12th ed. Chapter 13, p.555"}, {"id": "q376", "pdfPage": 191, "originalNumber": "8", "question": "Presence of penile ulcers. Small, multiple and tender lymph nodes. How would you differentiate from syphilis?", "options": [{"letter": "A", "text": "Presence of systemic signs"}, {"letter": "B", "text": "Painful lesion"}, {"letter": "C", "text": "Raised margin"}, {"letter": "D", "text": "Ulceration at corona"}], "answer": "B", "answerText": "Painful lesion", "explanation": "8. ANSWER: B A. Is wrong because either syphilis nor chancoid has prominent systemic symptoms B. Is CORRECT because chancoid is painful ulcer while syphilis is painless C. Is wrong because many condition can have raised margins D. Is wrong because many conditions can occur anywhere on the glans, shaft, or corona"}, {"id": "q377", "pdfPage": 192, "originalNumber": "9", "question": "A 50 year old man presented with a new onset of erectile dysfunction. The physical exam shows diminished peripheral pulse and cold lower extremities. Based on Bates, what is the likely diagnosis?", "options": [{"letter": "A", "text": "Medical induced erectile dysfunction"}, {"letter": "B", "text": "Diabetic neuropathy"}, {"letter": "C", "text": "Psychogenic erectile dysfunction"}, {"letter": "D", "text": "Vascular insufficiency"}], "answer": "D", "answerText": "Vascular insufficiency", "explanation": "9. ANSWER: D A. Is wrong because the stem gives objective vascular signs (diminished peripheral pulses, cold lower extremities) that point to arterial insufficiency rather than a drug effect. B. Is wrong because The vignette does not mention diabetes or neuropathic findings; instead it shows ischemic signs in the legs, making neuropathy less likely. C. Is wrong because Presence of decreased peripheral pulses and cold extremities argues strongly for an organic vascular cause rather than purely psychogenic. D. Is CORRECT because Diminished peripheral pulses and cold lower extremities are classic signs of peripheral arterial disease/arterial insufficiency. In a middle-aged man with new onset ED, arterial insufficiency (atherosclerotic vascular disease affecting pelvic/penile arteries) is a likely organic cause per Bates. These objective peripheral vascular signs support arterial (vascular) etiology. Source: Bate’s 13th Edition Chapter 27; Page 1936"}, {"id": "q378", "pdfPage": 193, "originalNumber": "11", "question": "Scrotal mass. (-) transillumination, (-) tenderness, firm. Next best thing to do.", "options": [{"letter": "A", "text": "Reassure pt that its benign"}, {"letter": "B", "text": "Initiate empiric antibiotic"}, {"letter": "C", "text": "Order UTZ to rule out malignancy"}, {"letter": "D", "text": "Attempt to push it back manually"}], "answer": "C", "answerText": "Order UTZ to rule out malignancy", "explanation": "11. ANSWER: C A. Is wrong because A firm, non-tender, non-transilluminating mass is never assumed benign—this is how testicular cancer commonly presents. B. Is wrong because Empiric antibiotics are for epididymitis/orchitis, which presents with:Tenderness. Pain. Often swelling. Sometimes fever. C. Is correct because A firm, non-tender scrotal mass that does NOT transilluminate is suspicious for a testicular tumor. D. Is wrong because Manual reduction is only for inguinal hernia, usually Soft, Reducible, Often associated with cough impulse"}, {"id": "q379", "pdfPage": 194, "originalNumber": "12", "question": "12. ANSWER: C", "options": [{"letter": "A", "text": "Is wrong because ____"}, {"letter": "B", "text": "Is wrong because ____"}, {"letter": "C", "text": "Is CORRECT because ______"}, {"letter": "D", "text": "Is wrong because _______ Fined"}], "answer": "C", "answerText": "Is CORRECT because ______", "explanation": "12. ANSWER: C A. Is wrong because ____ B. Is wrong because ____ C. Is CORRECT because ______ D. Is wrong because _______ Fined"}, {"id": "q380", "pdfPage": 194, "originalNumber": "13", "question": "Make up the outer folds of the female external genitalia", "options": [{"letter": "A", "text": "Labia minora"}, {"letter": "B", "text": "Labia majora"}, {"letter": "C", "text": "Vestibule"}, {"letter": "D", "text": "Clitoris"}], "answer": "B", "answerText": "Labia majora", "explanation": "13. ANSWER: B A. Is wrong because the labia minora are the inner folds of the vulva, lying medial to the labia majora, surrounding the vestibule. B. Is CORRECT because the labia majora are the outer folds of the female external genitalia, containing adipose tissue and hair, and extending from the mons pubis to the perineum. C. Is wrong because the vestibule is the space between the labia minora that contains the urethral and vaginal openings, not a fold. D. Is wrong because the clitoris is an erectile organ located at the anterior junction of the labia minora, not a fold of skin. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 21, Page 1154."}, {"id": "q381", "pdfPage": 194, "originalNumber": "14", "question": "Tender of the inguinal lymph nodes makes you suspect of infection and inflammation in the:", "options": [{"letter": "A", "text": "Upper vagina"}, {"letter": "B", "text": "Lower vagina"}, {"letter": "C", "text": "Internal genitalia"}, {"letter": "D", "text": "Cervix"}], "answer": "B", "answerText": "Lower vagina", "explanation": "14. ANSWER: B A. Is wrong because the upper vagina drains into the pelvic (internal iliac) lymph nodes, not the inguinal nodes, so tenderness here would not point to infection in this area. B. Is CORRECT because the lower third of the vagina drains into the superficial inguinal lymph nodes; therefore, tender inguinal nodes suggest infection or inflammation in this region. C. Is wrong because internal organs such as the uterus and ovaries drain into pelvic and para-aortic nodes, not the inguinal nodes. D. Is wrong because the cervix drains into the pelvic (obturator and internal iliac) lymph nodes, so inguinal tenderness does not indicate cervical infection."}, {"id": "q382", "pdfPage": 195, "originalNumber": "15", "question": "True of Menarche and Menses", "options": [{"letter": "A", "text": "Usually occur between 9 to 16 years old"}, {"letter": "B", "text": "Often 6 months to settle in regular pattern"}, {"letter": "C", "text": "Flows last 3 to 10 days"}, {"letter": "D", "text": "Age at menarche is dependent on genetic endowment only"}], "answer": "A", "answerText": "Usually occur between 9 to 16 years old", "explanation": "15. ANSWER: A A. Is CORRECT because Menarche normally occurs between ages 9–16, which is the standard range described in Bates for normal puberty onset. B. Is wrong because it commonly takes 1–2 years, not just 6 months, for menstrual cycles to become regular after menarche. C. Is wrong because normal menstrual flow lasts about 3 to 7 days; 10 days is beyond the normal upper limit and may indicate menorrhagia. D. Is wrong because while genetics play a major role, menarche is also influenced by nutrition, body fat, environment, and overall health, not genetics alone. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 21, Page 1163."}, {"id": "q383", "pdfPage": 195, "originalNumber": "16", "question": "Thick white curd like vaginal discharge", "options": [{"letter": "A", "text": "Bacterial vaginosis"}, {"letter": "B", "text": "Trichomonas infection"}, {"letter": "C", "text": "Candida"}, {"letter": "D", "text": "Atrophic vaginitis"}], "answer": "C", "answerText": "Candida", "explanation": "16. ANSWER: C A. Is wrong because bacterial vaginosis typically presents with a thin, gray-white, fishy-smelling discharge, not thick or curd-like. B. Is wrong because Trichomonas usually causes a frothy, yellow-green discharge with vaginal erythema and a “strawberry cervix.” C. Is CORRECT because Candida (yeast infection) is classically described as having a thick, white, curd-like “cottage cheese” discharge” with intense itching. D. Is wrong because atrophic vaginitis causes thin, dry, sometimes blood-tinged discharge due to low estrogen, not thick or curd-like. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 21, Page 1198."}, {"id": "q384", "pdfPage": 196, "originalNumber": "17", "question": "A patient presents with malodorous thin gray vaginal discharge. On the exam you note a positive \"whiff test\" with KOH. What is the possible diagnosis?", "options": [{"letter": "A", "text": "Candida vulvovaginitis"}, {"letter": "B", "text": "Trichomoniasis"}, {"letter": "C", "text": "Bacterial vaginosis"}, {"letter": "D", "text": "Pelvic Inflammatory Disease"}], "answer": "C", "answerText": "Bacterial vaginosis", "explanation": "17. ANSWER: C A. Is wrong because it causes thick white curd-like discharge, not thin gray with fishy odor. B. Is wrong because it usually produces frothy yellow-green discharge, not thin gray. C. Is CORRECT because it is characterized by thin gray discharge with a fishy smell and a positive whiff test. D. Is wrong because it primarily presents with pelvic pain and cervical motion tenderness, not a specific malodorous gray discharge. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 21, Pages 1198-1199."}, {"id": "q385", "pdfPage": 196, "originalNumber": "18", "question": "A 26 yr old female presents with pelvic pain and cervical motion tenderness. According to Bates which condition best fits the findings?", "options": [{"letter": "A", "text": "Endometriosis"}, {"letter": "B", "text": "Ovarian torsion"}], "answer": null, "answerText": "", "explanation": "18. ANSWER: C A. Is wrong because Endometriosis causes chronic cyclic pelvic pain, not acute pain with cervical motion tenderness. B. Is wrong because Ovarian torsion presents with sudden severe unilateral pelvic pain, not cervical motion tenderness. C. Is CORRECT because PID is characterized by pelvic pain with cervical motion tenderness, a hallmark sign described in Bates. 9 C. Pelvic Inflammatory Dx D. Uterine fibroids D. Is wrong because Fibroids typically cause heavy bleeding or pressure symptoms, not cervical motion tenderness. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 21, Page 1180."}, {"id": "q386", "pdfPage": 197, "originalNumber": "19", "question": "A sexually active woman reports labial swelling. On examination, labia is tense, hot and very tender. Common cause includes:", "options": [{"letter": "A", "text": "Sexual activity"}, {"letter": "B", "text": "Trichomonas vaginalis"}, {"letter": "C", "text": "Multiple sexual partners"}, {"letter": "D", "text": "Candida albicans"}], "answer": "A", "answerText": "Sexual activity", "explanation": "19. ANSWER: A A. Is CORRECT because this describes a bartholin gland abscesses are usually caused by infection of the Bartholin gland, often after obstruction of the duct. The most common pathogens are normal vaginal flora, including E. coli, Staphylococcus aureus, and anaerobes. Sexual activity is a risk factor, as it increases exposure to bacteria that can infect the gland. B. Is wrong because this usually causes frothy, malodorous discharge; rarely causes Bartholin abscess C. Is wrong because although this increases risk for STIs, but abscesses are more often due to bacterial overgrowth of normal flora, not specifically multiple partners D. Is wrong because this causes vulvovaginal candidiasis with itching, erythema, and discharge, but not typically an abscess. Source: Bate’s 13th Edition Chapter 21; Page 1196"}, {"id": "q387", "pdfPage": 197, "originalNumber": "20", "question": "21 year old, PAP smear. 1st specimen inadequate. 2nd sample extraction - smaller speculum used and warmed prior to insertion. Purpose?", "options": [{"letter": "A", "text": "To improve comfort and reduce muscle tension"}, {"letter": "B", "text": "To facilitate proper specimen collection"}, {"letter": "C", "text": "To increase cervical dilation"}, {"letter": "D", "text": "To decrease need for lubrication"}], "answer": "A", "answerText": "To improve comfort and reduce muscle tension", "explanation": "20. ANSWER: A A. Is CORRECT because using a smaller speculum and warming it helps reduce discomfort and relaxes the pelvic floor muscles. Relaxed muscles make insertion easier and improve the chance of collecting an adequate cervical specimen, especially after a prior inadequate sample. B. Is wrong because while easier insertion indirectly helps specimen collection, this is not the primary reason for using a smaller, warmed speculum C. Is wrong because the speculum does not dilate the cervix; dilation is not typically needed for Pap smear. D. Is wrong because lubrication may still be needed; warming the speculum doesn’t eliminate this."}, {"id": "q388", "pdfPage": 198, "originalNumber": "21", "question": "Patient presents with pelvic pain and fever. Bimanual exam reveals uterine tenderness and adnexal tenderness. There is mucopurulent cervical discharge. Based on Bates, which decision is the most appropriate?", "options": [{"letter": "A", "text": "Defer treatment until culture results return"}, {"letter": "B", "text": "Diagnose ovarian torsion"}, {"letter": "C", "text": "Empiric treatment for PID immediately"}, {"letter": "D", "text": "Test for pregnancy and assess again"}], "answer": "D", "answerText": "Test for pregnancy and assess again", "explanation": "21. ANSWER: D (C kay ga fever?) A. Is wrong because you always rule out the most life-threatening conditions first. B. Is wrong because you always rule out the most life-threatening conditions first. C. Is wrong because you always rule out the most life-threatening conditions first. D. Is CORRECT because the most life-threatening could be ectopic pregnancy or ovarian torsion (?) Source: Bickley-Bates’ Guide to Physical Examination (13th Ed); Chapter 14; Page 1167"}, {"id": "q389", "pdfPage": 198, "originalNumber": "22", "question": "A 23-year-old woman presents with vulvar itching. The examination shows multiple shallow ulcers with an erythematous base. The patient feels uncomfortable during inspection. What interpretation best describes the case?", "options": [{"letter": "A", "text": "Genital Herpes Infection"}, {"letter": "B", "text": "HPV"}, {"letter": "C", "text": "Syphilitic Chancre"}, {"letter": "D", "text": "Lichen Planus"}], "answer": "A", "answerText": "Genital Herpes Infection", "explanation": "22. ANSWER: A A. Is CORRECT because multiple shallow, painful ulcers on an erythematous base are the signature tag of HSV. B. Is wrong because human papillomavirus typically produces papillomatous or verrucous lesions not shallow, tender ulcers. C. Is wrong because the primary lesion of syphilis is classically a single, firm, indurated, painless ulcer. D. Is wrong because vulvar lichen planus generally presents with erosive or violaceous plaques and chronic irritation rather than acute, shallow ulcers with marked tenderness. Source: Bickley-Bates’ Guide to Physical Examination (12th Ed); Chapter 14; Page 596"}, {"id": "q390", "pdfPage": 199, "originalNumber": "23", "question": "26 y/o Ellen, amenorrhea. What to rule out first?", "options": [{"letter": "A", "text": "Pregnancy"}, {"letter": "B", "text": "Stress"}, {"letter": "C", "text": "Hormonal imbalance"}, {"letter": "D", "text": "Malignancy"}], "answer": "A", "answerText": "Pregnancy", "explanation": "23. ANSWER: A A. Is CORRECT because it is the most common and most important cause of secondary amenorrhea in any woman of reproductive age. B. Is wrong because this is only considered after pregnancy is excluded C. Is wrong because this requires blood tests and further evaluation. You should never jump to a hormonal workup without first excluding pregnancy D. Is wrong because malignancy is a rare cause of amenorrhea. It is far down the diagnostic algorithm, not the first step. Source: Bickley-Bates’ Guide to Physical Examination (13th Ed) Chapter 26, pg 1857"}, {"id": "q391", "pdfPage": 199, "originalNumber": "24", "question": "32 y.o vaginal discharge, strawberry cervix with motile organisms. Best supportive factor of the diagnosis", "options": [{"letter": "A", "text": "pH <4.5"}, {"letter": "B", "text": "Clue cells"}, {"letter": "C", "text": "Positive whiff test"}, {"letter": "D", "text": "Yellow purulent discharge"}], "answer": "D", "answerText": "Yellow purulent discharge", "explanation": "24. ANSWER: D A. Is wrong because pH>4.5 is expected or normal for the suspected conditions. B. Is wrong because it is supportive for bacterial vaginitis C. Is wrong because it is supportive for bacterial vaginitis D. Is CORRECT because motile organisms suggest trichomonal vaginitis. Source: Bickley-Bates’ Guide to Physical Examination (13th Ed); Chapter 14; Page 1198-1199"}, {"id": "q392", "pdfPage": 199, "originalNumber": "25", "question": "To conduct a successful female genitalia exam, do the following EXCEPT:", "options": [{"letter": "A", "text": "Advice patient to do douching 48-72hrs before examination"}, {"letter": "B", "text": "Examiner must"}], "answer": "A", "answerText": "Advice patient to do douching 48-72hrs before examination", "explanation": "25. ANSWER: A A. Is CORRECT because for best results when obtaining specimens for cervical cytology (Pap smears), the patient should AVOID use of douches 24-48 hours before the examination B. Is wrong because the statement is correct.The examiner should 12 obtain permission and have a chaperone C. Patient must be supine; head and shoulder be elevated to enhance eye contact D. A and C obtain permission from the patient to perform the examination. Male examiners should be accompanied by female chaperones. Female examiners should also be assisted if the patient is physically or emotionally disturbed, or if help is needed C. Is wrong because the statement is correct. D. Is wrong because Option C is correct. Source: Bate’s 13th Ed. Chapter 21. Female Genitalia"}, {"id": "q393", "pdfPage": 200, "originalNumber": "26", "question": "The three cardinal questions for neurologic method", "options": [{"letter": "A", "text": "Is there pain? Is there paralysis? Where is the lesion?"}, {"letter": "B", "text": "Is there a lesion? Where is the lesion? What is the lesion?"}, {"letter": "C", "text": "Where is the diagnosis? What are the abnormal neuro findings? What is the lesion?"}, {"letter": "D", "text": "What is the diagnosis? What is the PE? Where in the neuroaxis?"}], "answer": "B", "answerText": "Is there a lesion? Where is the lesion? What is the lesion?", "explanation": "26. ANSWER: B A. Is wrong because the neurologic method does not begin by asking about pain or paralysis specifically. These can be part of the history or exam but are not the core framework for neurologic localization. While “Where is the lesion?” is relevant, the first two questions are too narrow and miss the broader approach required in neurology. B. Is CORRECT because it follows a structured approach: first confirming that a neurologic lesion exists, then localizing it within the neuroaxis, and finally identifying the underlying disease process causing it. This sequence is foundational in neurologic clinical reasoning. C. Is wrong because “Where is the diagnosis?” is not a meaningful clinical question, diagnoses are not localized, lesions are. Although asking about abnormal neurologic findings is important during the exam, it is not one of the formal cardinal questions. This option mixes exam components with diagnostic reasoning. D. Is wrong because the neurologic method does not start by naming a diagnosis. Instead, it first establishes whether a neurologic lesion is present and where it is located before concluding the diagnosis. Asking “What is the PE?” is also not part of the structured neurologic problem-solving framework."}, {"id": "q394", "pdfPage": 201, "originalNumber": "27", "question": "Which cranial nerve is assessed by testing visual acuity?", "options": [{"letter": "A", "text": "Cn II"}, {"letter": "B", "text": "Cn III"}, {"letter": "C", "text": "Cn IV"}, {"letter": "D", "text": "Cn VI"}], "answer": "A", "answerText": "Cn II", "explanation": "27. ANSWER: A A. Is CORRECT because CN II is for Visual acuity, visual fields, and ocular fundi B. Is wrong because CN III is for Pupillary light reflex C. Is wrong because CN IV is for Extraocular movements D. Is wrong because CN VI is for Extraocular movements"}, {"id": "q395", "pdfPage": 201, "originalNumber": "28", "question": "A 76 year old woman presents with a gradual onset of inappropriate laughter, inattention. Speech is comprehensible, can follow through command. Sudden onset of persistent urinary retention. Naming and writing are intact. Which lobe of the brain is affected?", "options": [{"letter": "A", "text": "Frontal lobe"}, {"letter": "B", "text": "Parietal lobe"}, {"letter": "C", "text": "Occipital lobe"}, {"letter": "D", "text": "Temporal lobe"}], "answer": "A", "answerText": "Frontal lobe", "explanation": "28. ANSWER: A A. Is CORRECT because frontal lobe lesions commonly cause disinhibition , inappropriate laughter), impaired attention, and urinary incontinence or urinary retention due to involvement of the medial frontal micturition center. The patient also has intact language and naming, which is consistent with a non-dominant or medial frontal lesion. B. Is wrong because parietal lesions cause sensory deficits, neglect, difficulty with spatial tasks, or writing problems, none of which are present. C. Is wrong because it primarily affects vision, resulting in visual field defects or visual hallucinations, which are not described. D. Is wrong because temporal lobe lesions affect memory, emotions, and language comprehension, and may cause complex partial seizures, symptoms not seen here Source: Bates 13th Edition, Chapter 9 p. 433"}, {"id": "q396", "pdfPage": 201, "originalNumber": "14", "question": "upper motor neuron sign", "options": [{"letter": "A", "text": "Flaccidity"}, {"letter": "B", "text": "Atrophy"}, {"letter": "C", "text": "Fasciculations"}, {"letter": "D", "text": "Increased deep tendon reflex"}], "answer": "D", "answerText": "Increased deep tendon reflex", "explanation": "29. ANSWER: D A. Is wrong because upper motor neuron damage leads to increased muscle tone B. Is wrong because this fits lower motor neuron damage not upper C. Is wrong because this occurs in lower motor neuron damage D. Is CORRECT because upper motor neuron damage leads to hyperreflexia Source: Bates 13th Edition, Chapter 24, p. 1441"}, {"id": "q397", "pdfPage": 202, "originalNumber": "30", "question": "A 36 y.o MVA no helmet while driving. Upon assessment you noticed bilateral leg weakness, urinary retention, cannot raise both leg, and numbness of LE. Before neuro assessment, you know where the lesion is located", "options": [{"letter": "A", "text": "Parietal lobe"}, {"letter": "B", "text": "Spinal cord"}, {"letter": "C", "text": "Thalamus"}, {"letter": "D", "text": "Brain stem"}], "answer": "B", "answerText": "Spinal cord", "explanation": "30. ANSWER: B A. Is wrong because wrong because parietal lesions cause sensory deficits, neglect, or spatial problems, but they do not produce isolated bilateral leg weakness with urinary retention. B. Is CORRECT because bilateral leg weakness, urinary retention, inability to move both legs, and numbness of the lower extremities strongly indicate a spinal cord lesion, most likely at the thoracic or upper lumbar level. These signs are classic for spinal cord injury after trauma. C. Is wrong because thalamic lesions cause contralateral sensory loss or pain syndromes, but not isolated bilateral leg weakness with retention. D. Is wrong because brain stem lesions typically cause cranial nerve deficits, altered consciousness, respiratory issues, or quadriparesis, not isolated lower extremity deficits. Source: Bates 13th Edition, Chapter 24, p. 1437"}, {"id": "q398", "pdfPage": 202, "originalNumber": "31", "question": "A 62 hypertensive patient has sudden onset of difficulty swallowing, speaking, hoarseness of voice, pooling of saliva, and double vision. Befo
