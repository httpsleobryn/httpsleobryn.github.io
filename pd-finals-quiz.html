etter": "C", "text": "Spinal cord C1"}, {"letter": "D", "text": "Neuromuscular junction"}], "answer": "A", "answerText": "Motor cortex from C8-T1", "explanation": "59. ANSWER: A A. Correct: Symptoms (4th–5th digit weakness, thenar atrophy, triceps reflex loss, posterior arm sensory loss) localize to a C8–T1 radiculopathy / lower cervical nerve root lesion B. Wrong : Would produce cranial nerve deficits and crossed findings, not isolated upper limb radicular symptoms C. Wrong:A lesion at C1 would cause quadriplegia or respiratory compromise, not focal hand weakness D. Wrong : Disorders like Myasthenia gravis cause fluctuating weakness without sensory loss or reflex changes"}, {"id": "q475", "pdfPage": 241, "originalNumber": "60", "question": "A 22-year-old medical student studied all night for an exam and slept only 2 hours. He skipped breakfast. On the morning of the exam, he developed epigastric discomfort and nausea, then became pale and diaphoretic before losing consciousness. During the fall, there were brief jerky movements lasting <5 seconds. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Syncope"}, {"letter": "B", "text": "Seizure"}, {"letter": "C", "text": "Stroke"}, {"letter": "D", "text": "Disequilibrium vertigo"}], "answer": "A", "answerText": "Syncope", "explanation": "60. ANSWER: A A. Syncope is a transient loss of consciousness due to temporary cerebral hypoperfusion. The prodrome of nausea, pallor, and diaphoresis, combined with triggers such as sleep deprivation, fasting, and emotional stress, strongly supports vasovagal syncope. Brief jerking movements may occur but are typically short (<10 seconds) and followed by rapid recovery. B. Seizures usually involve longer tonic-clonic movements, often lasting more than 30–60 seconds, and are typically followed by a postictal state with confusion or drowsiness. In this case, the prodromal vasovagal symptoms and very brief jerks favor syncope rather than seizure. C. Stroke typically presents with focal neurologic deficits such as weakness, speech difficulty, or facial asymmetry. Sudden isolated loss of consciousness without persistent neurologic deficit is uncommon in stroke, especially in a young healthy individual. D. Vertigo causes a sensation of spinning or imbalance, often accompanied by nystagmus or difficulty walking, but does not usually cause loss of consciousness. Therefore, vertigo does not explain the episode described."}, {"id": "q476", "pdfPage": 242, "originalNumber": "61", "question": "Which of the following range of motions is LEAST LIKELY required in fastening herself back in one’s own bra?", "options": [{"letter": "A", "text": "56º flexion"}, {"letter": "B", "text": "69º horizontal abduction"}, {"letter": "C", "text": "86º medial rotation"}], "answer": null, "answerText": "", "explanation": "61. ANSWER: D A. Wrong. This degree of flexion represents a mid-range movement that could plausibly occur during the elevation in the scapular plane. B. Wrong. This allows the hands to meet at the center of the back C. Wrong. This allows the forearm to clear the side of the body and 31 D. 90º flexion reach behind the lumbar or thoracic spine. D. Is CORRECT because 90º of flexion brings back the arm parallel to the floor in front of the body, which is the opposite of the movement required to reach behind the back."}, {"id": "q477", "pdfPage": 244, "originalNumber": "62", "question": "When you place the patient in a prone position then flex the knee and ask the patient to do plantarflexion, what muscle are you isolating from?", "options": [{"letter": "A", "text": "Anterior tibialis from Posterior tibialis"}, {"letter": "B", "text": "Gastrocnemius from Peroneus longus"}, {"letter": "C", "text": "Soleus from Gastrocnemius"}, {"letter": "D", "text": "Anterior tibialis from Peroneus brevis"}], "answer": "C", "answerText": "Soleus from Gastrocnemius", "explanation": "62. ANSWER: C A. Wrong - Tibialis anterior performs dorsiflexion, while Tibialis posterior performs plantarflexion and inversion, and knee flexion does not isolate these muscles because neither crosses the knee joint. B. Wrong - Gastrocnemius contributes to plantarflexion and knee flexion, while Peroneus longus mainly causes eversion and plantarflexion, and flexing the knee does not isolate gastrocnemius from peroneus longus. C. Is CORRECT because Flexing the knee weakens the action of the Gastrocnemius because it crosses the knee joint, allowing the Soleus, which only crosses the ankle, to be isolated during plantarflexion. D. Wrong - Tibialis anterior performs dorsiflexion, whereas Peroneus brevis performs eversion and plantarflexion, and knee flexion does not selectively isolate either muscle"}, {"id": "q478", "pdfPage": 244, "originalNumber": "63", "question": "Which of the ff describes the proximal radioulnar joint?", "options": [{"letter": "A", "text": "It has a two degree freedom"}, {"letter": "B", "text": "It is a diarthrosis"}, {"letter": "C", "text": "It is a hinge joint"}, {"letter": "D", "text": "It is a biaxial joint"}], "answer": "B", "answerText": "It is a diarthrosis", "explanation": "63. ANSWER: B A. Wrong because the radioulnar joint is uniaxial. B. Is CORRECT because radioulnar joint is a synovial joint, which by definition is a diarthrosis or a freely movable joint. C. Wrong because the hinge joint allows flexion-extension movement, not rotation. D. Wrong because pivot joints are uniaxial, not biaxial."}, {"id": "q479", "pdfPage": 244, "originalNumber": "64", "question": "A basketball player came to you for pain in his posterior right thigh. You diagnosed him with ham strain. What procedure best helps with your diagnosis?", "options": [{"letter": "A", "text": "Patient sitting, right hip flexed with knee extended"}, {"letter": "B", "text": "Patient prone, right"}], "answer": "B", "answerText": "Patient prone, right", "explanation": "64. ANSWER: B A. Wrong. This is the hamstring test that is commonly used to test the length of the hamstrings but not for muscle strains B. Is CORRECT because both hip extension and knee flexion are movements that primarily involve the hamstrings which can be used to assess the muscle group C. Wrong because ankle flexion does not involve the hamstrings D. Wrong because hip abduction does not primarily involve the 33 knee flexed with neutral ankle C. Patient prone with right hip extended with ankle flexed D. Patient sitting with abducted hip with knee flexed hamstrings Daniel and Worthingham's Muscle Testing Techniques of Manual ExaminationCh. 5, pg. 218"}, {"id": "q480", "pdfPage": 245, "originalNumber": "65", "question": "48 yo cardiac patient on aspirin maintenance medication suddenly increases the intensity of his exercise. He then developed swelling and pain on his right knee after intense stretching on the said knee after that session. If the swelling is related to his medication and stretching, which examination would greatly correlate it to?", "options": [{"letter": "A", "text": "Painless ROM from 0 to 25"}, {"letter": "B", "text": "Cold upon palpation"}, {"letter": "C", "text": "Hematoma upon inspection"}, {"letter": "D", "text": "Painless ROM from"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q481", "pdfPage": 245, "originalNumber": "45", "question": "to 90 65. ANSWER: C", "options": [{"letter": "A", "text": "Wrong - bleeding causes pain + limited ROM, not painless"}, {"letter": "B", "text": "Wrong - Not coldness (that suggests poor perfusion), bleeding joints are usually warm if inflamed."}, {"letter": "C", "text": "Is CORRECT because the patient is on Aspirin → impaired platelet aggregation → ↑ bleeding tendency. Then had intense stretching/strain → possible soft tissue or intra-articular injury. Result → bleeding into tissues/joint (hemarthrosis or soft tissue hematoma)"}, {"letter": "D", "text": "Wrong - bleeding causes pain + limited ROM, not painless"}], "answer": "C", "answerText": "Is CORRECT because the patient is on Aspirin → impaired platelet aggregation → ↑ bleeding tendency. Then had intense stretching/strain → possible soft tissue or intra-articular injury. Result → bleeding into tissues/joint (hemarthrosis or soft tissue hematoma)", "explanation": "65. ANSWER: C A. Wrong - bleeding causes pain + limited ROM, not painless B. Wrong - Not coldness (that suggests poor perfusion), bleeding joints are usually warm if inflamed. C. Is CORRECT because the patient is on Aspirin → impaired platelet aggregation → ↑ bleeding tendency. Then had intense stretching/strain → possible soft tissue or intra-articular injury. Result → bleeding into tissues/joint (hemarthrosis or soft tissue hematoma) D. Wrong - bleeding causes pain + limited ROM, not painless"}, {"id": "q482", "pdfPage": 246, "originalNumber": "66", "question": "52 y.o obese woman maintained on simvastatin, participated in a contest. After a few days of performing vigorous intensity exercises, she experienced generalized muscle pain and oliguria. Which is likely related to the case?", "options": [{"letter": "A", "text": "Exacerbation of osteoarthritis"}, {"letter": "B", "text": "Chronic fatigue syndrome"}, {"letter": "C", "text": "Severe dehydration"}, {"letter": "D", "text": "Rhabdomyolysis"}], "answer": "D", "answerText": "Rhabdomyolysis", "explanation": "66. ANSWER: D A. Wrong - osteoarthritis causes joint pain without muscle breakdown or oliguria B. Wrong - it presents with persistent fatigue but not acute muscle pain with oliguria after intense exercise C. Wrong - dehydration may cause oliguria but does not explain severe muscle pain and statin-related muscle injury D. CORRECT - statin use combined with vigorous exercise can cause muscle breakdown leading to myalgia and myoglobinuria, which results in oliguria and possible acute kidney injury"}, {"id": "q483", "pdfPage": 246, "originalNumber": "67", "question": "A 28-year-old female housewife complains of pain over the lateral elbow upon wrist extension after repeatedly carrying heavy grocery bags while grocery shopping. She later sought medical consultation, and Cozen’s test was positive. Which of the following muscles is the most likely origin of the patient’s pain?", "options": [{"letter": "A", "text": "Flexor carpi radialis"}, {"letter": "B", "text": "Extensor carpi radialis brevis"}, {"letter": "C", "text": "Pronator teres"}, {"letter": "D", "text": "Flexor digitorum superficialis"}], "answer": "B", "answerText": "Extensor carpi radialis brevis", "explanation": "67. ANSWER: B A. Wrong because flexor carpi radialis originates from the medial epicondyle and is involved in wrist flexion, which is associated with medial epicondylitis (golfer’s elbow), not lateral elbow pain. B. Is CORRECT because extensor carpi radialis brevis originates from the lateral epicondyle and is the most commonly involved muscle in lateral epicondylitis (tennis elbow). Pain is reproduced with resisted wrist extension, as seen in a positive Cozen’s test. Please refer to the screenshots below to help with correlation. C. Wrong because pronator teres also arises from the medial epicondyle and contributes to forearm pronation, making it more associated with medial elbow pathology rather than lateral elbow pain. D. Wrong because flexor digitorum superficialis originates primarily from the medial epicondyle and functions in finger flexion, not wrist extension, and is not implicated in lateral epicondylitis. The patient has Lateral Epicondylitis:"}, {"id": "q484", "pdfPage": 247, "originalNumber": "68", "question": "A tailor complains of pain on the lateral aspect of his wrist. The pain was aggravated when you ulnarly deviate the affected wrist with the thumb fully flexed and the hand closed. The Finkelstein test was positive. Which of the following muscles is most likely the source of pain?", "options": [{"letter": "A", "text": "Extensor carpi radialis longus"}, {"letter": "B", "text": "Abductor pollicis longus"}, {"letter": "C", "text": "Flexor digitorum profundus"}, {"letter": "D", "text": "Flexor digitorum superficialis"}], "answer": "B", "answerText": "Abductor pollicis longus", "explanation": "68. ANSWER: B A. Wrong because the maneuver described/ Finkelstein test doesn’t test for the Extensor carpi radialis longus B. Is CORRECT because a positive Finkelstein test indicates inflammation of the abductor pollicis longus C. Wrong Wrong because the maneuver described/ Finkelstein test doesn’t test for the Flexor digitorum profundus D. Wrong Wrong because the maneuver described/ Finkelstein test doesn’t test for the flexor digitorum superficialis"}, {"id": "q485", "pdfPage": 248, "originalNumber": "69", "question": "Lateral trunk bending during gait is compensatory for weakness of:", "options": [{"letter": "A", "text": "Gluteus maximus"}, {"letter": "B", "text": "Gluteus medius"}, {"letter": "C", "text": "Adductor magnus"}, {"letter": "D", "text": "Adductor longus"}], "answer": "B", "answerText": "Gluteus medius", "explanation": "69. ANSWER: B A. Wrong: Gluteus maximus is a primary hip extensor, and its weakness typically results in an anterior-posterior gait abnormality (lurching) rather than lateral trunk bending B. Correct: Gluteus medius weakness causes the pelvis to drop on the opposite side during the stance phase (Trendelenburg sign); the patient leans the trunk laterally toward the weak side to compensate and maintain balance C. Wrong: Adductor magnus primarily pulls the thigh toward the body's midline; its weakness does not necessitate lateral trunk bending to stabilize the pelvis during gait D. Wrong: Adductor longus is an adductor; while adductor spasms can cause a \"scissors gait\" with trunk swaying, its weakness is not the cause of lateral trunk bending compensation"}, {"id": "q486", "pdfPage": 248, "originalNumber": "37", "question": "back right pocket. Weeks after being told not to put the wallet in the back pocket, there was decrease in pain. However, the area between the lateral edge of the sacrum and the hip joint is still tender on palpation. Which of the following structures is the origin of pain?", "options": [{"letter": "A", "text": "Ischial tuberosity"}, {"letter": "B", "text": "Piriformis"}, {"letter": "C", "text": "Gluteus maximus"}, {"letter": "D", "text": "Greater trochanter"}], "answer": "A", "answerText": "Ischial tuberosity", "explanation": "A. Wrong - Located inferiorly (“sit bone”) and associated with hamstring origin; pain is usually from hamstring injury or prolonged sitting directly on the bone. B. Is CORRECT because The Piriformis muscle lies between the lateral sacrum and the hip joint and can compress the Sciatic nerve when irritated by sitting on a wallet (wallet neuritis). C. Wrong - Large superficial buttock muscle; pain is usually diffuse, not localized to the sacrum hip region. D. Wrong - Located on the lateral femur; pain here suggests trochanteric bursitis causing lateral hip pain, not buttock tenderness. Source:Bates 12ed, ch 16 musculoskeletal system"}, {"id": "q487", "pdfPage": 250, "originalNumber": "71", "question": "You ask the patient to perform hallux and toe MP and IP extensions with full resistance, which nerve are you assessing?", "options": [{"letter": "A", "text": "Tibial nerve"}, {"letter": "B", "text": "Deep peroneal nerve"}, {"letter": "C", "text": "Lateral plantar nerve"}, {"letter": "D", "text": "Medial plantar nerve"}], "answer": "B", "answerText": "Deep peroneal nerve", "explanation": "71. ANSWER: B A. Wrong - The tibial nerve primarily innervates the posterior compartment of the leg and plantar intrinsic foot muscles, which are mainly responsible for plantarflexion and toe flexion, not extension. B. Is CORRECT because the deep peroneal (deep fibular) nerve innervates the extensor muscles of the anterior compartment of the leg, including extensor hallucis longus and extensor digitorum longus, which are responsible for extension of the hallux and toes at the MP and IP joints against resistance. C. Wrong - This nerve supplies most intrinsic muscles of the foot, which assist with toe flexion and stabilization, not toe extension. D. Wrong - This nerve innervates intrinsic foot muscles such as abductor hallucis and flexor hallucis brevis, which contribute to flexion of the hallux, not extension. Source: Gray’s Anatomy (The Anatomical Basis of Clinical Practice), Ch. 76, p. 1342 Source: Gray’s Anatomy (The Anatomical Basis of Clinical Practice), Ch. 79, p. 1453-1454"}, {"id": "q488", "pdfPage": 251, "originalNumber": "72", "question": "Patient is on one single left limb. Drooping to the right hip means?", "options": [{"letter": "A", "text": "Weakness on the right gluteus medius"}, {"letter": "B", "text": "Weakness on the left gluteus medius"}, {"letter": "C", "text": "Weakness of the right gluteus maximus"}, {"letter": "D", "text": "Weakness of the left gluteus maximus"}], "answer": "B", "answerText": "Weakness on the left gluteus medius", "explanation": "72. ANSWER: B A. Wrong because the right gluteus medius stabilizes when standing on the right leg, not the left B. Is CORRECT because when the patient is standing on the left leg, the pelvis drops to the right side due to weakness of the left gluteus medius. This is a positive Trendelenburg sign on the left side. C. Wrong because the gluteus maximus is mainly responsible for hip extension, not pelvic stabilization D. Wrong because the gluteus maximus is mainly responsible for hip extension, not pelvic stabilization"}, {"id": "q489", "pdfPage": 251, "originalNumber": "73", "question": "In a gait cycle, one limb is on a loading response while the other limb is on:", "options": [{"letter": "A", "text": "Preswing"}, {"letter": "B", "text": "Midswing"}, {"letter": "C", "text": "Midstance"}, {"letter": "D", "text": "Terminal Stance"}], "answer": "A", "answerText": "Preswing", "explanation": "73. ANSWER: A A. Is CORRECT because when one limb is in loading response, the opposite limb is in preswing because both phases occur during a period of double support. In preswing, the trailing limb is unloading and preparing for toe-off while the leading limb is accepting body weight. This creates a smooth transfer of weight from one limb to the other. The timing aligns perfectly, making this the correct pairing. B. Wrong - Midswing is part of the swing phase where the limb is already off the ground and advancing forward. During this time, the opposite limb is in single limb support, not double support. Loading response, however, specifically requires both feet to be in contact with the ground. Because midswing eliminates ground contact on one side, it cannot coincide with loading response. C. Wrong - Midstance occurs when the body’s weight is fully supported by one limb while the other limb is in swing. This represents a single support phase of gait. In contrast, loading response happens during double support, when both limbs share contact with the ground. Since midstance lacks this dual contact, it does not match the timing of loading response. D. Wrong - Terminal stance is a late stance phase where the heel rises and the body moves ahead of the supporting foot. It is still part of single limb support, with the opposite limb progressing through swing. Loading response, on the other hand, requires both limbs to be on the ground. Because terminal stance does not involve double support, it cannot occur simultaneously with loading response. During loading response of one limb (B, right foot):"}, {"id": "q490", "pdfPage": 252, "originalNumber": "74", "question": "Manual muscle test results of a 24-year old pedestrian bumped in a vehicular accident: Iliopsoas – 5/5 Gluteus maximus – 5/5 Gluteus medius – 5/5 Quadriceps – 4/4 Hamstring – 4/4 Tibialis anterior – 1/4 Tibialis posterior – 4/4 Gastrocsoleus – 4/4 Peroneus longus – 1/4 Peroneus brevis – 1/4 Xray: no fractures. Where was he most likely bumped during the accident?", "options": [{"letter": "A", "text": "Lateral right ankle"}, {"letter": "B", "text": "Lateral right knee"}, {"letter": "C", "text": "Lateral right hip"}, {"letter": "D", "text": "Lumbosacral region"}], "answer": "B", "answerText": "Lateral right knee", "explanation": "74. ANSWER: B A. Wrong because an injury at the ankle would typically affect only the distal branches of the common peroneal nerve and would not produce marked weakness in both dorsiflexion and eversion. B. CORRECT because the common peroneal nerve is most vulnerable at the lateral aspect of the knee near the fibular neck, and injury at this site leads to weakness of the tibialis anterior and peroneal muscles, resulting in impaired dorsiflexion and eversion C. Wrong because trauma to the lateral hip would more likely affect the superior gluteal nerve, which supplies the gluteus medius. D. Wrong because an injury to the lumbosacral region would typically produce more widespread neurologic deficits involving multiple muscle groups rather than the isolated pattern of weakness seen in muscles innervated by the common peroneal nerve."}, {"id": "q491", "pdfPage": 253, "originalNumber": "75", "question": "Techniques to make your older patient comfortable. EXCEPT.", "options": [{"letter": "A", "text": "Ask what the patient wants to be called"}, {"letter": "B", "text": "Adjust the environment"}, {"letter": "C", "text": "Ask open-ended questions and allow patient to reminisce"}, {"letter": "D", "text": "Always include the family"}], "answer": "D", "answerText": "Always include the family", "explanation": "75. ANSWER: D A. Wrong - Promotes respect and comfort B. Wrong - Improves comfort by providing well-lit, moderately warm setting with minimal background noise, chairs with arms and access to the examining table C. Wrong - Builds rapport D. Is CORRECT because this is not always appropriate, include only when indicated, especially if the patient has cognitive impairment Source: Bate’s 12th Edition, Page 1943"}, {"id": "q492", "pdfPage": 255, "originalNumber": "77", "question": "Older adults are persons who are-", "options": [{"letter": "A", "text": "50 years old and older"}, {"letter": "B", "text": "55 years old and older"}, {"letter": "C", "text": "60 years old and older"}, {"letter": "D", "text": "65 years old and older"}], "answer": "D", "answerText": "65 years old and older", "explanation": "77. ANSWER: D A. Wrong - Is not the standard global or clinical definition for an “older adult” B. Wrong - Is not the standard global or clinical definition for an “older adult” C. Wrong - Is not the standard global or clinical definition for an “older adult” D. CORRECT - This age is typically used by governments for official purposes, such as eligibility for Medicare in the United States or as the standard retirement age in many Western nations. https://pmc.ncbi.nlm.nih.gov/articles/PMC6301865/#:~:text=Geriatric%20dise ases%20should%20therefore%20be,oldest%2Dold%20according%20to%20a ge."}, {"id": "q493", "pdfPage": 256, "originalNumber": "78", "question": "In examining an older patient during cardiovascular examination, you noted isolated systolic hypertension. What physiologic change best explains this? (gist)", "options": [{"letter": "A", "text": "Increased cardiac output"}, {"letter": "B", "text": "Decreased arterial elasticity"}, {"letter": "C", "text": "Increased venous return"}, {"letter": "D", "text": "Increased heart rate"}], "answer": "B", "answerText": "Decreased arterial elasticity", "explanation": "78. ANSWER: B A. Wrong - increased cardiac output would raise both systolic and diastolic pressure B. Is CORRECT because arteries become stiffer due to aging-related changes such as loss of elastin, calcification, and increased collagen which leads to higher systolic pressures (arteries can’t expand well during systole) and normal or lower diastolic pressure (less elastic recoil during diastole) C. Wrong - increased venous return mainly affects preload and causes an increase in blood pressure D. Wrong - does not cause isolated systolic hypertension Bates, Guide to Physical Examination, Chapter 27, p. 1957"}, {"id": "q494", "pdfPage": 256, "originalNumber": "79", "question": "A 74 year old woman complains of memory problems. She was given a mini-cog test and recalled 1 of 3 words and drew an abnormal clock. What is the most appropriate interpretation?", "options": [{"letter": "A", "text": "Negative screening"}, {"letter": "B", "text": "No cognitive impairment"}, {"letter": "C", "text": "Possible cognitive impairment"}, {"letter": "D", "text": "Definitive diagnosis of dementia"}], "answer": "D", "answerText": "Definitive diagnosis of dementia", "explanation": "79. ANSWER: D A. Wrong - patient has 2 screening tests positive. B. Wrong - patient has 2 screening tests positive, hinting that there may be cognitive impairment. C. Wrong - patient has indeterminate word recall score (1-2), BUT failed the CDT. Patients with indeterminate word recall are classified based on the CDT. Since CDT is abnormal, the patient is demented (see ratio picture). D. Is CORRECT - definitive diagnosis of dementia. Although the 3-item recall is indeterminate, diagnosis of dementia is then done based on the CDT. Patient has an abnormal CDT, hence patient is demented."}, {"id": "q495", "pdfPage": 257, "originalNumber": "80", "question": "An 84 year old woman was brought in by her daughter because she \"has dementia\". The daughter reported the patient was fine last week but suddenly became confused yesterday and is now disoriented and agitated. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Alzheimer's disease"}, {"letter": "B", "text": "Vascular Dementia"}, {"letter": "C", "text": "Delirium"}, {"letter": "D", "text": "Normal aging"}], "answer": "C", "answerText": "Delirium", "explanation": "80. ANSWER: C A. Wrong. Alzheimer's has a slow, gradual onset over months to years. A patient cannot develop it overnight. The fact that she was fine last week completely rules this out. B. Wrong. Vascular dementia follows a stepwise decline linked to repeated small strokes. It requires a background of cerebrovascular disease. It does not appear suddenly in one day. C. Is CORRECT because Delirium is characterized by acute onset, fluctuating course, and impaired attention. This patient went from baseline to confused and agitated within a day. An underlying medical trigger like UTI or medication should be investigated. D. Wrong. Normal aging causes mild, gradual cognitive slowing. It never causes acute confusion, disorientation, or agitation. Sudden behavioral change is always pathological and must be worked up."}, {"id": "q496", "pdfPage": 258, "originalNumber": "81", "question": "A 78-year-old man reports dizziness when standing. Blood pressure drops to systolic 20mmHg. But heart rate does not increase. Which of the following is the likely cause?", "options": [{"letter": "A", "text": "Dehydration"}, {"letter": "B", "text": "Autonomic dysfunction"}, {"letter": "C", "text": "Anxiety"}, {"letter": "D", "text": "Arrhythmia"}], "answer": "B", "answerText": "Autonomic dysfunction", "explanation": "81. ANSWER: B A. Wrong. Causes orthostatic hypotension with compensatory tachycardia → HR should increase. B. Is CORRECT because Orthostatic hypotension without HR increase → impaired baroreflex (common in elderly). C. Wrong. Typically causes tachycardia and ↑BP, not orthostatic hypotension. D. Wrong. May cause dizziness, but not specifically positional BP drop with absent HR response. Source: Bates 12th ed., Chapter 4 p.131"}, {"id": "q497", "pdfPage": 258, "originalNumber": "82", "question": "88-year old woman cannot hear whispered words but can hear a tuning fork better in bone conduction than air conduction. What is the most likely condition?", "options": [{"letter": "A", "text": "Presbycusis"}, {"letter": "B", "text": "Conductive hearing loss"}], "answer": "B", "answerText": "Conductive hearing loss", "explanation": "82. ANSWER: B A. Is wrong because presbycusis (age-related hearing loss) is a sensorineural loss, usually affecting high-frequency sounds, and air conduction is worse than bone conduction, not the other way around. B. Is CORRECT because Bates explains that in conductive hearing loss, bone conduction is better than air conduction (positive Rinne test), and patients have difficulty hearing whispered words. This 47 C. Sensorineural hearing loss D. Meniere disease fits the patient’s presentation. C. Is wrong because sensorineural hearing loss shows air conduction > bone conduction (normal Rinne test), which does not match this case. D. Is wrong because Meniere disease typically presents with episodic vertigo, tinnitus, and fluctuating sensorineural hearing loss, not persistent conductive loss with bone > air conduction. Source: Bates, Chapter 13"}, {"id": "q498", "pdfPage": 259, "originalNumber": "83", "question": "78-year-old patient has wide-based gait and instability, but Romberg's test was negative. What is the most likely condition?", "options": [{"letter": "A", "text": "Cerebellar disease"}, {"letter": "B", "text": "Sensory ataxia"}, {"letter": "C", "text": "Peripheral neuropathy"}, {"letter": "D", "text": "Vestibular dysfunction"}], "answer": "A", "answerText": "Cerebellar disease", "explanation": "83. ANSWER: A A. Is CORRECT because wide-based gait and instability are hallmarks of ataxia, commonly caused by cerebellar dysfunction. The Romberg test speciﬁcally evaluates proprioception (posterior column function). If a patient has a wide-based gait, but their instability does not worsen signiﬁcantly upon closing their eyes, it suggests the instability is not due to loss of proprioception (sensory ataxia) B. Wrong - Sensory ataxia typically presents with a positive Romberg sign (signiﬁcantly worse with eyes closed C. Wrong - peripheral neuropathy typically presents with a positive Romberg sign D. Wrong - usually presents with vertigo and, if chronic or bilateral, may cause instability, but cerebellar dysfunction is more classic for a stable wide-based gait in older patients."}, {"id": "q499", "pdfPage": 260, "originalNumber": "84", "question": "77-year-old woman has kyphosis and loss of 5cm in height over the past several years. What is most likely?", "options": [{"letter": "A", "text": "Muscle weakness"}, {"letter": "B", "text": "Osteoarthritis"}, {"letter": "C", "text": "Osteoporosis"}, {"letter": "D", "text": "Rheumatoid arthritis"}], "answer": "C", "answerText": "Osteoporosis", "explanation": "84. ANSWER: C A. Is wrong because muscle weakness can cause posture changes but usually does not lead to significant height loss over years. B. Is wrong because osteoarthritis primarily affects joints, especially weight-bearing joints; it may cause pain and limited mobility but does not usually cause 5 cm height loss or kyphosis. C. Is CORRECT because osteoporosis leads to vertebral compression fractures, which can cause progressive kyphosis and height loss, especially in older women. Loss of 5 cm over years is classic. D. Is wrong because rheumatoid arthritis affects peripheral joints symmetrically, not vertebral bodies, so it does not typically cause height loss or kyphosis. Source: Bates, Chapter 27"}, {"id": "q500", "pdfPage": 260, "originalNumber": "85", "question": "A 76 year old patient repeatedly nods to the conversation but gives incorrect answers to the question. Hearing impairment is suspected. What is the next best step?", "options": [{"letter": "A", "text": "Speak loudly"}, {"letter": "B", "text": "Face the patient and speak clearly"}, {"letter": "C", "text": "Repeat the question rapidly"}], "answer": "A", "answerText": "Speak loudly", "explanation": "85. ANSWER: A A. Is CORRECT because Speaking louder can help a patient with suspected hearing impairment better hear the question, especially in conditions like Presbycusis where hearing sensitivity is reduced. B. Wrong - Although helpful for communication, simply facing the patient may not sufficiently improve hearing if the patient cannot hear the spoken words well. C. Wrong Speaking quickly makes comprehension more difficult for patients with hearing impairment. 49 D. Ignore the behavior D. Wrong - Ignoring the issue may lead to miscommunication and incorrect assessment. Source: Bates chapter 5 Page. 159"}, {"id": "q501", "pdfPage": 261, "originalNumber": "86", "question": "An 82-year-old patient fails the Mini-cog test but is oriented to person and place. What is the next best step?", "options": [{"letter": "A", "text": "Diagnose dementia immediately"}, {"letter": "B", "text": "Ignore the findings"}, {"letter": "C", "text": "Conduct further cognitive assessment"}, {"letter": "D", "text": "Start medication"}], "answer": "C", "answerText": "Conduct further cognitive assessment", "explanation": "86. ANSWER: C A. Wrong. The Mini-Cog Test is only a screening tool, not sufficient to diagnose dementia. B. Wrong. An abnormal screening result should not be ignored because it may indicate early cognitive impairment. C. Is CORRECT because The next step is more detailed testing such as Mini-Mental State Examination or Montreal Cognitive Assessment to evaluate cognitive function. D. Wrong Treatment should not start without confirming the diagnosis of Dementia or another cognitive disorder. Source: Bates chapter 20 Page. 1002"}, {"id": "q502", "pdfPage": 261, "originalNumber": "87", "question": "80 year old man presents with slow movements, resting tremors and slow arm swing on movements.", "options": [{"letter": "A", "text": "Stroke"}, {"letter": "B", "text": "Myopathy"}, {"letter": "C", "text": "Peripheral Neuropathy"}, {"letter": "D", "text": "Parkinson Disease"}], "answer": "D", "answerText": "Parkinson Disease", "explanation": "87. ANSWER: D A. Wrong - patient is not experiencing a stroke B. Wrong - myopathy would indicate that the patient is undergoing muscle weakness which is not indicated C. Wrong - peripheral neuropathy should present with tingling or numbness D. CORRECT - resting tremors is typical of parkinson disease"}, {"id": "q503", "pdfPage": 262, "originalNumber": "88", "question": "Examination of an 81 y.o patient, physician notices thin dry skin with decreasing elasticity and wrinkles. Most appropriate interpretation?", "options": [{"letter": "A", "text": ") Acute dehydration"}, {"letter": "B", "text": ") Malnutrition"}, {"letter": "C", "text": ") Dermatitis"}, {"letter": "D", "text": ") Normal aging skin change"}], "answer": "D", "answerText": ") Normal aging skin change", "explanation": "88. ANSWER: D A.) Acute dehydration B.) Malnutrition C.) Dermatitis D.) Normal aging skin change Source: Bates chapter 27 the older adult"}, {"id": "q504", "pdfPage": 262, "originalNumber": "89", "question": "Barrel chest is a sign of", "options": [{"letter": "A", "text": "Pulmonary fibrosis"}, {"letter": "B", "text": "Pneumonia"}, {"letter": "C", "text": "COPD with emphysema"}, {"letter": "D", "text": "Pleural effusion"}], "answer": "C", "answerText": "COPD with emphysema", "explanation": "89. ANSWER: C A. Wrong - Pulmonary fibrosis causes restrictive lung disease, leading to reduced lung expansion, not increased chest diameter. B. Wrong - Pneumonia causes lung consolidation and infection, but it does not change the shape of the chest. C. Is CORRECT because there is air trapping and hyperinflation of the lungs, which increases the anteroposterior (AP) diameter of the chest, producing the classic barrel chest appearance. D. Wrong - Pleural effusion causes fluid accumulation in the pleural space, leading to reduced chest expansion, not barrel chest. Source: Bates table 15-5 chapter 15 Thorax and Lungs"}, {"id": "q505", "pdfPage": 262, "originalNumber": "90", "question": "Rapid deep respirations seen metabolic acidosis.", "options": [{"letter": "A", "text": "Biot"}, {"letter": "B", "text": "Cheyne-stokes"}], "answer": null, "answerText": "", "explanation": "90. ANSWER: C A. Wrong - Biot’s breathing is unpredictably irregular, with breaths 51 C. Kussmaul D. Apneustic that may be shallow or deep and then stop briefly; it is linked to brain damage/respiratory depression, not metabolic acidosis B. Wrong -periods of deep breathing alternating with apnea; it is classically associated with heart failure, uremia, drug-induced respiratory depression, and brain damage, not just rapid deep respirations from metabolic acidosis. C. Is CORRECT because Kussmaul breathing is compensatory overbreathing due to systemic acidosis. D. Wrong - Apneustic breathing is characterized by a prolonged inspiratory hold / gasping inspiration with inadequate expiration, usually from upper pontine injury; Bates chapter 15: Thorax and lungs, table 15-4"}, {"id": "q506", "pdfPage": 263, "originalNumber": "91", "question": "Which of the following conditions causes Cheyne-Stokes respiration?", "options": [{"letter": "A", "text": "Asthma"}, {"letter": "B", "text": "Heart failure"}, {"letter": "C", "text": "Bronchitis"}, {"letter": "D", "text": "COPD"}], "answer": "B", "answerText": "Heart failure", "explanation": "91. ANSWER: B A. Wrong - Asthma would most likely present with an obstructive breathing characterized with prolonged expiration due to narrowed airways. B. Is CORRECT . This is characterized as periods of deep breathing alternate with periods of apnea also seen normally in children and older adults during sleep, uremia, brain injury, etc. C. Wrong - (chronic) bronchitis would most likely present with an obstructive breathing characterized with prolonged expiration due to narrowed airways. D. Wrong - COPD would most likely present with an obstructive breathing characterized with prolonged expiration due to narrowed airways."}, {"id": "q507", "pdfPage": 264, "originalNumber": "92", "question": "Decreased lung expansion on one side", "options": [{"letter": "A", "text": "Pneumonia"}, {"letter": "B", "text": "Pneumothorax"}, {"letter": "C", "text": "Pleural effusion"}, {"letter": "D", "text": "AOTA"}], "answer": "C", "answerText": "Pleural effusion", "explanation": "92. ANSWER: C A. Wrong - because it may cause decreased expansion but usually mild compared to pleural disease B. Wrong - because it is associated with tracheal deviation and decreased fremitus C. Is CORRECT because fluid in pleural space causes decreased expansion on the affected side D. Wrong - because not all choices are related to the lung expansion description Source: Bate’s 13th ed. Chap 15, p 777"}, {"id": "q508", "pdfPage": 264, "originalNumber": "93", "question": "72yr old man, long history of smoking, progressive SOB, Barrel shaped chest, diminished breath sounds. Most likely diagnosis", "options": [{"letter": "A", "text": "Pulmonary fibrosis"}, {"letter": "B", "text": "COPD"}, {"letter": "C", "text": "Pneumonia"}, {"letter": "D", "text": "Pleural effusion"}], "answer": "B", "answerText": "COPD", "explanation": "93. ANSWER: B A. Wrong - B. Is CORRECT because it is a classic textbook presentation of COPD C. Wrong - D. Wrong -"}, {"id": "q509", "pdfPage": 265, "originalNumber": "94", "question": "A 75 year old woman with fever, productive cough, chest pain. Lung examination shows bronchial breath sound with increased tactile fremitus in the right lower lobe. Which most likely describes the diagnosis", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Lung Consolidation"}, {"letter": "D", "text": "Asthma"}], "answer": "C", "answerText": "Lung Consolidation", "explanation": "94. ANSWER: C A. Wrong — Pneumothorax: This is air in the pleural space. Air acts as an insulator, so you would find decreased or absent breath sounds and decreased tactile fremitus. The percussion note would be hyper-resonant (drum-like). B. Wrong — Pleural Effusion: This is fluid outside the lung in the pleural space. While fluid conducts sound well, the space between the lung and the chest wall actually blocks the transmission of vibration from the airways. Therefore, you would find decreased breath sounds and decreased tactile fremitus. C. Is CORRECT because: Lung Consolidation is the only condition among the choices where tactile fremitus increases. The solid nature of the inflamed lung tissue acts as a superior conductor for vibrations and airway sounds compared to normal, air-filled lung tissue. D. Wrong — Asthma: This is a condition of airway narrowing (bronchospasm). It typically presents with wheezing and prolonged expiration. Tactile fremitus is usually normal or decreased if there is significant air trapping (hyperinflation). source: Bates. Chapter 8. Page 337"}, {"id": "q510", "pdfPage": 265, "originalNumber": "95", "question": "70 yr old man, absent breath sounds, decreased tactile fremitus, dullness to percussion over the left lung base.", "options": [{"letter": "A", "text": "Pleural effusion"}, {"letter": "B", "text": "Pneumonia"}, {"letter": "C", "text": "Asthma"}, {"letter": "D", "text": "Bronchitis"}], "answer": "C", "answerText": "Asthma", "explanation": "95. ANSWER: C A. Is CORRECT because Dullness to percussion → fluid is dense. Decreased tactile fremitus → fluid blocks transmission of vibrations. Decreased or absent breath sounds → lung is compressed by fluid B. Wrong - Increased tactile fremitus (because consolidation transmits sound better). Bronchial breath sounds and crackles C. Wrong - Wheezing, hyperresonance, normal fremitus D. Wrong - Rhonchi or wheezes, but percussion and fremitus usually normal"}, {"id": "q511", "pdfPage": 266, "originalNumber": "96", "question": "A 78 year old man suddenly develops severe shortness of breath (dyspnea) and chest pain. The physical exam shows hyperresonance to percussion and absent breath sounds on the right side.", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Pneumonia"}, {"letter": "C", "text": "Pulmonary edema"}, {"letter": "D", "text": "Pleural effusion"}], "answer": "A", "answerText": "Pneumothorax", "explanation": "96. ANSWER: A A. Correct - Pneumothorax occurs when air enters the pleural space, causing lung collapse. This produces hyperresonance on percussion and absent breath sounds on the affected side, with sudden dyspnea and chest pain. B. Wrong - Pneumonia causes lung consolidation, which produces dullness to percussion and crackles, not hyperresonance. C. Wrong - Pulmonary edema causes fluid accumulation in the lungs, leading to bilateral crackles (rales) rather than unilateral hyperresonance or absent breath sounds. D. Wrong - Pleural effusion causes fluid in the pleural space, which produces dullness to percussion, not hyperresonance. Source: Bates chapter 15 Thorax and Lungs"}, {"id": "q512", "pdfPage": 266, "originalNumber": "97", "question": "74 y.o man with dyspnea, tracheal deviation away from the affected side, dullness on percussion", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Asthma"}, {"letter": "D", "text": "Bronchitis"}], "answer": "B", "answerText": "Pleural effusion", "explanation": "97. ANSWER: B A. Wrong - pneumothorax usually produces hyperresonance on percussion, not dullness B. CORRECT - large pleural effusions cause dullness to percussion and can push the trachea away from the affected side due to fluid accumulation C. Wrong - asthma causes diffuse wheezing without tracheal deviation or dullness to percussion D. Wrong - bronchitis presents with productive cough and rhonchi but does not cause tracheal deviation or percussion dullness"}, {"id": "q513", "pdfPage": 266, "originalNumber": "98", "question": "During examination, the physician ask a patient to say “Ninety-nine” while palpating the chest wall. What is the purpose of this maneuver?", "options": [{"letter": "A", "text": "Measure Lung Expansion"}, {"letter": "B", "text": "Assess Tactile Fremitus"}, {"letter": "C", "text": "Detect Wheezing"}], "answer": "B", "answerText": "Assess Tactile Fremitus", "explanation": "98. ANSWER: B A. Wrong - Lung expansion is assessed visually and by palpating chest excursion, not by having the patient speak. B. Is CORRECT because asking the patient to say “ninety-nine” produces vibrations transmitted through lung tissue, allowing the examiner to palpate tactile fremitus for areas of consolidation or effusion. C. Wrong - Wheezing is detected by auscultation, not by palpation of vocal vibrations. 55 D. Evaluate Diaphragmatic Movement D. Wrong - Diaphragmatic movement is assessed by observing or percussing the diaphragm during deep inspiration, not via vocalization. Source: Bates’ Guide to Physical Examination and History Taking, Page 777."}, {"id": "q514", "pdfPage": 267, "originalNumber": "99", "question": "A 70 year old man complains of wheezing that occurs during expiration. What is most likely the condition?", "options": [{"letter": "A", "text": "Asthma"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Pulmonary fibrosis"}, {"letter": "D", "text": "Pneumonia"}], "answer": "A", "answerText": "Asthma", "explanation": "99. ANSWER: A A. Is CORRECT because asthma causes narrowing of the airways due to bronchospasm, inflammation, and mucus production, leading to airflow obstruction that produces wheezing, especially during expiration. B. Is wrong because pleural effusion involves accumulation of fluid in the pleural space, which typically causes decreased breath sounds and dullness to percussion rather than wheezing. C. Is wrong because pulmonary fibrosis is a restrictive lung disease characterized by stiff lungs and typically produces fine inspiratory crackles, not expiratory wheezing. D. Is wrong because pneumonia usually presents with fever, cough, crackles, and bronchial breath sounds due to lung consolidation, rather than isolated expiratory wheezing. Source: Harrisons Chapter 287: Asthma, p. 2154"}, {"id": "q515", "pdfPage": 267, "originalNumber": "100", "question": "During lung examination of a 70 year old patient, physicians hear coarse crackles that disappear after coughing. What is most likely the diagnosis", "options": [{"letter": "A", "text": "Pulmonary fibrosis"}, {"letter": "B", "text": "Bronchitis"}, {"letter": "C", "text": "Asthma"}, {"letter": "D", "text": "Pleural effusion"}], "answer": "B", "answerText": "Bronchitis", "explanation": "100. ANSWER: B A. Wrong - pulmonary fibrosis would present with no change even after coughing as its characteristic fine, velcro-like crackles come from the sudden opening of stiffened alveoli. B. Is CORRECT because clearing of any adventitious sounds may indicate inspissated secretions commonly seen in bronchitis or atelectasis. C. Wrong - coughing may improve airflow however, wheezing usually persists until the airways constricts less. D. Wrong - as fluid is outside the lung in the pleural space, coughing doesn’t help nor change the patient’s respiration/breath sounds"}, {"id": "q516", "pdfPage": 269, "originalNumber": "1", "question": "A 58-year old man presents with chest pain which describes as pressure-like, radiating to the left arm that lasted for 20 minutes with associated diaphoresis. Which of the historical features strongly suggests ischemic heart disease?", "options": [{"letter": "A", "text": "Pain relieved by changing position"}, {"letter": "B", "text": "Pain worsened by deep breathing"}, {"letter": "C", "text": "Pressure-like pain with radiation and diaphoresis"}, {"letter": "D", "text": "Sharp-stabbing pain localized in one area"}], "answer": "C", "answerText": "Pressure-like pain with radiation and diaphoresis", "explanation": "1. ANSWER: C A. Is wrong because this suggests musculoskeletal or pericardial pain, not typical ischemic heart disease. B. Is wrong because this is pleuritic chest pain, more consistent with pleurisy or pulmonary causes, not myocardial ischemia. C. Is CORRECT because classic presentation of myocardial ischemia, especially retrosternal pressure radiating to the left arm with autonomic symptoms (diaphoresis). D. Is wrong because ischemic chest pain is usually diffuse pressure-like, not sharp and well localized. Source: Harrison’s 21st Edition, Chapter 273 “Ischemic Heart Disease” page 2033"}, {"id": "q517", "pdfPage": 269, "originalNumber": "2", "question": "During a physical examination of a patient suspected with heart failure. What is most consistent with left sided heart failure ?", "options": [{"letter": "A", "text": "pitting edema bilaterally"}, {"letter": "B", "text": "bibasilar crackles"}, {"letter": "C", "text": "jugular vein distention"}, {"letter": "D", "text": "hepatomegaly"}], "answer": "B", "answerText": "bibasilar crackles", "explanation": "2. ANSWER: B A. Is wrong because it is more typical of right-sided heart failure due to systemic venous congestion. B. Is CORRECT because left-sided heart failure causes pulmonary congestion and fluid accumulation in the lung bases, producing crackling sounds heard on auscultation. C. Is wrong because it indicates elevated right atrial pressure, usually seen in right-sided heart failure. D. Is wrong because it is caused by hepatic congestion, another feature of right-sided heart failure Bibasilar crackles = suggests fluid in alveoli"}, {"id": "q518", "pdfPage": 270, "originalNumber": "3", "question": "On cardiac examination, a new S3 gallop is heard in an adult patient with dyspnea. What is the clinical significance of this finding?", "options": [{"letter": "A", "text": "Normal finding in elderly patients"}, {"letter": "B", "text": "Suggests increased ventricular filling pressure and heart failure"}, {"letter": "C", "text": "Indicates valvular stenosis"}, {"letter": "D", "text": "Always benign"}], "answer": "B", "answerText": "Suggests increased ventricular filling pressure and heart failure", "explanation": "3. ANSWER: B A. Is wrong because S3 is not normal in older adults B. CORRECT because patient is an adult patient not a young adult or children where S3 is normal so it can be considered a sign of increased ventricular filling and heart failure C. Is wrong because valvular stenosis is more related to systolic murmurs rather than an extra heart sound D. Is wrong because it’s not always benign and can indicate heart failure Bates’ guide to physical examination 13th ed, ch. 16, p. 828 & Table 16-9"}, {"id": "q519", "pdfPage": 270, "originalNumber": "4", "question": "Px has ischemic heart disease, cold, clammy skin and hypotension. Likely finding?", "options": [{"letter": "A", "text": "Compensated heart failure"}, {"letter": "B", "text": "Cardiogenic shock"}, {"letter": "C", "text": "Stable angina"}, {"letter": "D", "text": "Hypertensive emergency"}], "answer": "B", "answerText": "Cardiogenic shock", "explanation": "4. ANSWER: B A. Is wrong because Patients typically have dyspnea, edema, fatigue, but not severe hypotension with shock signs. B. Is CORRECT because The patient has ischemic heart disease and presents with cold, clammy skin and hypotension, which are classic signs of poor cardiac output and systemic hypoperfusion.In cardiogenic shock, severe myocardial dysfunction (often due to myocardial infarction from ischemic heart disease) causes:↓ Cardiac output↓ Blood pressure (hypotension) and Poor tissue perfusion C. Is wrong because it is characterized by chest pain with exertion relieved by rest or nitroglycerin. Hemodynamic instability (hypotension, cold clammy skin) is not typical. D. Is wrong because Defined by severely elevated blood pressure (>180/120 mmHg) with end-organ damage.The question states hypotension, which is the opposite. Source:https://www.nhlbi.nih.gov/health/cardiogenic-shock/symptoms?"}, {"id": "q520", "pdfPage": 271, "originalNumber": "5", "question": "Patient reports waking up at night gasping for air, relieved after sitting upright for 15 minutes. This symptom strongly suggest:", "options": [{"letter": "A", "text": "Stable Angina"}, {"letter": "B", "text": "Asthma exacerbation"}, {"letter": "C", "text": "Left sided Heart Failure"}, {"letter": "D", "text": "Panic Attack"}], "answer": "C", "answerText": "Left sided Heart Failure", "explanation": "5. ANSWER: C A. Is wrong because angina typically presents as chest pressure or pain related to physical exertion or emotional stress. It is relieved by rest or nitroglycerin, not by sitting upright at night. B. Is wrong, while asthma can worsen at night (nocturnal asthma), it is usually characterized by wheezing, coughing, and chest tightness C. Is CORRECT because when a patient with left-sided heart failure lies flat, the fluid that was sequestered in the lower extremities during the day (edema) returns to the central circulation. The failing left ventricle cannot pump this increased venous return, leading to sudden pulmonary congestion. This leads to the symptom called paroxysmal nocturnal dyspnea D. Is wrong, while panic attacks cause hyperventilation and a feeling of \"air hunger,\" they are usually associated with intense fear, palpitations, and tremors. They are not specifically triggered by lying flat (recumbency) nor specifically relieved by sitting upright for 15 minutes. Source: Bates 12th Ed, Chap 8, Page 332-333 https://www.ncbi.nlm.nih.gov/books/NBK537098/?hl=en-PH"}, {"id": "q521", "pdfPage": 271, "originalNumber": "6", "question": "On physical examination, you noted an increased jugular venous pressure at 45. This most consistently reflects:", "options": [{"letter": "A", "text": "Increased left atrial pressure"}, {"letter": "B", "text": "Increased right atrial pressure"}, {"letter": "C", "text": "Pulmonary capillary leak"}, {"letter": "D", "text": "Decreased cardiac output"}], "answer": "B", "answerText": "Increased right atrial pressure", "explanation": "6. ANSWER: B A. Is wrong because it is reflected by pulmonary capillary wedge pressure, not JVP. B. Is CORRECT because JVP assessment provides an estimate of central venous pressure (CVP), which corresponds to right atrial pressure C. Is wrong because seen in conditions like ARDS, and does not directly elevate JVP. D. Is wrong since cardiac output may be low in some cases, but JVP specifically reflects right atrial pressure, making option B the most accurate."}, {"id": "q522", "pdfPage": 272, "originalNumber": "7", "question": "A hepatojugular reflux is elicited during examination. This finding suggest:", "options": [{"letter": "A", "text": "Left ventricular hypertrophy"}, {"letter": "B", "text": "Right sided heart failure"}, {"letter": "C", "text": "Pericardial friction rub"}, {"letter": "D", "text": "Mitral valve prolapse"}], "answer": "B", "answerText": "Right sided heart failure", "explanation": "7. ANSWER: B A. Is wrong because because left ventricular hypertrophy (LVH) primarily affects the left side of the heart and is usually associated with findings such as displaced apical impulse or S4, not a positive hepatojugular reflux. B. Is CORRECT because hepatojugular reflux (HJR) occurs when firm pressure over the liver increases venous return, causing a sustained rise in jugular venous pressure (JVP). This indicates the right ventricle cannot accommodate the increased venous return, which is characteristic of right-sided heart failure. C. Is wrong because a pericardial friction rub is a scratchy auscultatory sound heard in pericarditis and is unrelated to the hepatojugular reflux maneuver. D. Is wrong because mitral valve prolapse typically produces a mid-systolic click and possible late systolic murmur, not an elevated JVP during the hepatojugular reflux test. Source: National Library of Medicine https://www.ncbi.nlm.nih.gov/books/NBK526097/ no mention of hepatojugular reflux in Bates"}, {"id": "q523", "pdfPage": 272, "originalNumber": "4", "question": "late inspiration, this findings is best explained by", "options": [{"letter": "A", "text": "Bronchoectasis"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Interstitial pulmonary edema"}, {"letter": "D", "text": "Consolidation"}], "answer": "C", "answerText": "Interstitial pulmonary edema", "explanation": "8. ANSWER: C A. Is wrong because this usually causes coarse crackles, often in early inspiration and may change with coughing B. Is wrong because this causes decreased breath sounds and dullness to percussion C. Is CORRECT because this occurs when the collapsed alveoli suddenly open during the late phase of inspiration. Fluid accumulation in the interstitial space makes the alveoli stiff and prone to collapse D. Is wrong because this produces bronchial breath sounds, egophony, and crackles but not specifically late inspiratory bilateral crackles Source: Bates 12th edition, Chapter 8 page 339"}, {"id": "q524", "pdfPage": 273, "originalNumber": "9", "question": "A displaced apical impulse (PMI) lateral to the midclavicular line would suggest:", "options": [{"letter": "A", "text": "Right ventricular hypertrophy"}, {"letter": "B", "text": "Left ventricular enlargement"}, {"letter": "C", "text": "Pericardial effusion"}, {"letter": "D", "text": "Aortic stenosis"}], "answer": "B", "answerText": "Left ventricular enlargement", "explanation": "9. ANSWER: B A. Is wrong because Right Ventricular Hypertrophy causes a parasternal heave or lift along the left sternal border. It does not typically move the PMI laterally, because the apex of the heart is formed mainly by the left ventricle. B. Is CORRECT because Left Ventricular Hypertrophy or dilation causes the apical impulse to shift downward and laterally. The enlarged left ventricle forms the apex and pushes the PMI beyond the midclavicular line. C. Is wrong because Pericardial Effusion causes fluid accumulation around the heart. The fluid dampens or obscures the PMI, making it difficult to palpate, rather than displacing it laterally. D. Is wrong because Aortic Stenosis may cause left ventricular hypertrophy due to pressure overload. However, the typical physical finding is a sustained or heaving PMI, not necessarily a lateral displacement unless significant dilation occurs. Source:Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 9, Page 387"}, {"id": "q525", "pdfPage": 273, "originalNumber": "10", "question": "Bilateral pitting edema up to the knees in a patient with elevated JVP most likely reflects?", "options": [{"letter": "A", "text": "Isolated renal disease"}, {"letter": "B", "text": "Chronic venous insufficiency"}, {"letter": "C", "text": "Systemic venous congestion"}, {"letter": "D", "text": "Hypoalbuminemia"}], "answer": "C", "answerText": "Systemic venous congestion", "explanation": "10. ANSWER: C A. Is wrong because isolated renal disease causes edema from sodium and water retention, but JVP is usually normal. B. Is wrong because chronic venous insufficiency causes localized lower limb edema without elevated JVP. C. Is CORRECT because elevated JVP with bilateral pitting edema indicates increased systemic venous pressure, typical of systemic venous congestion (e.g., right-sided heart failure). D. Is wrong because hypoalbuminemia causes edema due to low oncotic pressure, but JVP remains normal."}, {"id": "q526", "pdfPage": 274, "originalNumber": "11", "question": "A 65-year old woman presented with sudden right sided facial and arm weakness. She is conscious and presented with right sided facial drooping, forehead not included, with 3/5 right arm weakness. What area is affected? 11. ANSWER: B", "options": [{"letter": "A", "text": "Is wrong because Right hemisphere lesions cause left-sided weakness, but this patient has right-sided facial and arm weakness, indicating a left hemisphere lesion."}, {"letter": "B", "text": "The middle cerebral artery supplies the lateral motor cortex controlling the face and upper limb, producing contralateral weakness with forehead sparing (UMN facial palsy)."}, {"letter": "C", "text": "Is wrong because Pontine lesions affecting the facial nerve 6"}], "answer": "A", "answerText": "Is wrong because Right hemisphere lesions cause left-sided weakness, but this patient has right-sided facial and arm weakness, indicating a left hemisphere lesion.", "explanation": "A. Right cerebral hemisphere B. Left motor cortex (MCA area) C. Brainstem (Pons) D. Peripheral facial nerve nucleus usually cause ipsilateral complete facial paralysis including the forehead, unlike the forehead-sparing weakness seen here. D. Is wrong because Peripheral facial nerve lesions (LMN palsy) cause complete ipsilateral facial paralysis including the forehead and do not cause arm weakness."}, {"id": "q527", "pdfPage": 275, "originalNumber": "12", "question": "56 yo M claimed to have slurred speech for 10 minutes. Spontaneously relieved upon arrival at ER. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Intracerebral hemorrhage"}, {"letter": "B", "text": "Subarachnoid hemorrhage"}, {"letter": "C", "text": "Transient ischemic attack"}, {"letter": "D", "text": "Lacunar infarct"}], "answer": "C", "answerText": "Transient ischemic attack", "explanation": "12. ANSWER: C A. Is wrong because Intracerebral hemorrhage typically causes persistent focal neurologic deficits and decreased consciousness rather than brief symptoms that resolve spontaneously within minutes. B. Is wrong because Subarachnoid hemorrhage usually presents with a sudden severe “thunderclap” headache and neurologic deterioration, not a short episode of slurred speech that completely resolves. C. Is CORRECT because Transient ischemic attack is characterized by a temporary focal neurologic deficit (such as slurred speech) that resolves completely within minutes to hours without permanent brain injury. D. Is wrong because Lacunar infarct is a type of ischemic stroke that typically produces persistent neurologic deficits due to small-vessel infarction rather than transient symptoms that resolve completely. Source: Bates 13th Ed., Ch 24, p1440"}, {"id": "q528", "pdfPage": 275, "originalNumber": "7", "question": "headache of my life”. PE: photophobia, nuchal rigidity. Diagnosis?", "options": [{"letter": "A", "text": "Tension headache"}, {"letter": "B", "text": "Subarachnoid hemorrhage"}, {"letter": "C", "text": "Migraine with aura"}, {"letter": "D", "text": "Seizure"}], "answer": "A", "answerText": "Tension headache", "explanation": "A. Is wrong because tension headaches are typically bilateral, pressing, gradual in onset, and not associated with sudden severe pain, photophobia, or nuchal rigidity. B. Is CORRECT because a sudden “worst headache of my life” with photophobia and neck stiffness is classic for subarachnoid hemorrhage due to meningeal irritation. C. Is wrong because migraines are often unilateral and throbbing with aura, but do not usually present with abrupt thunderclap onset and nuchal rigidity. D. Is wrong because seizures may cause postictal headache, but sudden severe headache with meningeal signs is more consistent with subarachnoid hemorrhage. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 113."}, {"id": "q529", "pdfPage": 276, "originalNumber": "14", "question": "A 70 y.o. man presents a sudden onset of right leg weakness greater than right arm weakness. On exam, strength is 2/5 R leg, 4/5 R arm. There is urinary incontinence. Which of the following is most likely affected?", "options": [{"letter": "A", "text": "Middle cerebral artery"}, {"letter": "B", "text": "Posterior cerebral artery"}, {"letter": "C", "text": "Anterior cerebral artery"}, {"letter": "D", "text": "Basilar artery"}], "answer": "C", "answerText": "Anterior cerebral artery", "explanation": "14. ANSWER: C A. Is wrong because MCA stroke typically causes contralateral face and arm weakness greater than leg weakness, which does not match this presentation. B. Is wrong because PCA infarcts commonly cause visual field deficits, not predominant leg weakness with urinary incontinence. C. Is CORRECT because ACA stroke produces contralateral leg weakness greater than arm weakness and may cause urinary incontinence due to medial frontal lobe involvement. D. Is wrong because basilar artery lesions usually result in brainstem findings such as cranial nerve deficits and altered consciousness, not isolated leg-predominant weakness. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 1559."}, {"id": "q530", "pdfPage": 276, "originalNumber": "15", "question": "62 y/o women with atrial fibrillation develop left sided hemiplegia and shift of gaze to the right. Upon exam, she is aphasic. These findings is consistent with:", "options": [{"letter": "A", "text": "Right Lacunar infarct"}, {"letter": "B", "text": "Left MCA infarct"}, {"letter": "C", "text": "Right PCA infarct"}, {"letter": "D", "text": "Cerebellar hemorrhage"}], "answer": "B", "answerText": "Left MCA infarct", "explanation": "15. ANSWER: B A. Is wrong because lacunar infarcts typically cause pure motor or sensory deficits without cortical signs like aphasia or gaze deviation. B. Is CORRECT because a left MCA stroke causes right-sided weakness, gaze preference toward the lesion (rightward gaze shift), and aphasia due to dominant hemisphere involvement. C. Is wrong because PCA infarcts usually produce contralateral homonymous hemianopia, not aphasia with hemiparesis. D. Is wrong because cerebellar lesions cause ataxia, vertigo, and coordination deficits, not aphasia or conjugate gaze deviation. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 1559."}, {"id": "q531", "pdfPage": 277, "originalNumber": "16", "question": "The patient had a sudden seizure while eating dinner. Fell to the floor, eyes rolled backwards, foaming at the mouth. The wife put a spoon in his mouth to prevent him from biting his tongue. The daughter claims there was a urine stain. Nurse gave medications Who is the most reliable source of information?", "options": [{"letter": "A", "text": "Px"}, {"letter": "B", "text": "Wife"}, {"letter": "C", "text": "Daughter"}, {"letter": "D", "text": "Nurse"}], "answer": "B", "answerText": "Wife", "explanation": "16. ANSWER: B A. Is wrong because the patient is often amnesic or confused postictally, making their account unreliable. B. Is CORRECT because a direct eyewitness to the seizure event provides the most reliable history of the episode’s onset, movements, and duration. C. Is wrong because although helpful, her report appears secondary and limited (e.g., urine stain observation) rather than a full direct account. D. Is wrong because the nurse can describe post-event findings and treatment, but not the seizure’s initial features if not present during onset. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 1449."}, {"id": "q532", "pdfPage": 277, "originalNumber": "17", "question": "Which of the following history questions is MOST helpful in determining whether the patient has a known diagnosis of epilepsy?", "options": [{"letter": "A", "text": "Are you taking any antiepileptic medications?"}, {"letter": "B", "text": "Have you ever been hospitalized for similar episodes?"}, {"letter": "C", "text": "Have you had any recent head trauma"}, {"letter": "D", "text": "Have you experienced similar episodes in the past?"}], "answer": "A", "answerText": "Are you taking any antiepileptic medications?", "explanation": "17. ANSWER: A A. Is CORRECT because asking about current antiepileptic drug use most directly establishes whether the patient has a known diagnosis of epilepsy under treatment. B. Is wrong because prior hospitalization suggests severity but does not confirm a formal diagnosis of epilepsy. C. Is wrong because head trauma explores secondary causes of seizure, not whether epilepsy is already diagnosed. D. Is wrong because recurrent episodes suggest seizure disorder but do not confirm a documented diagnosis or ongoing management. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 1450."}, {"id": "q533", "pdfPage": 277, "originalNumber": "18", "question": "Grand mal features except", "options": [{"letter": "A", "text": "Sudden loss of consciousness"}, {"letter": "B", "text": "Tonic stiffening followed by rhythmic clonic jerking"}, {"letter": "C", "text": "Hyperactive reflexes"}, {"letter": "D", "text": "Recovery of awareness without confusion"}], "answer": "D", "answerText": "Recovery of awareness without confusion", "explanation": "18. ANSWER: D A. Is wrong because generalized tonic-clonic (grand mal) seizures characteristically begin with abrupt loss of consciousness. B. Is wrong because the classic sequence of a grand mal seizure is tonic stiffening followed by clonic jerking movements. C. Is wrong because transient hyperreflexia may be observed postictally due to generalized neuronal excitation. D. Is CORRECT because grand mal seizures are typically followed by a postictal period of confusion or altered consciousness, not immediate clear awareness."}, {"id": "q534", "pdfPage": 278, "originalNumber": "19", "question": "A 19 year old female reports recurrent episodes of brief staring for 10 seconds. During the episode, she is unresponsive and stops mid-sentence. She returns to normal immediately afterward without confusion. Neurologic examination is normal. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Focal seizure with impairment of consciousness"}, {"letter": "B", "text": "Absence seizure"}, {"letter": "C", "text": "Panic attack"}, {"letter": "D", "text": "Syncope"}], "answer": "B", "answerText": "Absence seizure", "explanation": "19. ANSWER: B A. Wrong - This often causes a state of confusion with presentation of automatisms. B. CORRECT - The patient presents with typical manifestations of an absence seizure. C. Wrong - patient did not complain of any feeling of unease or intense fear D. Wrong - Patient does not report total loss of consciousness, only unresponsiveness without confusion. A. B. C. D."}, {"id": "q535", "pdfPage": 278, "originalNumber": "20", "question": "A 28-year-old woman was brought into the ER for repeated episodes of shaking. Witnesses report asynchronous thrashing movements lasting 5 minutes with closed eyes. There is no postictal confusion. Neurologic examination is 20. ANSWER: D", "options": [{"letter": "A", "text": "Wrong. This is typical of epileptic seizures, not PNES"}, {"letter": "B", "text": "Wrong. More common in true epileptic seizures, not PNES"}, {"letter": "C", "text": "Wrong. Highly specific for epileptic seizures, especially generalized tonic-clonic seizures."}, {"letter": "D", "text": "CORRECT. Scenario describes features typical of Psychogenic Nonepileptic Seizures (PNES), which are seizure-like events"}], "answer": "D", "answerText": "CORRECT. Scenario describes features typical of Psychogenic Nonepileptic Seizures (PNES), which are seizure-like events", "explanation": "20. ANSWER: D A. Wrong. This is typical of epileptic seizures, not PNES B. Wrong. More common in true epileptic seizures, not PNES C. Wrong. Highly specific for epileptic seizures, especially generalized tonic-clonic seizures. D. CORRECT. Scenario describes features typical of Psychogenic Nonepileptic Seizures (PNES), which are seizure-like events"}, {"id": "q536", "pdfPage": 278, "originalNumber": "10", "question": "normal, and there is no tongue biting or incontinence. What feature strongly supports psychogenic nonepileptic seizure?", "options": [{"letter": "A", "text": "Postictal seizure"}, {"letter": "B", "text": "Incontinence"}, {"letter": "C", "text": "Lateral tongue biting"}, {"letter": "D", "text": "Asynchronous thrashing limb movement with eyes closed caused by psychological factors rather than abnormal brain electrical activity. One of the features that characterize PNES is asynchronous thrashing limb movements with eye closed Source: https://my.clevelandclinic.org/health/diseases/24517-psychogenic-nonepilepti c-seizure-pnes"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q537", "pdfPage": 279, "originalNumber": "21", "question": "Which of the following historical features strongly supports a diagnosis of laryngopharyngeal reflux rather than chronic bronchitis?", "options": [{"letter": "A", "text": "Age over 40 years"}, {"letter": "B", "text": "20-pack year smoking history"}, {"letter": "C", "text": "Chronic cough lasting more than 8 weeks"}, {"letter": "D", "text": "Cough that worsens when lying down"}], "answer": "D", "answerText": "Cough that worsens when lying down", "explanation": "21. ANSWER: D A. Wrong. More associated with Chronic Bronchitis, which is common in older adults. B. Wrong. Strongly associated with Chronic Bronchitis, not reflux C. Wrong. Although this defines chronic cough, it does not distinguish between reflux and bronchitis. D. CORRECT. Laryngopharyngeal Reflux (LR) occurs when gastric acid reflux reaches the larynx and pharynx, irritating the upper airway. Symptoms often worsen when lying down because stomach contents reflux more easily in the supine position."}, {"id": "q538", "pdfPage": 280, "originalNumber": "22", "question": "Which physical examination findings further support reflux-related pathology?", "options": [{"letter": "A", "text": "Posterior pharyngeal cobblestoning"}, {"letter": "B", "text": "Intercostal retraction, vesicular breath sounds"}, {"letter": "C", "text": "Tachycardia with S3 gallop"}, {"letter": "D", "text": "Hyperactive bowel sound with dull tympanic"}], "answer": "A", "answerText": "Posterior pharyngeal cobblestoning", "explanation": "22. ANSWER: A A. CORRECT. In reflux-related pathology, clinicians should look for signs of erythema and edema of the posterior commissure as well as cobblestoning. B. Wrong. Sign of respiratory distress or associated with chronic lung disease C. Wrong. Suggestive of heart failure D. Wrong. Suggestive of gastrointestinal obstruction Source: https://www.ncbi.nlm.nih.gov/books/NBK519548/"}, {"id": "q539", "pdfPage": 280, "originalNumber": "23", "question": "Negative findings of patient that excludes TB", "options": [{"letter": "A", "text": "Absence of fever"}, {"letter": "B", "text": "Absence of hemoptysis"}, {"letter": "C", "text": "Absence of dyspnea"}, {"letter": "D", "text": "Absence of wheezing"}], "answer": "B", "answerText": "Absence of hemoptysis", "explanation": "23. ANSWER: B A. Wrong. TB may be afebrile, especially in early or latent cases. B. CORRECT. Hemoptysis (coughing up blood) is a more specific and classic feature of pulmonary TB. C. Wrong. Shortness of breath is not always present, especially in localized TB. D. Wrong. Wheezing is rare in TB and usually points to other lung diseases like asthma or COPD. Source: Harrison’s Internal Medicine, Chapter 178, page 1364"}, {"id": "q540", "pdfPage": 281, "originalNumber": "24", "question": "Which historical feature most strongly supports a diagnosis of malignancy over pulmonary tuberculosis?", "options": [{"letter": "A", "text": "Age over 40 years"}, {"letter": "B", "text": "20-pack year smoking history"}, {"letter": "C", "text": "Chronic cough lasting more than 8 weeks"}, {"letter": "D", "text": "Cough that worsens when lying down"}], "answer": "B", "answerText": "20-pack year smoking history", "explanation": "24. ANSWER: B A. Wrong. While the risk of cancer increases with age, TB also frequently affects older adults and can even present with more atypical or severe symptoms in the elderly. Age alone does not distinguish the two as strongly as a specific behavioral risk factor like heavy smoking. B. CORRECT. A 20-pack year smoking history is the most powerful indicator of malignancy (lung cancer) over pulmonary tuberculosis (TB) because tobacco smoke contains carcinogens that directly cause genetic damage to lung cells. Smoking is the leading cause of lung cancer, responsible for 80% to 90% of cases. C. Wrong. A persistent cough is a hallmark symptom of both lung cancer and pulmonary TB. TB guidelines specifically state that any cough lasting more than 2–3 weeks should trigger an evaluation for the disease. D. Wrong. This feature is more characteristic of gastroesophageal reflux disease (GERD) or heart failure rather than a specific indicator for lung cancer over TB. Both cancer and TB involve parenchymal lung irritation where the cough is often persistent regardless of position. Source: https://pmc.ncbi.nlm.nih.gov/articles/PMC6218365/#:~:text=We%20recomme nd%20that%20for%20patients,we%20recommend%20a%20tissue%20diagn osis."}, {"id": "q541", "pdfPage": 281, "originalNumber": "25", "question": "Which physical finding suggests malignancy rather than reflux", "options": [{"letter": "A", "text": "Hoarseness in the morning"}, {"letter": "B", "text": "Unilateral supraclavicular lymph nodes"}, {"letter": "C", "text": "Mild posterior pharyngeal erythema"}, {"letter": "D", "text": "N…"}], "answer": "B", "answerText": "Unilateral supraclavicular lymph nodes", "explanation": "25. ANSWER: B A. Is wrong because morning hoarseness is commonly seen in laryngopharyngeal reflux (LPR) or gastroesophageal reflux disease (GERD). Acid irritation during sleep can cause vocal cord inflammation, producing hoarseness upon waking. B. Is CORRECT because see ratio. C. Is wrong because this finding is nonspecific and frequently seen in reflux, viral pharyngitis, or mild irritation, not specifically malignancy. D. Is wrong because i feel it so wa nako gi memo"}, {"id": "q542", "pdfPage": 282, "originalNumber": "26", "question": "CASE 26-30: Marco is a 54 year old man with a 4 day history of fever, productive cough with yellowish sputum, chills, and right pleuritic chest pain. He reported progressive shortness of breath, especially with exertion. He denies recent hospitalizations, recent antibiotic use, and known tuberculosis exposure. He has a 15 pack year smoking history and no known chronic lung illnesses. Which historical feature most strongly suggests pneumonia rather than acute bronchitis?", "options": [{"letter": "A", "text": "Productive cough"}, {"letter": "B", "text": "Fever with chills"}, {"letter": "C", "text": "Smoking history"}, {"letter": "D", "text": "Symptoms lasting 4 days"}], "answer": "B", "answerText": "Fever with chills", "explanation": "26. ANSWER: B A. Productive cough can occur in both pneumonia and acute bronchitis. In bronchitis, patients often produce sputum due to inflammation of the bronchi, even without lung parenchymal infection. Therefore, this finding does not strongly distinguish pneumonia from bronchitis. B. This is more suggestive of pneumonia, particularly when the fever is high and accompanied by rigors or chills, which indicate a systemic bacterial infection. Pneumonia involves infection of the lung parenchyma, producing a stronger inflammatory response than bronchitis. Thus, this feature more strongly points toward pneumonia. C. Smoking is a risk factor for respiratory infections because it impairs mucociliary clearance and airway defense mechanisms. However, it predisposes to both bronchitis and pneumonia, so it does not help distinguish between the two conditions. D. The duration of symptoms alone is not diagnostic. Both acute bronchitis and pneumonia can present with symptoms lasting several days to a week. Therefore, the duration does not specifically suggest pneumonia over bronchitis. PNEUMONIA ACUTE BRONCHITIS Source: Physical Diagnosis, 13th Ed., Ch 15: Thorax and Lungs"}, {"id": "q543", "pdfPage": 282, "originalNumber": "14", "question": "susceptibility to community acquired pneumonia", "options": [{"letter": "A", "text": "Male"}, {"letter": "B", "text": "4 day history of symptoms"}, {"letter": "C", "text": "Hypertension"}, {"letter": "D", "text": "15 pack years of smoking"}], "answer": "D", "answerText": "15 pack years of smoking", "explanation": "27. ANSWER: D A. Is wrong because sex alone is not a major independent risk factor for CAP. B. Is wrong because this describes duration of illness, not a risk factor for developing pneumonia. C. Is wrong because hypertension itself does not significantly increase risk for CAP. D. Is CORRECT because smoking damages the respiratory epithelium and impairs mucociliary cle
