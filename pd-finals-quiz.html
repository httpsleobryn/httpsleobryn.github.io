arance, increasing susceptibility to infections like CAP. Bates Harrison’s"}, {"id": "q544", "pdfPage": 283, "originalNumber": "28", "question": "MOST distinguish community acquired pneumonia from acute decompensated heart failure", "options": [{"letter": "A", "text": "Dyspnea on exertion"}, {"letter": "B", "text": "Fever and chills"}, {"letter": "C", "text": "Orthopnea"}, {"letter": "D", "text": "Peripheral edema"}], "answer": "B", "answerText": "Fever and chills", "explanation": "28. ANSWER: B A. Is wrong because dyspnea on exertion can occur in both community-acquired pneumonia and acute decompensated heart failure, making it a poor distinguishing feature. B. Is CORRECT because fever and chills: These are hallmark symptoms of an acute infectious process like pneumonia. Specifically, bacterial pneumonias often present as an acute illness with chills and high fever. Conversely, heart failure is a clinical syndrome resulting from the heart's inability to move blood adequately, which leads to fluid retention rather than a primary infectious response C. Is wrong because orthopnea is classically associated with heart failure, but it may also occur in severe pulmonary diseases and therefore is not the most reliable distinguishing feature compared to fever. D. D. Is wrong because peripheral edema is commonly seen in heart failure due to fluid overload, but its absence does not rule out"}, {"id": "q545", "pdfPage": 284, "originalNumber": "29", "question": "Which of the following best differentiates pneumonia from pulmonary edema caused by heart failure", "options": [{"letter": "A", "text": "Bilateral crackles with inspiratory rales"}, {"letter": "B", "text": "Localized bronchial breath sound with tactile fremitus"}, {"letter": "C", "text": "Elevated jvp"}, {"letter": "D", "text": "Lower extremity edema"}], "answer": "B", "answerText": "Localized bronchial breath sound with tactile fremitus", "explanation": "29. ANSWER: B A. Is wrong because While heart failure crackles are often bilateral and dependent, crackles can also occur in pneumonia, so they are not as definitive a differentiator as localized bronchial sounds and increased fremitus B. Is CORRECT because In lobar pneumonia (consolidation), the air-filled alveoli are replaced by fluid and blood cells. This solid tissue transmits sound more effectively, leading to ￼bronchial breath sounds and increased tactile fremitus over the involved area. C. Is wrong because Elevated JVP is a clinical sign of elevated right-sided heart pressures, which can occur in heart failure D. Is wrong because Like elevated JVP, peripheral (lower extremity) edema is a sign of elevated right-sided heart pressures associated with heart failure."}, {"id": "q546", "pdfPage": 285, "originalNumber": "30", "question": "How can you assess the severity of dyspnea?", "options": [{"letter": "A", "text": "Does it come with pain?"}, {"letter": "B", "text": "Does it affect your daily activities?"}, {"letter": "C", "text": "Does it come with seasonal allergies?"}, {"letter": "D", "text": "Do you have any travel history?"}], "answer": "B", "answerText": "Does it affect your daily activities?", "explanation": "30. ANSWER: B A. Is wrong. Tho it might be but is more towards knowing other associated s/sx B. Is CORRECT see ratio. CORRECT - There is no absolute scale for assessing dyspnea, but assessment should focus on its effects on the patient’s daily activities. C. Is wrong because obviously not hahah. Wrong - while seasonal allergies may cause lung-related symptoms, it is not used to assess severity. D. Is wrong because samot hahaha. Wrong - Travel history may be important in the diagnosis of the patient, but it is not used to assess severity of dyspnea. Bates pp. 766"}, {"id": "q547", "pdfPage": 285, "originalNumber": "31", "question": "Which history finding suggests an alternative finding such as pulmonary embolism instead of pneumonia", "options": [{"letter": "A", "text": "Gradual onset of cough"}, {"letter": "B", "text": "Fever and chills"}, {"letter": "C", "text": "Sudden onset of pleuritic pain without cough"}, {"letter": "D", "text": "C…"}], "answer": "C", "answerText": "Sudden onset of pleuritic pain without cough", "explanation": "31. ANSWER: C A. Is wrong because it is typical of pneumonia, which usually develops over hours to days due to lung infection. B. Is wrong because these are classic infectious symptoms, strongly suggesting pneumonia or other infections, not pulmonary embolism. C. Is CORRECT because see ratio D. Is wrong because cannot recall but trust me bro it’s wrong Bate’s; pg 334"}, {"id": "q548", "pdfPage": 285, "originalNumber": "32", "question": "What is the best way to assess sputum characteristics?", "options": [{"letter": "A", "text": "Use a multiple choice question - teaspoon, tablespoon, et al"}, {"letter": "B", "text": "Ask whether sputum occurs more in the morning or evening"}, {"letter": "C", "text": "Send sputum directly for Gram stain or culture"}, {"letter": "D", "text": "Ask patient to cough into the tissue and inspect sputum"}], "answer": "D", "answerText": "Ask patient to cough into the tissue and inspect sputum", "explanation": "32. ANSWER: D A. is wrong B. is wrong C. is wrong D. is CORRECT because asking the patient to cough into a tissue is the best way to inspect sputum characteristics"}, {"id": "q549", "pdfPage": 285, "originalNumber": "33", "question": "Technique to quantify volume of sputum or hemoptysis 33. ANSWER: A 17", "options": [{"letter": "A", "text": "Use a multiple choice question - teaspoon, tablespoon, et al"}, {"letter": "B", "text": "Ask whether sputum occurs more in the morning or evening"}, {"letter": "C", "text": "Send sputum directly for Gram stain or culture"}, {"letter": "D", "text": "Ask patient to cough into the tissue and inspect sputum"}], "answer": "A", "answerText": "Use a multiple choice question - teaspoon, tablespoon, et al", "explanation": "A. Is CORRECT because asking multiple choice questions is the best way to quantify sputum volume B. Is wrong C. Is wrong D. Is wrong"}, {"id": "q550", "pdfPage": 286, "originalNumber": "34", "question": "Differentials for a cough of more than 8 weeks, except?", "options": [{"letter": "A", "text": "Postnasal drip"}, {"letter": "B", "text": "Bacterial sinusitis"}, {"letter": "C", "text": "Asthma"}, {"letter": "D", "text": "Bronchiectasis"}], "answer": "B", "answerText": "Bacterial sinusitis", "explanation": "34. ANSWER: B A. Is wrong because it is a common cause. Now called Upper Airway Cough Syndrome (UACS) and one of the most frequent causes of chronic cough B. Is CORRECT because usually causes acute cough and duration typically <4 weeks C. Is wrong because a common cause especially cough-variant asthma and may present with chronic cough without wheezing D. Is wrong because it is a possible cause that produces chronic productive cough and often with large volumes of sputum. Bates 12th ed Ch8 Thorax and Lungs pg311"}, {"id": "q551", "pdfPage": 286, "originalNumber": "35", "question": "Which of the following symptoms of dyspnea indicates severe disease requiring \"urgent management\"?", "options": [{"letter": "A", "text": "Dyspnea on heavy exertion"}, {"letter": "B", "text": "Dyspnea while lying flat"}, {"letter": "C", "text": "Dyspnea at rest"}, {"letter": "D", "text": "Dyspnea on seasonal changes"}], "answer": "C", "answerText": "Dyspnea at rest", "explanation": "35. ANSWER: C A. Is wrong because this usually represents mild dyspnea and may occur in early cardiopulmonary disease or even in normal individuals with poor conditioning. It does not necessarily indicate severe disease or the need for urgent management. B. Is wrong because this describes orthopnea, which is commonly associated with left-sided heart failure. Although clinically important, it usually develops gradually and does not always indicate an immediate life-threatening condition requiring urgent management. C. Is CORRECT because the presence of dyspnea without any exertion indicates markedly impaired cardiopulmonary reserve. This finding often occurs in severe respiratory or cardiac disease (e.g., acute heart failure, severe asthma exacerbation, pulmonary edema, pulmonary embolism) and requires urgent evaluation and management. D. Is wrong because this pattern is more suggestive of allergic or environmental triggers, commonly seen in asthma or allergic rhinitis, and does not necessarily signify severe or immediately"}, {"id": "q552", "pdfPage": 287, "originalNumber": "1", "question": "day of nausea and multiple episodes of vomiting after eating street food. Several hours later he develops diffuse, crampy abdominal pain and watery diarrhea. On examination he appears to be mildly dehydrated. His abdomen is soft with diffuse tenderness and hyperactive bowel sounds. No guarding and rebound. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Appendicitis"}, {"letter": "B", "text": "Gastroenteritis"}, {"letter": "C", "text": "Bowel obstruction"}, {"letter": "D", "text": "Ulcer perforation"}], "answer": "B", "answerText": "Gastroenteritis", "explanation": "36. ANSWER: B A. Is wrong because appendicitis typically presents with pain migrating to the right lower quadrant and the presence of peritoneal signs like guarding or rebound tenderness B. Is correct because the acute onset of vomiting after eating, watery diarrhea, diffuse crampy pain, and hyperactive bowel sounds are hallmark findings for this condition C. Is wrong because intestinal obstruction typically presents with a lack of bowel movements (obstipation) and a \"silent\" abdomen rather than watery diarrhea and hyperactive sounds D. Is wrong because a perforated ulcer causes peritonitis, which is characterized by a rigid, board-like abdomen and guarding, findings absent in this patient"}, {"id": "q553", "pdfPage": 287, "originalNumber": "19", "question": "has a temperature of 38°C. On physical examination, there is positive rebound tenderness at McBurney’s point. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Gastroenteritis"}, {"letter": "B", "text": "Appendicitis"}, {"letter": "C", "text": "Bowel obstruction"}, {"letter": "D", "text": "Cholecystolithiasis RLQ pain with McBurney’s point tenderness."}], "answer": "B", "answerText": "Appendicitis", "explanation": "B. Is CORRECT because the classic presentation includes initial periumbilical pain that later localizes to the RLQ, fever, anorexia, and rebound tenderness at McBurney’s point, which are hallmark signs of acute appendicitis. C. Is wrong because it typically presents with abdominal distention, vomiting, inability to pass stool or gas, and diffuse abdominal pain, rather than localized RLQ tenderness. D. Is wrong because gallstones usually cause right upper quadrant (RUQ) pain, often after fatty meals, and may radiate to the right shoulder or back, not the RLQ. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Ch. 19 Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Ch. 19"}, {"id": "q554", "pdfPage": 288, "originalNumber": "38", "question": "A 58 year old man presents with severe RUQ pain, fever (39C), and jaundice. He appears ill and hypotensive. On exam, he has RUQ tenderness, (+) murphy’s sign and scleral icterus. This clinical picture strongly suggests progression to?", "options": [{"letter": "A", "text": "Simple cholelithiasis"}, {"letter": "B", "text": "Acute appendicitis"}, {"letter": "C", "text": "Ascending cholangitis"}, {"letter": "D", "text": "Pancreatitis"}], "answer": "C", "answerText": "Ascending cholangitis", "explanation": "38. ANSWER: C A. Is wrong because asymptomatic gallstones or biliary colic cause intermittent pain without fever, jaundice, systemic illness, or hypotension. B. Is wrong because it is typically right lower quadrant pain/migration from periumbilical, with different signs (e.g., rebound, Rovsing's); no jaundice or RUQ focus. C. Is CORRECT because the patient presents with Charcot’s triad (fever, jaundice, and right upper quadrant pain) together with hypotension, which strongly suggests acute ascending cholangitis. Although cholecystitis can cause fever and RUQ pain with a positive Murphy’s sign, the presence of jaundice indicates obstruction of the common bile duct (gallstones), a key feature of cholangitis The positive Murphy’s sign may occur because the 20 obstructing stone often causes concurrent or secondary inflammation and distension of the gallbladder (cholecystitis-like changes) due to obstructed bile flow and bacterial ascent/back pressure. D. Is wrong because while it can cause severe abdominal pain, jaundice is less common (unless due to a stone), and the clinical picture is classic for bile duct obstruction/infection. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Ch. 19 coreem.net"}, {"id": "q555", "pdfPage": 289, "originalNumber": "39", "question": "A 65 y/o had severe abdominal pain with abdominal cramps. No defecation and flatus. Noted tinkling bowel sound.", "options": [{"letter": "A", "text": "Paralytic ileus"}, {"letter": "B", "text": "Early bowel obstruction"}, {"letter": "C", "text": "Gastroenteritis"}, {"letter": "D", "text": "Perforated ulcer"}], "answer": "B", "answerText": "Early bowel obstruction", "explanation": "39. ANSWER: B A. Is wrong because paralytic ileus usually present with absent or silent bowel sounds since the bowel is \"lazy\" rather than blocked and it usually follows surgery or heavy medication B. Is CORRECT because early bowel obstruction usually presents with high pitched “musical” bowel sounds and the patient is not able to defecate or pass flatus C. Is wrong because gastroenteritis presents with diarrhea and vomiting; bowel sounds are hyperactive but generally gurgling rather than tinkling sounds D. Is wrong because perforated ulcer presents with \"board-like\" abdominal rigidity and absent bowel sounds due to peritonitis; pain is sudden and constant rather than crampy"}, {"id": "q556", "pdfPage": 290, "originalNumber": "40", "question": "A 52 year old man with history of peptic ulcers disease suddenly develops severe epigastric pain. Within hours, the pain becomes generalized. On examination, the abdomen is rigid and board-like with shallow respirations. What best explain this findings?", "options": [{"letter": "A", "text": "Inflammation alone"}, {"letter": "B", "text": "Visceral hypersensitivity"}, {"letter": "C", "text": "Peritonitis from peptic ulcer perforations"}, {"letter": "D", "text": "Biliary colic"}], "answer": "C", "answerText": "Peritonitis from peptic ulcer perforations", "explanation": "40. ANSWER: C A. Is wrong because inflammation alone does not usually cause board-like abdomen B. Is wrong because this produces pain but not rigidity or guarding C. Is CORRECT because it explains the diffuse pain, rigidity, and guarding of the patient. Epigastric pain is typical of perforated peptic ulcer and the diffusion of the pain resulted from gastric/duodenal contents spilling into peritoneal cavity causing irritation and manifests as guarding or rigidity D. Is wrong because this causes episodic RUQ without rigid abdomen"}, {"id": "q557", "pdfPage": 290, "originalNumber": "41", "question": "21/M with suspected appendicitis. During examination, patient noted increased pain during extension of right hip when lying on left side. What muscle is irritated?", "options": [{"letter": "A", "text": "Obturator muscle"}, {"letter": "B", "text": "Psoas muscle"}, {"letter": "C", "text": "Diaphragm"}, {"letter": "D", "text": "Rectus muscle"}], "answer": "B", "answerText": "Psoas muscle", "explanation": "41. ANSWER: B A. Is wrong because the obturator sign internally rotates the leg at the hip, stretching the obturator muscle. B. Is CORRECT because the psoas sign extends the patient’s right leg at the hip, contracting the psoas muscle upon flexion and stretching it upon extension. C. Is wrong because the diaphragm is not stretched or irritated upon doing the maneuver described. D. Is wrong because testing the rectus muscles is done through assessing either leg raising or curl ups."}, {"id": "q558", "pdfPage": 291, "originalNumber": "42", "question": "A 70-year-old patient presents with abdominal distention and persistent vomiting. The bowel sounds were initially hyperactive but now are absent. The abdomen remains distended and tender. This progression is most consistent with which of the following?", "options": [{"letter": "A", "text": "Early obstruction"}, {"letter": "B", "text": "Late obstruction or Ileus"}, {"letter": "C", "text": "Gastroenteritis"}, {"letter": "D", "text": "Appendicitis"}], "answer": "B", "answerText": "Late obstruction or Ileus", "explanation": "42. ANSWER: B A. Is wrong because intestines increase peristalsis to push contents past the obstruction. Does NOT match the later absence of bowel sounds in the question. B. Is CORRECT because Bowel becomes fatigued/paralyzed after prolonged obstruction → peristalsis stops. Hyperactive → silent abdomen. C. Is wrong because increased intestinal motility due to infection. No progression to absent bowel sounds typically. D. Local inflammation of appendix. Does not cause progressive hyperactive → absent bowel sounds with distention. Source: Bate’s 12th, Chapter 11, page 501"}, {"id": "q559", "pdfPage": 291, "originalNumber": "43", "question": "48-year-old woman presents with severe abdominal pain. Her abdomen is rigid with rebound tenderness and involuntary guarding. These findings strongly indicate:", "options": [{"letter": "A", "text": "Visceral pain"}, {"letter": "B", "text": "Parietal pain"}, {"letter": "C", "text": "Referred pain"}, {"letter": "D", "text": "Functional pain"}], "answer": "B", "answerText": "Parietal pain", "explanation": "43. ANSWER: B A. Is wrong because originates from organs and is usually vague, dull, and not accompanied by abdominal rigidity. B. Is CORRECT because the combination of severe abdominal pain, a rigid abdomen, and rebound tenderness, are classic indicators of peritonitis or peritoneal inflammation, which causes parietal pain/ C. Is wrong because referred pain is pain felt more in distant sites which are innervated at the same spinal levels as the disordered structures, D. Is wrong because functional pain is a persistent or recurring abdominal pain that cannot be explained by a structural, chemical, or infectious disease, even after a thorough medical investigation"}, {"id": "q560", "pdfPage": 292, "originalNumber": "44", "question": "A 50-year old patient with chronic NSAID use reports epigastric pain for weeks that improves after meals. The patient's history is highly suggestive of:", "options": [{"letter": "A", "text": "Peptic Ulcer"}, {"letter": "B", "text": "Gastritis"}, {"letter": "C", "text": "Ulcer perforation"}, {"letter": "D", "text": "Irritable bowel syndrome"}], "answer": "C", "answerText": "Ulcer perforation", "explanation": "44. ANSWER: C A. Is CORRECT because long-term use of NSAIDs may cause onset of abdominal pain by damaging the lining of your GIT epithelium B. Is wrong because it Gastritis is known to cause or worsen pain with eating C. Is wrong because ulcer perforation refers to an acute, sudden, severe and constant pain that needs surgical emergency. D. Is wrong because IBS is manifested with lower abdominal pain, not epigastric pain, affecting changes in bowel habits and usually relieved by defecation, not food. Source: Bate's 12th ed., Chapter 19"}, {"id": "q561", "pdfPage": 292, "originalNumber": "45", "question": "17 year old boy presents with abdominal pain, nausea and low-grade fever. On exam, has localized RLQ with rebound tenderness. What findings differentiate appendicitis and gastroenteritis?", "options": [{"letter": "A", "text": "Fever"}, {"letter": "B", "text": "Hyperactive bowel"}, {"letter": "C", "text": "RLQ localized"}], "answer": "C", "answerText": "RLQ localized", "explanation": "45. ANSWER: C A. Is wrong because is more typical in gastroenteritis B. Is wrong because is more typical in gastroenteritis C. Is CORRECT because RLQ Tenderness in the McBurney’s point is typical of appendicitis D. Is wrong because vomiting is a non specific symptom 24 tenderness D. Vomiting Source: Bates ch 19"}, {"id": "q562", "pdfPage": 293, "originalNumber": "46", "question": "During evaluation of a patient with acute abdominal pain, you assess for rebound tenderness. You press slowly and deeply into the abdomen, then quickly release your hand. Patient reported sharp pain upon release. This finding is known as:", "options": [{"letter": "A", "text": "Guarding"}, {"letter": "B", "text": "Percussion tenderness"}, {"letter": "C", "text": "Rebound tenderness"}, {"letter": "D", "text": "Rigidity"}], "answer": "C", "answerText": "Rebound tenderness", "explanation": "46. ANSWER: C A. Is wrong because it is voluntary tensing of abdominal muscles during palpation due to pain. B. Is wrong because pain occurs when tapping the abdomen, not when releasing pressure. C. Is CORRECT because pain occurs when the examiner quickly releases deep pressure from the abdomen, suggesting peritoneal irritation. D. Is wrong because it is involuntary stiffening of abdominal muscles due to peritoneal inflammation, not pain on release. Source: Bates ch"}, {"id": "q563", "pdfPage": 293, "originalNumber": "47", "question": "In acute gastroenteritis, dehydration is assessed by checking", "options": [{"letter": "A", "text": "Murphy's sign"}, {"letter": "B", "text": "Skin turgor and mucous membranes"}, {"letter": "C", "text": "Psoas sign"}], "answer": "B", "answerText": "Skin turgor and mucous membranes", "explanation": "47. ANSWER: B A. Is wrong because this would indicate an acute cholecystitis. B. Is CORRECT - Skin turgor test is delayed in dehydration causing “tenting” of the skin and mucous membranes can be quickly assessed if dry or moist. C. Is wrong because this would suggest an irritated psoas muscle 25 D. Rebound tenderness due to an inflamed retrocecal appendix. D. Is wrong because this would indicate a possible appendicitis. Source: Bate’s 13th ed. Chap 25, p. 1626 Source: Hoxha, T., Xhelili, L., Azemi, M., Avdiu, M., Ismaili-Jaha, V., Efendija-Beqa, U., & Grajcevci-Uka, V. (2015). Performance of clinical signs in the diagnosis of dehydration in children with acute gastroenteritis. Medical archives (Sarajevo, Bosnia and Herzegovina), 69(1), 10–12. https://doi.org/10.5455/medarh.2015.69.10-12"}, {"id": "q564", "pdfPage": 294, "originalNumber": "48", "question": "A positive Rovsing Sign is Elicited when", "options": [{"letter": "A", "text": "RLQ pain occurs when palpating LLQ"}, {"letter": "B", "text": "RLQ pain in right hip extension"}, {"letter": "C", "text": "Pain…"}, {"letter": "D", "text": "Pain on deep inspiration"}], "answer": "A", "answerText": "RLQ pain occurs when palpating LLQ", "explanation": "48. ANSWER: A A. A is CORRECT because it defines the phenomenon of indirect tenderness. When a clinician applies deep pressure to the Left Lower Quadrant (LLQ), it displaces intraluminal gas and peritoneal contents toward the Right Lower Quadrant (RLQ). In the presence of an inflamed appendix, this shift increases pressure or causes movement of the parietal peritoneum in the RLQ, eliciting pain at McBurney’s point. B. B is wrong because this describes the Psoas Sign. Pain during right hip extension suggests that an inflamed appendix is located in a retrocecal position, where it lies directly against the iliopsoas muscle. Extending the hip stretches the muscle, irritating the adjacent appendix. C. C is wrong because this describes the Obturator Sign. Pain elicited by internal rotation of the flexed right hip suggests that the inflamed appendix is in a pelvic position, lying in contact with the internal obturator muscle. D. D is wrong because this describes Murphy’s Sign. A cessation of inspiration (a \"catch\" in breath) during deep palpation of the Right Upper Quadrant (RUQ) is highly suggestive of acute cholecystitis (gallbladder inflammation), not appendicitis. Source: Bates. Chapter 11. Page 486"}, {"id": "q565", "pdfPage": 294, "originalNumber": "49", "question": "Obstipation refers to:", "options": [{"letter": "A", "text": "Severe vomiting"}, {"letter": "B", "text": "Inability to pass stool or flatus"}, {"letter": "C", "text": "Painful defecation"}, {"letter": "D", "text": "Rectal Bleeding"}], "answer": "B", "answerText": "Inability to pass stool or flatus", "explanation": "49. ANSWER: B A. Is wrong because although vomiting may occur in bowel obstruction but it is not the definition of obstipation. B. Is CORRECT because Obstipation is the complete and severe form of constipation in which the patient cannot pass stool or gas (flatus). C. Is wrong because this describes dyschezia or conditions like 26 anal fissure or hemorrhoids, not obstipation. D. Is wrong because this refers to hematochezia or rectal bleeding, unrelated to the definition of obstipation. Source: Bates Chapter 11 pg. 460 Source: https://www.merriam-webster.com/dictionary/obstinate#medicalDictionary"}, {"id": "q566", "pdfPage": 295, "originalNumber": "50", "question": "A patient with abdominal pain prefers to lie still and avoid movements. This behavior is mostly suggestive of:", "options": [{"letter": "A", "text": "Renal colic"}, {"letter": "B", "text": "Gastroenteritis"}, {"letter": "C", "text": "Peritonitis"}, {"letter": "D", "text": "Irritable bowel syndrome"}], "answer": "C", "answerText": "Peritonitis", "explanation": "50. ANSWER: C A. Is wrong because patients with renal colic tend to move around frequently trying to find a comfortable position. B. Is wrong because gastroenteritis is not manifested with guarding or avoidance of movements. C. Is CORRECT because patients with peritonitis manifest with parietal pain where they prefer to remain still since movement or coughing typically aggravates pain. D. Is wrong because IBS is manifested with lower abdominal pain affecting changes in bowel habits and usually relieved by defecation. Source: Bates 13th ed. Chap 19, p. 1025"}, {"id": "q567", "pdfPage": 296, "originalNumber": "1", "question": "Which combination of findings MOST strongly indicates hemodynamic instability from severe anemia due to upper gastrointestinal bleeding?", "options": [{"letter": "A", "text": "Low oxygen saturation and hypothermia"}, {"letter": "B", "text": "Confusion and restlessness and tachypnea"}, {"letter": "C", "text": "Hypotension, tachypnea, and tachycardia"}, {"letter": "D", "text": "Presence of hematemesis and tachycardia"}], "answer": "C", "answerText": "Hypotension, tachypnea, and tachycardia", "explanation": "1. ANSWER: C A. Is wrong because these findings are nonspecific and are not the classic indicators of hypovolemic instability from acute blood loss. B. Is wrong because these findings can occur in hypovolemia and decreased cerebral perfusion, but they are later and less specific manifestations of shock compared with the classic vital sign changes of hypotension and compensatory tachycardia. C. Is CORRECT because severe upper GI bleeding causes hypovolemia leading to compensatory tachycardia and tachypnea with hypotension indicating significant circulatory compromise. D. Is wrong because hematemesis confirms upper GI bleeding but does not alone establish severe hemodynamic instability without hypotension. Source: https://www.cdc.gov/dengue/training/cme/ccm/page68151.html"}, {"id": "q568", "pdfPage": 297, "originalNumber": "2", "question": "Which bedside examination maneuver is MOST useful for detecting volume depletion due to upper GI bleeding?", "options": [{"letter": "A", "text": "Orthostatic vital signs"}, {"letter": "B", "text": "Positive murphy sign"}, {"letter": "C", "text": "Abdominal tenderness and shifting dullness"}, {"letter": "D", "text": "Positive Tinel test"}], "answer": "A", "answerText": "Orthostatic vital signs", "explanation": "2. ANSWER: A A. Is CORRECT because orthostatic vitals a practical tool for identifying clinically significant hypovolemia, including from moderate to severe blood loss (e.g., upper GI bleeding). B. Is wrong because Murphy sign evaluates gallbladder inflammation (cholecystitis). C. Is wrong because abdominal tenderness and shifting dullness suggest ascites, not acute blood loss. D. Is wrong because Tinel test assesses nerve irritation (e.g., carpal tunnel syndrome). Source: Bates Clinical Guide to Physical Examination 13th Ed."}, {"id": "q569", "pdfPage": 297, "originalNumber": "3", "question": "Old person suspected of infection but hypothermic… 3. ANSWER: A Verified 2", "options": [{"letter": "A", "text": "Age related response"}, {"letter": "B", "text": "Cerebellar hypoperfusion"}, {"letter": "C", "text": "Sympathetic response"}, {"letter": "D", "text": "unrecalled"}], "answer": "A", "answerText": "Age related response", "explanation": "A. CORRECT. Older adults often have blunted febrile responses and may become hypothermic during infection. B. Wrong. Would cause neurologic symptoms such as ataxia, not hypothermia in infection. C. Wrong. Typically increases heart rate and peripheral vasoconstriction rather than explaining infection-related hypothermia. D. Unrecalled,"}, {"id": "q570", "pdfPage": 298, "originalNumber": "4", "question": "During cranial nerve examination, the patient’s pupils are equal but react sluggishly to light. What explains this?", "options": [{"letter": "A", "text": "Normal reaction due to aging"}, {"letter": "B", "text": "I…"}, {"letter": "C", "text": "Diffuse cerebral dysfunction"}, {"letter": "D", "text": "Peripheral neuropathy"}], "answer": "A", "answerText": "Normal reaction due to aging", "explanation": "4. ANSWER: A A. CORRECT - aging commonly causes sluggish pupillary light reflexes. B. Wrong C. Wrong- usually causes altered consciousness or abnormal pupil size/reactivity. D. affects peripheral nerves, not typically the pupillary reflex alone. Case for #5-#9:A 6-year old boy was brought to the clinic due to frequent watery diarrhea and vomiting for 2 days. His mother noted poor oral intake and decreased urination. On physical examination, child was lethargic, had dry lips, and sunken eyes. Vital signs: Temp 38.4 C BP - 84/56 mmHg HR - 132 bpm RR - 30 bpm"}, {"id": "q571", "pdfPage": 299, "originalNumber": "6", "question": "The combination of hypotension and tachycardia in this child MOST likely suggests:", "options": [{"letter": "A", "text": "Systemic viral infection"}, {"letter": "B", "text": "Primary cardiac disease on top of dehydration"}, {"letter": "C", "text": "Cerebral hypoperfusion due to dehydration"}, {"letter": "D", "text": "Decompensated hypovolemic shock"}], "answer": "D", "answerText": "Decompensated hypovolemic shock", "explanation": "6. ANSWER: D A. Is wrong because it does not explain the hypotension unless shock develops B. Is wrong because the patient does not have congenital or structural heart disease mentioned C. Is wrong because it is a consequence of shock D. Is CORRECT because the child experiences heavy fluid loss from diarrhea and vomiting. Tachycardia is a compensatory response to try and maintain the cardiac output. Hypotension is due to shock being in the late or decompensated stage. Nelson’s Textbook of Pediatrics Chapter 70 page 518"}, {"id": "q572", "pdfPage": 299, "originalNumber": "7", "question": "Which vital sign should be MOST closely monitored to assess worsening of dehydration and progression to shock?", "options": [{"letter": "A", "text": "Temperature"}, {"letter": "B", "text": "Blood pressure"}, {"letter": "C", "text": "Respiratory rate"}, {"letter": "D", "text": "O2 sat"}], "answer": "C", "answerText": "Respiratory rate", "explanation": "7. ANSWER: C A. Is wrong because Temperature may indicate infection or environmental causes but does not directly reflect circulatory collapse from dehydration B. Is correct because The reference specifically mentions that worsening hypovolemia eventually leads to hypotension, indicating progression to shock. C. Is wrong because Tachypnea can occur as a compensatory response, but it is less specific for monitoring progression of hypovolemic shock. D. Is wrong because Oxygen saturation may remain normal early because oxygenation is preserved; the main problem is decreased circulating volume and tissue perfusion."}, {"id": "q573", "pdfPage": 300, "originalNumber": "8", "question": "During assessment the child opens his eyes only when called loudly and answers slowly to questions. This mental status examination finding likely suggests?", "options": [{"letter": "A", "text": "Normal behavioral change"}, {"letter": "B", "text": "Mild anxiety due to illness"}, {"letter": "C", "text": "Altered level of consciousness"}, {"letter": "D", "text": "Primary psychiatric disorder"}], "answer": "C", "answerText": "Altered level of consciousness", "explanation": "8. ANSWER: C A. Is wrong because normal behavior does not include a depressed physiological response to the environment. If a child does not open their eyes until your voice is louder, they are moving away from \"behavioral\" and toward \"neurological\" impairment. B. Is wrong because anxiety might cause a child to refuse to speak or hide under a blanket, but it does not cause the physiological \"slowness\" or the need for loud vocal stimulation to achieve eye-opening. C. Is CORRECT because requiring a \"loud call\" to open eyes proves the child is not alert but is instead responding only to verbal stimuli.Slow responses indicate depressed cerebral function, which is a medical sign of brain distress rather than a behavioral or emotional choice. D. Is wrong because while some psychiatric states like catatonia involve decreased responsiveness, they are rare in general pediatric assessments and are diagnosed only after medical/neurological causes are ruled out. This describes an obtunded state, which is a medical emergency until proven otherwise. Source: Bates Clinical Guide to Physical Examination 13th Ed. Ch.24 p.1530"}, {"id": "q574", "pdfPage": 300, "originalNumber": "9", "question": "Which mental status change most strongly indicates worsening of clinical condition of the child.", "options": [{"letter": "A", "text": "Increased thirst"}, {"letter": "B", "text": "Irritability during examination"}, {"letter": "C", "text": "Excessive crying"}], "answer": null, "answerText": "", "explanation": "9. ANSWER: D A. Is wrong. While increased thirst is a sign of dehydration, it is a physiological drive and a behavioral response, not an altered mental status indicating imminent neurological or clinical collapse. B. Is wrong. Irritability or fussiness when being handled or examined by a stranger is a normal, age-appropriate developmental 5 during IV insertion D. Difficult to arouse from sleep response in infants and young children. Continuous, inconsolable irritability would be concerning, but episodic irritability during an exam is expected. C. Is wrong. Crying, screaming, and resisting a painful procedure like an intravenous line insertion is a normal, healthy, and expected physiological and behavioral response for a child. A lack of response to pain would be the actual red flag. D. Is CORRECT. This indicates lethargy or a depressed level of consciousness, which is a general danger sign in pediatrics. Source: Bates 13th Ed., Ch9, p410"}, {"id": "q575", "pdfPage": 301, "originalNumber": "10", "question": "What is the most likely cause of the fever of the patient?", "options": [{"letter": "A", "text": "Old age"}, {"letter": "B", "text": "Renal failure"}, {"letter": "C", "text": "Glucocorticoids"}, {"letter": "D", "text": "All of the above"}], "answer": "C", "answerText": "Glucocorticoids", "explanation": "10. ANSWER: C A. Is wrong because renal failure and glucocorticoids also contribute to the cause of fever. Old age can cause fever due to its weaker immune response and decreased thermoregulatory response B. Is wrong because old age and glucocorticoids also contribute to the cause of fever. Since patient also is immunocompromised C. Is wrong because renal failure and old age also contribute to the cause of fever. Glucocorticoids suppress inflammatory cytokines and fever response D. Is CORRECT because all choices contribute to the cause of fever"}, {"id": "q576", "pdfPage": 302, "originalNumber": "11", "question": "Based on the history of the patient, what is the MOST reliable in assessing the patient with possible infection?", "options": [{"letter": "A", "text": "Presence of chills"}, {"letter": "B", "text": "Absence of fever sensation"}, {"letter": "C", "text": "Acute change in mental status"}, {"letter": "D", "text": "A and C"}], "answer": "D", "answerText": "A and C", "explanation": "11. ANSWER: D A. A. is INCORRECT because chills alone are suggestive but not sufficient as the most reliable indicator of infection. B. B. is INCORRECT because elderly and immunocompromised patients may have serious infection even without fever sensation. C. C. is INCORRECT because acute change in mental status is an important manifestation of infection in older adults, but it is not the only reliable clue in this patient. D. D. is CORRECT because both recurrent chills/shaking chills suggest systemic bacteremia, and acute mental status change is a reliable indicator of infection in elderly patients. Unsure"}, {"id": "q577", "pdfPage": 302, "originalNumber": "12", "question": "Which historical feature MOST strongly supports a diagnosis for transient ischemic stroke?", "options": [{"letter": "A", "text": "Gradual onset of symptom with sudden onset of neurological deficit"}, {"letter": "B", "text": "Sudden onset focal neurological deficit with complete resolution within 24 hours"}, {"letter": "C", "text": "Headache followed by confusion lasting several hours"}, {"letter": "D", "text": "A and C"}], "answer": "B", "answerText": "Sudden onset focal neurological deficit with complete resolution within 24 hours", "explanation": "12. ANSWER: B A. Is wrong because transient ischemic attack typically presents with a sudden focal neurologic deficit rather than gradual symptom progression. B. Is CORRECT because TIA classically presents as sudden-onset focal neurologic deficits that completely resolve within 24 hours without permanent infarction. C. Is wrong because this presentation is more suggestive of migraine, encephalopathy, or other neurologic conditions rather than TIA. D. Is wrong because neither gradual symptom onset nor isolated headache with confusion are classic features of transient ischemic attack."}, {"id": "q578", "pdfPage": 303, "originalNumber": "13", "question": "Which part of the history is most important in identifying a patient’s risk for cerebrovascular event", "options": [{"letter": "A", "text": "History of smoking"}, {"letter": "B", "text": "High stress occupation"}, {"letter": "C", "text": "History of hypertension and diabetes"}, {"letter": "D", "text": "A and C"}], "answer": "D", "answerText": "A and C", "explanation": "13. ANSWER: D A. Is wrong because although it is a major risk factor, it is not the only most important factor in the choices. B. Is wrong because stress is only an indirect contributor to cerebrovascular disease. C. Is wrong because hypertension and diabetes is wrong because these are major risk factors, but smoking is also an important contributor. D. CORRECT because smoking, hypertension, and diabetes are all major established risk factors for cerebrovascular events."}, {"id": "q579", "pdfPage": 304, "originalNumber": "14", "question": "At the time of examination, patient is asymptomatic. In Bates, what is the most appropriate neurologic finding in TIA", "options": [{"letter": "A", "text": "Waxing and waning unilateral weakness"}, {"letter": "B", "text": "Normal neurologic exam"}, {"letter": "C", "text": "Residual hyperreflexia of all limbs"}, {"letter": "D", "text": "Minimal cranial nerve deficit"}], "answer": "C", "answerText": "Residual hyperreflexia of all limbs", "explanation": "14. ANSWER: C A. Is wrong because waxing and waning unilateral weakness suggests an ongoing or fluctuating neurologic deficit, which is not expected once a TIA has resolved. B. Is CORRECT because by definition, TIA symptoms are temporary and typically leave no persistent neurologic deficits, so the exam is usually normal if the patient is asymptomatic. C. Is wrong because residual hyperreflexia indicates an upper motor neuron lesion from prior or persistent CNS damage, more suggestive of stroke than TIA. D. Is wrong because minimal cranial nerve deficits imply a remaining focal neurologic abnormality, which should not persist in a resolved TIA. Source: Bates 12th Ed., Ch 17, p712"}, {"id": "q580", "pdfPage": 304, "originalNumber": "15", "question": "Case for 15-18 A 74yo man was brought to the ER by his wife. She reports that 2 hours ago, the man suddenly developed slurred speech, left side drooping of face, and weakness on both arms and feet. Medical history of hypertension and diabetes mellitus PE: BP: 170/100mmHg Pulse: 96bpm, irregular Neuro: left side facial droop, hemiparesis, expressive aphasia Question: According to JNC8, the patient blood pressure at admission is:", "options": [{"letter": "A", "text": "Prehypertensive"}, {"letter": "B", "text": "Stage 1"}, {"letter": "C", "text": "Stage 2"}, {"letter": "D", "text": "unrecalled"}], "answer": "C", "answerText": "Stage 2", "explanation": "15. ANSWER: C A. Is wrong because Prehypertension in JNC 8 is defined as SBP 120–139 mmHg or DBP 80–89 mmHg. B. Is wrong because While his diastolic is at the border of Stage 1/2 (100 mmHg), his systolic (170 mmHg) dictates that he is Stage 2 C. Is CORRECT. D. unrecalled Source: Bates 13th edition, Chapter 8 page 368"}, {"id": "q581", "pdfPage": 305, "originalNumber": "16", "question": "Which risk factor in the patient most likely increases risk of ischemic stroke?", "options": [{"letter": "A", "text": "Chronic Rhinitis"}, {"letter": "B", "text": "Migraine Headache"}, {"letter": "C", "text": "A-Fib"}, {"letter": "D", "text": "Bronchial Asthma"}], "answer": "C", "answerText": "A-Fib", "explanation": "16. ANSWER: C A. Is wrong because these are localized inflammatory airway conditions and are not independently associated with an increased risk of ischemic stroke. B. Is wrong because while certain types of migraines (specifically migraine with aura) carry a slight relative increase in stroke risk, the risk is vastly lower and less acute compared to the profound, direct embolic risk posed by Atrial Fibrillation. C. Is CORRECT because patients with A-Fib have an approximate 5-fold increase in stroke risk, which is why long-term oral anticoagulation therapy (like warfarin or NOACs/DOACs) is often crucial for management. D. Is wrong because same ratio with choice A Source: Bates Chapter 24, pp. 1544-1546"}, {"id": "q582", "pdfPage": 305, "originalNumber": "17", "question": "The patient was unable to form words but was able to understand commands. This finding is most consistent with:", "options": [{"letter": "A", "text": "Wernicke Aphasia"}, {"letter": "B", "text": "Broca Aphasia"}, {"letter": "C", "text": "Global Aphasia"}, {"letter": "D", "text": "Dysarthria due to cranial nerve dysfunction only"}], "answer": "B", "answerText": "Broca Aphasia", "explanation": "17. ANSWER: B A. Is wrong because Wernicke Aphasia causes poor comprehension with fluent but nonsensical speech. Patients usually cannot understand commands. B. Is CORRECT because Broca Aphasia is characterized by: ● Impaired speech production → patient cannot form words or speaks with great difficulty ● Preserved comprehension → patient can still understand commands ● Speech is typically nonfluent, slow, and effortful C. Is wrong because Global Aphasia involves both impaired speech production and impaired comprehension. D. Is wrong because Dysarthria is a motor speech problem where articulation is impaired, but language formation itself is intact. The question specifically describes inability to form words despite understanding, which is more consistent with aphasia rather than isolated dysarthria."}, {"id": "q583", "pdfPage": 306, "originalNumber": "18", "question": "The presence of left facial droop, left hemiparesis, and aphasia is most suggestive of a lesion involving the:", "options": [{"letter": "A", "text": "Brainstem lesion"}, {"letter": "B", "text": "Right cerebral hemisphere"}, {"letter": "C", "text": "Left cerebral hemisphere"}, {"letter": "D", "text": "Cerebellar infarction"}], "answer": "C", "answerText": "Left cerebral hemisphere", "explanation": "18. ANSWER: C A. Is wrong because brainstem lesions usually produce crossed findings (cranial nerve deficits on one side and body weakness on the opposite side), not facial droop and hemiparesis on the same side with aphasia. B. Is wrong because aphasia is usually associated with the dominant hemisphere, which is commonly the left hemisphere. C. Is CORRECT because aphasia localizes to the dominant (usually left) hemisphere, and cerebral hemisphere lesions can cause facial weakness and hemiparesis. D. Is wrong because cerebellar lesions mainly cause ataxia, dysmetria, and coordination problems, not aphasia or hemiparesis. Source: Bates Chapter 24, pp.774 A 2-year-old boy is brought to the emergency department after an episode of generalized seizure associated with a fever of 39.0°C. After the episode, the child was drowsy but returned to his baseline level of consciousness within 15–20 minutes. On physical examination: ● Temperature: 38.0°C ● No neck stiffness ● Appears irritable but is consolable ● No focal neurologic deficits"}, {"id": "q584", "pdfPage": 306, "originalNumber": "19", "question": "Which of the following vital signs is MOST consistent with febrile seizure illness?", "options": [{"letter": "A", "text": "Temperature 36.5°C, HR, RR, and BP normal"}, {"letter": "B", "text": "Temperature 38.5–39.5°C, HR elevated, RR and BP mildly elevated"}, {"letter": "C", "text": "Temperature 41.5°C, HR bradycardic, RR and BP normal"}, {"letter": "D", "text": "Temperature normal, HR severely bradycardic, BP and RR low"}], "answer": "B", "answerText": "Temperature 38.5–39.5°C, HR elevated, RR and BP mildly elevated", "explanation": "19. ANSWER: B A. Is wrong because the vital signs are entirely baseline and do not reflect an infectious febrile state. B. Is CORRECT because it shows fever (38.5–39.5°C) with an appropriate physiologic response—tachycardia and mild increases in RR (and sometimes BP)—which is the expected pattern in a febrile illness associated with febrile seizure. C. Is wrong because severe hyperthermia (41.5°C) with bradycardia is physiologically inconsistent; fever should cause tachycardia due to sympathetic activation, not bradycardia. D. Is wrong because normal temperature rules out a febrile trigger, and the presence of severe bradycardia with hypotension and abnormal RR suggests shock or primary cardiac/neurologic dysfunction. Source: Nakajima et al. (2018). A case of resistant tachycardia in a child with febrile status epilepticus. https://doi.org/10.15441/ceem.17.283"}, {"id": "q585", "pdfPage": 308, "originalNumber": "21", "question": "Suggests hypoglycemia over febrile seizure", "options": [{"letter": "A", "text": "Fever prior to seizure"}, {"letter": "B", "text": "Rapid recovery after seizure"}, {"letter": "C", "text": "Diaphoresis and tremors prior to seizure"}, {"letter": "D", "text": "Normal behaviour post seizure"}], "answer": "C", "answerText": "Diaphoresis and tremors prior to seizure", "explanation": "21. ANSWER: C A. Is wrong because suggests a febrile seizure rather than hypoglycemia. B. Is wrong because commonly seen in simple febrile seizures. C. Is CORRECT because are adrenergic symptoms typical of hypoglycemia before neuroglycopenia causes seizures. D. Is wrong because is more consistent with simple febrile seizure recovery."}, {"id": "q586", "pdfPage": 309, "originalNumber": "22", "question": "A 25 year old male with cough and fever went for a physical examination. Upon hip flexion to 90 degrees and knee extension, the patient experiences pain and hamstring resistance. What does this most likely indicate?", "options": [{"letter": "A", "text": "Limited musculoskeletal flexibility"}, {"letter": "B", "text": "Positive Kernig Sign"}, {"letter": "C", "text": "Sciatic Nerve compression and irritability"}, {"letter": "D", "text": "Hip Joint Arthritis"}], "answer": "B", "answerText": "Positive Kernig Sign", "explanation": "22. ANSWER: B A. Is wrong because this would cause tightness, but not the classic pain/resistance specific to Kernig sign. B. Is CORRECT because pain and resistance in the hamstrings after hip flexion and knee extension indicates positive Kernig sign. C. Is wrong because this is evaluated by straight leg raise, not this maneuver. D. Is wrong because this causes pain with joint movement, but not specifically with this pattern of knee extension after hip flexion. Source: Bates Chapter 24, pp. 1524"}, {"id": "q587", "pdfPage": 310, "originalNumber": "24", "question": "Which finding Most likely suggest indirect inguinal hernia", "options": [{"letter": "A", "text": "Bulge is medial to inferior epigastric vessel"}, {"letter": "B", "text": "Hernia passes through hasselbach’s triangle"}, {"letter": "C", "text": "Hernia enters inguinal canal via deep inguinal ring"}, {"letter": "D", "text": "No cough impulse present"}], "answer": "C", "answerText": "Hernia enters inguinal canal via deep inguinal ring", "explanation": "24. ANSWER: C A. Is wrong because this finding suggests a direct inguinal hernia, not indirect. Direct Inguinal Hernia protrudes: ● Medial to the inferior epigastric vessels ● Through a weakened posterior wall of the inguinal canal B. Is wrong because Passing through Hesselbach’s Triangle is the hallmark of a direct inguinal hernia. Hesselbach’s triangle boundaries: ● Rectus abdominis medially ● Inferior epigastric vessels laterally ● Inguinal ligament inferiorly C. Is CORRECT because This is the defining pathway of an indirect inguinal hernia. The hernia: 1. Enters the deep inguinal ring 2. Travels through the inguinal canal 3. May descend into the scrotum D. Is wrong because Most inguinal hernias typically have a cough impulse because intra-abdominal pressure pushes the hernia outward during coughing."}, {"id": "q588", "pdfPage": 311, "originalNumber": "25", "question": "Physical finding consistent of strangulated inguinal hernia", "options": [{"letter": "A", "text": "Tender reducible mass"}, {"letter": "B", "text": "Swollen lymph node"}, {"letter": "C", "text": "Groin swelling with overlying skin changes"}, {"letter": "D", "text": "Mass does not disappear when standing"}], "answer": "C", "answerText": "Groin swelling with overlying skin changes", "explanation": "25. ANSWER: C A. WRONG - strangulated inguinal hernias are not generally reducible B. WRONG - A hernia involves an actual organ (like the bowel) protruding through a defect in the abdominal wall. While a lymph node can be inflamed or infected (lymphadenitis), it doesn't \"strangulate\" in the surgical sense. C. CORRECT - strangulation will lead to reduced blood supply to the herniated tissue; overlying skin will present with erythema, warmth, or purple discoloration, and even necrosis. D. WRONG - although correct because marked appearance of hernias are gravity-dependent, this does not indicate strangulation."}, {"id": "q589", "pdfPage": 312, "originalNumber": "26", "question": "You suspect that your patient has chronic bladder obstruction due to BPH. Which conclusion supports this finding?", "options": [{"letter": "A", "text": "Sudden painless hematuria"}, {"letter": "B", "text": "Post-void dribbling and residual urine sensation"}, {"letter": "C", "text": "Flank pain radiating to groin"}, {"letter": "D", "text": "Proteinuria with edema"}], "answer": "B", "answerText": "Post-void dribbling and residual urine sensation", "explanation": "26. ANSWER: B A. Is wrong because Painless hematuria is more suggestive of urinary tract malignancy than chronic bladder outlet obstruction. B. Is CORRECT because these are classic obstructive lower urinary tract symptoms seen in benign prostatic hyperplasia (BPH). C. Is wrong because this presentation is typical of renal colic from ureteral stones, not BPH. D. Is wrong because Proteinuria and edema suggest renal disease or nephrotic syndrome, not bladder outlet obstruction. Source: Bates’ Guide to Physical Examination and History Taking, p 1937."}, {"id": "q590", "pdfPage": 312, "originalNumber": "27", "question": "24 yo sexually active, lower abdominal pain, increased vaginal discharge, dyspareunia, multiple sexual partners, inconsistent condom use LABS: Lower abdominal pain (worsen with palpitation) cervical motion tenderness positive something and adnexal tenderness on bimanual 27. ANSWER: D", "options": [{"letter": "A", "text": "Is wrong because Appendicitis can mimic pelvic inflammatory disease because it may present with lower abdominal pain and tenderness, making it an important differential diagnosis."}, {"letter": "B", "text": "Is wrong because PCOS typically presents with irregular menses, hirsutism, and infertility, not cervical motion tenderness or acute pelvic pain."}, {"letter": "C", "text": "Is wrong because Ectopic pregnancy is an essential differential in"}], "answer": "A", "answerText": "Is wrong because Appendicitis can mimic pelvic inflammatory disease because it may present with lower abdominal pain and tenderness, making it an important differential diagnosis.", "explanation": "a sexually active woman with pelvic pain and adnexal tenderness. D. Is CORRECT because Both acute appendicitis and ectopic pregnancy should be considered in the differential diagnosis of Unsure"}, {"id": "q591", "pdfPage": 312, "originalNumber": "17", "question": "examination Which of the following is an appropriate differential diagnosis?", "options": [{"letter": "A", "text": "Acute appendicitis"}, {"letter": "B", "text": "PCOS"}, {"letter": "C", "text": "Ectopic pregnancy"}, {"letter": "D", "text": "A & C"}, {"letter": "E", "text": "AOTA suspected PID."}], "answer": "E", "answerText": "AOTA suspected PID.", "explanation": "E. Wrong - since PCOS is not an appropriate diff diag for this case. Source: Bates’ Guide to Physical Examination and History Taking, p 1030."}, {"id": "q592", "pdfPage": 313, "originalNumber": "28", "question": "Which PE finding is MOST consistent with Pelvic inflammatory disease (PID)?", "options": [{"letter": "A", "text": "Fever"}, {"letter": "B", "text": "Lower abdominal tenderness"}, {"letter": "C", "text": "Cervical Motion Tenderness (CMT)"}, {"letter": "D", "text": "Purulent cervical discharge"}], "answer": "C", "answerText": "Cervical Motion Tenderness (CMT)", "explanation": "28. ANSWER: C A. Is wrong because Fever may occur in PID but is nonspecific and not the hallmark pelvic examination finding. B. Is wrong because Lower abdominal tenderness is common but can occur in many abdominal and gynecologic conditions. C. Is CORRECT because Cervical motion tenderness is the classic pelvic examination finding strongly associated with pelvic inflammatory disease. D. Is wrong because Purulent discharge supports infection but is less specific than cervical motion tenderness for PID diagnosis. Source: Bates’ Guide to Physical Examination and History Taking, p 1180."}, {"id": "q593", "pdfPage": 313, "originalNumber": "29", "question": "Which history finding MOST increases suspicion for PID?", "options": [{"letter": "A", "text": "24 years old sexually active woman"}, {"letter": "B", "text": "Multiple sexual partner with inconsistent condom use"}, {"letter": "C", "text": "History of recurrent UTI with antimicrobial urine isolate"}, {"letter": "D", "text": "HIV positive with previous STD diagnosis"}], "answer": "B", "answerText": "Multiple sexual partner with inconsistent condom use", "explanation": "29. ANSWER: B A. Is wrong because Young sexually active women are at increased risk, but this finding alone is less predictive than high-risk sexual behavior. B. Is CORRECT because Having multiple partners and inconsistent barrier protection strongly increases the risk of sexually transmitted infections leading to PID. C. Is wrong because Recurrent UTIs involve the urinary tract and are not major risk factors for PID. D. Is wrong because Prior STDs increase PID risk, but the strongest direct historical clue here is ongoing high-risk sexual behavior. Source: Bates’ Guide to Physical Examination and History Taking, p1208."}, {"id": "q594", "pdfPage": 314, "originalNumber": "30", "question": "Classic triad of PID.", "options": [{"letter": "A", "text": "Persistent fever + Adnexal Mass + unilateral tenderness"}, {"letter": "B", "text": "Lower abdominal pain + vaginal discharge + dyspareunia"}, {"letter": "C", "text": "Unilateral lower abdominal tenderness + amenorrhea + Fever"}, {"letter": "D", "text": "AOTA"}], "answer": "A", "answerText": "Persistent fever + Adnexal Mass + unilateral tenderness", "explanation": "30. ANSWER: A A. Is wrong because This presentation is more suggestive of a tubo-ovarian abscess or adnexal pathology, not the classic PID triad. B. Is CORRECT because PID classically presents with pelvic/lower abdominal pain, abnormal vaginal discharge, and dyspareunia. C. Is wrong because Amenorrhea with unilateral pain raises concern for ectopic pregnancy, not classic PID. D. Is wrong because Not all options are correct because choices 1 and 3 describe other gynecologic conditions more than PID. Source: Bates’ Guide to Physical Examination and History Taking, p Unsure"}, {"id": "q595", "pdfPage": 314, "originalNumber": "31", "question": "Man with long standing diabetes with a non healing ulcer on the plantar surface of his right foot. Which fo the following points towards Neuropathic ulcer instead of arterial ulcer?", "options": [{"letter": "A", "text": "Hyperpigmentation on medial malleolus"}, {"letter": "B", "text": "Cool, shiny skin"}, {"letter": "C", "text": "Preserved peripheral pulses with diminished monofilament sensation"}, {"letter": "D", "text": "Severe pain on ulcer despite light palpation"}], "answer": "C", "answerText": "Preserved peripheral pulses with diminished monofilament sensation", "explanation": "31. ANSWER: C A. Is wrong because Hyperpigmentation near the medial malleolus is more typical of chronic venous insufficiency, not neuropathic diabetic ulcers. B. Is wrong because Cool, shiny skin suggests arterial insufficiency rather than neuropathic ulceration. C. Is CORRECT because Neuropathic diabetic ulcers are characterized by loss of protective sensation with intact peripheral circulation and pulses. D. Is wrong because Neuropathic ulcers are often painless due to sensory loss, unlike arterial ulcers which are typically painful. Source: Bates’ Guide to Physical Examination and History Taking, p1547."}, {"id": "q596", "pdfPage": 315, "originalNumber": "32", "question": "A 55 year old woman, a painless lump on her left breast, denies fever or trauma, dimpling of the overlying skin when the patient raises her arms overhead. Which mechanism BEST explains this finding?", "options": [{"letter": "A", "text": "Venous obstruction from axillary lymphadenopathy"}, {"letter": "B", "text": "Retraction of Cooper ligaments by an underlying mas"}, {"letter": "C", "text": "Obstruction of superficial lymphatics causing edema"}, {"letter": "D", "text": "Fat necrosis beneath subcutaneous tissue"}], "answer": "B", "answerText": "Retraction of Cooper ligaments by an underlying mas", "explanation": "32. ANSWER: B A. Is wrong because Venous obstruction may cause swelling, but it does not produce localized skin dimpling with arm elevation. B. Is CORRECT because Breast malignancies can pull on the suspensory (Cooper) ligaments, causing skin dimpling that becomes more visible when the arms are raised. C. Is wrong because Lymphatic obstruction causes peau d’orange edema, not focal dimpling from ligament traction. D. Is wrong because Fat necrosis may mimic a breast mass but usually follows trauma and is less likely to cause classic dimpling. Source: Bates’ Guide to Physical Examination and History Taking, p978."}, {"id": "q597", "pdfPage": 315, "originalNumber": "33", "question": "A 68-yr old smoker complains of calf pain after walking two blocks that improves with rest. Upon examination, his right foot is cold with decreased hair distribution below the knee. What bedside examination maneuver would BEST help assess for arterial insufficiency?", "options": [{"letter": "A", "text": "Testing for vibrations using tuning fork"}, {"letter": "B", "text": "Evaluate pitting edema after prolonged standing"}, {"letter": "C", "text": "Elevate the legs to observe for dependent rubor and pallor"}, {"letter": "D", "text": "Assess deep tendon reflexes at the Achilles’ Heel"}], "answer": "C", "answerText": "Elevate the legs to observe for dependent rubor and pallor", "explanation": "33. ANSWER: C A. Wrong - Vibration testing evaluates neuropathy, not arterial blood flow insufficiency. B. Wrong - Pitting edema is more associated with venous disease or heart failure, not peripheral arterial disease. C. Is CORRECT because Elevation pallor and dependent rubor are classic bedside findings used to assess peripheral arterial insufficiency. D. Wrong - Achilles reflex testing evaluates neurologic function, not vascular perfusion. Source: Bates’ Guide to Physical Examination and History Taking, p 972."}, {"id": "q598", "pdfPage": 315, "originalNumber": "34", "question": "A 59-year old woman presents with a firm breast mass discovered 2 months ago. She reports no pain. During palpation, the mass feels irregular and fixed to the surrounding tissue. Which additional examination finding most 34. ANSWER: C", "options": [{"letter": "A", "text": "Wrong - Cyclic bilateral tenderness is more consistent with benign fibrocystic breast changes."}, {"letter": "B", "text": "Wrong - A mobile, rubbery mass suggests a benign lesion such as fibroadenoma, not malignancy."}, {"letter": "C", "text": "Is CORRECT because Nipple retraction and peau d’orange are"}], "answer": "C", "answerText": "Is CORRECT because Nipple retraction and peau d’orange are", "explanation": "34. ANSWER: C A. Wrong - Cyclic bilateral tenderness is more consistent with benign fibrocystic breast changes. B. Wrong - A mobile, rubbery mass suggests a benign lesion such as fibroadenoma, not malignancy. C. Is CORRECT because Nipple retraction and peau d’orange are"}, {"id": "q599", "pdfPage": 315, "originalNumber": "20", "question": "increase suspicion for malignancy.", "options": [{"letter": "A", "text": "Bilateral breast tenderness before menstruation"}, {"letter": "B", "text": "Mobile, rubbery consistency of the mass"}, {"letter": "C", "text": "Unilateral nipple retraction with peau d'orange changes"}, {"letter": "D", "text": "Clear bilateral nipple discharge on compression. classic signs of breast carcinoma with skin and lymphatic involvement."}], "answer": "D", "answerText": "Clear bilateral nipple discharge on compression. classic signs of breast carcinoma with skin and lymphatic involvement.", "explanation": "D. Wrong - Bilateral clear discharge is usually physiologic or benign, especially when provoked by compression. Source: Bates’ Guide to Physical Examination and History Taking, p"}, {"id": "q600", "pdfPage": 316, "originalNumber": "35", "question": "64 yr old man with poorly controlled diabetes presented with foot ulcer beneath 1st metatarsal head. Reported minimal pain despite ulcer depth. Which question is most important to ask for evaluating underlying sickness?", "options": [{"letter": "A", "text": "Have you noticed worse swelling at night?"}, {"letter": "B", "text": "Do you experience burning and numbness in your feet?"}, {"letter": "C", "text": "Have you recently changed footwear brands?"}, {"letter": "D", "text": "Do you feel pain on your knees during exercise?"}], "answer": "B", "answerText": "Do you experience burning and numbness in your feet?", "explanation": "35. ANSWER: B A. Wrong - Swelling is more suggestive of venous insufficiency or edema, not the primary cause of painless diabetic foot ulcers. B. Is CORRECT because Burning and numbness are classic symptoms of diabetic peripheral neuropathy, the major underlying cause of painless plantar ulcers. C. Wrong - Footwear may contribute to trauma, but it is less important than assessing neuropathy as the underlying pathology. D. Wrong - Knee pain with exercise relates more to musculoskeletal disease, not diabetic neuropathic ulcer formation. Source: Bates’ Guide to Physical Examination and History Taking, p1411."}, {"id": "q601", "pdfPage": 316, "originalNumber": "36", "question": "78 M progressive pain left leg, worst at night, relieved when foot is dangled. Physical finding consistent with PAD.", "options": [{"letter": "A", "text": "Shiny skin with bounding pulses"}, {"letter": "C", "text": "Observe for dependent rubor or pallor"}], "answer": "C", "answerText": "Observe for dependent rubor or pallor", "explanation": "36. ANSWER: C A. Wrong - Although shiny skin may occur in PAD, bounding pulses are inconsistent with arterial insufficiency because pulses are typically diminished. B. Wrong - C. Is CORRECT because Dependent rubor and elevation pallor are classic examination findings of peripheral arterial disease due to impaired arterial perfusion. D. Wrong -"}, {"id": "q602", "pdfPage": 317, "originalNumber": "37", "question": "Newly discovered breast mass; feature most indicative of malignancy", "options": [{"letter": "A", "text": "Cyclic tenderness associated with menses"}, {"letter": "B", "text": "Fluctuating lump size over several months"}, {"letter": "C", "text": "Persisting unilateral spontaneous bloody nipple discharge"}, {"letter": "D", "text": "Bilateral diffused nodule at the upper outer quadrant"}], "answer": "C", "answerText": "Persisting unilateral spontaneous bloody nipple discharge", "explanation": "37. ANSWER: C A. Wrong - This finding is more suggestive of benign fibrocystic breast changes because the symptoms fluctuate with hormonal cycles. B. Wrong - Changes in size over time are more commonly associated with benign cystic or fibrocystic conditions rather than malignancy. C. Is CORRECT because this is the most concerning feature for malignancy because spontaneous, persistent, unilateral bloody discharge may indicate an underlying breast carcinoma or intraductal pathology. D. Wrong - Bilateral diffuse nodularity is usually associated with benign fibrocystic breast disease rather than cancer. Source: Bates’ Guide to Physical Examination and History Taking, Chap 19, p 944"}, {"id": "q603", "pdfPage": 317, "originalNumber": "38", "question": "A 66-year-old patient presents with shiny skin, decreased hair distribution on the legs, and foot pain that worsens when lying down but improves when dangling the leg off the bed. Which finding is MOST consistent with advanced Peripheral Arterial Disease?", "options": [{"letter": "A", "text": "Ulcers over pressure-bearing surfaces"}, {"letter": "B", "text": "Soft callus formation"}, {"letter": "C", "text": "Warm erythematous skin with bounding pulses"}, {"letter": "D", "text": "Pain with elevation of the limb"}], "answer": "C", "answerText": "Warm erythematous skin with bounding pulses", "explanation": "38. ANSWER: C A. Wrong - characteristic of neuropathic ulcer B. Wrong - not typical of PAD C. Wrong - not characteristic of PAD D. Is CORRECT because Source: Bates’ Guide to Physical Examination: Table 17-2. Painful Peripheral Disorders and Their Mimics, page 969 on Goodnotes Unche…"}, {"id": "q604", "pdfPage": 318, "originalNumber": "39", "question": "55 y.o underwent breast examination after noticing skin changes. Examination reveals edema on one breast with accentuated hair follicles. According to Physical examination principles, which of the following is most likely the cause of peau d’ orange", "options": [{"letter": "A", "text": "Obstruction of dermal lymphs"}, {"letter": "B", "text": "Chronic irritation from brassiere friction"}, {"letter": "C", "text": "Benign Fibrocystic Mass"}, {"letter": "D", "text": "Thrombosis of superficial vessels"}], "answer": "A", "answerText": "Obstruction of dermal lymphs", "explanation": "39. ANSWER: A A. Is correct because lymphatic blockade causes the enlarged pores and thickened skin that is characteristic of the condition. B. Wrong - Chronic irritation would present more as erythematous lesions. C. Wrong - noncancerous mass that does not typically cause edema D. Wrong - usually presents as cord-like vein Source: Bates’ Guide to Physical Examination: Table 18-2. Visible Signs of Breast Cancer, page 1007 on Goodnotes"}, {"id": "q605", "pdfPage": 318, "originalNumber": "40", "question": "A 72 year old man presents with leg discomfort while walking. During vascular examination, the examiner palpated diminished femoral pulses and absent dorsalis pedis pulses bilaterally. Which history finding MOST strongly suggests advanced peripheral arterial disease?", "options": [{"letter": "A", "text": "Leg heaviness relieved by elevation"}, {"letter": "B", "text": "Rest pain involving distal foot at night"}, {"letter": "C", "text": "Bilateral leg cramps after prolonged standing"}, {"letter": "D", "text": "Morning stiffness that improves throughout the day"}], "answer": "B", "answerText": "Rest pain involving distal foot at night", "explanation": "40. ANSWER: B A. Wrong - This finding is more suggestive of venous insufficiency because elevating the legs improves venous return. B. Is CORRECT because ischemic rest pain, especially in the distal foot at night, is a classic sign of advanced Peripheral arterial disease and indicates severe arterial insufficiency. C. Wrong - This symptom is more commonly associated with venous disease or muscle fatigue rather than arterial occlusion. D. Wrong - This pattern is more typical of inflammatory or degenerative joint disorders such as arthritis, not peripheral arterial disease. Source: Bates’ Guide to Physical Examination and History Taking, Chap 12, p 535"}, {"id": "q606", "pdfPage": 318, "originalNumber": "41", "question": "A 60-year-old smoker complains of calf pain after walking two blocks that resolves within minutes of rest. Peripheral pulses are diminished bilaterally. Which mechanism BEST explains his leg pain?", "options": [{"letter": "A", "text": "Venous valve incompetence causing venous congestion"}, {"letter": "B", "text": "Ischemia of skeletal muscles during exertion"}], "answer": "B", "answerText": "Ischemia of skeletal muscles during exertion", "explanation": "41. ANSWER: B A. Wrong - This mechanism causes venous insufficiency symptoms such as leg swelling and heaviness rather than exertional calf pain. B. Is CORRECT because Peripheral arterial disease reduces blood flow to exercising muscles, causing intermittent claudication that improves with rest. C. Wrong - Nerve compression may cause numbness or tingling but does not typically produce exertional calf pain relieved by rest. D. Wrong - Joint inflammation causes persistent joint pain and stiffness rather than exercise-induced ischemic muscle pain. 23 C. Compression of peripheral nerves by edema D. Inflammatory destruction of synovial joints Source: Bates’ Guide to Physical Examination and History Taking, Chap 12, p 535"}, {"id": "q607", "pdfPage": 319, "originalNumber": "42", "question": "A 58-year-old woman reports of dull aching pain on the right calf that is relieved by rest. She has diabetes mellitus and hyperlipidemia. Upon vascular examination, the clinician elevates both her legs at a 60 angle for 1 minute and then asks the patient to sit up and dangle her legs. Her right foot becomes pale on elevation and develops a dusky red color on dependency. What is the most likely diagnosis for the current findings?", "options": [{"letter": "A", "text": "Chronic Venous Insufficiency"}, {"letter": "B", "text": "Arterial insufficiency due to PAD"}, {"letter": "C", "text": "Acute compartment syndrome"}, {"letter": "D", "text": "Lymphedema of the leg"}], "answer": "B", "answerText": "Arterial insufficiency due to PAD", "explanation": "42. ANSWER: B A. Wrong - Usually presents with leg swelling, varicose veins, and brown skin discoloration rather than pallor on elevation. B. Is CORRECT because persisting dependent rubor suggests arterial insufficiency C. Wrong - Causes severe pain, tense swelling, and neurologic deficits, not dependent rubor. D. Wrong - Causes chronic non-pitting edema and skin thickening without ischemic color changes on elevation and dependency. Source: Bates’ Guide to Physical Examination and History Taking, Chap 12, p 530"}, {"id": "q608", "pdfPage": 319, "originalNumber": "43", "question": "A 37-year-old woman reports of left calf swelling and tenderness for 2 days after a 14-hour-international flight. Her left calf has swelling, with slight erythema and tenderness in the deep venous system. Peripheral pulses are intact. What finding would most likely point towards DVT instead of PAD?", "options": [{"letter": "A", "text": "Intermittent claudication relieved by rest"}, {"letter": "B", "text": "Cool extremity with absent pedal pulses"}, {"letter": "C", "text": "Unilateral edema with mild tenderness"}, {"letter": "D", "text": "Affected Leg Pale on elevation"}], "answer": "C", "answerText": "Unilateral edema with mild tenderness", "explanation": "43. ANSWER: C A. Wrong - This is a classic symptom of Peripheral arterial disease rather than deep vein thrombosis. B. Wrong - These findings suggest arterial insufficiency or acute arterial occlusion, not DVT. C. Is CORRECT because Deep vein thrombosis commonly presents with unilateral leg swelling, tenderness, warmth, and mild erythema, especially after prolonged immobilization such as a long flight. D. Wrong - Pallor on elevation is more consistent with arterial insufficiency than venous thrombosis. Source: Bates’ Guide to Physical Examination and History Taking, Chap 12, p 534"}, {"id": "q609", "pdfPage": 319, "originalNumber": "44", "question": "62 yo man with known PAD complains of worsening pain on his right foot, especially at night. He reports that hanging his foot at the end of the bed relieves the discomfort. Examination shows decreased hair distribution, thickened toenails, and delayed capillary refill. Which 44. ANSWER: D", "options": [{"letter": "A", "text": "Wrong. Venous congestion is not the primary problem in PAD, which is an arterial insufficiency disorder."}, {"letter": "B", "text": "Wrong. Symptoms of PAD are caused by inadequate arterial oxygen delivery and not lymphatic obstruction."}, {"letter": "C", "text": "Wrong. PAD is associated with ischemic pain and not neuropathic pain from nerve compression."}, {"letter": "D", "text": "Is CORRECT. In severe cases, resting blood flow cannot"}], "answer": "D", "answerText": "Is CORRECT. In severe cases, resting blood flow cannot", "explanation": "44. ANSWER: D A. Wrong. Venous congestion is not the primary problem in PAD, which is an arterial insufficiency disorder. B. Wrong. Symptoms of PAD are caused by inadequate arterial oxygen delivery and not lymphatic obstruction. C. Wrong. PAD is associated with ischemic pain and not neuropathic pain from nerve compression. D. Is CORRECT. In severe cases, resting blood flow cannot"}, {"id": "q610", "pdfPage": 319, "originalNumber": "24", "question": "mechanism supports the development of dependent rubor and relief of ischemic rest pain with leg dependency?", "options": [{"letter": "A", "text": "Reduced venous congestion"}, {"letter": "B", "text": "Increased lymphatic drainage"}, {"letter": "C", "text": "Decreased nerve root compression"}, {"letter": "D", "text": "Improved arterial perfusion due to gravity accommodate the basal nutritional needs of the tissues, the development of ischemia may ensue causing the patient to feel pain even at rest, especially at night when the legs are horizontal. But the pain improves when the legs are hanging (dependent position). When the patient puts the leg in a dependent position, gravity can help arterial blood to reach the foot, improving tissue perfusion and improvement of pain. The rubor occurs secondary to reactive hyperemia when the limbs are dependent. Source: Bates’ Guide to Physical Examination and History Taking, 13th ed., p. 969; Harrison’s Principles of Internal Medicine, 22nd ed., 2172"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q611", "pdfPage": 320, "originalNumber": "25", "question": "circumference is 4 cm larger than the right with warmth and tenderness on palpation. Which of the following historical features would most increase the likelihood of deep venous thrombosis", "options": [{"letter": "A", "text": "Symptoms relieved by walking"}, {"letter": "B", "text": "History of prolonged immobilization after surgery"}, {"letter": "C", "text": "Pain felt only after exertion"}, {"letter": "D", "text": "Bilateral varicose veins since adolescence"}], "answer": "B", "answerText": "History of prolonged immobilization after surgery", "explanation": "B. Is CORRECT because immobilization causes venous stasis, a major factor for DVT especially postoperatively. C. Wrong - Exertional pain is more consistent with musculoskeletal causes or peripheral arterial disease not DVT. D. Wrong - Varicose veins slightly increase risk but are much less significant than recent surgery with immobilization Source: Bates’ Guide to Physical Examination and History Taking, 13th ed., p. 969"}, {"id": "q612", "pdfPage": 321, "originalNumber": "46", "question": "A child with fever is evaluated for possible dengue fever. Which of the following skin findings raise concern for increased capillary fragility?", "options": [{"letter": "A", "text": "Vesicular rash on the trunk"}, {"letter": "B", "text": "Petechiae on the extremities"}, {"letter": "C", "text": "Scaling plaques on the elbows"}, {"letter": "D", "text": "Hyperpigmented macules on the legs"}], "answer": "B", "answerText": "Petechiae on the extremities", "explanation": "46. ANSWER: B A. Wrong - Vesicles are fluid-filled lesions more commonly seen in viral infections like varicella, not dengue-related capillary fragility. B. Is CORRECT because petechiae indicate small capillary bleeding and are a classic sign of thrombocytopenia and increased capillary fragility manifested in dengue. C. Wrong - These are suggestive of chronic skin conditions like psoriasis. D. Wrong - Hyperpigmentation reflects past skin changes, not active bleeding or fragile capillaries. Source: Bate’s Guide to Physical Examination and History Taking, 12th ed., page 295."}, {"id": "q613", "pdfPage": 321, "originalNumber": "47", "question": "A 7-year-old child is brought to the clinic after a recent upper respiratory tract infection. Physical examination reveals a small, soft, mobile, non tender lymph node in the cervical chain. Which of the following is the most appropriate interpretation?", "options": [{"letter": "A", "text": "The finding is consistent with benign reactive lymphadenopathy"}, {"letter": "B", "text": "The nontender"}], "answer": "A", "answerText": "The finding is consistent with benign reactive lymphadenopathy", "explanation": "47. ANSWER: A A. Is CORRECT because small, soft, mobile cervical lymph nodes after an upper respiratory infection are common in children and usually represent a benign reactive process. B. Wrong - Although malignant nodes may be nontender, this child’s node is small, soft, and mobile, which are reassuring benign features. C. Wrong - Immediate biopsy is not indicated because the characteristics described are typical of reactive lymphadenopathy rather than malignancy. D. Wrong - Palpable cervical nodes can be normal in children, but in this context the node is better interpreted as reactive following a
