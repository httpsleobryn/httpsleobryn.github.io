rson, which is not affected in this scenario. D. Wrong. Judgment - involves decision-making and the ability to anticipate consequences; the issue described is lack of acknowledgment of illness severity, not impaired decision-making."}, {"id": "q236", "pdfPage": 115, "originalNumber": "14", "question": "A patient's affect is constricted. This means:", "options": [{"letter": "A", "text": "Mood change is rapid"}, {"letter": "B", "text": "Emotional expression is reduced"}, {"letter": "C", "text": "Emotions are inconsistent with mood"}, {"letter": "D", "text": "Emotional expression is absent"}], "answer": "B", "answerText": "Emotional expression is reduced", "explanation": "14. ANSWER: B A. Wrong. Rapid mood changes describe labile affect, not constricted affect. B. CORRECT. Constricted affect means the range and intensity of emotional expression are reduced. C. Wrong. Emotions inconsistent with mood describe incongruent affect, not constricted affect. D. Wrong. Absence of emotional expression refers to flat affect, which is more severe than constricted affect. Source: Manourja. (n.d.). Constricted affect. Manourja. https://manourja.com/mental-health/constricted-affect/ sorryyy, couldnt find sa book"}, {"id": "q237", "pdfPage": 115, "originalNumber": "15", "question": "You ask the patient to spell the word “WORLD” backwards. The patient struggled in this test. What is most likely impaired?", "options": [{"letter": "A", "text": "Recent memory"}, {"letter": "B", "text": "Attention and concentration"}, {"letter": "C", "text": "Abstract thinking"}, {"letter": "D", "text": "Judgement"}], "answer": "B", "answerText": "Attention and concentration", "explanation": "15. ANSWER: B A. Wrong because when assessing recent memory, you ask the patient events of the day B. CORRECT because it tests the patients ability to focus and maintain attention. Other tests include serial 7s and digit span C. Wrong because it is assessed usually by asking meaning of proverbs D. Wrong because it is tested by asking hypothetical situations"}, {"id": "q238", "pdfPage": 116, "originalNumber": "16", "question": "Cannot identify common objects such as watch", "options": [{"letter": "A", "text": "Apraxia"}, {"letter": "B", "text": "Aphasia"}, {"letter": "C", "text": "Agnosia"}, {"letter": "D", "text": "Amnesia"}], "answer": "C", "answerText": "Agnosia", "explanation": "16. ANSWER: C A. Wrong. In apraxia, the patient knows exactly what the object is. If you show them a watch, they can say, \"That is a watch.\" The problem is in movement performance B. Wrong. In aphasia, the patient recognizes the object but cannot find the right label for it. C. CORRECT. Agnosia is a neurological disorder characterized by the inability to recognize and identify objects, persons, or sounds, even though the sensory organs (eyes, ears, etc.) are functioning normally. D. Wrong. Amnesia is a loss of episodic or factual memory, not a loss of semantic recognition"}, {"id": "q239", "pdfPage": 117, "originalNumber": "17", "question": "Presented with intact orientation and recent memory, but demonstrates with difficulty in interpreting provers such as “A rolling stone gathers no moss”. What mental component is impaired?", "options": [{"letter": "A", "text": "Attention"}, {"letter": "B", "text": "Abstract thinking"}, {"letter": "C", "text": "Remote memory"}, {"letter": "D", "text": "Judgement"}], "answer": "B", "answerText": "Abstract thinking", "explanation": "17. ANSWER: B A. Wrong. Attention is assessed by tasks like digit span or serial sevens. The patient’s problem is not sustaining focus but interpreting meaning, so attention is intact. B. CORRECT. Bates states that interpretation of proverbs (e.g., “A rolling stone gathers no moss”) assesses abstract thinking. Literal or concrete interpretations indicate impaired abstraction. C. Wrong. Remote memory involves recall of distant past events (e.g., childhood history). The vignette specifies intact orientation and recent memory and does not suggest remote memory loss. D. Wrong. Judgment is assessed by responses to hypothetical situations (e.g., “What would you do if you smelled smoke in a crowded theater?”). Difficulty with proverbs reflects abstraction, not decision-making or judgment."}, {"id": "q240", "pdfPage": 118, "originalNumber": "18", "question": "Patient reports seeing snakes on the walls but there is patterned paintings. What is the most likely perceptual disturbance?", "options": [{"letter": "A", "text": "Hallucination"}, {"letter": "B", "text": "Illusion"}, {"letter": "C", "text": "Delusion"}, {"letter": "D", "text": "Obsession"}], "answer": "B", "answerText": "Illusion", "explanation": "18. ANSWER: B A. A is wrong because a hallucination is a perception without any external stimulus. B. B is correct because an illusion occurs when a real object (the patterned paintings) is misinterpreted as something else (snakes on the wall). C. C is wrong because a delusion is a false belief, not a misperception. D. D is wrong because an obsession is a persistent, intrusive thought, not a perceptual error. Source: Bates’ Guide 12th Ed. Chapter 5; page 163"}, {"id": "q241", "pdfPage": 119, "originalNumber": "20", "question": "A patient with depression performs poorly on MMSE. Which consideration ensures accurate evaluation?", "options": [{"letter": "A", "text": "Repeat MMSE immediately"}, {"letter": "B", "text": "Interpret results cautiously since depression can impair concentration"}, {"letter": "C", "text": "Diagnose dementia solely using MMSE"}, {"letter": "D", "text": "Use MMSE only without other cognitive tests"}], "answer": "B", "answerText": "Interpret results cautiously since depression can impair concentration", "explanation": "20. ANSWER: B A. Wrong. Repeating the MMSE right away does not correct the effects of poor concentration, low motivation, or psychomotor slowing seen in depression. It may produce similar results and does not improve diagnostic accuracy. B. CORRECT. Depression can significantly impair attention, concentration, and motivation, which may lead to poor performance on the MMSE despite intact cognition. This can result in falsely low scores, so results should be interpreted cautiously and correlated with the patient’s mood and overall clinical picture, rather than immediately assuming dementia. C. Wrong. The MMSE is only a screening tool. A diagnosis of dementia requires clinical correlation, functional assessment, and often additional cognitive testing; relying on MMSE alone can lead to misdiagnosis. D. Wrong. Cognitive evaluation should be comprehensive. Using the MMSE alone ignores other validated tests and clinical information needed to distinguish depression-related cognitive impairment from true dementia."}, {"id": "q242", "pdfPage": 120, "originalNumber": "21", "question": "Patient has belief that “Everyone is plotting to kill me\" but remains calm during examination. What's the next best assessment?", "options": [{"letter": "A", "text": "Mood"}, {"letter": "B", "text": "Insight to the belief"}, {"letter": "C", "text": "Memory recall"}, {"letter": "D", "text": "Orientation to time"}], "answer": "B", "answerText": "Insight to the belief", "explanation": "21. ANSWER: B A. Wrong. The statement reflects a fixed false belief (delusion of persecution), not primarily a mood disturbance. B. CORRECT. The next best assessment is to determine whether the patient recognizes the belief as irrational or possibly false. C. Wrong. Memory is not directly relevant to evaluating a delusional belief. D. Wrong. Orientation assesses cognition, not the presence or understanding of a delusion. cant find explanation sa book :( https://www.ncbi.nlm.nih.gov/books/NBK539855/?"}, {"id": "q243", "pdfPage": 120, "originalNumber": "22", "question": "A patient demonstrates severe impaired attention during an exam. To determine if medical, what additional finding points to medical cause (e.g. delirium)?", "options": [{"letter": "A", "text": "Stable vital signs"}, {"letter": "B", "text": "Acute onset of symptoms"}, {"letter": "C", "text": "Long standing psychiatric history"}, {"letter": "D", "text": "Gradual increase of symptoms"}], "answer": "B", "answerText": "Acute onset of symptoms", "explanation": "22. ANSWER: B A. Wrong. Vital signs are not diagnostic of delirium. B. CORRECT. Delirium is an acute confusional state marked by sudden onset, fluctuating course, impaired attention and changing levels of consciousness. It is often due to an underlying medical condition, intoxication or withdrawal. Thus, when a patient has severely impaired attention, an acute change strongly suggests a medical etiology rather than a primary psychiatric disorder. C. Wrong. This points toward a primary psychiatric disorder, not delirium. Delirium typically occurs without a prior psychiatric history. D. Wrong. This suggests dementia or psychiatric illness, not delirium. Delirium develops acutely while dementia and most psychiatric conditions have a slow, progressive onset."}, {"id": "q244", "pdfPage": 121, "originalNumber": "23", "question": "Patient responds to the question logically but present with sudden laughter and emotional outburst. What is the deficiency?", "options": [{"letter": "A", "text": "Mood"}, {"letter": "B", "text": "Affect regulation"}, {"letter": "C", "text": "Insight"}, {"letter": "D", "text": "Cognition"}], "answer": "B", "answerText": "Affect regulation", "explanation": "23. ANSWER: B A. Mood – Mood refers to a sustained emotional state over time, not brief, sudden emotional outbursts. B. Affect regulation – Sudden, inappropriate laughter and emotional outbursts despite logical responses indicate poor control of emotional expression (affect), not thinking. C. Insight – Insight is awareness of one’s condition, which is not described in the scenario. D. Cognition – Cognition involves thinking, memory, and reasoning, which are intact since the patient responds logically. https://my.clevelandclinic.org/health/diseases/17928-pseudobulbar-affect-pba Bates, MSE Chapter 9"}, {"id": "q245", "pdfPage": 122, "originalNumber": "24", "question": "The patient presented with executive dysfunction unable to perform multi-step commands (Pick up the paper, fold it, and place it on the ground). This strongly suggests impairment of the?", "options": [{"letter": "A", "text": "Language fluency/comprehens ion"}, {"letter": "B", "text": "Praxis"}, {"letter": "C", "text": "Higher cortical function"}, {"letter": "D", "text": "Orientation"}], "answer": "C", "answerText": "Higher cortical function", "explanation": "24. ANSWER: C A. Wrong. Language comprehension refers to understanding individual words and sentences. A person with pure language comprehension deficits (aphasia) might fail to understand the command due to inability to process language itself. However, failure to perform multi‑step tasks despite intact comprehension often points to problems in executive processing rather than language comprehension per se. B. Wrong. Praxis is the ability to plan and execute skilled motor movements and is important for purposeful movements (e.g., mimicking using a tool, dressing). Pure praxis deficits (apraxia) would show difficulty performing learned motor tasks even if the instruction is understood. However, multi‑step command performance requires more than motor planning — it requires correct sequencing, working memory, and organization, which are executive functions rather than solely praxis. C. CORRECT. Higher cortical functions include executive functions — the ability to analyze, plan, organize, and execute tasks, especially those involving sequential steps. A deficit here affects the ability to follow multi‑step commands logically, even when language comprehension and basic motor skills are intact. Tests like giving 3‑step commands are standard to assess these abilities in neurological exams. D. Wrong. Orientation refers to awareness of person, place, time, and situation. While important in cognition, orientation deficits do not specifically impair the ability to follow multi‑step instructions unless they are severe enough to globally affect cognition. In this scenario, being disoriented does not directly implicate difficulty with task sequencing. Source: https://www.msdmanuals.com/professional/neurologic-disorders/neurologic-e xamination/how-to-assess-mental-status"}, {"id": "q246", "pdfPage": 122, "originalNumber": "17", "question": "RUQ, no known cardiac or other co-morbidities. What are other expected PE findings?", "options": [{"letter": "A", "text": "LV thrill"}, {"letter": "B", "text": "JVP < 3.0 cm"}, {"letter": "C", "text": "Soft diastolic murmur heard best at cardiac apex"}, {"letter": "D", "text": "Bounding PMI with"}], "answer": "A", "answerText": "LV thrill", "explanation": "a diameter >2.5 cm 25. ANSWER: C (Possible B?) A. Wrong. A left ventricular thrill is a palpable vibration over the heart caused by valvular abnormalities, not typically expected in an acute abdominal trauma patient without preexisting cardiac disease. B. Wrong. Venous pressure <3 cm is normal, but trauma does not specifically lower VP, so this is not an expected PE finding. C. Wrong. This primarily describes mitral stenosis, not really expected in our patient. D. CORRECT. Trauma may induce hyperdynamic circulation, producing a PMI that is both displaced and bounding, consistent with high stroke volume states. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 820. Dili ni B? JVP is low in hypovolemic states like blood loss. Weak and thready sad unta ang PMI during hemorrhage, not bounding. Lowered venous pressure could be present in patients in hypovolemic shock. A gunshot wound in RUQ abdomen could hit the liver, a highly vascular organ causing severe blood loss. Source: Bates 12th Ed Chap 9 pp 374-375"}, {"id": "q247", "pdfPage": 123, "originalNumber": "26", "question": "During auscultation, which of the following can be heard in systolic murmur?", "options": [{"letter": "A", "text": "S2"}, {"letter": "B", "text": "S3"}, {"letter": "C", "text": "S4"}, {"letter": "D", "text": "Ejection click"}], "answer": "D", "answerText": "Ejection click", "explanation": "26. ANSWER: D A. Wrong. S2 is a normal heart sound marking aortic and pulmonic valve closure, not a murmur itself. B. Wrong. S3 is a diastolic sound associated with rapid ventricular filling, heard after S2, not during systole. C. Wrong. S4 occurs late in diastole due to atrial contraction against a stiff ventricle, not during systole. D. CORRECT. An ejection click is a high-pitched sound occurring in early systole due to the opening of a stiff semilunar valve (aortic or pulmonic) and is often heard in systolic murmurs."}, {"id": "q248", "pdfPage": 124, "originalNumber": "27", "question": "Which of the following has the least murmur intensity that is accompanied by a palpable thrill based on the levine system of grading murmurs?", "options": [{"letter": "A", "text": "Grade 2"}, {"letter": "B", "text": "Grade 3"}, {"letter": "C", "text": "Grade 4"}, {"letter": "D", "text": "Grade 5"}], "answer": "C", "answerText": "Grade 4", "explanation": "27. ANSWER: C A. Wrong. Grade 2 murmurs are faint but audible, and do not have a palpable thrill. B. Wrong. Grade 3 murmurs are moderately loud without a palpable thrill. C. CORRECT. Grade 4 murmurs are loud enough to be accompanied by a palpable thrill, marking the lowest grade in the Levine system with this feature. D. Wrong. Grade 5 murmurs are very loud, heard with the stethoscope partially off the chest, and also have a thrill, but higher in intensity than Grade 4. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 878."}, {"id": "q249", "pdfPage": 124, "originalNumber": "28", "question": "30 y.o. patient has prominent heaves in the 3rd-5th ICS just left to the sternum. Which of the following likely explain this finding?", "options": [{"letter": "A", "text": "Left Ventricular hypertrophy"}, {"letter": "B", "text": "Right ventricular hypertrophy"}, {"letter": "C", "text": "Aortic flow obstruction"}, {"letter": "D", "text": "Hypovolemic state"}], "answer": "B", "answerText": "Right ventricular hypertrophy", "explanation": "28. ANSWER: B A. Wrong. LV hypertrophy produces a heave at the apex (5th ICS, midclavicular line), not along the left sternal border. B. CORRECT. RV hypertrophy manifests as a prominent parasternal heave along the left sternal border (3rd–5th ICS) due to the enlarged right ventricle pushing anteriorly. C. Wrong. Aortic obstruction (e.g., stenosis) may produce a systolic murmur and thrill at the right upper sternal border, not a heave along the left sternal border. D. Wrong. Hypovolemia typically leads to soft heart sounds and a hyperdynamic apex, not a sustained parasternal heave. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 862."}, {"id": "q250", "pdfPage": 124, "originalNumber": "29", "question": "Which of the ff. maneuvers accentuate the normal splitting of S2? 29. ANSWER: D Verified 19", "options": [{"letter": "A", "text": "Asking the patient to lie in the left lateral decubitus position"}, {"letter": "B", "text": "Asking the patient to sit, lean forward, and exhale"}, {"letter": "C", "text": "Asking the patient to exhale more forcefully"}, {"letter": "D", "text": "Asking the patient to inhale deeper"}], "answer": "A", "answerText": "Asking the patient to lie in the left lateral decubitus position", "explanation": "A. Wrong. This position accentuates S3 and S4, particularly mitral stenosis, but does not accentuate normal S2 splitting. B. Wrong. This maneuver enhances aortic and pulmonic regurgitation murmurs, not the normal splitting of S2. C. Wrong. Forceful exhalation narrows the splitting by reducing venous return to the right heart, so it does not accentuate normal S2 splitting. D. CORRECT. Deep inspiration increases venous return to the right ventricle, delaying pulmonic valve closure, which accentuates the normal physiologic splitting of S2. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 830."}, {"id": "q251", "pdfPage": 125, "originalNumber": "30", "question": "Which of the ff assessments where you ask the patient to lie in the left lateral decubitus position?", "options": [{"letter": "A", "text": "Auscultate Murmurs of Mitral Stenosis"}, {"letter": "B", "text": "Better Assess S2"}, {"letter": "C", "text": "Palpate Right Ventricular impulse"}, {"letter": "D", "text": "Auscultate Bruits of Carotid Artery"}], "answer": "A", "answerText": "Auscultate Murmurs of Mitral Stenosis", "explanation": "30. ANSWER: A A. CORRECT. The left lateral decubitus position brings the apex of the heart closer to the chest wall, enhancing the low-pitched diastolic murmur of mitral stenosis heard with the bell. B. Wrong. S2 splitting and components are best evaluated at the upper sternal border, not in left lateral decubitus. C. Wrong. Right ventricular impulse is best felt along the left sternal border in the supine position, not specifically in left lateral decubitus. D. Wrong. Carotid bruits are assessed with the patient supine at 30–45°, not lying in left lateral decubitus. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 858."}, {"id": "q252", "pdfPage": 125, "originalNumber": "31", "question": "In a normal adult heart, what is the most anterior structure?", "options": [{"letter": "A", "text": "Left ventricle"}, {"letter": "B", "text": "Left atrium"}, {"letter": "C", "text": "Right ventricle"}, {"letter": "D", "text": "Right atrium"}], "answer": "C", "answerText": "Right ventricle", "explanation": "31. ANSWER: C A. Wrong. The left ventricle forms the apex and much of the inferolateral surface, not the most anterior structure. B. Wrong. The left atrium lies posteriorly, forming most of the base of the heart, not anteriorly. C. CORRECT. The right ventricle lies just behind the sternum and forms the majority of the anterior (sternocostal) surface of the heart. D. Wrong. The right atrium is more rightward and slightly posterior, not the most anterior structure."}, {"id": "q253", "pdfPage": 126, "originalNumber": "32", "question": "Thrills that may accompany aortic stenosis may be palpated in the following:", "options": [{"letter": "A", "text": "Carotid arteries in the neck"}, {"letter": "B", "text": "5th intercostal space 5 cm from the midsternal line"}, {"letter": "C", "text": "Area just below the subxiphoid space"}, {"letter": "D", "text": "3rd left intercostal space immediately lateral to the midsternal line"}], "answer": "A", "answerText": "Carotid arteries in the neck", "explanation": "32. ANSWER: A A. CORRECT. A thrill from aortic stenosis is often transmitted to the carotid arteries, producing a palpable vibration along their course. B. Wrong. This corresponds to the apical area (mitral region), where aortic stenosis thrills are not typically felt. C. Wrong. This area corresponds to the epigastric/right ventricle region, unrelated to aortic valve thrills. D. Wrong. The aortic area is at the 2nd right intercostal space; thrills are not best palpated at the 3rd left ICS. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 856."}, {"id": "q254", "pdfPage": 126, "originalNumber": "33", "question": "A PMI of >3 cm is a finding of which of the following", "options": [{"letter": "A", "text": "Volume overload"}, {"letter": "B", "text": "Severe Mitral stenosis"}, {"letter": "C", "text": "Left Ventricular Hypertrophy"}, {"letter": "D", "text": "Left Atrial Dilation"}], "answer": "C", "answerText": "Left Ventricular Hypertrophy", "explanation": "33. ANSWER: C A. Wrong. Volume overload (e.g., aortic or mitral regurgitation) may displace the PMI, but does not necessarily increase its diameter >3 cm. B. Wrong. Mitral stenosis typically causes diastolic thrill and apical lift, but PMI diameter remains normal. C. CORRECT. LV hypertrophy leads to sustained, laterally displaced, and enlarged PMI (>3 cm) due to increased myocardial mass. D. Wrong. Left atrial enlargement displaces the PMI posteriorly, but the diameter is usually unchanged. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 820."}, {"id": "q255", "pdfPage": 126, "originalNumber": "34", "question": "Which of the following best describes the proper technique in the examination of the brachial pulse", "options": [{"letter": "A", "text": "Completely extend the patient's arm"}, {"letter": "B", "text": "Palpate for the pulse lateral to the brachial tendon"}, {"letter": "C", "text": "Palpate only lightly to properly feel the pulse"}, {"letter": "D", "text": "Palpate for the pulse at the antecubital crease"}], "answer": "D", "answerText": "Palpate for the pulse at the antecubital crease", "explanation": "34. ANSWER: D A. Wrong. The arm should be relaxed and slightly flexed at the elbow, not fully extended, for accurate palpation. B. Wrong. The brachial pulse is located medial to the biceps tendon, not lateral. C. Wrong. Bates does not mention to only “lightly” palpate to properly feel the pulse D. CORRECT. The palpation of the brachial pulse is best felt at the antecubital crease, just medial to the biceps tendon. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 17, Page 944."}, {"id": "q256", "pdfPage": 126, "originalNumber": "35", "question": "Proper examination of popliteal fossa 35. ANSWER: A 21", "options": [{"letter": "A", "text": "Ensure legs are relaxed and somewhat flexed"}, {"letter": "B", "text": "Patient should stand erect or straight"}, {"letter": "C", "text": "Palpate pulse just superior to fossa"}, {"letter": "D", "text": "Prone position while leg is extended"}], "answer": "A", "answerText": "Ensure legs are relaxed and somewhat flexed", "explanation": "A. CORRECT. Relaxing and slightly flexing the knee allows the examiner to palpate the popliteal artery easily without tension in the surrounding muscles. B. Wrong. Standing makes the popliteal artery less accessible and is not recommended for pulse palpation. C. Wrong. The popliteal pulse is palpated within the fossa, not above it. D. Wrong. Full extension of the leg makes the popliteal artery deeper and harder to palpate; slight flexion is preferred. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 17, Page 952."}, {"id": "q257", "pdfPage": 127, "originalNumber": "36", "question": "Which does NOT describe a correct procedure in palpating peripheral arterial pulses?", "options": [{"letter": "A", "text": "Palpate the dorsum of the foot lateral to the extensor tendon of the great toe"}, {"letter": "B", "text": "Curve your fingers superior to the medial malleolus of the ankle"}, {"letter": "C", "text": "Press deeply below the inguinal ligament and about midway between the ASIS and symphysis pubis"}, {"letter": "D", "text": "Cannot palpate if edematous"}], "answer": "B", "answerText": "Curve your fingers superior to the medial malleolus of the ankle", "explanation": "36. ANSWER: B A. Wrong. Correctly describes palpation of the dorsalis pedis pulse. B. CORRECT. Incorrect technique: the posterior tibial pulse is palpated posterior and slightly inferior to the medial malleolus, not superior. C. Wrong. Correctly describes palpation of the femoral artery. D. Wrong. Edema may make pulses harder to feel, but they can usually still be palpated with careful technique. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 16, Page 953."}, {"id": "q258", "pdfPage": 127, "originalNumber": "37", "question": "Based on the grading of peripheral pulse, a pulse that is bounding is considered as:", "options": [{"letter": "A", "text": "3+"}, {"letter": "B", "text": "2+"}, {"letter": "C", "text": "1+"}, {"letter": "D", "text": "0"}], "answer": "A", "answerText": "3+", "explanation": "37. ANSWER: A A. CORRECT. Describes peripheral pulse grade 3+ B. Wrong. Brisk, expected (normal) C. Wrong. Diminished, weaker than expected D. Wrong. Absent, unable to palpate Source: Bates’ Guide 12th Ed. Chapter 12, page 522"}, {"id": "q259", "pdfPage": 127, "originalNumber": "38", "question": "Organ in RUQ", "options": [{"letter": "A", "text": "Spleen"}, {"letter": "B", "text": "Sigmoid colon"}, {"letter": "C", "text": "Gallbladder"}, {"letter": "D", "text": "Appendix"}], "answer": "C", "answerText": "Gallbladder", "explanation": "38. ANSWER: C A. Wrong. Found in LUQ B. Wrong. Found in LLQ C. CORRECT. Found in RUQ D. Wrong. Found in RLQ"}, {"id": "q260", "pdfPage": 128, "originalNumber": "39", "question": "What is the correct sequence of abdominal assessment?", "options": [{"letter": "A", "text": "Inspection → Auscultation → Percussion → Palpation"}, {"letter": "B", "text": "Auscultation → Percussion → Palpation → Inspection"}, {"letter": "C", "text": "Inspection → Auscultation → Palpation → Percussion"}, {"letter": "D", "text": "Percussion → Inspection → Auscultation → Palpation"}], "answer": "A", "answerText": "Inspection → Auscultation → Percussion → Palpation", "explanation": "39. ANSWER: A A. CORRECT. This is the correct sequence of abdominal assessment B. Wrong. Wrong sequence C. Wrong. Wrong sequence D. Wrong. Wrong sequence Source: Bates’ Guide 12th Ed. Chapter 11, page 471-473"}, {"id": "q261", "pdfPage": 129, "originalNumber": "40", "question": "High pitch tinkling bowel sounds are most commonly associated with:", "options": [{"letter": "A", "text": "Normal peristalsis"}, {"letter": "B", "text": "Small bowel obstruction"}, {"letter": "C", "text": "Ileus"}, {"letter": "D", "text": "Peritonitis"}], "answer": "B", "answerText": "Small bowel obstruction", "explanation": "40. ANSWER: B A. Wrong. Normal bowel sounds are softer, gurgling, irregular B. CORRECT. High-pitched, tinkling bowel sounds are classically associated with mechanical small bowel obstruction C. Wrong. Decreased or absent bowel sounds D. Wrong. Often leads to absent or hypoactive bowel sounds due to paralytic ileus Source: Bates’ Guide 12th Ed. Chapter 11, page 501"}, {"id": "q262", "pdfPage": 129, "originalNumber": "41", "question": "A soft, reducible bulge in the inguinal region", "options": [{"letter": "A", "text": "Direct hernia"}, {"letter": "B", "text": "Indirect hernia"}, {"letter": "C", "text": "Femoral hernia"}, {"letter": "D", "text": "Ventral hernia"}], "answer": "C", "answerText": "Femoral hernia", "explanation": "41. ANSWER: C A. Wrong. Protrudes medially to inferior epigastric vessels through Hesselbach’s triangle Usually occurs in older adults B. CORRECT. Follows the deep inguinal ring → inguinal canal → possibly scrotum Usually lateral to the inferior epigastric vessels Common in younger males and may be congenital (patent processus vaginalis) C. Wrong. Below the inguinal ligament, more common in women, higher risk of strangulation D. Wrong. Occurs in the abdominal wall, not specifically in the inguinal region Source: Bates’ Guide 12th Ed. Chapter 13, page 561"}, {"id": "q263", "pdfPage": 130, "originalNumber": "42", "question": "A liver edge palpable 2cm below the costal margin of a thin adult typically,", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Hepatomegaly"}, {"letter": "C", "text": "Splenomegaly"}, {"letter": "D", "text": "Ascites"}], "answer": "A", "answerText": "Normal", "explanation": "42. ANSWER: A A. CORRECT. In a thin adult, a liver edge that is palpable up to ~3 cm below the right costal margin on deep inspiration is typically considered normal. B. Wrong. In a thin adult, palpability up to 2 cm can be normal, so this finding alone does not indicate hepatomegaly C. Wrong. The spleen is palpated in the left upper quadrant, whereas the liver is in the right upper quadrant. D. Wrong. Ascites does not cause the liver edge itself to be palpable below the costal margin. Source: Bates’ Guide 12th Ed. Chapter 11, page 478"}, {"id": "q264", "pdfPage": 130, "originalNumber": "43", "question": "A 25 year old woman presented with RLQ pain that started in the umbilicus and radiated downward. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Cholecystitis"}, {"letter": "B", "text": "Appendicitis"}, {"letter": "C", "text": "Diverticulitis"}, {"letter": "D", "text": "Pancreatitis"}], "answer": "B", "answerText": "Appendicitis", "explanation": "43. ANSWER: B A. Wrong. Causes right upper quadrant (RUQ) pain, often radiating to the shoulder. B. CORRECT. Appendicitis classically presents with pain that begins in the periumbilical (umbilical) region and then migrates to the right lower quadrant (RLQ). This occurs because early appendiceal inflammation causes visceral pain (referred to the umbilicus), which later becomes localized somatic pain when the parietal peritoneum is involved. C. Wrong. Typically causes left lower quadrant (LLQ) pain. D. Wrong. Causes epigastric pain radiating to the back. Source: Bates’ Guide 12th Ed. Chapter 11, page 486"}, {"id": "q265", "pdfPage": 130, "originalNumber": "44", "question": "A spleen palpable below the costal margin and moving inferomedially on inspiration. This is consistent with:", "options": [{"letter": "A", "text": "Hepatic enlargement"}, {"letter": "B", "text": "Splenomegaly"}, {"letter": "C", "text": "Renal enlargement"}, {"letter": "D", "text": "Normal variant"}], "answer": "B", "answerText": "Splenomegaly", "explanation": "44. ANSWER: B A. Wrong. B. CORRECT. Splenomegaly is eight times more likely when the spleen is palpable below the costal margin. C. Wrong. D. Wrong."}, {"id": "q266", "pdfPage": 131, "originalNumber": "45", "question": "A patient has distended abdominal pain relieved, (+) Grey Turner Sign, (+) Increased lipase enzyme. This suggests:", "options": [{"letter": "A", "text": "Gastric Ulcers"}, {"letter": "B", "text": "Small Bowel Obstruction"}, {"letter": "C", "text": "Pancreatitis"}, {"letter": "D", "text": "Appendicitis"}], "answer": "C", "answerText": "Pancreatitis", "explanation": "45. ANSWER: C A. Wrong. Peptic ulcer disease may cause epigastric pain, but it does not explain Grey Turner sign or elevated lipase, which are markers of retroperitoneal inflammation and pancreatic injury. B. Wrong. SBO presents with abdominal distension and pain, often with vomiting and altered bowel sounds, but it does not cause elevated pancreatic enzymes or retroperitoneal hemorrhage manifested as Grey Turner sign. C. CORRECT. Acute pancreatitis classically presents with severe abdominal pain, often relieved by leaning forward, elevated serum lipase, and may show Grey Turner sign, indicating retroperitoneal hemorrhage from pancreatic inflammation. D. Wrong. Appendicitis causes localized right lower quadrant pain and systemic inflammatory signs but is not associated with elevated lipase or flank ecchymosis. Note: (+) Grey Turner = 1st picture Abdominal Pain = 2nd picture Increased pancreatic lipase = 3rd picture Source: Bate’s 13th Ed; Chapter Chapter 6, Page 208 & Robbin’s; Chapter 2; Page 41"}, {"id": "q267", "pdfPage": 132, "originalNumber": "47", "question": "During abdominal examination, the patient becomes tachypneic and visibly uncomfortable. What is the most appropriate next step?", "options": [{"letter": "A", "text": "Continue the examination quickly to finish sooner"}, {"letter": "B", "text": "Stop and reassure the patient"}, {"letter": "C", "text": "Increase pressure on palpation to localize tender area"}, {"letter": "D", "text": "Proceed to Percussion"}], "answer": "B", "answerText": "Stop and reassure the patient", "explanation": "47. ANSWER: B. A. Wrong. Speed does not resolve patient distress and often increases muscle guarding, making the exam clinically useless. B. CORRECT. In clinical practice, the safety, comfort, and cooperation of the patient are paramount to obtaining an accurate physical assessment. C. Wrong. Increasing pressure when a patient is already in pain or uncomfortable is counterproductive and may cause unnecessary suffering. D. Wrong. Jumping to the next step of the exam ignores the patient's immediate physiological and emotional state. In the \"IAPP\" (Inspection, Auscultation, Percussion, Palpation) sequence, if the patient becomes unstable at any point, the priority shifts to patient stabilization and reassurance."}, {"id": "q268", "pdfPage": 133, "originalNumber": "48", "question": "A patient presents with black, tarry stools and epigastric pain that improves with meals. Which finding is most consistent with this presentation?", "options": [{"letter": "A", "text": "Lower gastrointestinal bleeding"}, {"letter": "B", "text": "Gastric ulcer"}, {"letter": "C", "text": "Hemorrhoids"}, {"letter": "D", "text": "Anal fissure"}], "answer": "C", "answerText": "Hemorrhoids", "explanation": "48. ANSWER: C A. Wrong.Typically causes bright red or maroon blood, not black tarry stools. B. CORRECT. Black, tarry stools (melena) indicate upper gastrointestinal bleeding, because blood is digested as it passes through the GI tract. Ulcers can bleed, producing melena. C. Wrong. Cause bright red blood on toilet paper or stool, usually painless. D. Wrong. Causes severe anal pain with defecation and bright red blood, not melena. Source: Bates’ Physical Diagnosis 12th Ed., Chapter 11: Abdomen, page 495"}, {"id": "q269", "pdfPage": 133, "originalNumber": "49", "question": "While examining the abdomen, the patient expresses anxiety on finding. Best response would be:", "options": [{"letter": "A", "text": "“You should relax”"}, {"letter": "B", "text": "“Let’s finish first then we will talk.”"}, {"letter": "C", "text": "“I know this is stressful, I will explain every step done.”"}, {"letter": "D", "text": "“It’s probably nothing”"}], "answer": "C", "answerText": "“I know this is stressful, I will explain every step done.”", "explanation": "49. ANSWER: C A. Wrong. Dismissive; invalidates the patient’s feelings and may increase anxiety. B. Wrong. Delays emotional support and may worsen distress C. CORRECT. See ratio D. Wrong. Premature reassurance; minimizes the concern without adequate explanation"}, {"id": "q270", "pdfPage": 134, "originalNumber": "50", "question": "A distended abdomen with shifting dullness and a fluid wave is characteristic of:", "options": [{"letter": "A", "text": "Bowel obstruction"}, {"letter": "B", "text": "Ascites"}, {"letter": "C", "text": "Splenomegaly"}, {"letter": "D", "text": "Renal Enlargement"}], "answer": "B", "answerText": "Ascites", "explanation": "50. ANSWER: B A. Wrong. While a bowel obstruction causes a protuberant abdomen, it is typically tympanitic throughout due to gaseous distention B. CORRECT. In a patient with ascites, the border between tympany (from gas in the bowel) and dullness (from the fluid) will move when the patient changes position. When the patient rolls onto one side, the dullness shifts to the more dependent side while the tympany shifts to the top C. Wrong. An enlarged spleen (splenomegaly) will produce a fixed area of dullness D. Wrong. Enlarged kidneys are typically felt deep in the quadrants and do not cause the generalized shifting dullness or fluid transmission seen with free peritoneal fluid"}, {"id": "q271", "pdfPage": 134, "originalNumber": "51", "question": "Best position in performing male rectal exam", "options": [{"letter": "A", "text": "Prone"}, {"letter": "B", "text": "Lithotomy"}, {"letter": "C", "text": "Lateral decubitus"}, {"letter": "D", "text": "Supine"}], "answer": "C", "answerText": "Lateral decubitus", "explanation": "51. ANSWER: C A. Wrong. Prone position is not practical and provides poor access for digital rectal examination. B. Wrong. Lithotomy position is mainly used in gynecologic or operative procedures, not routine male rectal exam. C. CORRECT. Lateral decubitus (left lateral / Sims’ position) is the best and most commonly used position for performing a male digital rectal examination, providing comfort and adequate access. D. Wrong. Supine position does not allow optimal access or examiner control for rectal examination."}, {"id": "q272", "pdfPage": 135, "originalNumber": "52", "question": "Which of the following findings on digital rectal examination (DRE) is most consistent with a normal prostate gland?", "options": [{"letter": "A", "text": "Boggy and tender prostate"}, {"letter": "B", "text": "Rubbery, smooth, and symmetric prostate with a palpable median sulcus"}, {"letter": "C", "text": "Hard, irregular prostate with nodules"}, {"letter": "D", "text": "Enlarged prostate with obliteration of the median sulcus"}], "answer": "B", "answerText": "Rubbery, smooth, and symmetric prostate with a palpable median sulcus", "explanation": "52. ANSWER: B A. Wrong. A boggy and tender prostate is characteristic of acute prostatitis, often associated with infection and inflammation. This finding is abnormal and may be accompanied by systemic symptoms such as fever and dysuria. B. CORRECT. A normal prostate on DRE is firm or rubbery in consistency, smooth, and bilaterally symmetric, with a clearly palpable median sulcus. These features indicate the absence of inflammation, hyperplasia, or malignancy. C. Wrong. A hard, irregular prostate with nodules is suspicious for prostate carcinoma. Malignant prostates often lose their smooth contour and may feel asymmetrical or fixed. D. Wrong. Enlargement with loss of the median sulcus is typical of benign prostatic hyperplasia (BPH). Although usually nonmalignant, this is not a normal finding on DRE. Source: Bates’ Physical Diagnosis 13th Ed., Chapter 22: Anus, Rectum, and Prostate"}, {"id": "q273", "pdfPage": 135, "originalNumber": "53", "question": "Bright red blood on toilet paper", "options": [{"letter": "A", "text": "Gastric ulcer"}, {"letter": "B", "text": "Hemorrhoids"}, {"letter": "C", "text": "Melena"}, {"letter": "D", "text": "Intestinal obstruction"}], "answer": "B", "answerText": "Hemorrhoids", "explanation": "53. ANSWER: B A. Wrong. Bleeding from a gastric ulcer is an upper GI bleed. Typically presents as melena (black, tarry stools) or hematemesis. Not bright red blood on toilet paper B. CORRECT. Hemorrhoids are dilated venous plexuses in the anal canal. Cause fresh, bright red blood, often seen on toilet paper or coating the stool. Usually painless (internal hemorrhoids) C. Wrong. Melena describes black, tarry stools. Indicates digested blood from an upper GI source 30 D. Wrong. Presents with abdominal pain, distension, vomiting, constipation. Bleeding is not a typical feature"}, {"id": "q274", "pdfPage": 136, "originalNumber": "54", "question": "A digital rectal examination reveals a prostate that is firm, irregular, and nodular. Which of the following conditions is the most likely diagnosis?", "options": [{"letter": "A", "text": "Benign prostatic hyperplasia (BPH)"}, {"letter": "B", "text": "Acute prostatitis"}, {"letter": "C", "text": "Prostate cancer"}, {"letter": "D", "text": "Hydroureter"}], "answer": "C", "answerText": "Prostate cancer", "explanation": "54. ANSWER: C A. Wrong. BPH typically presents with a smooth, symmetrically enlarged, and rubbery prostate. Nodularity and irregular firmness are not characteristic features of BPH. B. Wrong. Acute prostatitis usually produces a boggy, swollen, and very tender prostate on DRE. The prostate is not typically firm or nodular, and examination may be painful. C. CORRECT. Prostate cancer classically presents as a hard, firm, irregular, and nodular prostate on digital rectal examination. These findings reflect malignant infiltration and loss of normal glandular architecture. D. Wrong. Hydroureter refers to dilatation of the ureter, usually secondary to urinary tract obstruction. It is not a prostate condition and cannot be diagnosed by prostate palpation on DRE. Source: Bates’ Physical Diagnosis 13th Ed., Chapter 22: Anus, Rectum, and Prostate"}, {"id": "q275", "pdfPage": 136, "originalNumber": "55", "question": "65 y.o man present with weak urinary stream dribbling, prostate is enlarged, smooth, and asymmetric. This is most likely:", "options": [{"letter": "A", "text": "Prostate cancer"}, {"letter": "B", "text": "BPH"}, {"letter": "C", "text": "Prostatitis"}, {"letter": "D", "text": "Urethral stricture"}], "answer": "B", "answerText": "BPH", "explanation": "55. ANSWER: B A. Wrong. Prostate cancer classically presents with a hard, irregular, nodular prostate, not smooth. B. CORRECT. Benign prostatic hyperplasia (BPH) presents with weak urinary stream and dribbling, and the prostate is typically enlarged and smooth (often symmetric, but may appear asymmetric). C. Wrong. Prostatitis usually presents with tenderness, pain, and systemic symptoms, not a smooth enlarged prostate. D. Wrong. Urethral stricture causes obstructive urinary symptoms but does not cause prostate enlargement."}, {"id": "q276", "pdfPage": 137, "originalNumber": "56", "question": "A patient has painless rectal bleeding with a mass on digital exam. This is most concerning for:", "options": [{"letter": "A", "text": "Hemorrhoids"}, {"letter": "B", "text": "Cancer"}, {"letter": "C", "text": "Anal fissure"}, {"letter": "D", "text": "Proctitis"}], "answer": "B", "answerText": "Cancer", "explanation": "56. ANSWER: B A. Wrong. Hemorrhoids — While hemorrhoids are a common cause of rectal bleeding, they are typically painful if thrombosed and do not present as a discrete mass on digital rectal exam; here, the finding of a mass plus painless bleeding raises a higher suspicion for malignancy. B. CORRECT. Cancer — Bates emphasizes that a palpable rectal mass with painless rectal bleeding is a classic “red flag” presentation for colorectal or anal cancer, requiring prompt endoscopic evaluation. C. Wrong. Anal fissure — Anal fissures characteristically cause painful rectal bleeding, especially during defecation, not painless bleeding, and do not present as a palpable mass. D. Wrong. Proctitis — Proctitis often presents with bleeding, but it is typically associated with pain, tenesmus, and mucoid discharge, not a discrete mass. Source: Bates Physical Examination 13th Edition"}, {"id": "q277", "pdfPage": 137, "originalNumber": "57", "question": "What is the most appropriate statement to say to comfort patient about the DRE if about to refuse (non-verbatim)", "options": [{"letter": "A", "text": "You’ll be fine. It’s nothing"}, {"letter": "B", "text": "Proceed anyways"}, {"letter": "C", "text": "Explain to the patient the procedure and what to expect"}, {"letter": "D", "text": "Do nothing"}], "answer": "C", "answerText": "Explain to the patient the procedure and what to expect", "explanation": "57. ANSWER: C A. Wrong. Patient comfort should always be part of the procedure B. Wrong. Not a patient centered approach C. CORRECT. He should be aware on what to do and what to expect D. Wrong. Because why Can’t find a word for word na ratio but this will do since sabotable raman."}, {"id": "q278", "pdfPage": 138, "originalNumber": "58", "question": "45 yr old patient present with severe pain during and after defecation with a small tear posteriorly. Diagnosis:", "options": [{"letter": "A", "text": "Hemorrhoids"}, {"letter": "B", "text": "Anal fissure"}, {"letter": "C", "text": "Rectal cancer"}, {"letter": "D", "text": "Ulcerative colitis"}], "answer": "B", "answerText": "Anal fissure", "explanation": "58. ANSWER: B A. Wrong. Usually with hemorrhoids there would be the presence of blood either on the stool or toilet paper used B. CORRECT. Anal fissure is a very painful tear/ulceration of the anoderm causing pain during defecation C. Wrong. Rectal cancer is often diagnosed with the palpation or presence of nodules, irregularities or induration. D. Wrong. Ulcerative colitis is often associated with acute diarrhea with noninfectious origin Source: Bates Physical Examination 13th Edition chapter 22"}, {"id": "q279", "pdfPage": 138, "originalNumber": "59", "question": "Best technique in breast examination", "options": [{"letter": "A", "text": "Random circular motion"}, {"letter": "B", "text": "Vertical strip pattern"}, {"letter": "C", "text": "Zig zag superficial pattern"}, {"letter": "D", "text": "One handed sweeping"}], "answer": "B", "answerText": "Vertical strip pattern", "explanation": "59. ANSWER: B A. Wrong. Not the best technique for breast examination B. CORRECT. According to Bates, this is the best technique for breast examination C. Wrong. Not the best technique for breast examination D. Wrong. Not the best technique for breast examination"}, {"id": "q280", "pdfPage": 139, "originalNumber": "60", "question": "Examination of the breast should be done:", "options": [{"letter": "A", "text": "Supine with arm overhead"}, {"letter": "B", "text": "Sitting with arms on side"}, {"letter": "C", "text": "Standing, leaning forward"}, {"letter": "D", "text": "B and C"}], "answer": "A", "answerText": "Supine with arm overhead", "explanation": "60. ANSWER: A A. CORRECT. This is the preferred position for palpation. Palpation is best performed with the patient lying down because it flattens the breast tissue against the chest wall B. Wrong. C. Wrong. Best for inspection to visualize any dimpling. D. Wrong. Source: Bates Physical Examination 13th Edition. Chapter 18"}, {"id": "q281", "pdfPage": 139, "originalNumber": "61", "question": "Firm, irregular nodules in the breast that varies with menses most likely indicate", "options": [{"letter": "A", "text": "Fibrocystic changes"}, {"letter": "B", "text": "Carcinoma"}, {"letter": "C", "text": "Mastitis"}, {"letter": "D", "text": "Paget’s disease"}], "answer": "A", "answerText": "Fibrocystic changes", "explanation": "61. ANSWER: A A. Correct. Fibrocystic changes are also commonly palpable as nodular, rope-like densities in women aged 25-50 years (refer to next ratio below). B. Wrong. Carcinoma presents as irregular or stellate, firm or hard, fixed, nontender, and no clear delineation C. Wrong. Mastitis presents as redness, heat, swelling, and intense pain; usually associated with breastfeeding. D. Wrong. Paget’s disease usually starts as scaly, eczema-like lesion on the nipple that may weep, crust, or erode"}, {"id": "q282", "pdfPage": 140, "originalNumber": "62", "question": "A firm, mobile, well circumscribed mass in a young woman's breast?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Mastitis"}, {"letter": "C", "text": "Carcinoma"}, {"letter": "D", "text": "Cyst"}], "answer": "A", "answerText": "Fibroadenoma", "explanation": "62. ANSWER: A A. CORRECT. B. Wrong Painful, inflamed, usually associated with fever and lactation. C. Wrong. Typically hard, irregular, fixed, more common in older women D. Wrong. Fits the description but is more common in 30 to 50 year olds"}, {"id": "q283", "pdfPage": 141, "originalNumber": "63", "question": "Skin dimpling and nipple retraction are most indicative of:", "options": [{"letter": "A", "text": "Fibrocystic disease"}, {"letter": "B", "text": "Fat necrosis"}, {"letter": "C", "text": "Malignancy"}, {"letter": "D", "text": "Mastitis"}], "answer": "C", "answerText": "Malignancy", "explanation": "63. ANSWER: C A. Wrong. It does not cause skin dimpling and nipple retraction. B. Wrong. Nipple retraction are not typical C. CORRECT. Breast dimpling or retraction suggests an underlying cancer. D. Wrong. It does not show skin dimpling and nipple retraction."}, {"id": "q284", "pdfPage": 141, "originalNumber": "64", "question": "Patient with erythema, warm, and tenderness on one breast while breastfeeding", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Mastitis"}, {"letter": "C", "text": "Carcinoma"}, {"letter": "D", "text": "Paget disease"}], "answer": "B", "answerText": "Mastitis", "explanation": "64. ANSWER: B A. Wrong. Fibroadenoma is usually painless, firm, and not associated with inflammation B. CORRECT. Mastitis commonly occurs in breastfeeding women and presents with localized erythema, warmth, tenderness, sometimes with fever and malaise C. Wrong. Carcinoma typically presents as a hard, non-tender mass; inflammatory signs are uncommon early D. Wrong. Paget disease involves eczematous changes of the nipple and areola, not acute breast tenderness during lactation Source: Bates’ Physical Diagnosis 13th Ed., Chapter 26: Pregnant Woman"}, {"id": "q285", "pdfPage": 141, "originalNumber": "65", "question": "Palpation of axilla includes: 36", "options": [{"letter": "A", "text": "Posterior axillary folds only"}, {"letter": "B", "text": "Central, Lateral, posterior, and anterior axillary folds"}, {"letter": "C", "text": "Central nodes only"}, {"letter": "D", "text": "Supraclavicular nodes only"}], "answer": "B", "answerText": "Central, Lateral, posterior, and anterior axillary folds", "explanation": "65. ANSWER: B A. Wrong. Misses central, anterior, and lateral node groups B. CORRECT. This reflects the complete axillary lymph node examination described in Bates C. Wrong. Central nodes are important but not sufficient alone D. Wrong. Supraclavicular nodes are examined separately, not part of axillary palpation Bates 12th Edition Ch10 Breast and Axillae page 440 - 441"}, {"id": "q286", "pdfPage": 142, "originalNumber": "66", "question": "Which approach best ensures privacy during a breast exam?", "options": [{"letter": "A", "text": "Asking the px to undress fully"}, {"letter": "B", "text": "Keeping the gown open completely in front"}, {"letter": "C", "text": "Exposing only one breast at a time"}, {"letter": "D", "text": "Turn off all the lights"}], "answer": "C", "answerText": "Exposing only one breast at a time", "explanation": "66. ANSWER: C A. Wrong. Full undressing reduces privacy and is unnecessary for the exam B. Wrong. TThis exposes both breasts and compromises patient comfort C. CORRECT. It preserves maximum privacy and dignity while allowing proper examination D. Wrong. This prevents proper visualization and is not a standard privacy measure"}, {"id": "q287", "pdfPage": 143, "originalNumber": "67", "question": "This maneuver helps differentiate hydrocele from hernia.", "options": [{"letter": "A", "text": "Transillumination Test"}, {"letter": "B", "text": "Testicular Self Exam"}, {"letter": "C", "text": "Palpating just above the scrotum"}, {"letter": "D", "text": "Palpating the inguinal canal"}], "answer": "A", "answerText": "Transillumination Test", "explanation": "67. ANSWER: A A. CORRECT. A hydrocele transilluminates due to clear serous fluid, whereas a hernia contains bowel or omentum and does not transilluminate B. Wrong. Testicular self-examination is a screening technique for testicular masses and does not differentiate hydrocele from hernia. C. Wrong. Palpating just above the scrotum helps assess whether a mass is scrotal or inguinal, but it does not specifically distinguish hydrocele from hernia. D. Wrong. Palpating the inguinal canal is useful for detecting an inguinal hernia, but it does not reliably differentiate it from a hydrocele, which is best done by transillumination. Bates’, PDF p. 1135"}, {"id": "q288", "pdfPage": 143, "originalNumber": "68", "question": "In hydrocele, there is fluid accumulation in the potential space formed by", "options": [{"letter": "A", "text": "Parietal and visceral layers"}, {"letter": "B", "text": "Parietal"}, {"letter": "C", "text": "Visceral"}, {"letter": "D", "text": "Inguinal canal"}], "answer": "A", "answerText": "Parietal and visceral layers", "explanation": "68. ANSWER: A A. CORRECT. The the parietal and viscera layers form the potential place where the fluid of a hydrocele accumulates B. Wrong. It should be parietal and visceral layers that form the potential space C. Wrong. It should be parietal and visceral layers that form the potential space D. Wrong. It should be parietal and visceral layers that form the potential space"}, {"id": "q289", "pdfPage": 143, "originalNumber": "69", "question": "Proper technique in palpation of the scrotum:", "options": [{"letter": "A", "text": "Always use 2 hands, cradle the testis at both poles in the thumb and both fingers"}, {"letter": "B", "text": "Palpate the scrotal contents with light and deep palpation frequently changing the position of your hands"}, {"letter": "C", "text": "AOTA"}, {"letter": "D", "text": "Using one hand, palpate each testis"}], "answer": "D", "answerText": "Using one hand, palpate each testis", "explanation": "69. ANSWER: D A. Wrong. It’s not always the case to use both hands. A single hand may be a better option. However, the technique is correct. B. Wrong.Your hands should never change positions when palpating. C. Wrong. A & B are incorrect D. CORRECT. It is the correct technique to palpating the testis up to the epididymis"}, {"id": "q290", "pdfPage": 144, "originalNumber": "70", "question": "Juan noticed a severe pruritus in his genital area. Upon inspection you notice several excoriations in his penis and pubic area, what is this indicative of?", "options": [{"letter": "A", "text": "Diabetes"}, {"letter": "B", "text": "Hypersensitivity reaction"}, {"letter": "C", "text": "Crabs"}, {"letter": "D", "text": "Syphilis"}], "answer": "C", "answerText": "Crabs", "explanation": "70. ANSWER: C A. Wrong. Pruritus in diabetes is more generalized or due to candidiasis, not isolated pubic-area itching with excoriations. B. Wrong. It would usually present with rash, erythema, or urticaria, not isolated pubic excoriations. C. CORRECT. Pubic lice cause severe localized genital pruritus with excoriations from scratching—classic for pediculosis pubis (crabs). D. Wrong. Primary syphilis causes a painless chancre, not pruritus or excoriations. source: Bates 12E Ch. 14 , pg 589"}, {"id": "q291", "pdfPage": 144, "originalNumber": "71", "question": "Uncircumcised male patient, you ask him to retract the prepuce and noticed a cheesy whitish material under the foreskin. The next best step is to:", "options": [{"letter": "A", "text": "Ask the patient if he noted any penile discharges"}, {"letter": "B", "text": "Smell the whitish material for possible bacterial infection"}, {"letter": "C", "text": "Milk the shaft of the penis to expel any discharges from urethral meatus"}, {"letter": "D", "text": "NOTA since it is a normal discharge"}], "answer": "D", "answerText": "NOTA since it is a normal discharge", "explanation": "71. ANSWER: D A. Wrong. Not necessary if there are no symptoms and the finding is consistent with smegma. B. Wrong. Clinically inappropriate and unnecessary. C. Wrong. Done when urethral discharge is suspected (e.g., urethritis), which is not suggested here. D. CORRECT. The cheesy, whitish material seen under the foreskin of an uncircumcised male is smegma, which is a normal accumulation of desquamated epithelial cells, skin oils, and moisture. It is not a pathologic discharge and does not indicate infection by itself. Source: Bates’ Physical Diagnosis 13th Ed., Chapter 20"}, {"id": "q292", "pdfPage": 144, "originalNumber": "72", "question": "Primary syphilis", "options": [{"letter": "A", "text": "Incubation period is 3-7 days after lesion"}, {"letter": "B", "text": "Deep ulceration"}, {"letter": "C", "text": "Painless chancre with indurated borders"}, {"letter": "D", "text": "Buboes &"}], "answer": "C", "answerText": "Painless chancre with indurated borders", "explanation": "72. ANSWER: C A. Wrong. The incubation period is usually 9–90 days. B. Wrong. The chancre is usually shallow, not deep. C. CORRECT. D. Wrong. Buboes are typical of chancroid. Syphilis causes non-tender regional lymphadenopathy, but not buboes."}, {"id": "q293", "pdfPage": 145, "originalNumber": "73", "question": "In patients with high risk behavior and you suspect oral-penile transmission, you ask for the following symptoms EXCEPT:", "options": [{"letter": "A", "text": "Sore Throat"}, {"letter": "B", "text": "Fever"}, {"letter": "C", "text": "Diarrhea"}, {"letter": "D", "text": "Anal Pruritus"}], "answer": "B", "answerText": "Fever", "explanation": "73. ANSWER: B A. Wrong. It is one of the symptoms being asked in patients with high-risk behavior and suspected oral-penile transmission. B. CORRECT. It is not one of the symptoms being asked in patients with high-risk behavior and suspected oral-penile transmission. C. Wrong. It is one of the symptoms being asked in patients with high-risk behavior and suspected oral-penile transmission. D. Wrong. It is one of the symptoms being asked in patients with high-risk behavior and suspected oral-penile transmission. Source: Bates’ Physical Diagnosis 13th Ed., Chapter 20"}, {"id": "q294", "pdfPage": 145, "originalNumber": "74", "question": "Which of the following describes HPV lesion", "options": [{"letter": "A", "text": "Single or multiple papule or plaque"}, {"letter": "B", "text": "May be round, accuminated, or slender and thin"}, {"letter": "C", "text": "Raised, flat, or verrucous"}, {"letter": "D", "text": "AOTA"}], "answer": "D", "answerText": "AOTA", "explanation": "74. ANSWER: D A. True B. True C. True D. CORRECT because all the other choices describe HPV lesion making D the best answer."}, {"id": "q295", "pdfPage": 146, "originalNumber": "75", "question": "Grayish-white discharge. Suspected Candida vaginitis. Which of the following will support your impression?", "options": [{"letter": "A", "text": "On going antibiotic treatment"}, {"letter": "B", "text": "Multiple sexual partners"}, {"letter": "C", "text": "New partner"}, {"letter": "D", "text": "Unrecalled"}], "answer": "A", "answerText": "On going antibiotic treatment", "explanation": "75. ANSWER: A A. CORRECT. Antibiotic therapy is one of the predisposing factors for Candidiasis. B. Wrong. More common to bacterial vaginosis which is often transmitted sexually. C. Wrong. Candidiasis is endogenous and is not acquired from a partner. D. Unrecalled Source: Bates 13th Ed, Chapter 21 Female Genitalia"}, {"id": "q296", "pdfPage": 146, "originalNumber": "76", "question": "Orchid complains of whitish to grayish vaginal discharge with unpleasant odor. Discharge increases after intercourse. What is the primary diagnosis?", "options": [{"letter": "A", "text": "Trichomonal vaginitis"}, {"letter": "B", "text": "Bacterial vaginosis"}, {"letter": "C", "text": "Candida vaginitis"}, {"letter": "D", "text": "Gonorrhea"}], "answer": "B", "answerText": "Bacterial vaginosis", "explanation": "76. ANSWER: B A. Wrong. This diagnosis will have a yellowish green or gray discharge and may be malodorous; will not increase after intercourse B. CORRECT. This describes bacterial vaginosis C. Wrong. Discharge will be white, curdy and may be malodorous; will not increase after intercourse D. Wrong. Will produce a purulent yellow drainage from cervical os."}, {"id": "q297", "pdfPage": 148, "originalNumber": "77", "question": "Daisy complains of grayish to whitish foul smelling vaginal discharge. She also claims pruritis. On physical examination you noticed that the vulva is inflamed but the vaginal mucosa looks normal. Impression?", "options": [{"letter": "A", "text": "Trichomonal vaginitis"}, {"letter": "B", "text": "Bacterial vaginosis"}, {"letter": "C", "text": "Candida vaginitis"}, {"letter": "D", "text": "Gonorrhea"}], "answer": "B", "answerText": "Bacterial vaginosis", "explanation": "77. ANSWER: B A. Wrong. It usually produces frothy yellow-green discharge, not grayish to whitish. B. CORRECT. It is characterized by gray or white discharge with foul odor. C. Wrong. It causes thick white curd-like discharge, not grayish to whitish foul smelling discharge. D. Wrong. Discharge is often mucopurulent (mucus and pus) and comes from the cervix."}, {"id": "q298", "pdfPage": 149, "originalNumber": "78", "question": "Lisa, 42yo, Married, G4P4. LMP: December 6 2025, PMP: November 26 2025, November 10 2025", "options": [{"letter": "A", "text": "Menorrhagia"}, {"letter": "B", "text": "Metrorrhagia"}, {"letter": "C", "text": "Menometrorrhagia"}, {"letter": "D", "text": "Polymenorrhagia"}], "answer": "B", "answerText": "Metrorrhagia", "explanation": "78. ANSWER: B A. Wrong. Because this involves heavy or prolonged bleeding at regular intervals which the patient does not exhibit B. CORRECT. This involves bleeding at irregular intervals between expected periods which the patient exhibits C. Wrong. This involves heavy, prolonged bleeding that occurs irregularly which the patient does not exhibit D. Wrong. This is bleeding that occurs too frequently often at relatively regular intervals which the patient does not exhibit"}, {"id": "q299", "pdfPage": 149, "originalNumber": "79", "question": "Ellen 26/F was brought to the clinic by her mother due to amenorrhea LMP: Oct. 14, 2022 PMP: Sept. 10, 2022 She recently started a new job. What is your primary impression:", "options": [{"letter": "A", "text": "Stress"}, {"letter": "B", "text": "Hormonal Imbalance"}, {"letter": "C", "text": "Pregnancy"}, {"letter": "D", "text": "Malignancy"}], "answer": "C", "answerText": "Pregnancy", "explanation": "79. ANSWER: C A. Wrong. Though stress can cause hypothalamic amenorrhea, it is only considered after pregnancy is ruled out. B. Wrong. Though hormonal imbalances may occur like PCOS, this still requires labs and exclusion of pregnancy first. C. CORRECT. Pregnancy as the primary impression is always favored when a woman is of reproductive age and is experiencing amenorrhea. Pregnancy must always be excluded first before considering other causes. D. Wrong. Amenorrhea at this age due to malignancy is rare especially without red flags such as weight loss, bleeding, and pain."}, {"id": "q300", "pdfPage": 150, "originalNumber": "80", "question": "Beth 48/F, G0P0 LMP DEC. 5, 2022 PMP NOV. 21, 2021", "options": [{"letter": "A", "text": "Abnormal uterine bleeding"}, {"letter": "B", "text": "Oligomenorrhea"}, {"letter": "C", "text": "Post coital bleeding"}, {"letter": "D", "text": "Postmenopausal bleeding"}], "answer": "D", "answerText": "Postmenopausal bleeding", "explanation": "80. ANSWER: D A. Wrong. too broad; postmenopausal bleeding is a specific subtype B. Wrong. infrequent menses, but she had complete cessation C. Wrong. no mention of bleeding after intercourse D. CORRECT. This is postmenopausal bleeding because it has been >1 year since her LMP. Menopause is defined as ≥12 consecutive months of amenorrhea. From Nov 21, 2021 → Dec 5, 2022, she already had >12 months without menses, meaning she was postmenopausal. Bates CH14 PG 570"}, {"id": "q301", "pdfPage": 150, "originalNumber": "81", "question": "Beth 48/F G0P0 LMP = Dec 5, 2021 PMP = Nov 21, 2021 Which symptoms best define cervical cancer as your diagnosis?", "options": [{"letter": "A", "text": "Abnormal Uterine bleeding"}, {"letter": "B", "text": "Oligomenorrhea"}, {"letter": "C", "text": "Post coital bleeding"}, {"letter": "D", "text": "Postmenopausal bleeding"}], "answer": "C", "answerText": "Post coital bleeding", "explanation": "81. ANSWER: C A. Wrong. Nonspecific; more commonly due to endometrial disorders, hormonal imbalance, or fibroids, not classic for cervical cancer. B. Wrong. Infrequent menses caused by ovulatory or endocrine dysfunction (e.g., PCOS); not associated with cervical malignancy. C. CORRECT. Most characteristic symptom of cervical cancer; occurs because friable malignant cervical tissue bleeds easily after intercourse. D. Wrong. Suggests endometrial cancer first; also inappropriate here since the patient is not postmenopausal."}, {"id": "q302", "pdfPage": 150, "originalNumber": "45", "question": "excessive menstrual bleeding.", "options": [{"letter": "A", "text": "Menometrorrhagia"}, {"letter": "B", "text": "Menorrhagia"}, {"letter": "C", "text": "Metrorrhagia"}, {"letter": "D", "text": "Polymenorrhea"}], "answer": "A", "answerText": "Menometrorrhagia", "explanation": "A. Wrong. Menometrorrhagia refers to heavy bleeding that occurs irregularly and at frequent intervals, not strictly prolonged regular menses. B. CORRECT because Menorrhagia is defined as excessive or prolonged menstrual bleeding occurring at regular intervals, which fits her complaint of heavy bleeding with normal cycle frequency. C. Wrong. Metrorrhagia is bleeding between regular menstrual periods, which is not described here. D. Wrong. Polymenorrhea is menstrual cycles shorter than 21 days, which is not indicated in this case. Bates’ Guide to Physical Examination 13th e , Chapter 21 Female Genitalia"}, {"id": "q303", "pdfPage": 151, "originalNumber": "83", "question": "15-year-old teenage boy brought to the ER due to rapid progression to quadriplegia. 6 months priors, he started to have recurrent cough associated with low-grade fever and night sweats. Lately, he lost half his weight and has been complaining of neck stiffness. A day prior, he complained of severe neck pain, and was then quadriplegic. Both reflexes to arms and legs were zero. Where in the neuroaxis is the cause of his weakness? Localize.", "options": [{"letter": "A", "text": "Motor nerve originating from cervical spine C8-T1"}, {"letter": "B", "text": "Pons - brainstem"}, {"letter": "C", "text": "Spinal cord compressing the cervical spine at C3"}, {"letter": "D", "text": "Neuromuscular junction"}], "answer": "C", "answerText": "Spinal cord compressing the cervical spine at C3", "explanation": "83. ANSWER: C A. Wrong. Lesions at C8-T1 motor nerves (A) would primarily affect specific hand/arm muscles, not cause full quadriplegia. B. Wrong. Lesions in the Pons (B) often present with cranial nerve palsies, specific gaze abnormalities, and often coma, not typically the isolated picture of neck stiffness and quadriplegia. C. CORRECT. Quadriplegia (paralysis of all four limbs) indicates a severe injury high up in the spinal cord, specifically in the cervical region. Rapid progression and the presence of neck stiffness point to an acute issue directly affecting the neural tissue within the cervical spinal canal. A C3 lesion is high enough to affect motor function in both arms and legs, as well as potentially impair breathing D. Wrong. Issues with the neuromuscular junction (D), such as myasthenia gravis, typically cause fluctuating weakness and fatigue, not rapid-onset, complete paralysis accompanied by neck stiffness. Bate’s 13th, Chapter 23, page 1394"}, {"id": "q304", "pdfPage": 151, "originalNumber": "84", "question": "25-year-old woman presents with new-onset focal motor seizures at right arm, followed by numbness at right leg. She reports not being able to feel the objects she touches, which has caused her to drop them. What is the most likely location of the lesion? 84. ANSWER: B", "options": [{"letter": "A", "text": "Wrong. The temporal lobe is primarily involved in memory, hearing, and language comprehension. Seizures originating here often manifest as auras, memory issues, or complex partial seizures, not the specific motor and sensory symptoms described."}, {"letter": "B", "text": "CORRECT. Focal motor seizures at the right arm followed by numbness at the right leg suggests the lesion affects both motor 46"}], "answer": "A", "answerText": "Wrong. The temporal lobe is primarily involved in memory, hearing, and language comprehension. Seizures originating here often manifest as auras, memory issues, or complex partial seizures, not the specific motor and sensory symptoms described.", "explanation": "A. Temporal Lobe B. Parietal Cortex C. Spinal Nerve D. Thalamaus and sensory areas. The location of motor and sensory functions for the arm and leg are adjacent in the brain. Loss of the ability to feel objects she touches (astereognosis) in her right hand points specifically to a dysfunction in sensory processing. The parietal lobe is responsible for interpreting sensory information, including touch, pressure, and proprioception (the sense of where the body is in space). C. Wrong. A single spinal nerve lesion would cause sensory and motor deficits limited to the distribution of that specific nerve, not potentially widespread symptoms across arm and leg. D. Wrong. While a thalamic lesion would cause sensory deficits, the progression of a seizure originating in the thalamus is less typical than one originating in the cortex. Bate’s 13th, Chapter 24, pages 1500 - 1502"}, {"id": "q305", "pdfPage": 153, "originalNumber": "86", "question": "A 46 year old man had new onset seizures coupled with headaches that are said to be persistent and severe and would worsen on coughing and bending. The location was consistent on the left occipital area. This kind of history is suspicious for", "options": [{"letter": "A", "text": "Subarachnoid hemorrhage"}, {"letter": "B", "text": "Meningitis"}, {"letter": "C", "text": "Migraine"}, {"letter": "D", "text": "Brain Tumor"}], "answer": "D", "answerText": "Brain Tumor", "explanation": "86. ANSWER: D A. Wrong. Characterized by a “thunderclap” headache or often described by patients as the “worst headache of my life”; symptoms develop over a longer period and not suddenly. B. Wrong. Meningitis is more characterized with onset of fever and stiff neck. C. Wrong. Migraines are not characterized with sudden onset but more on recurrent severe, one-sided, throbbing headache over the years. D. CORRECT."}, {"id": "q306", "pdfPage": 154, "originalNumber": "87", "question": "87. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "87. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q307", "pdfPage": 154, "originalNumber": "88", "question": "88. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "88. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q308", "pdfPage": 154, "originalNumber": "89", "question": "89. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "89. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q309", "pdfPage": 154, "originalNumber": "90", "question": "90. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "90. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q310", "pdfPage": 154, "originalNumber": "91", "question": "Upon reading a patient’s chart, you noted the patient's motor strength graded 3/5. You expect that the patient can: 91. ANSWER: Fined NO RATIO 49", "options": [{"letter": "A", "text": "Have no evidence of fatigue while doing active movements"}, {"letter": "B", "text": "Squeeze examiner’s fingers strongly"}, {"letter": "C", "text": "Move fingers right or left"}, {"letter": "D", "text": "Bend knees while feet flat on the bed"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q311", "pdfPage": 155, "originalNumber": "92", "question": "92. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "92. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q312", "pdfPage": 155, "originalNumber": "93", "question": "93. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. __"}, {"letter": "B", "text": "Wrong. __"}, {"letter": "C", "text": "CORRECT. __"}, {"letter": "D", "text": "Wrong. __ Fined"}], "answer": "C", "answerText": "CORRECT. __", "explanation": "93. ANSWER: C A. Wrong. __ B. Wrong. __ C. CORRECT. __ D. Wrong. __ Fined"}, {"id": "q313", "pdfPage": 155, "originalNumber": "94", "question": "Patient with right facial weakness but can still raise eyebrows symmetrically. What is most likely the cause", "options": [{"letter": "A", "text": "Peripheral CN VII lesion"}, {"letter": "B", "text": "Central (upper motor neuron) lesion on CN VII"}, {"letter": "C", "text": "Lower motor neuron on CN V"}, {"letter": "D", "text": "Brain stem lesion affecting CN III"}], "answer": "B", "answerText": "Central (upper motor neuron) lesion on CN VII", "explanation": "94. ANSWER: B A. Wrong: Peripheral CN VII lesion (This would cause weakness of the entire side of the face, including the forehead). B. CORRECT: Central (upper motor neuron) lesion on CN VII C. Wrong: Lower motor neuron on CN V (CN V controls muscles of mastication/chewing, not primary facial expression). D. Wrong: Brain stem lesion affecting CN III (CN III controls eye movement and eyelid elevation, not the muscles of facial expression)."}, {"id": "q314", "pdfPage": 156, "originalNumber": "95", "question": "During a neurologic exam, a patient struggles in rapid alternating movements. This strongly suggests", "options": [{"letter": "A", "text": "Upper motor neuron lesion"}, {"letter": "B", "text": "Basal ganglion disorder"}, {"letter": "C", "text": "Cerebellar dysfunction"}, {"letter": "D", "text": "Peripheral neuropathy"}], "answer": "C", "answerText": "Cerebellar dysfunction", "explanation": "95. ANSWER: C A. Wrong. Typically causes spasticity, weakness, hyperreflexia, not impaired rapid alternating movements. B. Wrong. Causes resting tremor, rigidity, bradykinesia, not dysdiadochokinesia. C. CORRECT. Difficulty performing rapid alternating movements is called dysdiadochokinesia. D. Wrong. Causes sensory loss and distal weakness, coordination improves with visual guidance. Source: Bates, Chapter 17 The Nervous System, page 748"}, {"id": "q315", "pdfPage": 157, "originalNumber": "96", "question": "A patient loses balance when standing with feet together and eyes closed, but maintains balance when eyes are open. Which kind of deficit is indicated?", "options": [{"letter": "A", "text": "Cerebellar lesion"}, {"letter": "B", "text": "Proprioceptive loss"}, {"letter": "C", "text": "Vestibular dysfunction"}, {"letter": "D", "text": "Parietal lobe lesion"}], "answer": "C", "answerText": "Vestibular dysfunction", "explanation": "96. ANSWER: C A. Wrong. patient would be unstable even with eyes open B. CORRECT This describes a positive Romberg sign: the patient can stand with feet together when eyes are open, but loses balance when eyes are closed. C. Wrong often associated with vertigo and imbalance regardless of eye closure D. Wrong. causes sensory neglect or cortical sensory deficits, not classic Romberg positivity"}, {"id": "q316", "pdfPage": 157, "originalNumber": "97", "question": "A patient is having difficulty turning neck against resistance and shrugging shoulders. Which nerve is involved", "options": [{"letter": "A", "text": "CN IX"}, {"letter": "B", "text": "CN X"}, {"letter": "C", "text": "CN XI"}, {"letter": "D", "text": "CN XII"}], "answer": "C", "answerText": "CN XI", "explanation": "97. ANSWER: C A. Wrong. It controls swallowing and sensation to the pharynx, not neck turning or shoulder shrugging. B. Wrong. It innervates the larynx and controls voice and swallowing, not the sternocleidomastoid or trapezius muscles. C. CORRECT. It innervates the sternocleidomastoid and trapezius, which are responsible for head turning and shoulder shrugging. D. Wrong. It controls tongue movements, not neck or shoulder muscles."}, {"id": "q317", "pdfPage": 157, "originalNumber": "52", "question": "APPROPRIATE finding?", "options": [{"letter": "A", "text": "Normal finding"}, {"letter": "B", "text": "Lower motor neuron lesion"}, {"letter": "C", "text": "Upper motor neuron lesion"}, {"letter": "D", "text": "Cerebellar lesion indicate neurologic pathology."}], "answer": "B", "answerText": "Lower motor neuron lesion", "explanation": "B. Wrong. LMN lesions usually cause hyporeflexia or absent reflexes, not hyperactive reflexes. C. CORRECT. UMN lesions are characterized by hyperreflexia, spasticity, and clonus, which match the described findings. D. Wrong. Cerebellar lesions typically produce ataxia, dysmetria, or intention tremor, not hyperactive deep tendon reflexes with clonus. Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 24, Page1434."}, {"id": "q318", "pdfPage": 158, "originalNumber": "99", "question": "An 85 y.o. female was noted to have unilateral resting tremors, rigidity, bradykinesia, and postural instability. These are characteristics of what condition?", "options": [{"letter": "A", "text": "Alzheimer's disease"}, {"letter": "B", "text": "Parkinson's disease"}, {"letter": "C", "text": "Vascular dementia"}, {"letter": "D", "text": "Epilepsy with medication"}], "answer": "B", "answerText": "Parkinson's disease", "explanation": "99. ANSWER: B A. Wrong. Alzheimer’s disease primarily presents with progressive memory loss and cognitive decline, not resting tremor, rigidity, or bradykinesia. B. CORRECT. Parkinson’s disease is characterized by the classic motor triad: resting tremor (often unilateral at onset), rigidity, bradykinesia, and postural instability. C. Wrong. Vascular dementia presents with cognitive deficits and stepwise decline; motor symptoms like resting tremor and rigidity are not typical. D. Wrong. Epilepsy with medication may cause side effects, but the described parkinsonian features are not a hallmark of epilepsy itself. Source: Bates p. 1450"}, {"id": "q319", "pdfPage": 158, "originalNumber": "100", "question": "Positive Brudzinski sign", "options": [{"letter": "A", "text": "Neck stiffness"}, {"letter": "C", "text": "Neck pain upon knee extension"}, {"letter": "D", "text": "Hip and knee flexion upon neck flexion"}], "answer": "D", "answerText": "Hip and knee flexion upon neck flexion",
