th Ed., Chapter 15, Page 775"}, {"id": "q163", "pdfPage": 72, "originalNumber": "79", "question": "Evidence of “witnessed apnea” in obstructive sleep apnea:", "options": [{"letter": "A", "text": "Cessation of breathing for >/= to 10 seconds"}, {"letter": "B", "text": "Patient reports excessive fatigue"}, {"letter": "C", "text": "Due to snoring"}, {"letter": "D", "text": "A & C"}], "answer": "A", "answerText": "Cessation of breathing for >/= to 10 seconds", "explanation": "79. ANSWER: A A. Is CORRECT because a symptom of breathing cessation for at least 10 seconds is the textbook definition of witnessed apnea B. Is wrong because this is one of the symptoms for OBSTRUCTIVE SLEEP APNEA C. Is wrong because this is one of the HALLMARKS for OSA D. Is wrong because only letter A is correct Source: Bates’ Guide to Physical Examination, 13th Edition, Chapter 15"}, {"id": "q164", "pdfPage": 72, "originalNumber": "80", "question": "Hallmark/s of obstructive sleep apnea", "options": [{"letter": "A", "text": "Daytime sleepiness"}, {"letter": "B", "text": "Fatigue"}, {"letter": "C", "text": "Snoring"}, {"letter": "D", "text": "A & C"}], "answer": "D", "answerText": "A & C", "explanation": "80. ANSWER: D A. Is wrong because it is only partially true B. Is wrong because it is NOT a hallmark symptom of obstructive sleep apnea C. Is wrong because it is only partially true D. Is CORRECT because BOTH daytime sleepiness and snoring are considered the HALLMARKS for obstructive sleep apnea so this is the BEST ANSWER Source: Bates’ Guide to Physical Examination, 13th Edition, Chapter 15"}, {"id": "q165", "pdfPage": 73, "originalNumber": "82", "question": "Best describes continued use of comprehensive physical exam in asymptomatic patients", "options": [{"letter": "A", "text": "Always detect cancer early"}, {"letter": "B", "text": "Establishes clinician patient rapport and detect subtle signs"}, {"letter": "C", "text": "Removes the need of diagnostic testing"}, {"letter": "D", "text": "Less time consuming than other diagnostic tests"}], "answer": "B", "answerText": "Establishes clinician patient rapport and detect subtle signs", "explanation": "82. ANSWER: B A. Is wrong because the physical exam does not guarantee early cancer detection; screening programs and diagnostic imaging are needed for that purpose. B. Is CORRECT because in asymptomatic patients, the comprehensive physical exam is valuable for building trust and rapport and for identifying subtle or early clinical findings that may precede overt disease. C. Is wrong because physical examination complements rather than replaces diagnostic testing; it helps determine when further tests are necessary. D. Is wrong because a comprehensive exam is time-intensive, but it provides critical baseline data and strengthens patient–clinician connection, making it worth the time investment. Source: Bates Guide to Physical Examination, 13th Edition, Ch 4, page"}, {"id": "q166", "pdfPage": 74, "originalNumber": "84", "question": "Best describes over reliance in diagnostic imaging than physical exam", "options": [{"letter": "A", "text": "Imaging provides better diagnosis than physical exam"}, {"letter": "B", "text": "Imaging is more accurate and cheaper"}, {"letter": "C", "text": "Physical tests prevent unnecessary diagnostic testing, enhance diagnostic imaging"}, {"letter": "D", "text": "Physical exam is outdated and less reliable"}], "answer": "C", "answerText": "Physical tests prevent unnecessary diagnostic testing, enhance diagnostic imaging", "explanation": "84. ANSWER: C A. Is wrong because while imaging is valuable, it does not always provide a better diagnosis—many findings require clinical correlation from physical assessment. B. Is wrong because imaging is often more accurate but not cheaper; it is costly and may expose patients to unnecessary radiation if used indiscriminately. C. Is CORRECT because a skilled physical examination guides appropriate test selection, prevents unnecessary imaging, and enhances the interpretation of diagnostic studies. D. Is wrong because the physical exam remains essential and reliable in modern practice; Bates explicitly rejects the idea that it is outdated. Source: Bates Guide to Physical Examination, 13th Edition, Ch 4, page 216-217"}, {"id": "q167", "pdfPage": 74, "originalNumber": "85", "question": "During physical examination, a patient with bleeding fingers accidentally touches your stethoscope. What is the MOST appropriate immediate action to maintain universal precautions?", "options": [{"letter": "A", "text": "Wash your hands and disregard the contaminated equipment"}, {"letter": "B", "text": "Continue with the examination and clean the stethoscope later"}, {"letter": "C", "text": "Discard the stethoscope and get"}], "answer": "A", "answerText": "Wash your hands and disregard the contaminated equipment", "explanation": "a new one D. Wash the stethoscope immediately with an 85. ANSWER: D A. Is wrong because hands should always be cleaned, but ignoring contaminated equipment violates infection control protocols. B. Is wrong because this delays decontamination, increasing the risk of spreading infection. C. Is wrong because it is not necessary, stethoscopes can be disinfected and reused. Discarding is wasteful unless it’s single-use or damaged. D. Is CORRECT because this is the correct universal precaution immediate disinfection of contaminated equipment prevents cross-contamination."}, {"id": "q168", "pdfPage": 75, "originalNumber": "86", "question": "A clinician wears gloves while performing a rectal exam but does not wash hands after removing them. Which of the following BEST describes the breach in universal precautions?", "options": [{"letter": "A", "text": "Gloves were inappropriate for the procedure"}, {"letter": "B", "text": "Hand hygiene should still be performed after glove removal to prevent cross-contamination"}, {"letter": "C", "text": "The gloves were likely sterile, so handwashing is unnecessary"}, {"letter": "D", "text": "The clinician followed all correct protocols"}], "answer": "B", "answerText": "Hand hygiene should still be performed after glove removal to prevent cross-contamination", "explanation": "86. ANSWER: B A. Is wrong because gloves are appropriate and necessary for rectal examinations. Universal precautions also stipulates that gloves are to be used before touching mucous membranes. B. Is CORRECT because appropriate hand hygiene includes handwashing/handrubbing after patient care. C. Is wrong because gloves used for routine rectal exams are typically clean gloves and not necessarily sterile gloves. Regardless if gloves are sterile or not, hand hygiene should always be practiced after glove removal to ensure there was no contamination that occured. D. Is wrong because the clinician did not follow all the protocols by omitting post-procedure hand hygiene."}, {"id": "q169", "pdfPage": 76, "originalNumber": "87", "question": "During examination, patient coughs uncontrollably. What adheres to universal health precautions?", "options": [{"letter": "A", "text": "Ignore the cough and continue the exam"}, {"letter": "B", "text": "Step back and ask patient to cover their mouth"}, {"letter": "C", "text": "Give N95 mask to patient"}, {"letter": "D", "text": "Offer surgical mask to patient and wear one yourself"}], "answer": "D", "answerText": "Offer surgical mask to patient and wear one yourself", "explanation": "87. ANSWER: D A. Is wrong because ignoring the possibility of communicable diseases is not adhering to Universal Health precautions B. Is wrong because this does not adhere to Universal Health precautions C. Is wrong because the healthcare worker should also be wearing similar PPE D. Is CORRECT because Droplet precautions mostly suggest wearing a mask for both the healthcare worker and the patient."}, {"id": "q170", "pdfPage": 77, "originalNumber": "88", "question": "You noticed the patient seems anxious and is gripping the hospital gown tightly, what is the first step before proceeding?", "options": [{"letter": "A", "text": "Proceed silently to minimize patient discomfort"}, {"letter": "B", "text": "Explain procedure and ask permission before proceeding"}, {"letter": "C", "text": "Auscultate the heart to reduce anxiety"}, {"letter": "D", "text": "Start with palpation to ease patient into the exam"}], "answer": "B", "answerText": "Explain procedure and ask permission before proceeding", "explanation": "88. ANSWER: B A. Is wrong because the patient will still feel discomfort B. Is CORRECT because dcotors must explain first and get permission from the patient before proceeding C. Is wrong because patient might have white coat anxiety D. Is wrong because rapport is not yet built Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 8, Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 1, p. 70"}, {"id": "q171", "pdfPage": 77, "originalNumber": "89", "question": "89. ANSWER: C", "options": [{"letter": "A", "text": "Is wrong because ____"}, {"letter": "B", "text": "Is wrong because ____"}, {"letter": "C", "text": "Is CORRECT because ______"}, {"letter": "D", "text": "Is wrong because _______ Fined"}], "answer": "C", "answerText": "Is CORRECT because ______", "explanation": "89. ANSWER: C A. Is wrong because ____ B. Is wrong because ____ C. Is CORRECT because ______ D. Is wrong because _______ Fined"}, {"id": "q172", "pdfPage": 78, "originalNumber": "91", "question": "Which of the following general observations would most likely require critical intervention and further evaluation?", "options": [{"letter": "A", "text": "Mildly elevated RR in an anxious patient"}, {"letter": "B", "text": "Diaphoresis in a patient complaining of chest pain"}, {"letter": "C", "text": "Slight asymmetry in gait during ambulation"}, {"letter": "D", "text": "Soft-spoken tone and resting tremors in an elderly patient"}], "answer": "B", "answerText": "Diaphoresis in a patient complaining of chest pain", "explanation": "91. ANSWER: B A. Is wrong because this finding is common in anxiety or panic attacks. Although it should be monitored, it is usually not immediately dangerous unless other symptoms are present. B. Is CORRECT because this is indicative of an angina pectoris from a myocardial ischemia or an impending myocardial infarction if prolonged or chronic. This condition warrants immediate medical evaluation and intervention. C. Is wrong because this may be suggestive of neurological or musculoskeletal problems, which is usually not urgent unless the patient's symptoms progress rapidly and/or may cause falls. D. Is wrong because the patient most likely has Parkinson’s disease or other neurological condition that needs evaluation but typically not an emergency. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 8, Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 15, p. 8055"}, {"id": "q173", "pdfPage": 80, "originalNumber": "93", "question": "93. ANSWER: C", "options": [{"letter": "A", "text": "Is wrong because ____"}, {"letter": "B", "text": "Is wrong because ____"}, {"letter": "C", "text": "Is CORRECT because ______"}, {"letter": "D", "text": "Is wrong because _______ Fined"}], "answer": "C", "answerText": "Is CORRECT because ______", "explanation": "93. ANSWER: C A. Is wrong because ____ B. Is wrong because ____ C. Is CORRECT because ______ D. Is wrong because _______ Fined"}, {"id": "q174", "pdfPage": 80, "originalNumber": "94", "question": "Which of the following reflects the most accurate approach in measuring the temperature of a patient that recently drank hot coffee and is flushing", "options": [{"letter": "A", "text": "Take oral temperature immediately to confirm fever"}, {"letter": "B", "text": "Get tympanic temperature without delay"}, {"letter": "C", "text": "Wait 10-15 min before getting oral temperature"}, {"letter": "D", "text": "Switch to rectal measurement for accuracy"}], "answer": "C", "answerText": "Wait 10-15 min before getting oral temperature", "explanation": "94. ANSWER: C A. A. Take oral temperature immediately to confirm fever Is wrong because taking the oral temperature right after drinking hot coffee can lead to falsely elevated readings, since the oral mucosa is temporarily warmed by the beverage rather than body temperature. B. B. Get tympanic temperature without delay Is wrong because while tympanic measurements are not affected by oral intake, flushing or increased skin temperature due to peripheral vasodilation may not accurately reflect core body temperature, and tympanic readings can also be unreliable if not positioned properly. C. C. Wait 10–15 minutes before getting oral temperature Is CORRECT because allowing time for the oral cavity to return to baseline temperature ensures a more accurate reading, minimizing the influence of recent food or fluid intake. This is a standard nursing and clinical practice for reliable oral thermometry. D. D. Switch to rectal measurement for accuracy Is wrong because rectal temperature measurement, though accurate, is more invasive and unnecessary in this situation. Simply waiting before repeating the oral measurement is a safer and equally effective approach for this patient."}, {"id": "q175", "pdfPage": 81, "originalNumber": "95", "question": "Medical student performs blood pressure on a patient, result was 140/90 mmHg, patient seated with legs crossed and arm hanging at the side. What is the most likely result of this technique error?", "options": [{"letter": "A", "text": "Falsely low"}, {"letter": "B", "text": "Falsely high"}, {"letter": "C", "text": "Diastolic pressure is accurate, systolic pressure is low."}, {"letter": "D", "text": "No significant result"}], "answer": "B", "answerText": "Falsely high", "explanation": "95. ANSWER: B A. Is wrong because A falsely low reading occurs if the arm is above heart level, or if the cuff is too large or loose—neither of which is present here. B. Is CORRECT because Crossing the legs and allowing the arm to hang below heart level both raise blood pressure readings artificially. C. Is wrong because both systolic and diastolic pressures are affected by improper positioning. D. Is wrong because both leg crossing and arm position are well-documented to cause measurable increases"}, {"id": "q176", "pdfPage": 82, "originalNumber": "96", "question": "You obtain two different blood pressure readings in a patient: 118/76 mmHg in the right arm and 134/80 mmHg in the left arm. Which of the following is the most appropriate next step?", "options": [{"letter": "A", "text": "Use the lower reading as the true BP"}, {"letter": "B", "text": "Use the average of both readings"}, {"letter": "C", "text": "Repeat measurement of both arms and assess for consistency"}, {"letter": "D", "text": "Ignore discrepancy unless the patient is symptomatic"}], "answer": "C", "answerText": "Repeat measurement of both arms and assess for consistency", "explanation": "96. ANSWER: C A. Is wrong because the lower reading might reflect the \"normal\" pressure if one arm has arterial narrowing. B. Is wrong because It may mask clinically significant inter-arm differences and delay diagnosis of conditions like peripheral artery disease. C. Is CORRECT because A difference in blood pressure readings between arms (>10-15 mmHg) can indicate underlying vascular issues (e.g., subclavian artery stenosis, aortic dissection). Repeating the measurement helps confirm if the discrepancy is real or due to measurement error. D. Is wrong because many vascular pathologies causing BP differences are asymptomatic early on; ignoring the finding can miss a critical diagnosis. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Pages 865"}, {"id": "q177", "pdfPage": 82, "originalNumber": "97", "question": "Patient has low BP at home than in clinic. What does this suggests?", "options": [{"letter": "A", "text": "BP at home is inaccurate"}, {"letter": "B", "text": "Patient has poor"}], "answer": null, "answerText": "", "explanation": "97. ANSWER: C A. Is wrong because home readings are often more reliable than clinic readings. B. Is wrong since inconsistent medication use would raise BP both 51 medication adherence C. Patient has white coat hypertension D. Patient has secondary at home and in the clinic. C. Is CORRECT because anxiety in the clinic temporarily elevates BP compared to normal home readings. D. Is wrong because this refers to high BP caused by another disease and would be elevated in all settings. Source: Bates’ Chapter 8"}, {"id": "q178", "pdfPage": 83, "originalNumber": "98", "question": "When inflating the cuff during BP measurement, you palpate the radial pulse and find it disappears at 130 mmHg. To avoid an auscultatory gap, to what pressure should you inflate before auscultation?", "options": [{"letter": "A", "text": "130 mmHg"}, {"letter": "B", "text": "140 mmHg"}, {"letter": "C", "text": "150 mmHg"}, {"letter": "D", "text": "160 mmHg"}], "answer": "D", "answerText": "160 mmHg", "explanation": "98. ANSWER: D A. Is wrong because 130 mmHg is only the palpated systolic pressure; may miss true systolic due to auscultatory gap. B. Is wrong because 140 mmHg is too low, only 10 mmHg above palpated pressure insufficient margin to avoid gap. C. Is wrong because 150 mmHg is closer, but still below the recommended 30 mmHg above palpated value. D. Is CORRECT because 160 mmHg is 30 mmHg above palpated systolic pressure to prevent error from auscultatory gap. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Chapter 8, Pages 363-364."}, {"id": "q179", "pdfPage": 83, "originalNumber": "99", "question": "Patient with 160/80. Which of the following warrants immediate attention", "options": [{"letter": "A", "text": "Patient drank coffee"}, {"letter": "B", "text": "Patient experienced headaches and visual changes"}, {"letter": "C", "text": "Patient is anxious"}, {"letter": "D", "text": "BP lowered after"}], "answer": "B", "answerText": "Patient experienced headaches and visual changes", "explanation": "99. ANSWER: B A. Is wrong because caffeine can transiently increase BP, but not an emergency cause. B. Is CORRECT because Headache and visual disturbances are warning signs of hypertensive urgency or impending hypertensive crisis, which can lead to target organ damage (especially affecting the brain, eyes, kidneys, or heart)→ This 52 rest requires immediate medical evaluation and possibly emergency intervention. C. Is wrong because anxiety can temporarily elevate BP; monitor, not emergency. D. Is wrong because this means the high reading was situational (white coat or stress-related), not an urgent problem."}, {"id": "q180", "pdfPage": 84, "originalNumber": "100", "question": "A person's arm circumference is 38 cm. Available cuff size is 12 cm wide and 23 cm long. What is the relevance of this in their BP measurement (gist)", "options": [{"letter": "A", "text": "Cuff size is adequate to use"}, {"letter": "B", "text": "Cuff size too wide will give falsely low BP"}, {"letter": "C", "text": "Cuff size too narrow will give falsely high BP"}, {"letter": "D", "text": "Cuff size is irrelevant"}], "answer": "C", "answerText": "Cuff size too narrow will give falsely high BP", "explanation": "100. ANSWER: C A. Is wrong because cuff size is too small for patient’s arm circumference B. Is wrong because cuff size is smaller than the arm circumference C. Is CORRECT because a narrow cuff size can give falsely high BP readings. 12 x 23 cm cuff size are appropriate for arm circumferences up to 28 cm D. Is wrong because cuff size is important to record the accurate blood pressure of the patient"}, {"id": "q181", "pdfPage": 86, "originalNumber": "1", "question": "Family history includes:", "options": [{"letter": "A", "text": "Age and cause of death of 1st degree relatives"}, {"letter": "B", "text": "Age and comorbidities of parents and siblings"}, {"letter": "C", "text": "Family beliefs in faith healing"}, {"letter": "D", "text": "Both A & B"}, {"letter": "E", "text": "All of the above"}], "answer": "D", "answerText": "Both A & B", "explanation": "Answer: D A. Is CORRECT because your 1st degree relatives are your parents, siblings, and children B. Is CORRECT because the age and comorbidities of parents and siblings are included to identify patterns of chronic or genetic diseases C. is wrong because family history strictly refers to medical conditions and ages/causes of death of relatives, not cultural or spiritual practices D. Is the BEST ANSWER because both A & B are correct E. is wrong because C is not included in the correct answer Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 3, p. 180"}, {"id": "q182", "pdfPage": 86, "originalNumber": "2", "question": "Which of the following is a subjective data", "options": [{"letter": "A", "text": "Pain score"}, {"letter": "B", "text": "Blood pressure"}, {"letter": "C", "text": "Head Circumference"}, {"letter": "D", "text": "Birth weight"}], "answer": "A", "answerText": "Pain score", "explanation": "Answer: A A. Pain score is subjective because it’s what the patient tells you B. Blood pressure is objective because it is an information obtained through physical examination C. Head circumference is objective because it is an information obtained through physical examination 1 D. Birth weight is objective because it is an information obtained through physical examination Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 3"}, {"id": "q183", "pdfPage": 87, "originalNumber": "3", "question": "The patient exclaimed that their father passed away. Which of the following statements supports empathy?", "options": [{"letter": "A", "text": "\"Your father died. What has it been like?\""}, {"letter": "B", "text": "\"Your father died. you must have been very upset\""}, {"letter": "C", "text": "\"Your father died. Me too\""}, {"letter": "D", "text": "\"Your father died. I will hold a mass for him\""}], "answer": "A", "answerText": "\"Your father died. What has it been like?\"", "explanation": "ANSWER: A A. Your father died. What has it been like?\" (verbatim answer from book) B. \"Your father died. you must have been very upset\" C. \"Your father died. Me too\" D. \"Your father died. I will hold a mass for him\" Source: Bate’s Guide to Physical Examination 12th Ed.Ch 2, p128"}, {"id": "q184", "pdfPage": 87, "originalNumber": "4", "question": "Which of the following is INCORRECT in a Skilled interview?", "options": [{"letter": "A", "text": "Signposting transitions - Before we move into reviewing all your medications, was there anything else about your past health problems?"}, {"letter": "B", "text": "Validation - Your accident must have been very scary.Car accidents are always unsettling because they remind us how vulnerable we are. Perhaps that explains why you still feel upset."}, {"letter": "C", "text": "Reassurance -"}], "answer": "C", "answerText": "Reassurance -", "explanation": "ANSWER: C A. Is part of a skilled interview B. Is part of a skilled interview. C. Wrong – Reassurance is part of the skilled interview, but saying “Don’t worry. Everything is going to be alright” may be counterproductive to the patient's well being. Avoid false promises. D. Wrong since C is wrong Source: Bate’s Guide to Physical Examination 12th Ed.Ch 3, p72 2 Don’t worry. Everything is going to be alright. D. None of the above Source: Bate’s Guide to Physical Examination 12th Ed.Ch 3, p71 Source: Bate’s Guide to Physical Examination 12th Ed.Ch 3, p71"}, {"id": "q185", "pdfPage": 88, "originalNumber": "5", "question": "In interviewing, nonstigmatizing approach…", "options": [{"letter": "A", "text": "Are you a drug abuser?"}, {"letter": "B", "text": "Are you an addict?"}, {"letter": "C", "text": "Are you a person who uses illicit drugs?"}, {"letter": "D", "text": "Are you a junkie?"}], "answer": "C", "answerText": "Are you a person who uses illicit drugs?", "explanation": "Answer: C A. “People-first language” is not used B. “People-first language” is not used C. “People-first language” is used D. “People-first language” is not used Source: Bate’s Guide to Physical Examination 13th Ed., Ch2, p133"}, {"id": "q186", "pdfPage": 88, "originalNumber": "6", "question": "Which of the following is an example of appropriate nonverbal communication by a physician during a patient interaction?", "options": [{"letter": "A", "text": "Staring directly into the patient’s eyes while they talk"}, {"letter": "B", "text": "Listening attentively with arms crossed"}, {"letter": "C", "text": "Listening attentively and nodding the head"}, {"letter": "D", "text": "Using the smartphone while listening"}], "answer": "C", "answerText": "Listening attentively and nodding the head", "explanation": "Answer: C A. Wrong because prolonged eye contact can feel uncomfortable or intimidating B. Wrong because cross arms may appear defensive or closed off. C. Is CORRECT because it shows engagement, empathy, and encourages the patient to continue speaking. D. Wrong because using a phone during a conversation is distracting and signals disinterest or disrespect. Source: Bate’s Guide to Physical Examination 13th Edition,"}, {"id": "q187", "pdfPage": 89, "originalNumber": "7", "question": "Patients history should be obtained from", "options": [{"letter": "A", "text": "Patient only"}, {"letter": "B", "text": "Patient and family member"}, {"letter": "C", "text": "Clinical record and caregiver"}, {"letter": "D", "text": "Any of the above"}, {"letter": "E", "text": "None of the above"}], "answer": "E", "answerText": "None of the above", "explanation": "ANSWER: E A. Is wrong because some patients may have impaired memory, communication barriers, or limited knowledge of their illness. B. Is wrong because it excludes other valid sources like caregivers and the medical record. C. Is wrong because it unnecessarily leaves out the patient’s direct account, which is central. D. Is wrong because Wrong, because history is indeed obtained from these sources. E. Is correct because the patient’s history can and should be obtained from multiple sources: the patient directly, family/caregivers, and clinical records, depending on the situation. Source: Bate’s Guide to Physical Examination 12th Ed.Ch 1, p8"}, {"id": "q188", "pdfPage": 89, "originalNumber": "8", "question": "In Interviewing patients, avoid leading questions. Which of the following is NOT a leading question?", "options": [{"letter": "A", "text": "Has your headache been improving?"}, {"letter": "B", "text": "You don't have blood in your stool, do you?"}, {"letter": "C", "text": "Does your pain feel like pressure?"}, {"letter": "D", "text": "Please describe your pain."}], "answer": "D", "answerText": "Please describe your pain.", "explanation": "ANSWER: D A. Is it wrong because “Has your headache been improving?” is a leading queston B. Is wrong because “You don't have blood in your stool, do you?” is a leading question C. Is wrong because “Does your pain feel like pressure?” is a leading question D. Is CORRECT because “Please describe your pain.” encourage the patient to describe/detail his or her experience; it does not suggest a response. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 2 p.126"}, {"id": "q189", "pdfPage": 89, "originalNumber": "9", "question": "16 yr old male presents to the clinic with left ear pain, PS: 8/10 with ear discharge. What is the next appropriate question to complete HPI?", "options": [{"letter": "A", "text": "Have you had any history of surgeries?"}, {"letter": "B", "text": "Is there anything you want to bring up?"}, {"letter": "C", "text": "Is there anything that soothes or aggravates the pain?"}, {"letter": "D", "text": "It seems that the pain bothered you, is that true?"}], "answer": "C", "answerText": "Is there anything that soothes or aggravates the pain?", "explanation": "ANSWER: C A. Is wrong because this question doesn’t help further characterize the current symptom of ear pain. B. Is wrong because this is more of a general question typically asked at the start or end of an interview — not while you’re focusing on a specific complaint like ear pain with discharge. C. Is CORRECT because asking what makes the pain better or worse helps you determine potential causes, identify patterns, and guide differential diagnosis D. Is wrong because while it shows empathy, it doesn’t advance the clinical understanding of the ear pain."}, {"id": "q190", "pdfPage": 90, "originalNumber": "10", "question": "All of the following are correct when asking a patient’s sexual history, EXCEPT:", "options": [{"letter": "A", "text": "Sexual history may be included as part of the gynecologic history"}, {"letter": "B", "text": "Use specific, clear language and maintain a matter-of-fact tone when questioning"}, {"letter": "C", "text": "Ask about specific sexual behaviors and satisfaction with sexual function"}, {"letter": "D", "text": "Skip this part when interviewing elderly patients or persons with disability"}], "answer": "D", "answerText": "Skip this part when interviewing elderly patients or persons with disability", "explanation": "ANSWER: D A. Is correct because in female patients, sexual history is often integrated into the gynecologic history. B. Is correct because a non-judgmental, professional, and straightforward approach helps reduce embarrassment and encourages honest answers. C. Is correct because details on behaviors, practices, and satisfaction are essential to identify risks (STIs, contraceptive needs). D. Is WRONG because sexual history is important regardless of age or disability. Source: Bate’s Guide to Physical Examination 12th Edition, Chapter 3, pp. 94-95"}, {"id": "q191", "pdfPage": 90, "originalNumber": "11", "question": "What cervical lymph nodes can you palpate at the posterior cervical triangle?", "options": [{"letter": "A", "text": "Posterior Auricular Cervical Lymph Node"}, {"letter": "B", "text": "Supraclavicular lymph node"}, {"letter": "C", "text": "Occipital lymph node"}, {"letter": "D", "text": "All of the above"}, {"letter": "E", "text": "None of the above"}], "answer": "B", "answerText": "Supraclavicular lymph node", "explanation": "ANSWER: B or C (Contested B only) A. Is wrong these are located behind the ear (mastoid area), not within the posterior cervical triangle. B. Is correct because Found just above the clavicle, within the inferior part of the posterior triangle → palpable here. C. Is correct because Located at the base of the skull near the superior nuchal line, and these are palpable in the upper part of the posterior triangle (close to trapezius). Is wrong because Occipital Lymph nodes are not found WITHIN the boundaries of the Post. Cerv. Triangle. (See images below) D. Is wrong because A is incorrect. Unsure"}, {"id": "q192", "pdfPage": 91, "originalNumber": "12", "question": "Paired salivary glands near the mandible:", "options": [{"letter": "A", "text": "Parotid gland"}, {"letter": "B", "text": "Submandibular"}, {"letter": "C", "text": "Pineal gland"}, {"letter": "D", "text": "Both a and b"}, {"letter": "E", "text": "AOTA"}], "answer": "D", "answerText": "Both a and b", "explanation": "Answer: D A. parotid gland- superficial to and behind the mandible (both visible and palpable when enlarged B. submandibular gland, located deep to the mandible C. Pineal gland is located at the epithalamus, part of forebrain D. This is correct because only parotid and submandibular glands lie near the mandible. Source: Bate’s Guide to Physical Examination 13th Edition"}, {"id": "q193", "pdfPage": 91, "originalNumber": "13", "question": "Which of the following suggest malignancy", "options": [{"letter": "A", "text": "Hard, fixed nodule"}, {"letter": "B", "text": "Nontender breast mass with irregular borders"}, {"letter": "C", "text": "Torus palatinus"}, {"letter": "D", "text": "A & B"}, {"letter": "E", "text": "All of the above"}], "answer": "D", "answerText": "A & B", "explanation": "Answer: D A. Is wrong alone because it should be choices A and B. A hard, fixed nodule strongly suggests malignancy, especially in lymph nodes or breasts. Mobility and softness are more benign. B. Is wrong alone because it should be choices A and B. Malignant breast masses are often nontender, firm/hard, irregular, poorly circumscribed. C. Is wrong because torus palatinus is a benign bony growth on the hard palate, common and not malignant. D. Is CORRECT because both a hard, fixed nodule and a nontender breast mass with irregular borders are classic suspicious features for malignancy. E. Is wrong because torus palatinus is not malignant."}, {"id": "q194", "pdfPage": 92, "originalNumber": "14", "question": "Rinne Test", "options": [{"letter": "A", "text": "Tuning fork test for lateralization"}, {"letter": "B", "text": "Tuning fork test to compare air conduction and bone conduction"}, {"letter": "C", "text": "Confirmatory test for hearing loss"}, {"letter": "D", "text": "Sound is heard on good ear for unilateral hearing loss"}], "answer": "B", "answerText": "Tuning fork test to compare air conduction and bone conduction", "explanation": "Answer: B A. Is wrong because this describes Weber's test. B. Is CORRECT because the Rinne test compares air conduction (AC) and bone conduction (BC) by placing the tuning fork on the mastoid (BC) then in front of the ear canal (AC). Normally, AC > BC. C. Is wrong because Rinne test alone is not confirmatory; it helps distinguish conductive vs. sensorineural loss when hearing loss is suspected. D. Is wrong because this describes the Weber test in sensorineural loss, where sound lateralizes to the good ear. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13, page 679"}, {"id": "q195", "pdfPage": 92, "originalNumber": "15", "question": "Epistaxis:", "options": [{"letter": "A", "text": "Nosebleed"}, {"letter": "B", "text": "Coughing of blood"}, {"letter": "C", "text": "Vomiting of blood"}, {"letter": "D", "text": "Blood in the stool"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q196", "pdfPage": 92, "originalNumber": "7", "question": "Answer: A", "options": [{"letter": "A", "text": "Is CORRECT because epistaxis is bleeding from the nasal cavity (nosebleed)."}, {"letter": "B", "text": "Is wrong because coughing of blood is hemoptysis, usually from the lower respiratory tract (lungs, bronchi, trachea)."}, {"letter": "C", "text": "Is wrong because vomiting of blood is hematemesis, usually from gastrointestinal bleeding (stomach, esophagus)."}, {"letter": "D", "text": "Is wrong because blood in stool is hematochezia (bright red blood per rectum) or melena (black, tarry stools from upper GI bleeding). Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13, pages 669-670"}], "answer": "A", "answerText": "Is CORRECT because epistaxis is bleeding from the nasal cavity (nosebleed).", "explanation": "Answer: A A. Is CORRECT because epistaxis is bleeding from the nasal cavity (nosebleed). B. Is wrong because coughing of blood is hemoptysis, usually from the lower respiratory tract (lungs, bronchi, trachea). C. Is wrong because vomiting of blood is hematemesis, usually from gastrointestinal bleeding (stomach, esophagus). D. Is wrong because blood in stool is hematochezia (bright red blood per rectum) or melena (black, tarry stools from upper GI bleeding). Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13, pages 669-670"}, {"id": "q197", "pdfPage": 93, "originalNumber": "16", "question": "Facial fullness, fever, nasal congestion (i forgot the second sentence)", "options": [{"letter": "A", "text": "Allergic rhinitis"}, {"letter": "B", "text": "Acute rhinosinusitis"}, {"letter": "C", "text": "Periodontitis"}, {"letter": "D", "text": "Bronchitis"}], "answer": "B", "answerText": "Acute rhinosinusitis", "explanation": "Answer: B A. Is wrong because allergic rhinitis is associated with itching, watery eyes, clear secretions, not purulent or febrile illness. B. Is CORRECT because facial pain or pressure/fullness, nasal obstruction/congestion, purulent nasal discharge, and sometimes fever describes acute rhinosinusitis. C. Is wrong because periodontitis does not cause nasal congestion, sinus pressure, or fever in typical presentation. D. Is wrong because bronchitis shows no primary nasal or sinus symptoms like facial fullness or congestion. Source: Bate’s Guide to Physical Examination 13th Edition, Chap 13, pg 685"}, {"id": "q198", "pdfPage": 93, "originalNumber": "17", "question": "Which of the ff. is the NOT the appropriate technique in examining the ear canal:", "options": [{"letter": "A", "text": "Use the otoscope with the smallest speculum that inserts easily into the ear canal"}, {"letter": "B", "text": "Position the patient's head to see comfortably through the otoscope"}, {"letter": "C", "text": "Straighten the ear canal by gently pulling the auricle upward, backward and away from the head"}], "answer": "A", "answerText": "Use the otoscope with the smallest speculum that inserts easily into the ear canal", "explanation": "Answer: A A. Is CORRECT because it is an incorrect statement, the speculum should be large enough for a good view but still fit comfortably. B. Is wrong because it is a correct statement, proper positioning helps both examiner and patient; avoids awkward angling. C. Is wrong because it is a correct statement, gently pulling the auricle upward, backward and away from the head is the correct maneuver in adults. D. Is wrong because it is a correct statement, directing the speculum down and forward into the ear canal. 8 D. Insert the speculum into the canal down and forward. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13, page 672"}, {"id": "q199", "pdfPage": 94, "originalNumber": "18", "question": "7 yr old boy, multiple <1 mm, erythematous, raised w/o fluid", "options": [{"letter": "A", "text": "Papule"}, {"letter": "B", "text": "Vesicle"}, {"letter": "C", "text": "Macule"}, {"letter": "D", "text": "Bulla"}], "answer": "A", "answerText": "Papule", "explanation": "Answer: A A. Is CORRECT because a papule is a raised lesion ≤1 cm, solid, without fluid. B. Is wrong because vesicles are raised, <1 cm, filled with serous fluid (e.g., chickenpox, herpes simplex). The question specifies no fluid, so not vesicles. C. Is wrong because macules are flat, non-palpable lesions <1 cm (e.g., freckles, flat nevi). Since the lesion is raised, it cannot be a macule. D. Is wrong because bullae are large, >1 cm, fluid-filled lesions (e.g., burns, bullous pemphigoid). Wrong size and no fluid Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 10, page 461"}, {"id": "q200", "pdfPage": 94, "originalNumber": "9", "question": "shortness of breath. Upon examination, his nails are rounded, bulbous, and the angle between the base of his nail and proximal end is more than 180 degrees. What is most likely the diagnosis?", "options": [{"letter": "A", "text": "Beau's lines"}, {"letter": "B", "text": "Clubbing"}, {"letter": "C", "text": "Paronychia"}, {"letter": "D", "text": "Habit tic deformity"}], "answer": "A", "answerText": "Beau's lines", "explanation": "A. Is wrong because Beau’s lines or transverse depressions of the nail plates, which is usually bilateral, is a result from temporary disruption of proximal nail growth from systemic illness. This is seen in severe illness, trauma and cold exposure if Raynaud disease is present B. Is CORRECT because clubbing of fingers is characterized with a bulbous swelling of soft tissue at the nail base with loss of the normal angle between the nail and the proximal nail fold. The angle increases to 180 degrees or more, and the nail bed feels spongy or floating C. Is wrong because paronychia is caused by a superficial infection of the proximal and lateral nail folds adjacent to the nail plate. The nail folds are often red, swollen, and tender. Represents the most common infection of the hand, usually from Staphylococcus aureus or Streptococcus series. Arises from local trauma due to nail biting, manicuring, or frequent hand immersion in water. D. Is wrong because habit tic deformity is characterized with a depression of the central nial with a “christmas tree” appearance from small, horizontal depressions, resulting from repetitive trauma from rubbing the index finger over the thumb or vice versa Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 10, page 530"}, {"id": "q201", "pdfPage": 95, "originalNumber": "20", "question": "28 year old woman sought consult to the ER for a painful rash with dermatomal distribution. The rash was fluid-filled, and does not cross the midline. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Contact dermatitis"}, {"letter": "B", "text": "HSV 1"}, {"letter": "C", "text": "Varicella (Chicken Pox)"}, {"letter": "D", "text": "Herpes Zoster (Shingles)"}], "answer": "D", "answerText": "Herpes Zoster (Shingles)", "explanation": "Answer: D A. Is wrong because contact dermatitis occurs when an irritant/allergen comes into contact with your skin and produces an itchy, erythematous rash B. Is wrong because herpes simplex virus 1 can lead to formation of multiple vesicles and pustules on an erythematous base and they do not occur in a dermatomal distribution C. Is wrong because varicella (chicken pox) leads to a formation of an itchy rash D. Is CORRECT because herpes zoster (shingles) is caused by the reactivation of latent varicella (chickenpox) virus infection within the sensory ganglia which usually causes painful unilateral vesicular rashes in a dermatomal distribution and does not cross the midline"}, {"id": "q202", "pdfPage": 96, "originalNumber": "21", "question": "35 y.o. Man with scaly, silver plaques on his elbows and knees, most likely nail characteristic of multiple small depressions.", "options": [{"letter": "A", "text": "Pitting"}, {"letter": "B", "text": "Splinter hemorrhage"}, {"letter": "C", "text": "Onycholysis"}, {"letter": "D", "text": "Terry’s nails"}], "answer": "A", "answerText": "Pitting", "explanation": "Answer: A A. Is CORRECT because the patient presents with silver plaques on his elbows and knees which is a characteristic of psoriasis. Pitting is characterized by punctate depressions of the nail plate which is caused by defective layering of the superficial nail plate by the proximal nail matrix. Pitting is often associated with psoriasis. B. Is wrong because splinter hemorrhage are red or brown vertical streaks under the nail that resembles a splinter and is often associated with infective endocarditis C. Is wrong because onycholysis is characterized by painless separation of the whitened opaque nail plate from the pinker translucent nail bed. Fingernails that extend past the fingertip are more likely to result in the traumatic shearing forces that produce onycholysis. D. Is wrong because Terry's nails are characterized by the nail plates turning white with a ground-glass appearance, a distal band of reddish brown and obliteration of the lunula. Often associated with liver disease, usually cirrhosis, heart failure, and diabetes."}, {"id": "q203", "pdfPage": 97, "originalNumber": "22", "question": "A 52-year old woman with poorly controlled diabetes presents with a red, moist, macerated rash on the groin and inner thigh. The rash is surrounded by a satellite of pustules. What is the possible diagnosis?", "options": [{"letter": "A", "text": "Viral exanthem"}, {"letter": "B", "text": "Candida infection"}, {"letter": "C", "text": "Psoriasis"}, {"letter": "D", "text": "Eczema"}], "answer": "B", "answerText": "Candida infection", "explanation": "Answer: B A. Is wrong because viral exanthem is characterized by spots, bumps or blotches in the skin that accompany a viral infection B. Is CORRECT because erythema with satellite lesions usually result from Candida infections C. Is wrong because psoriasis frequently affects the scalp, extensor surfaces of the elbows and knees, umbilicus and the gluteal cleft and is often characterized by silver plaques on the skin D. Is wrong because eczema or atopic dermatitis is characterized by erythema, scaling, dry skin, and intense itching. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 27, page 1968"}, {"id": "q204", "pdfPage": 97, "originalNumber": "23", "question": "25 y.o with painless, mobile, rubbery nodule on anterior cervical neck", "options": [{"letter": "A", "text": "Metastatic cancer"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "Reactive lymph node"}, {"letter": "D", "text": "Thyroid nodule"}], "answer": "B", "answerText": "Lymphoma", "explanation": "Answer: B A. Is wrong because malignant lymph nodes are often hard or fixed B. Most likely answer because lymphoma causes non-tender generalized lymphadenopathy. C. Is wrong because reactive lymph nodes are often tender (painful) D. Is wrong because thyroid nodules are usually firm Source: Bate’s Guide to Physical Examination 12th Edition, Chap 7, p 261 Unsure"}, {"id": "q205", "pdfPage": 97, "originalNumber": "24", "question": "Inspection of thyroid. Bruit during auscultation.", "options": [{"letter": "A", "text": "Hashimoto"}, {"letter": "B", "text": "Multinodular goiter"}, {"letter": "C", "text": "Thyroid carcinoma"}, {"letter": "D", "text": "Graves disease"}], "answer": "D", "answerText": "Graves disease", "explanation": "Answer: D A. Is wrong because one cannot typically hear bruits upon auscultation in Hashimoto’s thyroiditis B. Is wrong because a bruit can only be present if the multinodular goiter is associated with toxic conditions C. Is wrong because bruits are not typically a sign of thyroid 12 carcinoma D. Is CORRECT because bruits are the hallmark finding in conditions such as Graves disease Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 11, page 570"}, {"id": "q206", "pdfPage": 98, "originalNumber": "25", "question": "During otoscopic examination you noticed a cone of light on the anteroinferior quadrant of the tympanic membrane:", "options": [{"letter": "A", "text": "Tympanic membrane perforation"}, {"letter": "B", "text": "Normal tympanic membrane"}, {"letter": "C", "text": "Otitis media with effusion"}, {"letter": "D", "text": "Choleastatoma"}], "answer": "B", "answerText": "Normal tympanic membrane", "explanation": "Answer: B A. Is wrong because it refers to holes in the eardrum, usually from purulent middle ear infections. When perforations are present, the tympanic membrane can be scarred, and no landmarks are visible, which would include the cone of light. B. Is correct because the cone of light is a normal light reflection observed during otoscopic examination. It is described as fanning downward and anteriorly from the umbo, where the eardrum meets the tip of the malleus. This location corresponds to the anteroinferior quadrant of the tympanic membrane. C. Is wrong because it is characterized by amber fluid behind the eardrum, and a fluid level or air bubbles may be visible. This condition implies an abnormal appearance of the tympanic membrane, making the presence of a \"good cone of light\" unlikely. D. Is wrong because it is a middle ear disorder that can cause conductive hearing loss. The sources do not describe the appearance of the cone of light in the presence of a cholesteatoma, but as an abnormal condition, it would typically alter the normal appearance of the tympanic membrane. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13"}, {"id": "q207", "pdfPage": 98, "originalNumber": "13", "question": "sound lateralizes to the left ear. The Rinne test performed on the left ear reveals bone conduction greater than air conduction. Based on these findings, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Right sensorineural"}, {"letter": "B", "text": "Left sensorineural"}, {"letter": "C", "text": "Right conductive"}, {"letter": "D", "text": "Left conductive but Rinne should still be normal on left (AC > BC)"}], "answer": "B", "answerText": "Left sensorineural", "explanation": "B. Left sensorineural – Would cause Weber to lateralize to the right, opposite of the finding C. Right conductive – Would cause Weber to lateralize to the right, not the left D. Left conductive – Weber lateralizes to affected side + Rinne shows BC > AC in left ear Source: Bate’s Guide to Physical Examination 12th Edition, Chapter 7"}, {"id": "q208", "pdfPage": 99, "originalNumber": "27", "question": "A 40 years old male presents with nasal congestion, loss of smell, and multiple gray glistening mass found in nasal cavity. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Nasal polyps"}, {"letter": "B", "text": "Deviated septum"}, {"letter": "C", "text": "Acute sinusitis"}, {"letter": "D", "text": "Allergic rhinitis"}], "answer": "A", "answerText": "Nasal polyps", "explanation": "ANSWER: A A. Is CORRECT because they are benign, gray, glistening, edematous masses in the nasal cavity, often associated with nasal obstruction, hyposmia/anosmia (loss of smell), and chronic inflammation. B. Is wrong because it presents with nasal obstruction and sometimes recurrent sinusitis, but not with multiple gray glistening masses. C. Is wrong because it usually presents with facial pain, fever, purulent nasal discharge, and congestion, but not multiple gray glistening masses. D. Is wrong because it presents with sneezing, nasal itching, watery rhinorrhea, and congestion, but not with polypoid masses in the nasal cavity. Source: Bate’s Guide to Physical Examination 12th Edition, Chapter 13"}, {"id": "q209", "pdfPage": 99, "originalNumber": "28", "question": "Tenderness upon palpation on the frontal and maxillary sinuses presents:", "options": [{"letter": "A", "text": "Acute sinusitis"}, {"letter": "B", "text": "Allergic rhinitis"}, {"letter": "C", "text": "Nasal fracture"}, {"letter": "D", "text": "Viral upper respiratory tract infection"}], "answer": "A", "answerText": "Acute sinusitis", "explanation": "Answer: A A. Is CORRECT because tenderness to palpation or percussion over the frontal and maxillary sinuses is a classic and common physical examination finding in acute sinusitis. This occurs due to inflammation, purulent buildup, and increased pressure within the obstructed sinus cavities. \"Tenderness to palpation\" and \"pain on percussion\" over the sinuses are key findings that support the diagnosis of acute sinusitis, especially when accompanied by other major symptoms like purulent nasal discharge, nasal 14 obstruction, and facial pain/pressure that is worse when bending forward. B. Is wrong because allergic rhinitis is characterized by mucosal inflammation triggered by allergens, leading to symptoms like sneezing, pruritus (itching), and clear, watery rhinorrhea. It does not typically involve purulent infection, significant pressure buildup, or tenderness of the sinus bones. The exam findings are more related to mucosal edema (e.g., pale, boggy turbinates) and other allergic signs (e.g., allergic shiners, transverse nasal crease), not sinus tenderness. C. Is wrong because a nasal fracture would cause significant nasal tenderness, pain, edema, and possibly crepitus over the nasal bridge itself, it does not specifically cause tenderness over the frontal and maxillary sinuses. The sinuses are air-filled chambers within the skull bones; their tenderness points to a problem within the sinus cavity itself (like infection), not an external bony injury to the nasal structure. D. Is wrong because a viral URI causes inflammation primarily of the nasal mucosa (rhinitis) and throat (pharyngitis). While it can cause general facial discomfort and a feeling of \"pressure,\" it is not typically associated with focal tenderness upon palpation of the sinuses. The presence of true sinus tenderness is a key differentiator that suggests a secondary bacterial sinus infection has complicated the initial viral illness. Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 13, page 685"}, {"id": "q210", "pdfPage": 100, "originalNumber": "29", "question": "A 42 year old male smokes tobacco and drinks alcohol, presents with a non-healing ulcer on the tongue:", "options": [{"letter": "A", "text": "Aphthous ulcer"}, {"letter": "B", "text": "Oral candidiasis"}, {"letter": "C", "text": "Squamous cell carcinoma"}, {"letter": "D", "text": "Geographic tongue"}], "answer": "C", "answerText": "Squamous cell carcinoma", "explanation": "Answer: C A. Is wrong because Aphthous ulcer is a painful, shallow whitish-gray oval ulceration surrounded by halo of reddened mucosa. B. Is wrong because Oral Candidiasis on the tongue is noted for a white thick coating. C. This ulcerated lesion is in common location for carcinoma. Medially, note the reddened area of mucosa called erythroplakia which is suspicious for malignancy and should be biopsied D. Is wrong because in this condition the tongue would show scattered smooth red areas denuded of papillae, they would give a map-like pattern over time. To be honest both A and C could be the answer but i think its C due to the history of the patient being a smoker and alcoholic Bates 12th edition pg 790- 791"}, {"id": "q211", "pdfPage": 101, "originalNumber": "30", "question": "A child presenting with fever, sore throat, inflamed with exudates in the tonsils, and swollen anterior cervical lymph node. What is the possible causative agent?", "options": [{"letter": "A", "text": "Group A Streptococcus"}, {"letter": "B", "text": "Infectious mononucleosis"}, {"letter": "C", "text": "Acute Pharyngitis"}, {"letter": "D", "text": "Viral URTI"}], "answer": "A", "answerText": "Group A Streptococcus", "explanation": "Answer: A A. Is correct because It is the common causative agent for sore throat. Highly bacterial infection because of the presence of exudates. Affected LN is anterior B. Is wrong because it causes kissing disease; lymph node affected is posterior LN C. Is wrong because the question is causative agent D. Is wrong because most URTIs cause flu like symptoms (including coryza); no exudates; URTI is accompanied with cough Bates 12th edition pp. 221 Bates 12th edition pp. 257 Bates 12th edition pp. 292"}, {"id": "q212", "pdfPage": 101, "originalNumber": "31", "question": "Physical Examination Findings: Blood Pressure: ● 90/60 mmHg (hypotension) Heart Rate: ● 113 bpm (tachycardia) Respiratory Rate: ● 21 breaths/min (tachypnea) Temperature: ● 40 °C (high fever) BMI: ANSWER: D", "options": [{"letter": "A", "text": "Is correct because the patient is having fever with chills. Turning off the aircon helps reduce discomfort and prevents worsening of chills. Should be answered together with Letter C"}, {"letter": "B", "text": "Is wrong because removing the blanket will intensify shivering, worsening the patient’s discomfort and oxygen demand. A proper physical exam can be done without abruptly exposing the patient to cold."}, {"letter": "C", "text": "Is correct because this maneuver (Trendelenburg-like positioning) helps improve venous return and cardiac output in hypotension, making it the priority action. Should be answered together with Letter A"}, {"letter": "D", "text": "Is CORRECT because both interventions (preventing shivering by turning off the aircon and addressing hypotension by elevating legs) are appropriate and should be performed together."}], "answer": "D", "answerText": "Is CORRECT because both interventions (preventing shivering by turning off the aircon and addressing hypotension by elevating legs) are appropriate and should be performed together.", "explanation": "ANSWER: D A. Is correct because the patient is having fever with chills. Turning off the aircon helps reduce discomfort and prevents worsening of chills. Should be answered together with Letter C B. Is wrong because removing the blanket will intensify shivering, worsening the patient’s discomfort and oxygen demand. A proper physical exam can be done without abruptly exposing the patient to cold. C. Is correct because this maneuver (Trendelenburg-like positioning) helps improve venous return and cardiac output in hypotension, making it the priority action. Should be answered together with Letter A D. Is CORRECT because both interventions (preventing shivering by turning off the aircon and addressing hypotension by elevating legs) are appropriate and should be performed together."}, {"id": "q213", "pdfPage": 101, "originalNumber": "16", "question": "● 17.7 (underweight) Patient is experiencing chills. How would you approach and make the patient comfortable?", "options": [{"letter": "A", "text": "Turn the aircon off when you enter the room"}, {"letter": "B", "text": "Ask the patient to take off blanket to begin physical exam"}, {"letter": "C", "text": "Carefully elevate pt legs to regulate hypotension"}, {"letter": "D", "text": "A and C Source: Bates 13th Edition. Chapter 1 Source: https://thejnp.org/index.php/jnp/article/download/130/105/683"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q214", "pdfPage": 102, "originalNumber": "32", "question": "You remember to do standard procedure? The following are done except:", "options": [{"letter": "A", "text": "Wash your hands but can be omitted if there are gloves"}, {"letter": "B", "text": "Regularly disinfect white coats and stethoscope"}, {"letter": "C", "text": "Wear masks when interacting with selected patients in specific places"}, {"letter": "D", "text": "A and C"}], "answer": "D", "answerText": "A and C", "explanation": "ANSWER: D A. is the exception because you should always wash your hands regardless if you will be wearing gloves or not B. Is correct because it is the standard procedure C. It is also the exception because wearing a mask, as part of standard procedure/precaution, is applicable to all patients in any setting. D. Therefore, is the correct answer Bates 13th ed Chap 4"}, {"id": "q215", "pdfPage": 102, "originalNumber": "33", "question": "Based on the patient's age (26y.o) weight (not indicated but BMI=17.7) & general profile, she can be classified as?", "options": [{"letter": "A", "text": "Underweight"}, {"letter": "B", "text": "Normal"}, {"letter": "C", "text": "Overweight"}, {"letter": "D", "text": "Obese"}], "answer": "A", "answerText": "Underweight", "explanation": "ANSWER: A A. Is CORRECT because BMI <18.5 is underweight B. Is wrong because Normal BMI is 18.5-24.9 C. Is wrong because Overweight BMI is 25.0-29.9 D. Is wrong because Obese BMI is 30.0-39.9"}, {"id": "q216", "pdfPage": 103, "originalNumber": "34", "question": "To confirm hypotension in this patient, the following techniques can be applied, EXCEPT:", "options": [{"letter": "A", "text": "Average of 2 or more blood pressure readings, measured in both arms at least once"}, {"letter": "B", "text": "Ask the patient for her usual BP readings at home or in the office"}, {"letter": "C", "text": "Repeat BP reading and make sure to position patient to be sitting with feet flat on the bed"}, {"letter": "D", "text": "Palpate brachial artery and position the arm so that the antecubital crease is level with the 4th interspace at its junction with the sternum"}], "answer": "C", "answerText": "Repeat BP reading and make sure to position patient to be sitting with feet flat on the bed", "explanation": "ANSWER: C A. Is correct B. Is correct C. Is WRONG because the patient’s feet should be on the floor, not on the bed D. Is correct Bates 12th ed. Chapter 4, p127"}, {"id": "q217", "pdfPage": 103, "originalNumber": "35", "question": "52/F claims that she cannot read and write complains of not being able to see from a distance. What tool should not be used for assessing the visual acuity", "options": [{"letter": "A", "text": "Snellen’s chart"}, {"letter": "B", "text": "Tumbling E’s"}, {"letter": "C", "text": "Allen cards"}, {"letter": "D", "text": "None of the above"}], "answer": "A", "answerText": "Snellen’s chart", "explanation": "ANSWER: A A. Is CORRECT because Snellen’s chart uses letters of the alphabet to measure visual acuity. Since the patient cannot read or write, this tool would not be appropriate because it requires the ability to recognize and verbally name letters B. Is wrong because Tumbling E’s is a tool used for patients who cannot read or write. C. Is wrong because Allen cards use pictures (house, hand, tree, etc.) and are designed for children or illiterate patients who cannot read letters. D. Is wrong because Tumbling E’s and Allen cards can be used for assessing visual acuity of patients who cannot read or write Source: Bate’s Guide to Physical Examination 13th Edition, Chapter 12"}, {"id": "q218", "pdfPage": 103, "originalNumber": "36", "question": "52 y.o/ F who claims she cannot read or write complains of not being able to see objects at a distance What is her condition? ANSWER: A", "options": [{"letter": "A", "text": "Is correct since difficulty with distance vision suggests myopia or nearsightedness"}, {"letter": "B", "text": "Is incorrect because hyperopia or farsightedness suggests 18"}], "answer": "A", "answerText": "Is correct since difficulty with distance vision suggests myopia or nearsightedness", "explanation": "A. Myopia B. Hyperopia C. Astigmatism D. Presbyopia difficulty with seeing close objects C. Is incorrect because astigmatism causes distortion while looking at near and far objects D. Is incorrect because although common in middle-aged and older adults, presbyopia causes focusing problems for near vision, thus they can see better when the card is farther away"}, {"id": "q219", "pdfPage": 104, "originalNumber": "37", "question": "When examining the pupil, you remember that:", "options": [{"letter": "A", "text": "The pupil constrict when looking at near objects"}, {"letter": "B", "text": "The pupil reaction when under oblique light, the pupil near the light will dilate first than the other eye."}, {"letter": "C", "text": "The normal pupil is 3-5cm"}, {"letter": "D", "text": "All of the above"}], "answer": "A", "answerText": "The pupil constrict when looking at near objects", "explanation": "ANSWER: A A. Is CORRECT because of accommodation reflex mediated by the oculomotor nerve (CN III). B. Is wrong because when light is shone obliquely, the pupil constricts (direct light reflex) and at the same time the opposite pupil also constricts (consensual reflex). C. Is wrong because the normal pupil size is 2-4 mm, not cm. D. Is wrong Source: Bates 13th Ed Chapter 12"}, {"id": "q220", "pdfPage": 104, "originalNumber": "38", "question": "Sammy complains of redness of eyes, which of the following symptoms is consistent with subconjunctival hemorrhage?", "options": [{"letter": "A", "text": "Pain"}, {"letter": "B", "text": "Pruritus"}, {"letter": "C", "text": "Grainy or foreign body sensation"}, {"letter": "D", "text": "NOTA"}], "answer": "D", "answerText": "NOTA", "explanation": "ANSWER: D A. Red painful eyes are seen in corneal abrasions, foreign bodies, corneal ulcers, acute angle closure glaucoma, herpes keratitis, hyphema, and uveitis. B. Eye pruritus, or itchy eyes, is commonly caused by allergies to pollen, dust mites, mold, or animal dander, but can also result from dry eyes, infections (like conjunctivitis), blepharitis (eyelid inflammation), or environmental irritants. (google ni, can’t find it 19 sa book sorry) C. A red eye with gritty sensation is seen in viral conjunctivitis and dry eye. D. CORRECT"}, {"id": "q221", "pdfPage": 105, "originalNumber": "39", "question": "Sammy is complaining of red eye sensation. If he is complaining of corneal abrasion, what would be the other symptom present?", "options": [{"letter": "A", "text": "Pain"}, {"letter": "B", "text": "Pruritus"}, {"letter": "C", "text": "Presence of foreign body"}, {"letter": "D", "text": "NOTA"}], "answer": "A", "answerText": "Pain", "explanation": "ANSWER: A A. Is CORRECT because red painful eyes are seen in corneal abrasions, foreign bodies, corneal ulcers, acute angle closure glaucoma, herpes keratitis, hyphema, and uveitis. B. Is WRONG because eye pruritus, or itchy eyes, is commonly caused by allergies to pollen, dust mites, mold, or animal dander, but can also result from dry eyes, infections (like conjunctivitis), blepharitis (eyelid inflammation), or environmental irritants. (google ni, can’t find it sa book sorry) C. Is WRONG because a red eye with gritty sensation is seen in viral conjunctivitis and dry eye. D. Is WRONG because letter A is the correct answer"}, {"id": "q222", "pdfPage": 105, "originalNumber": "40", "question": "Carlos complains of excessive tearing. You suspect lacrimal duct obstruction. What can you observe upon examination?", "options": [{"letter": "A", "text": "Redness and tenderness upon palpation of lacrimal sac near the canthus"}, {"letter": "B", "text": "Mucopurulent discharge when palpating lacrimal sac area"}, {"letter": "C", "text": "Presence of regurgitating fluid when lacrimal sac is pressed"}, {"letter": "D", "text": "NOTA"}], "answer": "C", "answerText": "Presence of regurgitating fluid when lacrimal sac is pressed", "explanation": "ANSWER: C A. Is WRONG because redness or tenderness is a common sign of dacryocystitis which is an infection or inflammation of tear sac B. Is WRONG because while this is a sign of duct obstruction, the mucopurulent discharge is often a cause of secondary bacterial infection of the tear buildup C. Is CORRECT because it is the most definitive diagnostic sign of a lacrimal duct obstruction and the regurgitation of fluid confirms the obstruction D. Is WRONG because there is a definitive answer"}, {"id": "q223", "pdfPage": 105, "originalNumber": "20", "question": "BM 2 MEDICINE II (PD) BIMONTHLY EXAM 2 December 10, 2025 COVERAGE LECTURER Cardiovascular PVS Abdomen, Anus, rectum, Prostate Male Genitalia Female Genitalia Mental Status & Behavior Nervous System Dr. Rey Cabalejo Dr. Christy Yapha-Lee Dr. Busico Dr. Debbie Go Dr. Montoya QUESTION RATIONALE & SOURCE *for checker only: 1.Which artery is primarily palpated to assess for lower extremity peripheral artery disease during routine examination?", "options": [{"letter": "A", "text": "Popliteal artery"}, {"letter": "B", "text": "Posterior tibial artery"}, {"letter": "C", "text": "Dorsalis pedis artery"}, {"letter": "D", "text": "Femoral artery"}], "answer": "D", "answerText": "Femoral artery", "explanation": "1. ANSWER: D A. Wrong. Popliteal pulse is deeper, more diffuse, and more difficult to palpate than other pulses, making it unsuitable as the primary pulse for routine assessment of peripheral artery disease. B. Wrong. Posterior tibial pulse is a distal pedal pulse that may be difficult to feel in edematous or obese patients and is assessed after proximal pulses to help localize the level of obstruction. C. Wrong. Dorsalis pedis artery may be congenitally absent or branch higher, limiting its reliability as the primary screening pulse. Absent pedal pulses are interpreted in relation to normal femoral and popliteal pulses, not as the initial finding. D. CORRECT. Palpation of the femoral pulse is essential and primary in evaluating lower extremity peripheral artery disease. An absent femoral pulse has a likelihood ratio >6.2 for PAD, and occlusion at the aortic or iliac level typically affects all distal pulses, making the femoral pulse critical for detecting proximal arterial obstruction."}, {"id": "q224", "pdfPage": 108, "originalNumber": "2", "question": "A patient with chronic venous insufficiency presents with brownish discoloration over the lower leg. Which of the following mechanisms explain this finding?", "options": [{"letter": "A", "text": "Arterial spasm causing skin ischemia"}, {"letter": "B", "text": "Hemosiderin deposition due to red blood cell leakage"}, {"letter": "C", "text": "Lymphatic obstruction leading to fluid retention"}, {"letter": "D", "text": "Increased melanin production from chronic inflammation"}], "answer": "B", "answerText": "Hemosiderin deposition due to red blood cell leakage", "explanation": "2. ANSWER: B A. Wrong. Chronic venous insufficiency is caused by venous occlusion and not arterial spasm. B. CORRECT. Hemosiderin staining is a symptom of chronic venous insufficiency caused by blood leaking out of the capillaries because of weakening of the one-way valves that keep the blood from flowing backward leading to blood pooling under the skin and leaving a residue of hemoglobin settling in the tissue of the legs and feet. Hemoglobin contains iron, which causes the rusty or brownish coloration. C. Wrong. Chronic venous insufficiency is not caused by lymphatic obstruction. D. Wrong. Sources: Bates’ Guide 13th Ed. Chapter 17 page 931; 968; 969; 971"}, {"id": "q225", "pdfPage": 109, "originalNumber": "3", "question": "A 58 year old patient presents with calf pain after walking 2-3 blocks which is relieved by rest. What is appropriate measure", "options": [{"letter": "A", "text": "Order ankle brachial index"}, {"letter": "B", "text": "Conduct trendelenburg test"}, {"letter": "C", "text": "Perform allen test"}, {"letter": "D", "text": "Elevate legs and observe color changes"}], "answer": "A", "answerText": "Order ankle brachial index", "explanation": "3. ANSWER: A A. CORRECT. The patient’s symptoms are classic for intermittent claudication, and ABI is the first-line, noninvasive test to confirm peripheral arterial disease B. Wrong. This test evaluates superficial venous insufficiency, not arterial claudication C. Wrong. It assesses radial–ulnar arterial patency of the hand, unrelated to leg claudication D. Wrong. This is used for advanced arterial insufficiency (Buerger test), not initial evaluation"}, {"id": "q226", "pdfPage": 109, "originalNumber": "4", "question": "Patient’s leg is pale when elevated and becomes ruddy when turned to dependent side", "options": [{"letter": "A", "text": "Chronic venous insufficiency"}, {"letter": "B", "text": "Lymphatic obstruction"}, {"letter": "C", "text": "Arterial insufficiency"}, {"letter": "D", "text": "Deep vein thrombosis"}], "answer": "C", "answerText": "Arterial insufficiency", "explanation": "4. ANSWER: C A. Wrong. It causes leg hyperpigmentation and edema, not pallor on elevation nor dependent rubor. B. Wrong. It presents with non-pitting swelling, not color changes with leg position. C. CORRECT. It is pallor on elevation and dependent rubor are classic signs of chronic arterial insufficiency due to poor arterial flow. D. Wrong. It causes acute swelling, pain, and warmth, not position-dependent color changes."}, {"id": "q227", "pdfPage": 110, "originalNumber": "5", "question": "A 70-year old man presents with unilateral right leg swelling, warmth, and tenderness. Pedal pulses are normal. Which finding helps differentiate venous from arterial disease in this case?", "options": [{"letter": "A", "text": "Presence of warmth"}, {"letter": "B", "text": "Normal pulses"}, {"letter": "C", "text": "Unilateral swelling"}, {"letter": "D", "text": "Pain with walking"}], "answer": "B", "answerText": "Normal pulses", "explanation": "5. ANSWER: B A. Wrong. Warmth may be present in both venous inflammation and infection; it is not a reliable differentiating feature. B. CORRECT. Normal pedal pulses favor a venous cause, since arterial disease typically presents with diminished or absent pulses. C. Wrong. Unilateral swelling can be seen in both venous disease (e.g., DVT) and other conditions; it is not specific. D. Wrong. Pain with walking (claudication) is characteristic of arterial disease, not venous pathology. Source: Bates 13th Ed., Ch17, p954"}, {"id": "q228", "pdfPage": 111, "originalNumber": "6", "question": "During Allen's Test, the patient's hand remained pale for 15 seconds after releasing the ulnar artery. What does this imply?", "options": [{"letter": "A", "text": "Adequate collateral circulation"}, {"letter": "B", "text": "Radial artery dominance"}, {"letter": "C", "text": "Ulnar artery occlusion"}, {"letter": "D", "text": "Normal vascular reactivity"}], "answer": "C", "answerText": "Ulnar artery occlusion", "explanation": "6. ANSWER: C A. Wrong. Adequate collateral circulation would show flushing around 3-5 seconds B. Wrong. It may delay flushing but the persisting 15 seconds of pallor more indicates occlusion C. CORRECT. Flushing via the ulnar artery takes about 3-5 seconds but the patient’s pallor is 15 seconds long D. Wrong. It would also show quick flushing Source: Bates 13th ed"}, {"id": "q229", "pdfPage": 111, "originalNumber": "7", "question": "A 65 year old diabetic patient with non-healing foot ulcer has an ABI of 1.35. Pedal Pulse is weak due to edema. What interpretation is most accurate?", "options": [{"letter": "A", "text": "ABI is normal. Ulcer is likely non-vascular"}, {"letter": "B", "text": "Interpretation is severe arterial occlusion"}, {"letter": "C", "text": "ABI is falsely elevated due to calcified arteries — need toe-brachial index"}, {"letter": "D", "text": "Supports venous insufficiency"}], "answer": "C", "answerText": "ABI is falsely elevated due to calcified arteries — need toe-brachial index", "explanation": "7. ANSWER: C A. Wrong. While an ABI of 0.90-1.40 is technically “normal” range, in diabetic patients, an ABI > 1.30 (or > 1.40 in some guidelines) is often falsely elevated due to medial arterial calcification (Mönckeberg sclerosis), which prevents the arteries from compressing. B. Wrong. Severe arterial occlusion is typically defined by an ABI < 0.39; however, this patient likely does have occlusion that is masked by the calcification. C. CORRECT. While Bates defines an ABI >1.40 as definitively noncompressible, it also notes that diabetic patients frequently have calcified vessels that yield falsely elevated (pseudonormal) readings. In this scenario, the presence of a non-healing ulcer and a weak pulse creates a clinical picture of ischemia that contradicts the \"normal\" ABI of 1.35; therefore, the value should be treated as unreliable and calcified (Choice C), requiring a Toe-Brachial Index (TBI) for accuracy. D. Wrong. While venous insufficiency can cause ulcers, the ABI value of 1.35 in a diabetic specifically points to arterial calcification artifact rather than venous disease. Source: Bates 13th ed"}, {"id": "q230", "pdfPage": 112, "originalNumber": "8", "question": "A 45 year old woman complains of aching and edematous(?) varicose veins that are relieved at rest. She was advised to elevate her legs. Which of the following explains why elevation is beneficial?", "options": [{"letter": "A", "text": "Elevation increases arterial pressure, relieves pain"}, {"letter": "B", "text": "Elevation increases lymphatic drainage, reducing edema only"}, {"letter": "C", "text": "Elevation increases venous return, decreases hydrostatic pressure"}, {"letter": "D", "text": "Elevation warms the legs, relaxes veins"}], "answer": "C", "answerText": "Elevation increases venous return, decreases hydrostatic pressure", "explanation": "8. ANSWER: C A. Wrong. Arterial pressure is not increased by leg elevation, and pain relief is not arterial in origin. B. Wrong. It may help edema slightly, but does not explain pain relief and is not the main mechanism. C. CORRECT. Elevation benefits varicose veins by decreasing venous hydrostatic pressure and improving venous return, not by arterial or lymphatic effects. D. Wrong. Warming and venous relaxation would actually worsen venous pooling. Source: Chat GPT (way info makita sa bates :()"}, {"id": "q231", "pdfPage": 112, "originalNumber": "9", "question": "Which component of MSE assesses the patient's ability to correctly identify date and location?", "options": [{"letter": "A", "text": "Mood"}, {"letter": "B", "text": "Insight"}, {"letter": "C", "text": "Orientation"}, {"letter": "D", "text": "Judgment"}], "answer": "C", "answerText": "Orientation", "explanation": "9. ANSWER: C A. Wrong because it assesses the patient’s subjective emotional state B. Wrong because it evaluates the patient's awareness and understanding of their own mental health condition and the need for treatment. C. CORRECT because it assesses the patient's cognitive awareness of surroundings by checking their ability to identify person, place, time, and situation. D. Wrong because this measures the patient's decision-making ability and their capacity to anticipate the consequences of their actions in real-world or hypothetical scenarios. Source: Bates 13th Ed., Ch24, p419"}, {"id": "q232", "pdfPage": 112, "originalNumber": "10", "question": "Which term describes a false, fixed belief not shared to others in a person's culture?", "options": [{"letter": "A", "text": "Hallucination"}, {"letter": "B", "text": "Delusion"}, {"letter": "C", "text": "Illusion"}, {"letter": "D", "text": "Compulsion"}], "answer": "C", "answerText": "Illusion", "explanation": "10. ANSWER: C A. Wrong because hallucination is a perception-like experiences that seem real but, unlike illusions, lack actual external stimuli B. CORRECT since it describes delusion C. Wrong because illusion is a misinterpretation of real external stimuli D. Wrong since compulsion is a repetitive behaviors that the person"}, {"id": "q233", "pdfPage": 113, "originalNumber": "11", "question": "Mini-Mental State Examination (MMSE) is used primarily to assess:", "options": [{"letter": "A", "text": "Mood"}, {"letter": "B", "text": "Affect"}, {"letter": "C", "text": "Cognitive function"}, {"letter": "D", "text": "Judgment"}], "answer": "C", "answerText": "Cognitive function", "explanation": "11. ANSWER: C A. Wrong. Mood refers to the patient’s sustained emotional state and is not the primary focus of the MMSE. B. Wrong. Affect is the observable expression of emotion and is not what the MMSE primarily evaluates. C. CORRECT. MMSE is designed to assess orientation, attention, memory, language, and visuospatial abilities. D. Wrong. Judgment is not directly or comprehensively assessed by the MMSE. Source: Bates’ Guide 12th Ed. Chapter 9"}, {"id": "q234", "pdfPage": 114, "originalNumber": "12", "question": "A patient reports hearing voices when no one is around. This is best classified as:", "options": [{"letter": "A", "text": "Illusion"}, {"letter": "B", "text": "Obsession"}, {"letter": "C", "text": "Hallucination"}, {"letter": "D", "text": "Delusion"}], "answer": "C", "answerText": "Hallucination", "explanation": "12. ANSWER: C A. Wrong. An illusion is a misinterpretation of a real external stimulus (e.g., mistaking the sound of wind for voices), whereas no external stimulus is present in this case. B. Wrong. An obsession is a recurrent, intrusive thought, impulse, or image recognized as one’s own thought, not a sensory perception like hearing voices. C. CORRECT. A hallucination is a perception without an external stimulus. Hearing voices when no one is around is an auditory hallucination, which is common in psychotic disorders. D. Wrong. A delusion is a fixed, false belief that is not based in reality, not a false sensory perception. Source: Bates’ Guide 12th Ed. Chapter 5, page 163"}, {"id": "q235", "pdfPage": 114, "originalNumber": "13", "question": "A patient can describe their medical condition accurately but denies its severity. This indicates an issue with", "options": [{"letter": "A", "text": "Cognition"}, {"letter": "B", "text": "Insight"}, {"letter": "C", "text": "Orientation"}, {"letter": "D", "text": "Judgment"}], "answer": "B", "answerText": "Insight", "explanation": "13. ANSWER: B A. Wrong. Cognition - refers to mental processes such as memory, attention, and understanding; the patient can accurately describe the condition, indicating intact cognition. B. CORRECT. Insight - the patient’s awareness and understanding of their illness and its implications. Denying the severity of a known condition reflects poor insight. C. Wrong. Orientation - concerns awareness of time, place, and pe
