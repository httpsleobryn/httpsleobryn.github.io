re conducting a neurologic exam, you already have neurologic localization. Where is the lesion likely?", "options": [{"letter": "A", "text": "Basal ganglia"}, {"letter": "B", "text": "Spinal cord"}, {"letter": "C", "text": "Brainstem"}, {"letter": "D", "text": "Motor cortex and inferior frontal cortex"}], "answer": "C", "answerText": "Brainstem", "explanation": "31. ANSWER: C A. Is wrong because lesions here affect movement, causing rigidity, slowness of movement (bradykinesia), or involuntary movements, but typically do not cause paralysis. They are not the origin site for multiple cranial nerves. B. Is wrong because the spinal cord mediates signals for the trunk and limbs via spinal nerves (C1-S5) and terminates at L1–L2. CN deficits (swallowing, speaking, vision) are not localized here. C. Is CORRECT because the symptoms described (difficulty swallowing, difficulty speaking, hoarseness of voice, pooling of saliva, and double vision) involve multiple cranial nerves (CNs) whose nuclei or tracts are located in the brainstem. D. Is wrong because lesions in the motor cortex (cerebral hemisphere) generally cause weakness or paralysis on the opposite (contralateral) side of the body (he Aw miparesis/hemiplegia). While a lesion in the dominant posterior inferior frontal lobe can cause expressive aphasia (Broca aphasia), a cortical lesion typically affects the face and arm much more than the leg (e.g., MCA stroke). A cortical lesion is less likely to produce the widespread, multi-level CN deficits (III, IV, VI,"}, {"id": "q399", "pdfPage": 203, "originalNumber": "32", "question": "A 50-year old man with atrial fibrillation complained of abrupt onset of right-sided paralysis- face, arm, and leg. He has no symptoms of impaired cognitive function. Based on this, the lesion is most likely located in:", "options": [{"letter": "A", "text": "Basal Ganglia"}, {"letter": "B", "text": "Spinal cord"}, {"letter": "C", "text": "Brain stem"}, {"letter": "D", "text": "Motor cortex and Inferior frontal cortex"}], "answer": "A", "answerText": "Basal Ganglia", "explanation": "32. ANSWER: A A. is correct because the basal ganglia is closest in the involvement of the internal capsule. Lacunar infarcts in the lenticulostriate deep penetrating branches of the MCA can cause contralateral motor or sensory deficits without cortical signs. Moreover, subcortical circulation infarcts do not affect cognitive function. B. Is wrong because the paralysis of the face would be due to the control of the cranial nerves V and VII, which are on the brain stem. C. is wrong because lesions here most often have crossed deficits, particularly on the face (e.g. face paralysis on the left, extremity paralysis on the right, and vice-versa). D. Is wrong because although the motor cortex can be involved in the paralysis, involvement of the inferior frontal cortex would mean there would be impairment of speech, which is a cognitive function. As the patient has no impaired cognitive function, this would not be the answer."}, {"id": "q400", "pdfPage": 204, "originalNumber": "33", "question": "To identify distal weakness", "options": [{"letter": "A", "text": "Talk about combing hair"}, {"letter": "B", "text": "Talk about difficulties with getting up chair"}, {"letter": "C", "text": "Talk about climbing stairs"}, {"letter": "D", "text": "Talk about strength when opening jar"}], "answer": "D", "answerText": "Talk about strength when opening jar", "explanation": "33. ANSWER: D A. Is wrong because this action identifies proximal weakness B. Is wrong because this action identifies proximal weakness C. Is wrong because this action identifies proximal weakness D. Is CORRECT"}, {"id": "q401", "pdfPage": 204, "originalNumber": "34", "question": "A 32 year old female develops headache, hearing disturbances and later ataxia/imbalance. Where could the lesion be located?", "options": [{"letter": "A", "text": "Thalamus"}, {"letter": "B", "text": "Basal Ganglia"}, {"letter": "C", "text": "Cerebellum"}, {"letter": "D", "text": "Spinal Cord"}], "answer": "C", "answerText": "Cerebellum", "explanation": "34. ANSWER: C A. Is wrong because it acts as a sensory relay center. Lesions here cause significant sensory changes (e.g., loss of sensation on one side of the body) or movement disorders B. Is wrong because involved in motor control and learning (e.g., voluntary movement, habit formation). Lesions here cause movement disorders like Parkinsonian symptoms (tremors, rigidity, slow movement) C. Is CORRECT because it is the primary center for coordination and balance. Ataxia/imbalance is its signature symptom. The cerebellum is located in the posterior fossa near the brainstem, where the auditory nerve (Cranial Nerve VIII) originates. A lesion in this general vicinity can easily compress or involve both the cerebellum itself and the nearby nerve that controls hearing and balance, explaining all reported symptoms. D. Is wrong because it primarily transmits signals between the brain and the rest of the body. A spinal cord lesion would cause different symptoms, such as Motor deficits (weakness or paralysis in the arms, legs, or trunk), Sensory deficits (numbness, tingling) Source: Bate’s 12th Ed. Chapter 17. Nervous System pg 748"}, {"id": "q402", "pdfPage": 205, "originalNumber": "35", "question": "Which of the following is a headache warning sign?", "options": [{"letter": "A", "text": "Vomiting"}, {"letter": "B", "text": "Syncope"}, {"letter": "C", "text": "Age >50 years old"}, {"letter": "D", "text": "Disabling headache"}], "answer": "C", "answerText": "Age >50 years old", "explanation": "35. ANSWER: C A. Is wrong because it’s not part of what’s indicated in Bates’ B. Is wrong because it’s also not indicated in Bates’ C. Is CORRECT because age of >50 years is part of the headache warning signs D. Is wrong because although you can vaguely relate it to what are listed below, it’s not stated verbatim; so my heart belongs to C. Source: Bates’ 12th Ed., Chap. 7, p.216"}, {"id": "q403", "pdfPage": 205, "originalNumber": "36", "question": "A 52 year old female complained of abrupt onset of headache described as the “worst headache of her life”. She later on lost consciousness for 10 minutes and awakened with no recollection of events and frequent vomiting. This is highly suspicious for", "options": [{"letter": "A", "text": "Subarachnoid hemorrhage"}, {"letter": "B", "text": "Meningitis"}, {"letter": "C", "text": "Migraine"}, {"letter": "D", "text": "Brain tumor"}], "answer": "A", "answerText": "Subarachnoid hemorrhage", "explanation": "36. ANSWER: A A. Is CORRECT because the abrupt onset and description as the “worst headache of her life” are the classic, defining features that strongly suggest a secondary, life-threatening condition such as subarachnoid hemorrhage B. Is wrong because although meningitis causes severe headache, the scenario does not include key warning signs like fever or stiff neck which are typically necessary to suggest this diagnosis C. Is wrong because migraines are generally episodic, progress to a peak over several hours, and loss of consciousness is not a common characteristic, unlike the abrupt, instantaneous onset of hemorrhage D. Is wrong because headaches caused by a brain tumor (mass lesion) are typically new and progressively severe over a period of time rather than having a sudden, instantaneous onset like the event described"}, {"id": "q404", "pdfPage": 206, "originalNumber": "38", "question": "years old motorcycle rider was hit by an incoming bus. He arrived at the ER with dilated left pupil not reactive. His won’t open on pain or command. Upon sternal rub there was decerebrate posturing. Verbal was absent. Calculate the GCS.", "options": [{"letter": "A", "text": "3"}, {"letter": "B", "text": "4"}, {"letter": "C", "text": "5"}, {"letter": "D", "text": "6"}], "answer": "B", "answerText": "4", "explanation": "38. ANSWER: B A. Is wrong because it does not add up to the correct responses under the GCS. B. Is CORRECT because the calculated GCS score is a total of 4. C. Is CORRECT because it does not add up to the correct responses under the GCS. D. Is wrong because it does not add up to the correct responses under the GCS."}, {"id": "q405", "pdfPage": 206, "originalNumber": "39", "question": "A patient suspected of dementia gives highly detailed but incorrect answers to recent events. What is the patient likely showing?", "options": [{"letter": "A", "text": "Preservation"}, {"letter": "B", "text": "Confabulation"}, {"letter": "C", "text": "Delusion"}, {"letter": "D", "text": "Echolalia"}], "answer": "B", "answerText": "Confabulation", "explanation": "39. ANSWER: B A. Is wrong because preservation is the persistent repetition of words or ideas. B. Is CORRECT because confabulation is when the patient fabricates facts or events in response to questions to fill in the gaps with detailed but incorrect answers. C. Is wrong because delusion is a fixed false belief not due to memory loss. D. Is wrong because echolalia is the repetition of the words and phrases of others."}, {"id": "q406", "pdfPage": 207, "originalNumber": "40", "question": "A 50 yo reports hearing voices when no one is present.", "options": [{"letter": "A", "text": "Start antipsychotic treatment immediately"}, {"letter": "B", "text": "Rule out illnesses such as metabolic or neurologic illnesses"}, {"letter": "C", "text": "Perform remote memory recall only"}, {"letter": "D", "text": "Assume it's stress-related"}], "answer": "B", "answerText": "Rule out illnesses such as metabolic or neurologic illnesses", "explanation": "40. ANSWER: B A. Is wrong because it is dangerous especially without ruling out medical causes of the hallucinations B. Is CORRECT because auditory hallucinations in adults after age 40-50 are more likely to have a secondary medical cause and they should be ruled out before diagnosing the patient with psychotic disorders C. Is wrong because this test is insufficient and doesn’t detect secondary medical causes that may have resulted to the development of auditory hallucinations D. Is wrong because it is premature, especially in middle-aged adults Source: https://www.webmd.com/schizophrenia/mental-health-psychotic-disorders"}, {"id": "q407", "pdfPage": 207, "originalNumber": "41", "question": "Awareness of personal identity, place, and time", "options": [{"letter": "A", "text": "Mood"}, {"letter": "B", "text": "Orientation"}], "answer": "B", "answerText": "Orientation", "explanation": "41. ANSWER: B A. Is wrong because this refers to the subjective, sustained emotional state 20 C. Perception D. Affect B. Is CORRECT because it assesses whether the patient knows who they are, where they are, and when it is C. Is wrong because it explains how the patient interprets sensory information D. Is wrong because it is the objective, observed expression of emotion"}, {"id": "q408", "pdfPage": 208, "originalNumber": "42", "question": "Immediate recall is assessed by asking the patient to:", "options": [{"letter": "A", "text": "Recall 3 unrelated words immediately"}, {"letter": "B", "text": "Recall events from their Childhood"}, {"letter": "C", "text": "Recall what they Ate yesterday"}, {"letter": "D", "text": "Have them do a Simple math question"}], "answer": "A", "answerText": "Recall 3 unrelated words immediately", "explanation": "42. ANSWER: A A. Is CORRECT because testing new learning ability is through immediate recall where you give the patient three or four words and ask the patient to repeat them. B. Is wrong because this is for testing long-term memory (cognitive function). C. Is wrong because this is for testing memory (cognitive function). D. Is wrong because this is testing calculating ability for higher cognitive function"}, {"id": "q409", "pdfPage": 208, "originalNumber": "43", "question": "A patient describes feeling \"empty and hopeless, but their facial expression appears bright and smiling. This best represents:", "options": [{"letter": "A", "text": "Elevated mood"}, {"letter": "B", "text": "Flat affect"}, {"letter": "C", "text": "Incongruent affect"}, {"letter": "D", "text": "Labile affect"}], "answer": "C", "answerText": "Incongruent affect", "explanation": "43. ANSWER: C A. Is wrong because elevated mood means an overly cheerful or euphoric emotional state, not sadness with a smile. B. Is wrong because flat affect shows no emotional expression; this patient shows a smiling expression. C. Is CORRECT because incongruent affect is when the expressed emotion does not match the reported mood, thus hopelessness with a bright expression. D. Is wrong because labile affect involves rapid, shifting emotions, not a mismatch between mood and expression. Source: Kaplan and Sadock, Chapter 1, Examination and Diagnosis of the Psychiatric Patient"}, {"id": "q410", "pdfPage": 209, "originalNumber": "44", "question": "Which of the following statements best differentiates thought content and thought process?", "options": [{"letter": "A", "text": "Thought content refers to logic and flow of ideas"}, {"letter": "B", "text": "Thought process refers to what the patient is thinking about"}, {"letter": "C", "text": "Thought content includes delusions or obsessions"}, {"letter": "D", "text": "Thought process includes suicidal ideation"}], "answer": "C", "answerText": "Thought content includes delusions or obsessions", "explanation": "44. ANSWER: C A. Wrong. Logic/flow of ideas is thought of process, not content B. Wrong. What they think about is thought content C. CORRECT. This lists specific subject matter that is assessed, which is the definition of Thought Content D. Wrong. Suicidal ideation is thought content Unsure"}, {"id": "q411", "pdfPage": 209, "originalNumber": "45", "question": "A 72-yr old patient cannot recall the date or location but can adhere to commands and has attention. This is consistent with?", "options": [{"letter": "A", "text": "Impaired orientation"}, {"letter": "B", "text": "Impaired language"}, {"letter": "C", "text": "Hallucination"}, {"letter": "D", "text": "Depression"}], "answer": "A", "answerText": "Impaired orientation", "explanation": "45. ANSWER: A A. Is CORRECT because orientation refers to TIME, PLACE and PERSON B. Is wrong because px can still adhere to commands and has attention C. Is wrong D. Is wrong Source: Bates chapter 5"}, {"id": "q412", "pdfPage": 209, "originalNumber": "46", "question": "A patient reports shadows on the wall as people watching them. This is best described as:", "options": [{"letter": "A", "text": "Illusion"}, {"letter": "B", "text": "Hallucination"}, {"letter": "C", "text": "Confabulation"}, {"letter": "D", "text": "Perseveration"}], "answer": "A", "answerText": "Illusion", "explanation": "46. ANSWER: A A. Is CORRECT because it is a misinterpretation of a real external stimulus B. Is wrong because it is a perception without any external stimulus C. Is wrong because it refers to unintentionally making up memories to fill gaps (memory disturbance), not a perceptual misinterpretation. D. Is wrong because it refers to inappropriate repetition of a word/phrase or action Unsure"}, {"id": "q413", "pdfPage": 210, "originalNumber": "47", "question": "An elderly patient presented with fluctuating alertness and recent onset of symptoms", "options": [{"letter": "A", "text": "Delirium"}, {"letter": "B", "text": "Dementia"}, {"letter": "C", "text": "Major depression"}, {"letter": "D", "text": "Schizophrenia"}], "answer": "A", "answerText": "Delirium", "explanation": "47. ANSWER: A A. Is CORRECT because it accurately describes the manifestations of delirium. B. Is wrong because it is characterized by gradual onset and a progressive, chronic decline in memory and cognitive function. C. Is wrong because it typically involves a persistent depressed mood and/or anhedonia. It doesn’t typically cause fluctuating alertness. D. Is wrong because it is a chronic psychotic disorder that usually presents during adolescence or early adulthood. Source: Bate’s 13th Ed. Chapter 9-Cognition, Behaviour, and Mental Status"}, {"id": "q414", "pdfPage": 210, "originalNumber": "48", "question": "A patient scored poorly on delayed recall but normal attention and language. What cognitive domain is most affected?", "options": [{"letter": "A", "text": "Immediate memory"}, {"letter": "B", "text": "Remote memory"}, {"letter": "C", "text": "New learning"}, {"letter": "D", "text": "Abstraction"}], "answer": "C", "answerText": "New learning", "explanation": "48. ANSWER: C A. Is wrong because immediate memory is tested by digit span or repeating numbers/words right away, which depends on attention. The patient had normal attention, so this domain is not the problem. B. Is wrong because remote memory refers to long-term stored information (childhood events, past personal history), which is not assessed by delayed recall tasks. C. Is CORRECT because delayed recall specifically tests the ability to encode and retain newly learned information, so a poor score indicates impaired new learning. D. Is wrong because abstraction is tested using similarities/proverbs or conceptual reasoning, not delayed recall."}, {"id": "q415", "pdfPage": 211, "originalNumber": "49", "question": "A student notices a patient rapidly jumping between unrelated topics during conversation. This pattern represents:", "options": [{"letter": "A", "text": "Circumstantiality"}, {"letter": "B", "text": "Flight of Ideas"}, {"letter": "C", "text": "Blocking"}, {"letter": "D", "text": "Tangentiality"}], "answer": "B", "answerText": "Flight of Ideas", "explanation": "49. ANSWER: B A. Is wrong because Circumstantiality is overinclusion of unnecessary details but eventually returns to the point. B. Is CORRECT because rapid shifting between topics that are loosely connected or not connected at all, commonly seen in mania. The patient jumps quickly from one idea to another, making the conversation hard to follow. C. Is wrong because Blocking is sudden interruption of speech mid-thought. D. Is wrong because Tangentiality answers diverge and never return to the original point, but not rapid topic-jumping. Doc Lee’s PPT"}, {"id": "q416", "pdfPage": 211, "originalNumber": "50", "question": "You suspect depression in a patient presenting with poor energy and sleep disturbance. Which next step is MOST appropriate?", "options": [{"letter": "A", "text": "Perform suicide risk assessment"}, {"letter": "B", "text": "Order brain MRI"}, {"letter": "C", "text": "Test for immediate recall"}, {"letter": "D", "text": "Evaluate orientation only"}], "answer": "A", "answerText": "Perform suicide risk assessment", "explanation": "50. ANSWER: A A. Is CORRECT because when a patient presents with depressive symptoms such as poor energy and sleep disturbance, the first priority is to assess for safety, particularly suicidal ideation B. Is wrong because it is not indicated initially unless there are neurological deficits or atypical features. C. Is wrong because cognitive testing is not the first step; it may be part of a broader evaluation later. D. Is wrong because orientation assessment is too limited and misses critical psychiatric risk assessment. Source: Bate’s 13th Ed. Chapter 9-Cognition, Behaviour, and Mental Status"}, {"id": "q417", "pdfPage": 212, "originalNumber": "1", "question": "According to the Levine system for grading of murmurs, which murmur intensity is the lowest grade accompanied by a palpable thrill?", "options": [{"letter": "A", "text": "Grade 2"}, {"letter": "B", "text": "Grade 3"}, {"letter": "C", "text": "Grade 4"}, {"letter": "D", "text": "Grade 5"}], "answer": "C", "answerText": "Grade 4", "explanation": "1. ANSWER: C A. Wrong. Quiet, but heard immediately after placing the stethoscope on the chest. B. Wrong. Moderately loud. C. CORRECT. Loud with palpable thrill D. Wrong. Very loud, with thrill. May be heard when the stethoscope is partly off the chest. Source: Bates’ Guide 12th Ed.,Chapter 9, page 396"}, {"id": "q418", "pdfPage": 212, "originalNumber": "2", "question": "Which of the following statements correctly describes the timing of the common cardiac murmur?", "options": [{"letter": "A", "text": "Pulmonic regurgitation produces a systolic murmur"}, {"letter": "B", "text": "Mitral stenosis produces a diastolic murmur"}, {"letter": "C", "text": "Aortic stenosis produces a diastolic murmur"}, {"letter": "D", "text": "Tricuspid regurgitation produces a diastolic murmur"}], "answer": "B", "answerText": "Mitral stenosis produces a diastolic murmur", "explanation": "2. ANSWER: B A. Is wrong because pulmonic regurgitation produces a diastolic murmur. B. Is CORRECT because mitral stenosis produces a diastolic murmur. C. Is wrong because aortic stenosis produces a systolic murmur. D. Is wrong because tricuspid regurgitation produces a systolic murmur. Remember: DARMS (Diastolic: Aortic Regurgitation, Mitral Stensosis)"}, {"id": "q419", "pdfPage": 213, "originalNumber": "3", "question": "Pediatric px presents with dyspnea and has a known patent ductus arteriosus. which finding supports this diagnosis?", "options": [{"letter": "A", "text": "Continuous murmur heard through systole and diastole"}, {"letter": "B", "text": "Early systolic murmur at apex"}, {"letter": "C", "text": "Late systolic murmur radiating to the axilla"}, {"letter": "D", "text": "Mid diastolic rumble at apex"}], "answer": "A", "answerText": "Continuous murmur heard through systole and diastole", "explanation": "3. ANSWER: A A. CORRECT - PDA produces a continuous “machinery” murmur due to persistent flow from the aorta to the pulmonary artery throughout the cardiac cycle B. Wrong - this finding is not characteristic of PDA and is more associated with other valvular abnormalities C. Wrong - this is typical of mitral valve prolapse or mitral regurgitation, not PDA D. Wrong - this murmur is classically associated with mitral stenosis"}, {"id": "q420", "pdfPage": 214, "originalNumber": "4", "question": "Mitral stenosis on cardiac examination. Which is the best position to assess this?", "options": [{"letter": "A", "text": "Supine position"}, {"letter": "B", "text": "Left Lateral decubitus"}, {"letter": "C", "text": "Sitting while arms raised"}, {"letter": "D", "text": "Standing position"}], "answer": "B", "answerText": "Left Lateral decubitus", "explanation": "4. ANSWER: B A. Is wrong because Not the best for mitral sounds B. Is CORRECT because this position brings the mitral valve closer to the chest wall, enhancing the diastolic murmur. C. Is wrong because Used for lung exam / aortic regurg D. Is wrong because Murmurs usually softer"}, {"id": "q421", "pdfPage": 215, "originalNumber": "6", "question": "A 30 year old patient has prominent heaves palpated at the 3rd-5th ICS along the left sternal border. What underlying cardiac abnormality best explains this finding?", "options": [{"letter": "A", "text": "LV enlargement"}, {"letter": "B", "text": "RV enlargement"}, {"letter": "C", "text": "Aortic Valve Regurgitation"}, {"letter": "D", "text": "Hypovolemia"}], "answer": "B", "answerText": "RV enlargement", "explanation": "6. ANSWER: B A. Is wrong because heaves depend on the location. Since the heave is located at the parasternal border, it cannot be a left ventricle enlargement because the heave for this abnormality is located in the MIDCLAVICULAR line in the 5th ICS. B. Is CORRECT because the heave was found in the PARASTERNAL border where the right ventricle is much closer to, compared to the left ventricle C. Is wrong because Aortic Regurgitation is more related to a displaced apical impulse than prominent heaves at the parasternal border D. Is wrong because it is more related to lack of cardiac filling and diminished pulses Source: Bates"}, {"id": "q422", "pdfPage": 215, "originalNumber": "7", "question": "Patient with massive blood loss due to gunshot wound with signs of hypovolemic shock. BP 80 mmHg and weak peripheral pulses. What cardiovascular examination finding is in line with this hemodynamic state?", "options": [{"letter": "A", "text": "Bounding point on maximal impulse"}, {"letter": "B", "text": "Palpable left ventricular thrill"}, {"letter": "C", "text": "JVP less than 3 cm above the sternal angle"}, {"letter": "D", "text": "Loud diastolic"}], "answer": "C", "answerText": "JVP less than 3 cm above the sternal angle", "explanation": "7. ANSWER: C A. Wrong. “Bounding” PMI is usually associated with high-output states or aortic regurgitation. In hypovolemic shock, the stroke volume is severely diminished. The PMI would likely be thready, weak, or difficult to palpate because there isn't enough blood to create a forceful ventricular contraction against the chest wall. B. Wrong. A thrill is a palpable vibration caused by turbulent blood flow, usually associated with high-grade murmurs (Grade 4/6 or higher), such as severe aortic stenosis or a ventricular septal defect. While a gunshot wound could theoretically cause structural damage, a \"thrill\" is not a standard finding of the hemodynamic state of hypovolemia itself. C. CORRECT. In a patient with massive blood loss (hemorrhagic shock), there is a critical decrease in intravascular volume. The Jugular Venous Pressure (JVP) is a direct reflection of right 4 murmur at the apex atrial pressure and overall fluid status. According to Bates', a low JVP (often non-visible even when the patient is lying flat) is a classic sign of hypovolemia. A normal JVP is typically 6 to 8 cm H2O total, or less than or equal to 3 cm vertical distance above the sternal angle. In hypovolemic shock, the venous columns collapse due to lack of volume. D. Wrong. A loud diastolic murmur at the apex usually indicates Mitral Stenosis. Hypovolemic shock leads to a \"quiet\" heart because there is less blood moving through the valves. Furthermore, diastolic murmurs are almost always pathological structural issues, not a result of acute volume loss. Source: Bates 13th Ed. Ch. 16"}, {"id": "q423", "pdfPage": 216, "originalNumber": "8", "question": "Px is noted to have a palpable thrill during cardiac examination. Which of the following valvular lesions explains this finding?", "options": [{"letter": "A", "text": "Mitral stenosis"}, {"letter": "B", "text": "Aortic stenosis"}, {"letter": "C", "text": "Tricuspid regurgitation"}, {"letter": "D", "text": "Pulmonic stenosis"}], "answer": "B", "answerText": "Aortic stenosis", "explanation": "8. ANSWER: B A. Is wrong because it causes a diastolic rumbling murmur at the apex.Thrills are rare; usually only in very severe cases. It is less commonly palpable because the mitral valve is on the left atrium, and blood flow velocity is relatively low compared to aortic stenosis. B. Is CORRECT because aortic stenosis is high-velocity blood ejection through a narrow aortic valve produces turbulent flow transmitted to the chest wall. It is most commonly associated with valvular lesion with palpable thrill. C. Is wrong because it causes holosystolic murmur at the lower left sternal border, often increasing with inspiration (Carvallo’s sign).Thrills are uncommon and usually mild flow, unless severe. D. Is wrong because it is systolic ejection murmur at left upper sternal border, may radiate to neck but this is less common than aortic stenosis Source: Bates 13th Ed. Ch. 16 p. 856"}, {"id": "q424", "pdfPage": 216, "originalNumber": "9", "question": "During teaching rounds, a medical student states that murmurs from semilunar valves are best heard at the apex. How should the clinician evaluate this statement?", "options": [{"letter": "A", "text": "Correct. Semilunar valve murmurs are best heard at the apex"}, {"letter": "B", "text": "Correct. Semilunar valves lie closest to the apex"}, {"letter": "C", "text": "Incorrect. Semilunar"}], "answer": "C", "answerText": "Incorrect. Semilunar", "explanation": "9. ANSWER: C A. Is wrong. Semilunar valve murmurs are best heard at the base B. Is wrong. Anatomically, the semilunar valves are located at the base, the mitral valve is closest to the apex C. Is CORRECT. The Aortic area (2nd right intercostal space) and the Pulmonic area (2nd left intercostal space) are the primary sites for evaluating semilunar valve function. D. Is wrong. Semilunar valves are frequently the source of significant clinical murmurs 5 valve murmurs are best heard at the base D. Incorrect. Semilunar valves do not produce murmurs Source: Bates 13th Ed., Ch16, p876"}, {"id": "q425", "pdfPage": 217, "originalNumber": "10", "question": "In bedside teaching, an intern states that the left ventricle is the most anterior structure of the chest. What is the best interpretation of statement?", "options": [{"letter": "A", "text": "Correct, left ventricle forms most of the anterior of the chest"}, {"letter": "B", "text": "Correct, left ventricle lies close to the sternum"}, {"letter": "C", "text": "Incorrect, right ventricle forms most of the anterior of the chest"}, {"letter": "D", "text": "Incorrect, left atrium lies close to the sternum"}], "answer": "C", "answerText": "Incorrect, right ventricle forms most of the anterior of the chest", "explanation": "10. ANSWER: C A. Is wrong because right ventricle is the most anterior B. Is wrong because left ventricle does not lie close to the sternum C. Is CORRECT because right ventricle is the most anterior structure of the heart D. Is wrong because left atrium does not lie close to the sternum Source: Bates 13th Ed., Chapter 16 page 822"}, {"id": "q426", "pdfPage": 217, "originalNumber": "11", "question": "What cognitive function is assessed by asking the patient to repeat three words after 3-5 minutes?", "options": [{"letter": "A", "text": "Attention"}, {"letter": "B", "text": "Memory"}, {"letter": "C", "text": "Vocabulary"}, {"letter": "D", "text": "Abstract thinking"}], "answer": "B", "answerText": "Memory", "explanation": "11. ANSWER: B A. Is wrong because attention is assessed by tasks like digit span or serial 7s, not delayed recall. B. Is CORRECT because asking a patient to recall three words after 3–5 minutes evaluates short-term (recent) memory. C. Is wrong because vocabulary is assessed by language tasks such as naming or word definitions. D. Is wrong because abstract thinking is tested with proverbs or similarities (e.g., “How are an apple and an orange alike?”). Source: Bates 13th ed., chap 9 page 498"}, {"id": "q427", "pdfPage": 217, "originalNumber": "12", "question": "Why is the Mini-Cog Test commonly used in screening for cognitive impairment?", "options": [{"letter": "A", "text": "It measures emotional intelligence"}, {"letter": "B", "text": "It quickly assesses"}], "answer": "B", "answerText": "It quickly assesses", "explanation": "12. ANSWER: B A. Is wrong because the Mini-Cog Test does not measure emotional intelligence. B. Is CORRECT because the Mini-Cog Test is commonly used to quickly assess memory and executive function, especially in 6 memory and executive function C. It evaluates cranial nerve function D. It determines personality disorder dementia. C. Is wrong because the Mini-Cog Test does not evaluate cranial nerve function. D. Is wrong because the Mini-Cog Test does not determine personality disorders. Source: Bates 13th ed., chap 9 page 428"}, {"id": "q428", "pdfPage": 218, "originalNumber": "13", "question": "A 72 yo patient is undergoing a cognitive assessment. The physician asks the patient to spell the word “WORLD” backwards. Which of the ff domains is primarily being tested?", "options": [{"letter": "A", "text": "Attention and concentration"}, {"letter": "B", "text": "Language comprehension"}, {"letter": "C", "text": "Long term memory"}, {"letter": "D", "text": "Visuospatial ability"}], "answer": "A", "answerText": "Attention and concentration", "explanation": "13. ANSWER: A A. Is CORRECT because because asking a patient to spell “WORLD” backwards tests attention and concentration, which are components of executive functioning commonly assessed in cognitive screening tests such as the Mini-Mental State Examination. B. Is wrong because language comprehension assesses the ability to understand spoken or written language, not the ability to manipulate information mentally. C. Is wrong because long-term memory refers to the recall of past events or learned information, which is usually tested by asking about past history or delayed recall tasks. D. Is wrong because visuospatial ability involves interpreting spatial relationships, such as copying figures or drawing objects, which is not involved in spelling words backward."}, {"id": "q429", "pdfPage": 219, "originalNumber": "14", "question": "During mental status exam, physician asks patient to interpret this proverb: \"People in glass houses should not throw stones.\" What cognitive ability is being assessed?", "options": [{"letter": "A", "text": "Immediate memory"}, {"letter": "B", "text": "Abstract reasoning"}, {"letter": "C", "text": "Orientation"}, {"letter": "D", "text": "Language fluency"}], "answer": "B", "answerText": "Abstract reasoning", "explanation": "14. ANSWER: B A. Is wrong because immediate memory tests short-term recall of recent information, not interpretation of symbolic meaning. B. Is CORRECT because interpreting proverbs requires understanding figurative meaning and concepts beyond literal words, which assesses abstract reasoning. C. Is wrong because orientation checks awareness of time, place, and person, not higher-level thinking. D. Is wrong because language fluency measures ease and flow of speech, not the ability to interpret metaphors. Source: Bates 12th Ed., Ch 5, p 166"}, {"id": "q430", "pdfPage": 219, "originalNumber": "15", "question": "The patient was unable to recall the three words after 5 minutes, but able to correctly answer when given categorical clues. What difficulty is most likely?", "options": [{"letter": "A", "text": "Impaired attention"}, {"letter": "B", "text": "Retrieval difficulty"}, {"letter": "C", "text": "Language impairment"}, {"letter": "D", "text": "Severe dementia"}], "answer": "B", "answerText": "Retrieval difficulty", "explanation": "15. ANSWER: B A. Is wrong because it would also affect immediate recall not just delayed in answering B. Is CORRECT because the patient still can recall information when given calls, meaning the information is stored but just not easily accessed C. Is CORRECT because this affects naming and comprehension, not recall with cues D. Is wrong because typically with no improvement even with cues Source: Bates 13th edition, Chapter 9 page 421"}, {"id": "q431", "pdfPage": 219, "originalNumber": "8", "question": "incorrectly and clock hands are placed randomly when asked to place on 10:10. What is affected?", "options": [{"letter": "A", "text": "Language"}, {"letter": "B", "text": "Visuospatial and Executive Memory"}, {"letter": "C", "text": "Immediate memory"}, {"letter": "D", "text": "Emotional"}], "answer": "A", "answerText": "Language", "explanation": "A. Is wrong because while the patient must understand the instruction, the physical act of drawing and spatial arrangement is not a linguistic task. B. Is CORRECT because Clock Drawing Test (CDT) is a widely used screening tool in clinical settings to assess multiple cognitive domains simultaneously; such asVisuospatial & Executive Memory C. Is wrong because the patient does not need to \"store\" the information for long; the prompt is usually right in front of them or repeated. D. Is wrong because this refers to mood or affect, which does not govern the motor-spatial accuracy of drawing."}, {"id": "q432", "pdfPage": 221, "originalNumber": "17", "question": "A medical student concludes that the patient has severe cognitive impairment due to failure to perform serial 7 subtraction. What is the best evaluation of the medical student’s conclusion?", "options": [{"letter": "A", "text": "Correct, because serial 7 measures all cognitive function domains"}, {"letter": "B", "text": "Correct, because attention alone determines cognitive function"}, {"letter": "C", "text": "Incorrect, because multiple cognitive domains must be assessed"}, {"letter": "D", "text": "Incorrect, because serial 7 only test language"}], "answer": "C", "answerText": "Incorrect, because multiple cognitive domains must be assessed", "explanation": "17. ANSWER: C A. Is wrong because Serial 7s do NOT assess all domains. It mainly tests attention and calculation, not memory, language, or executive function. B. Is wrong because Attention is important, but cognition is broader. A patient may have impaired attention but intact memory or language (or vice versa). C. Is CORRECT because A proper cognitive evaluation (e.g., mental status exam) must include multiple domains, not just one task like serial 7s. D. Is wrong because Serial 7s do not primarily test language. They test Attention, Concentration, and Arithmetic ability Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 5, p. 165"}, {"id": "q433", "pdfPage": 221, "originalNumber": "18", "question": "During a mental status examination, patient was able to state date, location, and current president but was unable to recall 3 words after 5 mins. What is your interpretation?", "options": [{"letter": "A", "text": "Normal mental cognition"}, {"letter": "B", "text": "Impaired language interpretation"}], "answer": null, "answerText": "", "explanation": "18. ANSWER: C A. Is wrong because the patient is oriented (time, place, person), but inability to recall 3 words after 5 minutes indicates a deficit. So cognition is not fully normal. B. Is wrong because language function involves comprehension, naming, repetition, and fluency. Since the issue is memory recall, not understanding or speaking, this is not affected. 10 C. Impaired recent memory D. Impaired judgement C. Is CORRECT because failure to recall 3 words after a delay specifically tests recent (short-term) memory. This is a classic finding of impaired recent memory, even if orientation is intact. D. Is wrong because Judgment is assessed through decision-making scenarios (e.g., “What would you do if…?”). This case involves memory, not decision-making, so judgment is unaffected. Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 5 p. 165"}, {"id": "q434", "pdfPage": 222, "originalNumber": "19", "question": "Before performing a physical examination, the medical student asks the patient’s name, age, and gender. This practice follows which principle?", "options": [{"letter": "A", "text": "Rapport building only"}, {"letter": "B", "text": "Proper patient identification"}, {"letter": "C", "text": "Time efficiency"}, {"letter": "D", "text": "Legal documentation"}], "answer": "B", "answerText": "Proper patient identification", "explanation": "19. ANSWER: B A. Is wrong because while asking basic details can help rapport, the primary purpose is identification, not just communication. B. Is CORRECT because asking for the patient’s name, age, and gender ensures that the clinician confirms they are examining the correct patient, preventing errors and ensuring patient safety. C. Is wrong because confirming patient details doesn’t directly save time; it prevents mistakes. D. Is wrong because documentation comes later; asking these questions is not primarily for legal purposes. Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 1, p. 8"}, {"id": "q435", "pdfPage": 222, "originalNumber": "20", "question": "While interviewing a patient, the physician maintains eye contact, nods and allow pauses for patient to elaborate. What is the questioning skill being elaborated?", "options": [{"letter": "A", "text": "Closed questioning"}, {"letter": "B", "text": "Direct interviewing"}, {"letter": "C", "text": "Active listening"}, {"letter": "D", "text": "Confrontation"}], "answer": "C", "answerText": "Active listening", "explanation": "20. ANSWER: C A. Is wrong because Closed questions are yes/no or short answers, limiting patient elaboration. The stem shows facilitation of elaboration, opposite of closed questioning. B. Is wrong because In direct interviewing, the physician controls the flow of the interview and asks structured questions. The stem describes a patient-centered approach, not physician-led. C. Is CORRECT because maintaining eye contact, nodding, and allowing pauses for the patient to elaborate—are classic features of Active listening. Active listening is a communication technique in which the listener fully concentrates, understands, responds, and then remembers what the patient is saying. It is patient-centered and facilitates the flow of information without interruption. D. Is wrong because Confrontation is used to address inconsistencies or challenge statements. Here, the physician is encouraging, not challenging."}, {"id": "q436", "pdfPage": 223, "originalNumber": "21", "question": "During history, the patient begins to cry discussing a recent diagnosis. What is the next appropriate step?", "options": [{"letter": "A", "text": "Change the topic to avoid distress"}, {"letter": "B", "text": "Offer tissue and allow silence"}, {"letter": "C", "text": "Explain the medical details immediately"}, {"letter": "D", "text": "End the interview briefly"}], "answer": "B", "answerText": "Offer tissue and allow silence", "explanation": "21. ANSWER: B A. Is wrong because This is inappropriate because it dismisses the patient’s emotions and breaks rapport. B. Is correct because This is correct because acknowledging emotion and giving the patient space demonstrates empathy and therapeutic communication. C. Is wrong because This is not ideal because emotional distress should be addressed first before giving cognitive information D. Is wrong because This is inappropriate because terminating the interview abandons the patient during a vulnerable moment."}, {"id": "q437", "pdfPage": 224, "originalNumber": "23", "question": "Medical student examines a patient without hand hygiene. Which protocol was violated?", "options": [{"letter": "A", "text": "Patient autonomy"}, {"letter": "B", "text": "Infection control"}, {"letter": "C", "text": "Documentation"}, {"letter": "D", "text": "Informed consent"}], "answer": "B", "answerText": "Infection control", "explanation": "23. ANSWER: B A. Is wrong because patient autonomy is associated with considering the patient’s decision B. Is CORRECT because hand hygiene is the most important practice in infection control C. Is wrong because documentation refers to charting and other documents D. Is wrong because informed consent is useful for acquiring patients' approval in certain tests and able to make informed decisions."}, {"id": "q438", "pdfPage": 225, "originalNumber": "24", "question": "Repeatedly arriving late to clinical rotations demonstrates a lack of:", "options": [{"letter": "A", "text": "Knowledge"}, {"letter": "B", "text": "Professional responsibility"}, {"letter": "C", "text": "Clinical skill"}, {"letter": "D", "text": "Diagnostic ability"}], "answer": "B", "answerText": "Professional responsibility", "explanation": "24. ANSWER: B A. Is wrong because Knowledge refers to understanding of medical concepts. Being late does not indicate lack of medical knowledge. B. Is CORRECT because Chronic lateness shows poor Time management, Accountability, &Commitment to duties. These are fundamental aspects of medical professionalism. C. Is wrong because Clinical skills involve physical exam techniques and patient care abilities. Tardiness does not directly reflect skill level. D. Is wrong because Diagnostic ability refers to interpreting clinical data and making diagnoses. This is unrelated to punctuality. Source: Common sense"}, {"id": "q439", "pdfPage": 225, "originalNumber": "25", "question": "Presented with low back pain 8 months ago. Pain affects daily activities and work performance. How is this differentiated from acute illness?", "options": [{"letter": "A", "text": "Pain intensity"}, {"letter": "B", "text": "Duration of symptoms"}, {"letter": "C", "text": "Location of pain"}, {"letter": "D", "text": "Response to analgesics"}], "answer": "B", "answerText": "Duration of symptoms", "explanation": "25. ANSWER: B A. Is wrong because pain intensity may vary in both acute and chronic conditions and does not define whether an illness is acute or chronic. B. Is CORRECT because chronic illness is differentiated from acute illness primarily by symptom duration (typically >3–6 months). C. Is wrong because the site of pain does not determine whether the condition is acute or chronic. D. Is wrong because response to pain medication varies among individuals and is not a defining criterion for chronic versus acute illness. Source: Bates’ Guide to Physical Examination and History Taking, Page 267 and 379."}, {"id": "q440", "pdfPage": 226, "originalNumber": "26", "question": "A 22-year-old female is being examined with both the abdomen and chest exposed. Which proper draping principle should be followed to correct the violation? (Gist)", "options": [{"letter": "A", "text": "Perform simultaneous examination of multiple systems"}, {"letter": "B", "text": "Only the area being examined should be exposed while the rest of the body remains covered"}, {"letter": "C", "text": "Unrecalled (not the answer)"}, {"letter": "D", "text": "Prioritize physician efficiency rather than patient comfort"}], "answer": "B", "answerText": "Only the area being examined should be exposed while the rest of the body remains covered", "explanation": "26. ANSWER: B A. Is wrong because examining multiple systems at once may compromise patient privacy and comfort, which Bates emphasizes protecting during the physical exam. B. Is CORRECT because proper draping requires exposing only the body part currently being examined while keeping the remainder of the patient covered to maintain dignity and comfort. C. Is wrong because any option that allows unnecessary exposure of the patient’s body would violate Bates’ principle of respectful draping. D. Is wrong because Bates stresses that patient comfort, modesty, and privacy take priority over examiner convenience. Source: Bates’ Guide to Physical Examination and History Taking, Page 225-226."}, {"id": "q441", "pdfPage": 226, "originalNumber": "27", "question": "A patient appears pale, diaphoretic, and clutching the chest while leaning forward. Which component of the exam does this observation belong to?", "options": [{"letter": "A", "text": "Mental status exam"}, {"letter": "B", "text": "General survey"}, {"letter": "C", "text": "Cardiovascular exam"}, {"letter": "D", "text": "Respiratory exam"}], "answer": "B", "answerText": "General survey", "explanation": "27. ANSWER: B A. Is wrong because the mental status exam evaluates cognition, orientation, mood, and thought processes, not physical distress signs like pallor or diaphoresis. B. Is CORRECT because the general survey involves the initial observation of the patient’s overall appearance, posture, distress, and skin findings such as pallor and diaphoresis. C. Is wrong because the cardiovascular exam focuses on inspection, palpation, and auscultation of the heart and vessels, not the initial overall observation. D. Is wrong because the respiratory exam evaluates breathing patterns, chest movement, and lung sounds, which occur after the general survey."}, {"id": "q442", "pdfPage": 227, "originalNumber": "28", "question": "The physician measures BP after the patient has been standing for 3 mins. Systolic pressure drops by 25 mmHg and dizziness. What is the most likely interpretation?", "options": [{"letter": "A", "text": "Normal physiologic response"}, {"letter": "B", "text": "Orthostatic hypotension"}, {"letter": "C", "text": "White coat hypertension"}, {"letter": "D", "text": "Essential hypertension"}], "answer": "B", "answerText": "Orthostatic hypotension", "explanation": "28. ANSWER: B A. Is wrong because a drop in systolic BP ≥20 mmHg with symptoms like dizziness after standing is abnormal and not a normal physiologic response. B. Is CORRECT because orthostatic hypotension is defined as a fall in systolic BP ≥20 mmHg (or diastolic ≥10 mmHg) within 3 minutes of standing, often accompanied by dizziness. C. Is wrong because white coat hypertension refers to elevated BP in the clinical setting due to anxiety, not BP drop with standing. D. Is wrong because essential hypertension describes chronically elevated blood pressure, not positional BP decrease. Source: Bates’ Guide to Physical Examination and History Taking, Page 369."}, {"id": "q443", "pdfPage": 227, "originalNumber": "29", "question": "The patient described pain as burning and radiating down the leg. Which pain type is most likely?", "options": [{"letter": "A", "text": "Somatic pain"}, {"letter": "B", "text": "Neuropathic pain"}, {"letter": "C", "text": "Visceral pain"}, {"letter": "D", "text": "Referred pain"}], "answer": "B", "answerText": "Neuropathic pain", "explanation": "29. ANSWER: B A. Is wrong because somatic pain arises from skin, muscles, or joints and is typically well localized and described as aching or sharp, not burning and radiating. B. Is CORRECT because neuropathic pain is classically described as burning, shooting, or radiating along a nerve distribution, such as pain traveling down the leg. C. Is wrong because visceral pain originates from internal organs and is usually diffuse, deep, and poorly localized, often described as cramping or pressure. D. Is wrong because referred pain is felt in a different location from the diseased organ, but it is not typically described as burning along a nerve path. Source: Bates’ Guide to Physical Examination and History Taking, Page 380."}, {"id": "q444", "pdfPage": 227, "originalNumber": "30", "question": "A patient with RR of 28/min with a use or accessory muscles. Strongly indicates:", "options": [{"letter": "A", "text": "Normal variations"}, {"letter": "B", "text": "Respiratory Distress"}, {"letter": "C", "text": "Anxiety only"}, {"letter": "D", "text": "Fever response"}], "answer": "B", "answerText": "Respiratory Distress", "explanation": "30. ANSWER: B A. Is wrong because a respiratory rate of 28/min with accessory muscle use exceeds normal adult ranges and indicates abnormal breathing effort. B. Is CORRECT because tachypnea with use of accessory muscles is a classic sign of respiratory distress and increased work of breathing. C. Is wrong because although anxiety may cause tachypnea, accessory muscle use suggests physiologic respiratory 16 compromise, not anxiety alone. D. Is wrong because fever can mildly increase respiratory rate, but marked tachypnea with accessory muscle use suggests respiratory pathology. Source: Bates’ Guide to Physical Examination and History Taking, Page 773."}, {"id": "q445", "pdfPage": 228, "originalNumber": "31", "question": "Physician palpates radial pulse, irregular rhythm with varying intensity. What should be done next?", "options": [{"letter": "A", "text": "Ignore findings"}, {"letter": "B", "text": "Count for a full minute"}, {"letter": "C", "text": "Repeat after 30 seconds"}, {"letter": "D", "text": "Get RR"}], "answer": "B", "answerText": "Count for a full minute", "explanation": "31. ANSWER: B A. Is wrong because an irregular pulse with varying intensity may indicate arrhythmia and should never be ignored during assessment. B. Is CORRECT because when the pulse rhythm is irregular, Bates recommends counting the pulse for a full 60 seconds to obtain an accurate rate. C. Is wrong because counting for only 30 seconds may underestimate or misrepresent the rate when rhythm irregularity is present. D. Is wrong because measuring respiratory rate is important but does not address the irregular pulse finding that requires confirmation. Source: Bates’ Guide to Physical Examination and History Taking, Page 372."}, {"id": "q446", "pdfPage": 228, "originalNumber": "32", "question": "The normal adult respiratory rate is", "options": [{"letter": "A", "text": "8-12/min"}, {"letter": "B", "text": "12-20/min"}, {"letter": "C", "text": "20-30/min"}, {"letter": "D", "text": "30-40/min"}], "answer": "B", "answerText": "12-20/min", "explanation": "32. ANSWER: B A. Is wrong because a respiratory rate of 8–12/min is considered bradypnea in adults, below the normal range. B. Is CORRECT because the normal resting respiratory rate for adults is 12–20 breaths per minute. C. Is wrong because a rate of 20–30/min indicates tachypnea, suggesting increased respiratory effort or illness. D. Is wrong because this rate reflects marked tachypnea and possible respiratory distress, not normal respiration. Source: Bates’ Guide to Physical Examination and History Taking, Page 373."}, {"id": "q447", "pdfPage": 228, "originalNumber": "33", "question": "Which vital sign reflects “Peripheral Perfusion”? 33. ANSWER: B 17", "options": [{"letter": "A", "text": "Temperature"}, {"letter": "B", "text": "Pulse"}, {"letter": "C", "text": "Respiratory Rate"}, {"letter": "D", "text": "Oxygen Saturation"}], "answer": "A", "answerText": "Temperature", "explanation": "A. Wrong - Temperature reflects thermoregulatory status, not peripheral blood flow or perfusion. B. Is CORRECT because pulse provides a direct assessment of peripheral perfusion and cardiac output by evaluating rate, rhythm, and amplitude. C. Wrong - Respiratory rate reflects ventilatory status, not peripheral perfusion. D. Wrong - Oxygen saturation measures hemoglobin oxygenation, which does not directly assess the adequacy of blood flow to peripheral tissues. Source: Bates’ Guide to Physical Examination and History Taking, Page 373."}, {"id": "q448", "pdfPage": 229, "originalNumber": "34", "question": "The diaphragm of the stethoscope is best used for.", "options": [{"letter": "A", "text": "Low pitched sounds"}, {"letter": "B", "text": "High pitched sounds"}, {"letter": "C", "text": "Murmurs only"}, {"letter": "D", "text": "Carotid bruits only"}], "answer": "B", "answerText": "High pitched sounds", "explanation": "34. ANSWER: B A. Wrong - Low-pitched sounds, such as S3, S4, and certain murmurs, are better heard with the bell of the stethoscope, not the diaphragm. B. Is CORRECT because the diaphragm is designed to transmit high-pitched sounds like S1, S2, breath sounds, and most normal heart sounds. C. Wrong - The diaphragm can detect murmurs, but its primary function is high-pitched sounds in general, not murmurs exclusively. D. Wrong - Carotid bruits can be heard with either diaphragm or bell, but the diaphragm is not limited to this use. Source: Bates’ Guide to Physical Examination and History Taking, Page 853."}, {"id": "q449", "pdfPage": 229, "originalNumber": "35", "question": "Normal pulse pressure", "options": [{"letter": "A", "text": "10 mmHg"}, {"letter": "B", "text": "20 mmHg"}, {"letter": "C", "text": "40 mmHg"}, {"letter": "D", "text": "80 mmHg"}], "answer": "C", "answerText": "40 mmHg", "explanation": "35. ANSWER: C A. Wrong - A pulse pressure this low is considered narrow and may indicate low stroke volume or heart failure. B. Wrong - This is below the normal range; normal pulse pressure is wider, typically reflecting normal cardiac output. C. Is CORRECT because normal adult pulse pressure (systolic minus diastolic) is roughly 30–40 mmHg, indicating normal arterial compliance and stroke volume. D. Wrong - A pulse pressure this wide is abnormally high, possibly due to aortic regurgitation, stiff arteries, or hyperthyroidism. Source: Bates’ Guide to Physical Examination and History Taking, Page 899."}, {"id": "q450", "pdfPage": 229, "originalNumber": "36", "question": "repeat? 36. ANSWER: C Fined 18", "options": [{"letter": "A", "text": "Wrong -"}, {"letter": "B", "text": "Wrong -"}, {"letter": "C", "text": "Is CORRECT because ______"}, {"letter": "D", "text": "Wrong -"}], "answer": "C", "answerText": "Is CORRECT because ______", "explanation": "36. ANSWER: C Fined 18 A. Wrong - B. Wrong - C. Is CORRECT because ______ D. Wrong -"}, {"id": "q451", "pdfPage": 230, "originalNumber": "37", "question": "72y.o frail and thin, arrives with hands on knees and breathing heavily, suggests respiratory distress. What contributes to the observation?", "options": [{"letter": "A", "text": "Skin"}, {"letter": "B", "text": "Posture and apparent distress"}, {"letter": "C", "text": "Temperature"}, {"letter": "D", "text": "Height and weight"}], "answer": "B", "answerText": "Posture and apparent distress", "explanation": "37. ANSWER: B A. Wrong - Can show cyanosis, pallor, or dehydration. Does not directly explain the hands-on-knees posture B. Is CORRECT because the tripod posture: patient leans forward with hands on knees to improve accessory muscle use. Observation of effort, labored breathing, use of accessory muscles indicates respiratory compromise C. Wrong - Not the immediate cause of hands-on-knees or labored breathing D. Wrong - Does not explain acute respiratory distress Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 4, page 120"}, {"id": "q452", "pdfPage": 230, "originalNumber": "38", "question": "Student begins examination by palpating painful area. Which principle is most important in this situation?", "options": [{"letter": "A", "text": "Start by examining painful area first"}, {"letter": "B", "text": "Observation before manipulation"}, {"letter": "C", "text": "Percussion before palpation"}, {"letter": "D", "text": "Percussion before auscultation"}], "answer": "B", "answerText": "Observation before manipulation", "explanation": "38. ANSWER: B A. Wrong - always save noxious tests for last B. Is CORRECT because Inspection is always the first step in physical examination. C. Wrong - Palpation is last for abdomen D. Wrong - For abdomen, the order of physical examination is Inspection, Auscultation, Percussion, Palpation Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 471"}, {"id": "q453", "pdfPage": 231, "originalNumber": "39", "question": "45 y.o complaints of severe abdominal pain that started near the umbilical region; migrated towards RLQ. Upon abdominal examination, the examiner palpated LLQ and elicited pain on RLQ.", "options": [{"letter": "A", "text": "Psoas Irritation"}, {"letter": "B", "text": "Peroneal Irritation & appendiceal inflammation"}, {"letter": "C", "text": "Iliopsoas irritation"}, {"letter": "D", "text": "Ureteral Obstruction"}], "answer": "B", "answerText": "Peroneal Irritation & appendiceal inflammation", "explanation": "39. ANSWER: B A. Wrong - psoas irritation from inflammation is aggravated by hip extension B. Is CORRECT - the Rovsing’s sign indicates peritoneal irritation C. Wrong - iliopsoas irritation triggers pain by flexing hip against resistance D. Wrong - pain character does not match (flank pain radiating to the groin) Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 486"}, {"id": "q454", "pdfPage": 231, "originalNumber": "40", "question": "A patient with severe abdominal pain lies very still on the examination table. When the examiner asks the patient to cough, the pain worsens significantly. Which physical finding is being assessed?", "options": [{"letter": "A", "text": "Murphy sign"}, {"letter": "B", "text": "Peritoneal inflammation"}, {"letter": "C", "text": "Obturator sign"}, {"letter": "D", "text": "Cullen sign"}], "answer": "C", "answerText": "Obturator sign", "explanation": "40. ANSWER: C A. Wrong - Pain with inspiration during right upper quadrant palpation which may indicate acute cholecystitis B. Is CORRECT because pain that worsens with movement (like coughing) and the patient is lying very still. This behavior is classic for peritoneal irritation, where any movement of the abdominal wall aggravates pain. C. Wrong - Pain with internal rotation of the flexed thigh which may indicate appendicitis D. Wrong - Periumbilical bruising which may indicate internal bleeding (e.g., pancreatitis) Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 475"}, {"id": "q455", "pdfPage": 231, "originalNumber": "41", "question": "A 52-year old woman complains of episodic right upper quadrant pain after fatty meals. On examination, the physician deeply palpates under the right costal margin while the patient inspires. The patient abruptly stops inhaling due to pain. Which condition is most consistent with this finding?", "options": [{"letter": "A", "text": "Acute hepatitis"}, {"letter": "B", "text": "Acute cholecystitis"}, {"letter": "C", "text": "Pancreatitis"}, {"letter": "D", "text": "Peptic ulcer disease"}], "answer": "C", "answerText": "Pancreatitis", "explanation": "41. ANSWER: C A. Wrong - Causes diffuse liver tenderness, not a positive Murphy sign B. Is CORRECT because a positive Murphy sign strongly points to acute cholecystitis, especially in patients with postprandial (fatty meal–triggered) right upper quadrant pain. C. Wrong - Typically presents with epigastric pain radiating to the back D. Wrong - Presents with epigastric pain related to meals, no Murphy sign"}, {"id": "q456", "pdfPage": 232, "originalNumber": "42", "question": "Upon auscultation, a high-pitched tinkling bowel sound is heard. Which condition is most likely?", "options": [{"letter": "A", "text": "Paralytic ileus"}, {"letter": "B", "text": "Small bowel obstruction"}, {"letter": "C", "text": "Appendicitis"}, {"letter": "D", "text": "Peritonitis"}], "answer": "C", "answerText": "Appendicitis", "explanation": "42. ANSWER: C A. Wrong - Typically presents with absent or hypoactive bowel sounds B. Is CORRECT because high-pitched, “tinkling” bowel sounds are characteristic of intestinal obstruction, especially early in the course C. Wrong - Bowel sounds are usually normal or mildly decreased D. Wrong - Presents with silent abdomen (absent bowel sounds) due to decreased motility Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 501"}, {"id": "q457", "pdfPage": 232, "originalNumber": "43", "question": "A 60-year-old man has chronic liver disease and has a distended abdomen. Upon percussion, a dullness shifts when he turns to the side. What sign is seen?", "options": [{"letter": "A", "text": "Fluid wave"}, {"letter": "B", "text": "Shifting dullness"}, {"letter": "C", "text": "Tympany"}, {"letter": "D", "text": "Splenic percussion sign"}], "answer": "C", "answerText": "Tympany", "explanation": "43. ANSWER: C A. Wrong - Involves tapping one side of the abdomen and feeling a transmitted impulse on the other side B. Is CORRECT because when the patient lies supine → fluid settles in dependent areas → dullness on percussion. When the patient turns to the side → fluid shifts → the area of dullness moves. This phenomenon is called shifting dullness, a classic sign of ascites. C. Wrong - Drum-like sound from gas, not fluid D. Wrong - Used to detect splenomegaly, not ascites"}, {"id": "q458", "pdfPage": 233, "originalNumber": "44", "question": "The physician palpates a pulsatile abdominal mass slightly left of midline above the umbilicus. What is the most likely structure?", "options": [{"letter": "A", "text": "Enlarged spleen"}, {"letter": "B", "text": "Abdominal aortic aneurysm"}, {"letter": "C", "text": "Enlarged pancreas"}, {"letter": "D", "text": "Mesenteric lymph node"}], "answer": "B", "answerText": "Abdominal aortic aneurysm", "explanation": "44. ANSWER: B A. Wrong. To palpate an enlarged spleen, a physician must palpate at the left costal margin and pressing in toward the spleen. B. Is CORRECT. A pulsatile mass located: Slightly left of midline and above the umbilicus is classic for the abdominal aorta. When enlarged and palpable, this suggests an abdominal aortic aneurysm (AAA). C. Wrong. Usually not palpable and not pulsatile D. Wrong. Small, non-pulsatile Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11"}, {"id": "q459", "pdfPage": 233, "originalNumber": "45", "question": "A patient presents with suspected peritonitis. The physician slowly presses into the abdomen and then quickly releases, causing severe pain. This maneuver tests for:", "options": [{"letter": "A", "text": "Guarding"}, {"letter": "B", "text": "Rebound tenderness"}, {"letter": "C", "text": "Rigidity"}, {"letter": "D", "text": "Psoas sign"}], "answer": "B", "answerText": "Rebound tenderness", "explanation": "45. ANSWER: B A. Wrong. Guarding is a voluntary contraction of the abdominal wall. B. Is CORRECT because the maneuver done by the physician on the question describes rebound tenderness. C. Wrong. Rigidity is an involuntary reflex contraction of the abdominal wall. D. Wrong. Psoas sign is not used to assess for any possible peritonitis."}, {"id": "q460", "pdfPage": 234, "originalNumber": "46", "question": "A patient suspected with appendicitis experiences pain when the right hip is extended while lying on his side. What is this sign?", "options": [{"letter": "A", "text": "Obturator sign"}, {"letter": "B", "text": "Psoas sign"}, {"letter": "C", "text": "Rovsing sign"}, {"letter": "D", "text": "Murphy’s sign"}], "answer": "B", "answerText": "Psoas sign", "explanation": "46. ANSWER: B A. Wrong - The obturator sign is tested by flexing the patient’s right hip and knee, then internally rotating the hip. B. Is CORRECT because the psoas sign is elicited when pain occurs during extension of the right hip while the patient lies on the left side. This maneuver stretches the psoas muscle, which lies adjacent to the appendix. C. Wrong - The Rovsing sign occurs when palpation of the left lower quadrant produces pain in the right lower quadrant. D. Wrong - The Murphy’s sign is used to assess acute cholecystitis. It is elicited when a patient suddenly stops inhaling due to pain during palpation of the right upper quadrant while taking a deep breath. Source: Bates’ 12th edition page 486"}, {"id": "q461", "pdfPage": 234, "originalNumber": "47", "question": "What quadrant can you find gallbladder?", "options": [{"letter": "A", "text": "LUQ"}, {"letter": "B", "text": "RUQ"}, {"letter": "C", "text": "RLQ"}, {"letter": "D", "text": "Epigastric Region"}], "answer": "C", "answerText": "RLQ", "explanation": "47. ANSWER: C A. Wrong B. Is CORRECT because the gallbladder can be found in the RUQ C. Wrong D. Wrong Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 450"}, {"id": "q462", "pdfPage": 235, "originalNumber": "48", "question": "A medical student palpates for the liver by pressing below the right costal margin while asking the patient to inhale deeply. What is the purpose for this maneuver?", "options": [{"letter": "A", "text": "To detect Splenic tenderness"}, {"letter": "B", "text": "Palpation for the liver margin"}, {"letter": "C", "text": "Assess liver span"}, {"letter": "D", "text": "Assess for diaphragmatic excursion"}], "answer": "C", "answerText": "Assess liver span", "explanation": "48. ANSWER: C A. Wrong - The spleen is palpated in the left upper quadrant B. Is CORRECT because when the examiner presses below the right costal margin, the patient inhales deeply → the diaphragm pushes the liver downward. This allows the examiner to feel the liver edge as it descends C. Wrong - Done primarily by percussion, not palpation D. Wrong - Evaluated by percussion of lung borders Source: Bates’ Guide to Physical Examination and History Taking, 12th Edition, Chapter 11, page 477"}, {"id": "q463", "pdfPage": 235, "originalNumber": "49", "question": "Normal sound of a normal stomach", "options": [{"letter": "A", "text": "Dull"}, {"letter": "B", "text": "Tympanic"}, {"letter": "C", "text": "Flat"}, {"letter": "D", "text": "Hyperresonant"}], "answer": "C", "answerText": "Flat", "explanation": "49. ANSWER: C A. Wrong - Dullness is heard over solid organs or fluid, not a normal stomach. B. Is CORRECT because a normal stomach or abdomen with gas-filled intestines produces a tympanic sound on percussion. This is the expected finding in a healthy individual. C. Wrong – Flatness occurs over bones or very dense tissue, not the stomach. D. Wrong - Hyperresonance is exaggerated tympany, usually seen in pneumothorax or gaseous distention, not in a normal stomach. Source: Bates Chapter 19: Abdomen p. 1050"}, {"id": "q464", "pdfPage": 235, "originalNumber": "24", "question": "radiating to the back. Which organ is most likely involved?", "options": [{"letter": "A", "text": "Liver"}, {"letter": "B", "text": "Pancreas"}, {"letter": "C", "text": "Spleen"}, {"letter": "D", "text": "Appendix"}], "answer": "A", "answerText": "Liver", "explanation": "A. Wrong - Pathology involving the liver is primarily associated with visceral pain located in the right upper quadrant (RUQ) B. Is CORRECT because sudden, severe, knife-like epigastric pain that often radiates straight through to the back is a classic clinical presentation of acute pancreatitis C. Wrong - Spleen is situated in the left upper quadrant (LUQ) D. Wrong - Appendicitis classically begins as poorly localized visceral pain in the periumbilical region and then migrates to parietal pain in the right lower quadrant (RLQ) Source: Bates 12th Edition. Chapter 11: Abdomen"}, {"id": "q465", "pdfPage": 236, "originalNumber": "51", "question": "A 32 year old female presented in the neuro clinic due to gradual onset of headache, hearing loss and new development of ataxia/imbalance and compensated by wide-based gait. Based on the history, where is the lesion most likely located?", "options": [{"letter": "A", "text": "Thalamus"}, {"letter": "B", "text": "Midbrain"}, {"letter": "C", "text": "Cerebellum"}, {"letter": "D", "text": "Temporal lobe"}], "answer": "C", "answerText": "Cerebellum", "explanation": "51. ANSWER: C A. Wrong - Thalamus: A lesion in this sensory relay station typically results in contralateral sensory loss or \"thalamic pain syndrome,\" rather than the specific combination of hearing loss and motor incoordination. B. Wrong - Midbrain: This area is primarily associated with eye movement (Cranial Nerves III and IV) and motor tract relay. A midbrain lesion would likely present with double vision or hemiparesis rather than gait ataxia and hearing deficits. C. CORRECT. Cerebellum is the body's primary center for coordinating balance and fine motor control. Damage or compression here leads to cerebellar ataxia, which the patient compensates for with a characteristic wide-based gait. In clinical practice, this specific triad (hearing loss + ataxia + headache) strongly suggests a lesion in the cerebellopontine angle, where a tumor like an acoustic neuroma can compress both the vestibulocochlear nerve (CN VIII) and the adjacent cerebellum. D. Wrong. While the temporal lobe houses the primary auditory cortex, a lesion here is more likely to cause seizures, memory impairment, or Wernicke’s aphasia. It would not typically produce the physical \"drunken\" gait (ataxia) seen in this patient. Source: Bates’ Guide 12th Ed.,Chapter 17, page 775"}, {"id": "q466", "pdfPage": 237, "originalNumber": "53", "question": "58/F HTN p/w sudden onset of severe headache described as “worst headache of my life”. PE: photophobia, nuchal rigidity. Diagnosis?", "options": [{"letter": "A", "text": "Tension headache"}, {"letter": "B", "text": "Subarachnoid hemorrhage"}, {"letter": "C", "text": "Migraine with aura"}, {"letter": "D", "text": "Seizure"}], "answer": "B", "answerText": "Subarachnoid hemorrhage", "explanation": "53. ANSWER: B A. Is wrong because tension headaches are typically bilateral, pressing, gradual in onset, and not associated with sudden severe pain, photophobia, or nuchal rigidity. B. Is CORRECT because a sudden “worst headache of my life” with photophobia and neck stiffness is classic for subarachnoid hemorrhage due to meningeal irritation. C. Is wrong because migraines are often unilateral and throbbing with aura, but do not usually present with abrupt thunderclap onset and nuchal rigidity. D. Is wrong because seizures may cause postictal headache, but sudden severe headache with meningeal signs is more consistent with subarachnoid hemorrhage. Source: Bates’ Guide to Physical Examination and History Taking, 13th Edition, Page 113."}, {"id": "q467", "pdfPage": 237, "originalNumber": "54", "question": "A 30 y/o medical student complained of on and off moderate intensity headache with visual - and light sensitivity. The headache lasts for 4 hours, unilateral, and associated with vomiting. The patient prefers to lie down with eyes closed and any movement will aggravate the pain. This 54. ANSWER: C", "options": [{"letter": "A", "text": "Wrong. Subarachnoid hemorrhage typically presents with a sudden, severe “thunderclap” headache, often described as the worst headache of the patient’s life, and not with recurrent, moderate headaches lasting hours."}, {"letter": "B", "text": "Wrong. Meningitis usually presents with fever, neck stiffness, altered mental status, and a more acute, systemic infectious picture—not isolated recurrent unilateral headaches."}], "answer": null, "answerText": "", "explanation": "54. ANSWER: C A. Wrong. Subarachnoid hemorrhage typically presents with a sudden, severe “thunderclap” headache, often described as the worst headache of the patient’s life, and not with recurrent, moderate headaches lasting hours. B. Wrong. Meningitis usually presents with fever, neck stiffness, altered mental status, and a more acute, systemic infectious picture—not isolated recurrent unilateral headaches."}, {"id": "q468", "pdfPage": 237, "originalNumber": "26", "question": "is highly suspicious for?", "options": [{"letter": "A", "text": "Subarachnoid hemorrhage"}, {"letter": "B", "text": "Meningitis"}, {"letter": "C", "text": "Migraine"}, {"letter": "D", "text": "Brain tumor"}], "answer": "C", "answerText": "Migraine", "explanation": "C. CORRECT. The patient’s symptoms (unilateral headache, photophobia, visual sensitivity, vomiting, aggravated by movement, lasting 4 hours) are classic features of a migraine. D. Wrong. Brain tumor headaches tend to be progressive, worse in the morning, and associated with focal neurologic deficits—not episodic headaches with migraine characteristics. Source: Bate’s 13th Ed. Chapter 24. Nervous System"}, {"id": "q469", "pdfPage": 238, "originalNumber": "55", "question": "A 56-year-old man presents with new-onset seizures accompanied by a persistent headache and becomes more severe when coughing or bending. The headache is localized to the left occipital area. Which of the following is the most likely diagnosis?", "options": [{"letter": "A", "text": "Subarachnoid hemorrhage"}, {"letter": "B", "text": "Meningitis"}, {"letter": "C", "text": "Migraine"}, {"letter": "D", "text": "Brain tumor"}], "answer": "C", "answerText": "Migraine", "explanation": "55. ANSWER: C A. Is wrong because subarachnoid hemorrhage typically presents with a sudden “thunderclap” headache described as the worst headache of life, often abrupt in onset rather than progressively worsening with positional changes. B. Is wrong because meningitis commonly presents with fever, neck stiffness, photophobia, and altered mental status, which are not described in this patient. C. Is wrong because migraine usually presents with recurrent unilateral throbbing headaches with nausea, photophobia, or aura and typically does not cause new-onset seizures in older adults. D. Is CORRECT because a progressive headache that worsens with coughing or bending suggests increased intracranial pressure, and new-onset seizures in an older adult strongly suggests an intracranial mass lesion such as a brain tumor. Source: Harrisons Chapter 16: Headache p. 113"}, {"id": "q470", "pdfPage": 238, "originalNumber": "56", "question": "The knee reflex is mediated by what set of spinal nerves?", "options": [{"letter": "A", "text": "Lumbar 2,3,4"}, {"letter": "B", "text": "Lumbar 5-Sacral 1,"}], "answer": null, "answerText": "", "explanation": ""}, {"id": "q471", "pdfPage": 238, "originalNumber": "2", "question": "56. ANSWER: A", "options": [{"letter": "A", "text": "Is CORRECT because the patellar tendon reflex (knee jerk) tests the femoral nerve, which is derived from spinal nerve roots L2, L3, and L4. This reflex evaluates the integrity of the 27"}, {"letter": "C", "text": "Thoracic 12-Lumbar 1, 2"}], "answer": null, "answerText": "", "explanation": "D. Sacral 2,3,4 neuromuscular arc at the level of the lumbar spine. B. Wrong - B: Lumbar 5, Sacral 1, and Sacral 2 mediate the ankle reflex (Achilles tendon reflex), not the knee reflex. C. Wrong - C: Thoracic 12, Lumbar 1, and Lumbar 2 do not correspond to a major deep tendon reflex; the knee reflex is specifically an L2-L4 mediated response. D. Wrong - D: Sacral 2, 3, and 4 mediate the bulbocavernosus reflex and contribute to the anal wink reflex, but not the patellar reflex. Source: Bates Physical Examination 12th Edition"}, {"id": "q472", "pdfPage": 239, "originalNumber": "57", "question": "To assess for distal weakness", "options": [{"letter": "A", "text": "let the patient perform combing hair"}, {"letter": "B", "text": "difficulties with getting up from sitting on a chair"}, {"letter": "C", "text": "climbing stairs"}, {"letter": "D", "text": "strength when opening jar"}], "answer": "C", "answerText": "climbing stairs", "explanation": "57. ANSWER: C A. Wrong because it assesses proximal weakness B. Wrong because it assesses hip muscles which are part considered proximal muscles C. Is wrong because same as B it assesses Hip muscles D. Is CORRECT because distal muscles include hands and wrist"}, {"id": "q473", "pdfPage": 239, "originalNumber": "58", "question": "38 year old motorcycler was hit by an incoming bus. He was rushed to the ER unconscious. Left eye was dilated and non-reactive. Eyes wont open to command or pain. Verbal is absent. Calculate the GCS score", "options": [{"letter": "A", "text": "3"}, {"letter": "B", "text": "4"}, {"letter": "C", "text": "5"}, {"letter": "D", "text": "6"}], "answer": "A", "answerText": "3", "explanation": "58. ANSWER: A A. Is CORRECT because score of 1 is given if there is no eye opening, even to pressure. Since the patient's eyes \"wont open to command or pain,\" this category receives a score of 1. a score of 1 is assigned when there is \"no verbalization of any type.\" The scenario confirms \"verbal is absent.\"While not explicitly detailed, in a patient described as \"unconscious\" who does not respond to pain (as noted in the eye category), the default score for a lack of motor response to any pain is 1.The total GCS score is the sum of these three categories (1 + 1 + 1), which equals 3. Note that while the source mentions the patient has a dilated and non-reactive pupil, this pupillary finding is used for clinical assessment of brain injury severity but is not a component of the standard GCS score calculation shown in the provided table. B. Wrong - To achieve a total score of 4, the patient would need to score at least one point higher in one of the three categories. This would require one of the following to be true: Eye Opening (2): Eyes opening to pain (the scenario states they do not open to pain). Verbal Response (2): Incomprehensible moans or groans (the scenario states verbal is absent). C. Wrong - Because the scenario confirms \"verbal is absent\" and \"eyes won't open to command or pain,\" these higher scores are impossible. D. Wrong - A score of 6 would imply significantly better neurological function, such as spontaneous eye opening (4), withdrawing from pain (4), or being confused but conversing (4). None of these behaviors were observed in this unconscious patient."}, {"id": "q474", "pdfPage": 240, "originalNumber": "59", "question": "65 year old, pain radiating from neck to the back. 4th and 5th digit weakness with thenar atrophy. Sensory loss of posterior arm, loss of tricep reflex", "options": [{"letter": "A", "text": "Motor cortex from C8-T1"}, {"letter": "B", "text": "Pons-Brainstem"}, {"l
