izure type. D. Is wrong because vaccination history may relate to fever triggers in children but does not characterize seizure type."}, {"id": "q682", "pdfPage": 364, "originalNumber": "16", "question": "After a seizure, which physical examination should be prioritized?", "options": [{"letter": "A", "text": "Skin examination"}, {"letter": "B", "text": "Abdominal examination"}, {"letter": "C", "text": "Musculoskeletal assessment"}, {"letter": "D", "text": "Focused neurological assessment"}], "answer": "D", "answerText": "Focused neurological assessment", "explanation": "16. ANSWER: D A. Is wrong because skin findings (e.g., tongue bite, trauma) may be helpful but are not the priority immediately after a seizure. B. Is wrong because abdominal assessment is not relevant to postictal evaluation unless specific symptoms suggest abdominal pathology. C. Is wrong because musculoskeletal evaluation may detect injuries but is secondary to assessing neurologic status after a seizure. D. Is CORRECT because the priority is a neurologic exam to assess postictal state, focal deficits, and recovery of consciousness, which helps determine seizure type and complications. A focused neurological assessment should be prioritized after a seizure. Because a seizure is a sudden excessive electrical discharge from cortical neurons that often results in an altered level of consciousness (postictal state), a neurological examination is essential to identify any focal or asymmetric findings. Key reasons to prioritize this assessment according to the sources include: ● Assessment of Consciousness: Evaluating the patient's Clinical Level of Consciousness helps determine the degree of stimulation required to arouse them post-seizure. ● Postictal Reflexes: A focused assessment can detect transient changes that occur immediately following a seizure, such as a positive Babinski response, which can be present during the postictal period. ● Localization of Deficits: Identifying focal neurologic signs (such as weakness or speech difficulty) is critical for determining if the seizure focus relates to a structural lesion like a brain tumor or stroke. ● Safety and Stabilization: For patients who remain in a state of impaired arousal (coma) after a seizure, the sources emphasize stabilizing the patient and performing a neurological examination as a primary step after checking the airway, breathing, and circulation (ABCs). While other examinations like a skin or musculoskeletal assessment may reveal secondary findings such as tongue injury or bruising of limbs, the focused neurological assessment is the priority for evaluating the underlying condition of the nervous system. Source: Bates’ Guide to Physical Examination and History Taking, Chapters"}, {"id": "q683", "pdfPage": 365, "originalNumber": "17", "question": "Which history findings suggests a more complex seizure pattern", "options": [{"letter": "A", "text": "Occurs with fever"}, {"letter": "B", "text": "Recurrence within the same illness episode"}, {"letter": "C", "text": "Duration of less than 5 minutes"}, {"letter": "D", "text": "Generalized movements"}], "answer": "B", "answerText": "Recurrence within the same illness episode", "explanation": "17. ANSWER: B A. Is wrong because febrile seizures are generally classified as simple (short, generalized, non-recurrent within 24 hours). B. Is CORRECT. SEE RATIO C. Is wrong because a seizure lasting <5 minutes is indicative of focal and generalized seizures–no clear differentiation if based on duration only. D. Is wrong because generalized activity alone does not define complexity, as many simple seizures are also generalized. A complex seizure pattern, commonly known as a focal impaired awareness seizure (formerly complex partial seizure), is a seizure that starts in one area of the brain, causing a temporary loss of consciousness or awareness. People may appear awake but are confused, dazed, or exhibit repetitive, purposeless behaviors. Source: Fountain, N. B., & May, A. C. (2003). Epilepsy and athletics. Clinics in Sports Medicine, 22(3), 605–616. https://doi.org/10.1016/s0278-5919(02)00106-0 Recurrence can occur within the same illness episode for focal seizures with impaired awareness. In this context, it is often described as clustering, where multiple seizures happen in a short time frame without a full recovery of consciousness in between. Source: Kumar A, Ighodaro ET, Sharma S. Focal Impaired Awareness Seizure. [Updated 2024 Mar 19]. In: StatPearls [Internet]. Treasure Island (FL): StatPearls Publishing; 2026 Jan-. Available from: https://www.ncbi.nlm.nih.gov/books/NBK519030/ Source: Harrison's Principles of Internal Medicine, 22nd Edition, Chapter 436, page 3409"}, {"id": "q684", "pdfPage": 365, "originalNumber": "18", "question": "A child returned to baseline after a seizure episode", "options": [{"letter": "A", "text": "Ongoing neurological deficit"}, {"letter": "B", "text": "Chronic epilepsy"}], "answer": null, "answerText": "", "explanation": "18. ANSWER: C A. Is wrong because persistent neurologic deficits would indicate postictal complications or structural brain injury, not a return to baseline. 11 C. Recovery from postictal phase D. Behavioral problem B. Is wrong because epilepsy refers to a tendency for recurrent unprovoked seizures, not the immediate recovery phase after a single event. C. Is CORRECT because returning to baseline behavior and consciousness indicates resolution of the postictal phase following a seizure. D. Is wrong because post-seizure recovery is neurologic in origin, not a behavioral disorder. Postictal phase is wherein inhibition of selected cortical regions occurs which may cause anterograde amnesia or transient neurologic deficits (see ratio in number 17). Returning to baseline/normal occurs after this phase–typically in focal seizures with intact awareness and myoclonic seizures. Source: Bates’ Guide to Physical Examination and History Taking, Chapter 24"}, {"id": "q685", "pdfPage": 366, "originalNumber": "19", "question": "(Gist) Symptom that reflects CNS infection?", "options": [{"letter": "A", "text": "Family History of Seizure"}, {"letter": "B", "text": "Change in appetite"}, {"letter": "C", "text": "unrecalled"}, {"letter": "D", "text": "Neck stiffness and altered consciousness"}], "answer": "D", "answerText": "Neck stiffness and altered consciousness", "explanation": "19. ANSWER: D A. Is wrong. Family history of seizure suggests a possible genetic tendency for seizures but does not indicate an active CNS infection. B. Is wrong. Change in appetite is a nonspecific symptom that can occur with many illnesses and is not specific for CNS infection. C. Is wrong. D. Is CORRECT because neck stiffness or nuchal rigidity is suggestive of meningeal irritation due to various causes."}, {"id": "q686", "pdfPage": 367, "originalNumber": "20", "question": "A 2 year old has diarrhea and vomiting. Which history detail is best to assess severity?", "options": [{"letter": "A", "text": "Stool color"}, {"letter": "B", "text": "Recent dietary change"}, {"letter": "C", "text": "Appetite level"}, {"letter": "D", "text": "Frequency and volume of stool loss"}], "answer": "D", "answerText": "Frequency and volume of stool loss", "explanation": "20. ANSWER: D A. Is wrong because stool color helps identify possible causes of diarrhea, such as blood or infection, but it does not accurately measure how severe the fluid loss or dehydration is. B. Is wrong because recent dietary change may suggest a trigger for diarrhea, such as food intolerance or contaminated food, but it does not indicate the severity of the illness. C. Is wrong because appetite level can show that the child is unwell or becoming dehydrated, but it is not the best indicator of the amount of fluid being lost. D. Is CORRECT because frequency and volume of stool loss are the best indicators of severity because they directly reflect how much fluid and electrolytes the child is losing and therefore the risk of dehydration. Source: https://emedicine.medscape.com/article/176515-clinical (I couldn’t find sa book)"}, {"id": "q687", "pdfPage": 367, "originalNumber": "21", "question": "Which history finding most strongly indicates dehydration?", "options": [{"letter": "A", "text": "Reduced appetite"}, {"letter": "B", "text": "Mild abdominal pain"}, {"letter": "C", "text": "Decrease urine output"}, {"letter": "D", "text": "Irritability"}], "answer": "C", "answerText": "Decrease urine output", "explanation": "21. ANSWER: C A. Is wrong because REDUCED APPETITE is a nonspecific constitutional symptom. B. Is wrong because MILD ABDOMINAL PAIN is nonspecific nor s reliable indicator of hydration status C. Is CORRECT because URINE OUTPUT most directly reflects the intravascular volume depletion 13 D. Is wrong because while it may occur in dehydration, it is less specific and may reflect other conditions such as hypoglycemia, anxiety."}, {"id": "q688", "pdfPage": 368, "originalNumber": "22", "question": "Which combination of exam findings indicates moderate dehydration?", "options": [{"letter": "A", "text": "Moist mucosa with normal capillary refill"}, {"letter": "B", "text": "Normal skin turgor with tachycardia"}, {"letter": "C", "text": "Dry mucosa with delayed capillary refill"}, {"letter": "D", "text": "Warm extremities with normal hydration"}], "answer": "C", "answerText": "Dry mucosa with delayed capillary refill", "explanation": "22. ANSWER: C A. Is wrong. Moist mucosa with normal capillary refill suggests adequate hydration and does not indicate moderate dehydration. B. Is wrong. Normal skin turgor with tachycardia may indicate early fluid loss or another cause of increased heart rate, but normal skin turgor makes moderate dehydration less likely. C. Is CORRECT. Dry mucosa with delayed capillary refill is a classic sign of moderate dehydration because it reflects decreased body fluids and reduced peripheral perfusion. D. Is wrong. Warm extremities with normal hydration suggests good circulation and hydration status rather than dehydration. Source: https://www.rch.org.au/clinicalguide/guideline_index/dehydration/"}, {"id": "q689", "pdfPage": 368, "originalNumber": "14", "question": "exposure?", "options": [{"letter": "A", "text": "Skin contact with similar symptoms"}, {"letter": "B", "text": "Formula change"}, {"letter": "C", "text": "Teething"}, {"letter": "D", "text": "Previous illness"}], "answer": "A", "answerText": "Skin contact with similar symptoms", "explanation": "A. Is CORRECT because contact with another person who has similar symptoms strongly suggests exposure to an infectious agent through direct transmission. B. Is wrong because changing formula may explain feeding intolerance or allergy, but it does not indicate exposure to an infection. Is wrong because teething is a normal developmental process and is not a source of infectious exposure. C. Is wrong because a past illness may provide medical background information, but it does not specifically identify a recent source of infection exposure. https://www.cdc.gov/niosh/learning/safetyculturehc/module-2/3.html"}, {"id": "q690", "pdfPage": 369, "originalNumber": "24", "question": "Which physical examination domain should be prioritized initially?", "options": [{"letter": "A", "text": "Nail examination"}, {"letter": "B", "text": "Hydration status (mental status, mucosa, capillary refill)"}, {"letter": "C", "text": "Detailed bowel sounds"}, {"letter": "D", "text": "Musculoskeletal examination"}], "answer": "B", "answerText": "Hydration status (mental status, mucosa, capillary refill)", "explanation": "24. ANSWER: B A. Is wrong. Nail examination may provide information about chronic nutritional or systemic conditions, but it is not urgent in the initial assessment. B. Is CORRECT. Hydration status (mental status, mucosa, capillary refill) is the priority because diarrhea and vomiting can quickly cause dehydration in children, and assessing circulation and perfusion helps determine severity and need for urgent treatment. C. Is wrong. Detailed bowel sounds can help evaluate gastrointestinal function, but they are less important than assessing the child’s immediate fluid status and stability. D. Is wrong. Musculoskeletal examination is not a priority in a child presenting with vomiting and diarrhea unless there are additional concerning symptoms."}, {"id": "q691", "pdfPage": 370, "originalNumber": "25", "question": "A patient presents with lethargy, sunken eyes, delayed capillary refill time", "options": [{"letter": "A", "text": "Mild illness"}, {"letter": "B", "text": "Normal variation"}, {"letter": "C", "text": "Behavioral symptoms"}, {"letter": "D", "text": "Severe dehydration"}], "answer": "D", "answerText": "Severe dehydration", "explanation": "25. ANSWER: D A. Is wrong because mild illness would not typically present with lethargy, sunken eyes, and delayed capillary refill time—these are signs of significant volume depletion. B. Is wrong because normal variation cannot explain clinical signs such as sunken eyes and delayed capillary refill, which indicate hypovolemia. C. Is wrong because behavioral symptoms do not account for objective physical signs like delayed capillary refill and sunken eyes. D. Is CORRECT because lethargy, sunken eyes, and delayed capillary refill time are classic clinical signs of severe dehydration, indicating poor perfusion and significant fluid loss. Source: Bates 13th Ed. Chapter 25."}, {"id": "q692", "pdfPage": 370, "originalNumber": "26", "question": "A 36-year-old G4P3 at 33 weeks’ gestation presents with progressive dyspnea and fatigue. On examination, she has a grade 2/6 systolic murmur at the left sternal border, mild bilateral ankle edema, and clear lungs. However, careful examination reveals subtle jugular vein distention at 45 degrees. No hepatosplenomegaly is noted. Which finding most strongly suggests pathologic early cardiac involvement rather than physiologic changes of pregnancy?", "options": [{"letter": "A", "text": "Systolic murmur"}, {"letter": "B", "text": "Mild edema"}, {"letter": "C", "text": "Jugular vein distention"}, {"letter": "D", "text": "Increased heart rate"}], "answer": "C", "answerText": "Jugular vein distention", "explanation": "26. ANSWER: C A. A soft systolic flow murmur is common during pregnancy because of increased blood volume and cardiac output. Grade 1–2 systolic murmurs without other abnormal findings are usually considered physiologic. B. Mild bilateral ankle edema commonly occurs in pregnancy due to increased plasma volume and venous compression from the enlarging uterus. In isolation, it does not strongly indicate cardiac pathology. C. Jugular vein distention suggests elevated central venous pressure and possible right-sided cardiac dysfunction. Unlike mild edema or flow murmurs, JVD is not typically a normal physiologic finding in pregnancy and warrants further cardiac evaluation. D. Pregnancy normally causes a modest increase in maternal heart rate because of increased metabolic demand and circulating blood volume. Mild tachycardia alone is therefore often physiologic rather than pathologic. For Choice A For Choice B"}, {"id": "q693", "pdfPage": 371, "originalNumber": "30", "question": "weeks during abdominal exam. Fundal height is 34cm. Fetal parts are poorly defined. Upon percussion, tympani and dullness. There is distant fetal heart tone and normal fetal movements.", "options": [{"letter": "A", "text": "Fetal demise"}, {"letter": "B", "text": "Polyhydramnios"}, {"letter": "C", "text": "Maternal obesity"}, {"letter": "D", "text": "Incorrect gestational age"}], "answer": "C", "answerText": "Maternal obesity", "explanation": "27. ANSWER: C A. Is wrong because fetal movements and fetal heart tones are present. B. Is CORRECT because though subject to error between 16 and 36 weeks, measurement of the fundal height in centimeters should roughly equal the number of weeks of gestation. If the fundal height is 4 cm larger than expected, consider multiple gestation, a large fetus, extra amniotic fluid, or uterine leiomyoma. C. Is wrong because it may make palpation difficult but does not explain increased fundal height well. D. Is wrong because though its possible but the combination of findings is more characteristic of polyhydramnios."}, {"id": "q694", "pdfPage": 371, "originalNumber": "28", "question": "A 31-year-old at 37 weeks gestation undergoes Leopold’s maneuvers. The examiner feels a round, cephalic (hard) structure in the fundus and soft structures in the pelvis. However, upon repeat examination by a senior clinician, fetal heart sounds are heard below the 28. ANSWER: B", "options": [{"letter": "A", "text": "is wrong because rapid fetal repositioning is uncommon at 37 weeks due to limited intrauterine space, making sudden major position changes unlikely during repeat examination."}, {"letter": "B", "text": "is CORRECT because an error in identifying the fetal back during Leopold’s maneuvers can lead to incorrect interpretation of fetal presentation and fetal heart sound location. Fetal heart tones are best heard over the fetal back, usually below the umbilicus in"}], "answer": "B", "answerText": "is CORRECT because an error in identifying the fetal back during Leopold’s maneuvers can lead to incorrect interpretation of fetal presentation and fetal heart sound location. Fetal heart tones are best heard over the fetal back, usually below the umbilicus in", "explanation": "28. ANSWER: B A. is wrong because rapid fetal repositioning is uncommon at 37 weeks due to limited intrauterine space, making sudden major position changes unlikely during repeat examination. B. is CORRECT because an error in identifying the fetal back during Leopold’s maneuvers can lead to incorrect interpretation of fetal presentation and fetal heart sound location. Fetal heart tones are best heard over the fetal back, usually below the umbilicus in"}, {"id": "q695", "pdfPage": 371, "originalNumber": "17", "question": "umbilicus. What is the probable reason for this discrepancy?", "options": [{"letter": "A", "text": "Rapid fetal repositioning"}, {"letter": "B", "text": "Error in identifying fetal back"}, {"letter": "C", "text": "Twin pregnancy"}, {"letter": "D", "text": "Placental variation cephalic presentation."}], "answer": "C", "answerText": "Twin pregnancy", "explanation": "C. is wrong because twin pregnancy would usually produce additional findings such as multiple palpable poles or separate fetal heart rates rather than a simple discrepancy in examination. D. is wrong because placental variation does not significantly alter the relationship between fetal presentation and the location where fetal heart sounds are best auscultated. Source: Bates Chapter 19-Pregnant Woman"}, {"id": "q696", "pdfPage": 372, "originalNumber": "29", "question": "27 yr old patients 28 weeks had fundal height of 24cm. Upon repeat measurement using proper landmarks (pubic symphysis to fundus) it was 28 cm. What does this scenario portray?", "options": [{"letter": "A", "text": "Incorrect gestational age"}, {"letter": "B", "text": "Measurement bias- improper technique"}, {"letter": "C", "text": "Fetal growth restriction"}, {"letter": "D", "text": "Polyhydramnios"}], "answer": "B", "answerText": "Measurement bias- improper technique", "explanation": "29. ANSWER: B A. Is wrong because While a discrepancy in fundal height can sometimes indicate a miscalculation of gestational age, the fact that the measurement became accurate (28 cm for 28 weeks) once the proper technique was applied suggests the age was correct and the initial measurement was at fault. B. Is CORRECT because the scenario explicitly states that the measurement changed from an abnormal 24 cm to a normal 28 cm simply by using the correct anatomical landmarks. The sources note that fundal height measurement is a \"widely used technique\" but is \"subject to error\". C. Is wrong because The sources state that if a fundal height is 4 cm smaller than expected, one should consider intrauterine growth retardation (fetal growth restriction). However, because the corrected measurement (28 cm) matches the gestational age (28 weeks), growth restriction is not the cause of the initial low reading. D. Is wrong because this condition involves extra amniotic fluid and is considered when the fundal height is 4 cm larger than expected. Since the final measurement was exactly what was expected for 28 weeks, and not larger, this diagnosis does not"}, {"id": "q697", "pdfPage": 373, "originalNumber": "30", "question": "A 30-yo pregnant at 34 weeks, leopold maneuver reveals longitudinal lie, appropriate fundal height, presenting part is movable and not engaged. What additional information will suggest abnormality?", "options": [{"letter": "A", "text": "Longitudinal fetal lie"}, {"letter": "B", "text": "Movable presenting part"}, {"letter": "C", "text": "Appropriate fundal height"}, {"letter": "D", "text": "Breech until term"}], "answer": "D", "answerText": "Breech until term", "explanation": "30. ANSWER: D A. Is wrong because a longitudinal fetal lie is the normal alignment of the fetus in late pregnancy and is expected at 34 weeks. B. Is wrong because a movable presenting part can still be normal at 34 weeks, especially if the fetus has not yet engaged into the pelvis. C. Is wrong because appropriate fundal height suggests normal uterine growth consistent with gestational age and does not indicate abnormality. D. Is CORRECT because a breech presentation persisting until term (or at 34 weeks without expected version) suggests malpresentation, which is considered abnormal as most fetuses should be cephalic by this stage."}, {"id": "q698", "pdfPage": 373, "originalNumber": "31", "question": "Prenatal care is important for mother and fetus. Which of the following questions is pertinent to ask during the initial prenatal visit?", "options": [{"letter": "A", "text": "Last sexual contact"}, {"letter": "B", "text": "Volume and frequency of menstruation"}, {"letter": "C", "text": "Is the pregnancy was planned or desired"}, {"letter": "D", "text": "A & C"}], "answer": "C", "answerText": "Is the pregnancy was planned or desired", "explanation": "31. ANSWER: C A. Is wrong because while it may be helpful in rare cases where the Last Menstrual Period (LMP) is unknown or conception timing is disputed, it is not a standard, pertinent question for a routine initial prenatal history. The textbook emphasizes using the LMP and ultrasound to establish dates, rather than the date of intercourse. B. Is wrong because these details are more relevant to a general gynecological workup (like diagnosing PCOS or menorrhagia). For an initial prenatal visit, the focus shifts specifically to the LMP and the symptoms of pregnancy(missed periods, nausea, fatigue) rather than the historical flow or frequency of the patient's cycles prior to conception C. Is CORRECT because Bates explicitly lists this under \"Concerns and Attitudes Toward Pregnancy.\" It is a critical psychosocial screening tool used to: Assess the patient’s emotional state (excited, scared, or concerned), Determine if the patient needs counseling or support services, Guide the conversation regarding the patient's intent to carry the pregnancy to term, terminate, or consider adoption, Ensure the clinician provides nonjudgmental and patient-centered care from the very first encounter. 19 D. Is wrong because as established above, \"Option A\" (Last sexual contact) is not a standard pertinent question for this visit. Since A is incorrect, the combination of A and C cannot be the correct answer. The primary focus of the initial history is on establishing the health baseline, confirming dates via LMP, and assessing the patient's attitude toward the pregnancy"}, {"id": "q699", "pdfPage": 375, "originalNumber": "32", "question": "Confirmation of pregnancy is important in order to proceed to maternal and fetal care. Which of the following confirms pregnancy?", "options": [{"letter": "A", "text": "Positive store-bought urine pregnancy test"}, {"letter": "B", "text": "Positive symptoms of pregnancy"}, {"letter": "C", "text": "Amenorrhea of 1 month following regular menses"}, {"letter": "D", "text": "All of the above"}], "answer": "A", "answerText": "Positive store-bought urine pregnancy test", "explanation": "32. ANSWER: A A. is correct because this is one of the questions that you should ask when you (as a doctor) want to confirm the basis of pregnancy. Urine tests detect the presence of 𝛽-human chorionic gonadotropin (𝛽-hCG), which is secreted by the trophoblast after implantation, making it a reliable, early objective marker of pregnancy, often considered a \"probable\" sign in early weeks but reliable enough to confirm for prenatal care initiation. B & C are wrong because these are presumptive signs of pregnancy. These signs and symptoms can happen for other reasons hence not entirely used as a confirmation of pregnancy."}, {"id": "q700", "pdfPage": 375, "originalNumber": "33", "question": "When advising a first time mother on common benign symptoms during pregnancy, you advised her on the following EXCEPT:", "options": [{"letter": "A", "text": "Fatigue and sleep Disturbance"}, {"letter": "B", "text": "Irregular unpredictable uterine contractions"}, {"letter": "C", "text": "Hemorrhoids from constipation"}, {"letter": "D", "text": "Dehydration from vomiting"}], "answer": "D", "answerText": "Dehydration from vomiting", "explanation": "33. ANSWER: D A. Is wrong because fatigue and sleep disturbance is common in pregnancy due to hormonal changes (progesterone). B. Is wrong because these irregular unpredictable uterine contractions are Braxton Hicks contractions, a normal benign finding. C. Is wrong because hemorrhoids are very common due to progesterone-induced decreased bowel motility and increased venous pressure. D. Is CORRECT because dehydration from vomiting is not benign. While mild nausea and vomiting (morning sickness) are common, dehydration suggests a complication, such as hyperemesis gravidarum, which requires medical attention."}, {"id": "q701", "pdfPage": 376, "originalNumber": "34", "question": "25 yo pregnant presents with bilateral leg edema symmetrical. With facial puffiness and hand swelling. Bp is mildly elevated. Which physical combination finding would be most concerning for pre eclampsia", "options": [{"letter": "A", "text": "Bilateral leg edema only"}, {"letter": "B", "text": "Facial puffiness and hand edema"}, {"letter": "C", "text": "Leg edema + normal bp"}, {"letter": "D", "text": "Swelling of ankle at the end of the day"}], "answer": "B", "answerText": "Facial puffiness and hand edema", "explanation": "34. ANSWER: B A. Is wrong because mild symmetric leg edema is common in normal pregnancy due to venous compression by the enlarging uterus and increased fluid retention, so by itself it is not strongly suggestive of preeclampsia. B. Is CORRECT because this is the most concerning finding for preeclampsia because edema involving the face and hands, especially with elevated blood pressure, suggests abnormal generalized fluid retention and increased capillary permeability associated with the disease. C. Is wrong because edema with a normal blood pressure is less concerning for preeclampsia since hypertension is one of the major diagnostic features required for the condition. D. Is wrong because dependent ankle swelling that worsens later in the day is a common physiologic change in pregnancy caused by gravity and venous stasis, making it the least worrisome option. Bates 12th edition page 942 The Pregnant Woman"}, {"id": "q702", "pdfPage": 376, "originalNumber": "35", "question": "Amy is on her 1st Prenatal Checkup. Obstetric history reveals term delivery of twins, three children delivered preterm, and one spontaneous loss at 20 weeks. What is her obstetric score?", "options": [{"letter": "A", "text": "G5P4 (1315)"}, {"letter": "B", "text": "G4P5 (1405)"}, {"letter": "C", "text": "G6P4 (1315)"}], "answer": "C", "answerText": "G6P4 (1315)", "explanation": "35. ANSWER: C A. Is wrong because the gravida is incorrectly counted. Gravida includes all pregnancies, including the current pregnancy, multifetal gestations, preterm deliveries, and pregnancy losses. B. Is wrong because although the parity components are partially close, the gravida is still undercounted and the parity computation is inaccurate. C. Is CORRECT because Amy is currently pregnant, giving her a total of 6 pregnancies: 1 twin term delivery, 3 preterm deliveries, 1 spontaneous abortion at 20 weeks, and the present pregnancy. 22 D. G7P5 (1415) Her obstetric score is G6P4 (1315): 1 term delivery, 3 preterm deliveries, 1 abortion/loss, and 5 living children (the twins plus the 3 preterm children). D. Is wrong because the gravida is overcounted. Twin gestation counts as one pregnancy, not two, and the parity notation is also inaccurate. Kindly refer to number 36’s additional information to reinforce knowledge on OB Scoring and pregnancy classification. Thank you."}, {"id": "q703", "pdfPage": 377, "originalNumber": "36", "question": "40 y.o is pregnant with her 4th child. Her eldest was born 1 week after EDD. Her 2nd and 3rd pregnancy resulted in spontaneous miscarriage at 18 and 25 weeks respectively. What is her OB score", "options": [{"letter": "A", "text": "G5P3(1111)"}, {"letter": "B", "text": "G4P2 (1021)"}, {"letter": "C", "text": "G4P2 (1111)"}, {"letter": "D", "text": "G4P1 (1021)"}], "answer": "C", "answerText": "G4P2 (1111)", "explanation": "36. ANSWER: C A. Is wrong because the patient is currently in her 4th pregnancy, making her G4, not G5 B. Is wrong because the 25-week miscarriage reached the age of viability (≥24 weeks), meaning it is classified as a preterm delivery (P) rather than an abortion C. Is correct because she is G4 (4 total pregnancies) and P2 (2 deliveries ≥24 weeks); her TPAL is 1 term (eldest), 1 preterm (25-week loss), 1 abortion (18-week loss), and 1 living child D. Is wrong because her parity is 2 (the sum of her term and preterm births), and the 25-week loss counts as preterm, not as a second abortion"}, {"id": "q704", "pdfPage": 377, "originalNumber": "37", "question": "24 yo pregnant women, unknown gestational age but fundal height is at the umbilicus. What is the approximate AOG?", "options": [{"letter": "A", "text": "16 weeks"}, {"letter": "B", "text": "18 weeks"}, {"letter": "C", "text": "20 weeks"}, {"letter": "D", "text": "24 weeks"}], "answer": "C", "answerText": "20 weeks", "explanation": "37. ANSWER: C A. Is wrong because the fundus is midway between the symphysis pubis and umbilicus. B. Is wrong because the fundus is still slightly below the umbilicus. C. Is CORRECT because the fundus reaches the level of the umbilicus. D. Is wrong because the fundus is already above the umbilicus."}, {"id": "q705", "pdfPage": 378, "originalNumber": "38", "question": "A 26 y/o at 32 weeks gestation undergoes abdominal palpation. The examiner feels a smooth, firm, rounded structure in the fundus and irregular nodules in the lower abdomen. What is the most likely fetal presentation?", "options": [{"letter": "A", "text": "Cephalic"}, {"letter": "B", "text": "Breech"}, {"letter": "C", "text": "Transverse lie"}, {"letter": "D", "text": "Oblique lie"}], "answer": "B", "answerText": "Breech", "explanation": "38. ANSWER: B A. Is wrong because in a cephalic presentation, the head is usually palpated in the lower uterine segment, appearing as a smooth, firm, round, and ballotable structure in the lower abdomen. B. Is CORRECT because in breech presentation, the fetal buttocks occupy the lower uterine segment, which are palpated as irregular nodules, while the head is palpated in the fundus as a smooth, firm, rounded structure. C. Is wrong because in a transverse lie, the fetus lies horizontally, and the examiner typically palpates the head on one side of the maternal abdomen and the buttocks on the opposite side, not specifically in the fundus. D. Is wrong because an oblique lie presents with the fetus positioned diagonally, producing asymmetric findings rather than a distinct rounded structure in the fundus with irregular nodules below."}, {"id": "q706", "pdfPage": 378, "originalNumber": "24", "question": "pregnant woman revealed a fetal heart rate of 150 with regular rhythm. What is the implication?", "options": [{"letter": "A", "text": "Fetal bradycardia"}, {"letter": "B", "text": "Normal fetal heart rate"}, {"letter": "C", "text": "Fetal tachycardia"}, {"letter": "D", "text": "Maternal heart rate"}], "answer": "B", "answerText": "Normal fetal heart rate", "explanation": "39. ANSWER: B A. Is wrong because fetal bradycardia should be <110 bpm B. Is CORRECT because the normal range of FHR is between 110 and 160 bpm. C. Is wrong because fetal tachycardia should be >160 bpm D. Is wrong because maternal heart rate ranges from 60 t0 90 bpm Bates, Pregnant Women, Page 1890"}, {"id": "q707", "pdfPage": 379, "originalNumber": "40", "question": "34 year old G2P1 at 28 weeks presents on routine examination. Abdominal inspection shows a midline darkened line from symphysis pubis to umbilicus. What is the best interpretation?", "options": [{"letter": "A", "text": "Pathologic hyperpigmentation"}, {"letter": "B", "text": "Linea alba"}, {"letter": "C", "text": "Linea nigra"}, {"letter": "D", "text": "Striae gravidarum"}], "answer": "C", "answerText": "Linea nigra", "explanation": "40. ANSWER: C A. Is wrong because the case scenario describes a physiologic hyperpigmentation rather than a pathologic one B. Is wrong because this pertains to the the normal pale fibrous midline line before pregnancy C. Is CORRECT because this is descriptive of linea nigra which occurs as a normal physiologic hyperpigmentation during pregnancy. This is caused by melanocyte-stimulating hormone, estrogen, and progesterone. D. Is wrong because these are stretch marks, usually pink/purple linear streaks on abdomen, breasts, or thighs, not a single midline dark line."}, {"id": "q708", "pdfPage": 379, "originalNumber": "41", "question": "Upon breast examination of a pregnant woman, the areola appears darkened with raised nodules. What are these nodules?", "options": [{"letter": "A", "text": "Sebaceous cysts"}, {"letter": "B", "text": "Montgomery tubercles"}, {"letter": "C", "text": "Fibroadenoma"}, {"letter": "D", "text": "Lymph node"}], "answer": "C", "answerText": "Fibroadenoma", "explanation": "41. ANSWER: C A. Is wrong because sebaceous cysts are dome-shaped lumps in the dermis that forms a benign closed firm sac. B. Is CORRECT because the raised nodules around the areolae (Montgomery glands) become more pronounced by the third month of gestation. C. Is wrong because fibroadenomas are usually smooth, rubbery, round, mobile, and nontender masses on the breast, not darkened raised nodules on the areola. D. Is wrong because in a normal pregnant woman only the central nodes are most likely to be palpable and these lie along the chest wall, high in the axilla, not around the areola, and presents as a small movable mass. A. Sebaceous Cyst 25 B. Montgomery tubercules/glands (tubercles gyud ang gina use ni doc na term sa exam tho) C. Fibroadenoma D. Lymph Node"}, {"id": "q709", "pdfPage": 381, "originalNumber": "42", "question": "A 31 y.o. 34 weeks gestation underwent Leopold's maneuver. The examiner identified the back side on the left and small parts on the right. Which area should the fetal heart tone be heard best?", "options": [{"letter": "A", "text": "Epigastric region"}, {"letter": "B", "text": "Right upper quadrant"}, {"letter": "C", "text": "Midline"}, {"letter": "D", "text": "Left lower quadrant"}], "answer": "D", "answerText": "Left lower quadrant", "explanation": "42. ANSWER: D A. Is wrong because this is typical for transverse lies or very high fundal positions. B. Is wrong because this is typical for a Breech presentation where the back is on the right (RSA - Right Sacrum Anterior). C. Is wrong because this is the location for 10-18 weeks and is not the primary point of intensity thereafter unless the fetus is directly occiput anterior or posterior, and even then, it is usually lateralized. D. To determine where the fetal heart tones will be heard best, we first need to interpret the results of the Leopold's Maneuvers provided: ● Back on the left: This indicates the fetus is in a Left position. ● Small parts (limbs) on the right: This confirms the back is on the opposite side. ● 34 weeks gestation: At this stage, the fetus is most likely in a cephalic (head-down) presentation. Therefore the best area to hear FHT would be the lower left quadrant."}, {"id": "q710", "pdfPage": 381, "originalNumber": "43", "question": "37 weeks AOG with whitish to clear discharge upon compression of nipple. What is the next best step?", "options": [{"letter": "A", "text": "Assess for infection and ask for breast tenderness and fullness"}, {"letter": "B", "text": "Assess for presence of breast cancer activity and ask for presence of pruritus and mass lesion"}, {"letter": "C", "text": "Assess for spontaneous leakage and ask for"}], "answer": "C", "answerText": "Assess for spontaneous leakage and ask for", "explanation": "43. ANSWER: C A. Is wrong because the whitish to clear discharge upon compression of nipple during the late trimesters is physiologic, and may be colostrum or “let down”, a spontaneous mild leakage. B. Is wrong because the whitish to clear discharge upon compression of nipple during the late trimesters is physiologic, and does not indicate any risk for breast cancer. C. Is CORRECT because during the late / third trimester, pregnant patients may experience a “let down”, a spontaneous mild leakage often accompanied by cramping sensation in the breast during a hot shower or orgasm D. Is wrong because only C is correct 27 recent hot shower or orgasm D. A and C Source: Bate’s 12th Edition, Chapter 19, page 943 - 944"}, {"id": "q711", "pdfPage": 382, "originalNumber": "44", "question": "A 27-year-old G1P0 presents for her first prenatal visit. She reports her LMP started on March 10. Today's date is April 10. Her cycles are regular. What is her gestational age?", "options": [{"letter": "A", "text": "3 weeks 0 days"}, {"letter": "B", "text": "3 weeks 4 days"}, {"letter": "C", "text": "4 weeks 3 days"}, {"letter": "D", "text": "5 weeks 0 days"}], "answer": "C", "answerText": "4 weeks 3 days", "explanation": "44. ANSWER: C A. Is wrong because it's too early B. Is wrong because it's too early C. Is CORRECT because it matches the manual counted days divided by 7 – 4 weeks and 3 days. D. Is wrong because it's too late Source: Bates & Gemini bestie"}, {"id": "q712", "pdfPage": 382, "originalNumber": "1", "question": "Using Naegele’ s rule what is the EDD?", "options": [{"letter": "A", "text": "Dec 1"}, {"letter": "B", "text": "Dec 8"}, {"letter": "C", "text": "Dec 15"}], "answer": "B", "answerText": "Dec 8", "explanation": "45. ANSWER: B A. Wrong B. CORRECT. The Naegele’s rule is LMP + 7 days - 3 months + 1 year which is December 8 in this case. 28 D. Dec 22 C. Wrong D. Wrong March 1 + 7 days = March 8 - 3 months = December 8 (No year indicated so +1 year is redundant) Source: Bate’s 12th Edition, Chapter 26 The Pregnant Woman"}, {"id": "q713", "pdfPage": 383, "originalNumber": "46", "question": "A woman presented with a fundal height of 24cm but is calculated to be 28 weeks by LMP. What is the best interpretation?", "options": [{"letter": "A", "text": "Fetal anomaly"}, {"letter": "B", "text": "Twin pregnancy"}, {"letter": "C", "text": "Polyhydramnios"}, {"letter": "D", "text": "Normal variation"}], "answer": "C", "answerText": "Polyhydramnios", "explanation": "46. ANSWER: C A. Is CORRECT because fetal anomalies can cause poor fetal growth or low amniotic fluid, making the fundal height smaller than expected. B. Is wrong because twin pregnancy makes the uterus larger because there are two babies, so the fundal height is usually greater than expected. C. Is wrong because polyhydramnios increases the amount of amniotic fluid, causing the uterus and fundal height to become larger. D. Is wrong because a A 4 cm difference between fundal height and gestational age is beyond the normal ±2 cm range. Source: pg 1889 bates 13 ed Techniques of examination: Abdomen in chapter 26"}, {"id": "q714", "pdfPage": 383, "originalNumber": "47", "question": "Detecting fetal heart tones via doppler is best done at", "options": [{"letter": "A", "text": "First prenatal visit"}, {"letter": "B", "text": "10-12 weeks gestation"}, {"letter": "C", "text": "Every clinic visit"}, {"letter": "D", "text": "A&C"}], "answer": "B", "answerText": "10-12 weeks gestation", "explanation": "47. ANSWER: B A. Is wrong because depending when patient seeks care, the first visit could occur as early as 4-6 weeks, at which point FHTs cannot be detected by a standard bedside Doppler. B. Is CORRECT because FHTs can be detected between 10-12 weeks of gestation. C. Is wrong because although it is standard to attempt to auscultate at every visit, the question asked when it is best done or first achievable. D. Is wrong because both statements are wrong."}, {"id": "q715", "pdfPage": 384, "originalNumber": "48", "question": "At what age of gestation will you start telling your pregnant px to monitor fetal movement", "options": [{"letter": "A", "text": "10-12 weeks gestation"}, {"letter": "B", "text": "15 weeks gestation"}, {"letter": "C", "text": "18-24 weeks gestation"}, {"letter": "D", "text": "37 weeks gestation"}], "answer": "C", "answerText": "18-24 weeks gestation", "explanation": "48. ANSWER: C A. 10–12 weeks gestation Is wrong because fetal movements may already occur physiologically at this stage, but they are too weak to be perceived by the mother. B. 15 weeks gestation Is wrong because although some multiparous women may begin to feel quickening around this time, movements are not yet consistently detectable enough for formal monitoring. C. 18–24 weeks gestation Is CORRECT because this is the period when most pregnant women can reliably perceive fetal movement, making fetal movement monitoring clinically useful. D. 37 weeks gestation Is wrong because fetal movement monitoring should begin much earlier in pregnancy to help assess fetal well-being throughout gestation. Source: Bates. Chapter 19. Page 944"}, {"id": "q716", "pdfPage": 384, "originalNumber": "49", "question": "True for Leopold's Maneuver:", "options": [{"letter": "A", "text": "Used to determine fetal position at the maternal abdomen at the beginning of the third trimester"}, {"letter": "B", "text": "Most accurate after 36 weeks age of gestation"}, {"letter": "C", "text": "Accurate assessment for fetal growth"}, {"letter": "D", "text": "All of the above"}], "answer": "B", "answerText": "Most accurate after 36 weeks age of gestation", "explanation": "49. ANSWER: B A. Is wrong because Leopold maneuvers are not specifically intended for use only at the beginning of the third trimester. B. Is CORRECT because accuracy is greatest after 36 weeks. C. Is wrong because they are not an accurate method for assessing fetal growth. D. Is wrong because A and C are false. Source” Bates 12th ed. Chapter 19 pg 948"}, {"id": "q717", "pdfPage": 385, "originalNumber": "50", "question": "Hegar sign", "options": [{"letter": "A", "text": "Softening of the cervix during pregnancy"}, {"letter": "B", "text": "Cervical effacement"}, {"letter": "C", "text": "Irregular brownish patches around the face and jaw"}, {"letter": "D", "text": "A and C"}], "answer": "A", "answerText": "Softening of the cervix during pregnancy", "explanation": "50. ANSWER: A A. Is CORRECT because it is the palpable softening of the cervical isthmus during pregnancy. B. Is wrong because this refers to the thinning and shortening of the cervix that occurs during labor. C. Is wrong because this describes chloasma, also known as melasma or the mask of pregnancy, which is a dermatological change related to hormonal shifts. D. Is wrong because C is not correct. Source: Bates 13th ed. Chap 26, p. 1871 31"}]</script>
<script>
const questions=JSON.parse(document.getElementById('question-data').textContent);const STORE='pd-finals-quiz-progress-v1';let state=JSON.parse(localStorage.getItem(STORE)||'{}');let order=questions.map((_,i)=>i);let pos=0;let filter='all';let query='';const $=s=>document.querySelector(s);const save=()=>localStorage.setItem(STORE,JSON.stringify(state));function filtered(){return order.filter(i=>{const q=questions[i],r=state[q.id]||{};const text=(q.question+' '+q.options.map(o=>o.text).join(' ')).toLowerCase();if(query&&!text.includes(query))return false;if(filter==='unanswered'&&r.choice)return false;if(filter==='wrong'&&(!r.choice||r.correct))return false;if(filter==='flagged'&&!r.flag)return false;if(filter==='missing'&&q.answer)return false;return true})}function stats(){let answered=0,correct=0,flagged=0;questions.forEach(q=>{const r=state[q.id]||{};if(r.choice)answered++;if(r.correct)correct++;if(r.flag)flagged++});$('#answered').textContent=answered;$('#correct').textContent=correct;$('#left').textContent=questions.length-answered;$('#flagged').textContent=flagged}function render(){stats();const list=filtered();if(pos>=list.length)pos=Math.max(0,list.length-1);$('#total').textContent=list.length;$('#current').textContent=list.length?pos+1:0;$('#bar').style.width=list.length?`${((pos+1)/list.length)*100}%`:'0%';const wrap=$('#question-wrap');if(!list.length){wrap.innerHTML='<div class="panel empty">No questions match this view.</div>';return}const q=questions[list[pos]],r=state[q.id]||{};const known=Boolean(q.answer);wrap.innerHTML=`<section class="panel"><div class="meta"><span class="pill">Question ${list[pos]+1} of ${questions.length}</span><span class="pill">PDF page ${q.pdfPage}</span><span class="pill">Original #${q.originalNumber}</span>${known?'':'<span class="pill">No answer key found</span>'}</div><h2 class="question"></h2><div class="choices"></div><div class="feedback ${r.choice?'show':''}"><b></b><div class="explain"></div></div><div class="actions"><div><button class="btn" id="prev">Previous</button> <button class="btn primary" id="next">Next</button></div><div><button class="btn" id="flag">${r.flag?'Unflag':'Flag'}</button> <button class="btn warn" id="clear">Clear</button></div></div></section>`;$('.question').textContent=q.question;const choices=$('.choices');q.options.forEach(o=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<span class="letter">${o.letter}</span><span></span>`;b.querySelector('span:last-child').textContent=o.text;b.onclick=()=>choose(q,o.letter);if(r.choice){if(known&&o.letter===q.answer)b.classList.add('correct');else if(o.letter===r.choice&&r.choice!==q.answer)b.classList.add('wrong');else b.classList.add('dim')}choices.appendChild(b)});showFeedback(q,r);$('#prev').onclick=()=>{pos=Math.max(0,pos-1);render()};$('#next').onclick=()=>{pos=Math.min(list.length-1,pos+1);render()};$('#flag').onclick=()=>{state[q.id]={...r,flag:!r.flag};save();render()};$('#clear').onclick=()=>{delete state[q.id];save();render()};$('#prev').disabled=pos===0;$('#next').disabled=pos===list.length-1}function showFeedback(q,r){const fb=$('.feedback');if(!fb)return;if(!r.choice){fb.classList.remove('show');return}fb.classList.add('show');const title=fb.querySelector('b'),ex=fb.querySelector('.explain');if(!q.answer){title.textContent='Answer key not detected for this item.';ex.textContent=q.explanation||'The PDF did not provide a clean answer marker for this question.';return}title.textContent=r.correct?'Correct':'Correct answer: '+q.answer+'. '+q.answerText;ex.textContent=q.explanation||q.answer+'. '+q.answerText}function choose(q,letter){const correct=q.answer?letter===q.answer:false;state[q.id]={...(state[q.id]||{}),choice:letter,correct};save();render()}$('#search').oninput=e=>{query=e.target.value.trim().toLowerCase();pos=0;render()};$('#filter').onchange=e=>{filter=e.target.value;pos=0;render()};$('#shuffle').onclick=()=>{for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}pos=0;render()};$('#resetOrder').onclick=()=>{order=questions.map((_,i)=>i);pos=0;render()};$('#reset').onclick=()=>{if(confirm('Clear all saved answers and flags?')){state={};save();render()}};document.addEventListener('keydown',e=>{const list=filtered();if(!list.length)return;const q=questions[list[pos]];if(/^[1-5]$/.test(e.key)){const o=q.options[Number(e.key)-1];if(o)choose(q,o.letter)}if(e.key==='ArrowRight'){pos=Math.min(list.length-1,pos+1);render()}if(e.key==='ArrowLeft'){pos=Math.max(0,pos-1);render()}});render();</script>
<script>
let confettiPieces=[],confettiFrame=null;
function celebrateCorrect(){
  const pop=document.getElementById('celebration-pop'),canvas=document.getElementById('confetti-canvas');
  if(!pop||!canvas)return;
  const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,w=innerWidth,h=innerHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  clearTimeout(celebrateCorrect.timer);cancelAnimationFrame(confettiFrame);confettiPieces=[];
  const colors=['#1f8a8a','#f3b33d','#d95f43','#2f8f5b','#14213d','#86c6b8'];
  for(let i=0;i<130;i++)confettiPieces.push({x:w/2,y:h*.36,vx:(Math.random()-.5)*12,vy:Math.random()*-9-4,g:.28+Math.random()*.16,s:6+Math.random()*8,r:Math.random()*Math.PI,vr:(Math.random()-.5)*.34,c:colors[i%colors.length],life:70+Math.random()*25});
  pop.classList.add('show');
  function tick(){
    ctx.clearRect(0,0,w,h);
    confettiPieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.r+=p.vr;p.life--;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/3,p.s,p.s*.66);ctx.restore()});
    confettiPieces=confettiPieces.filter(p=>p.life>0&&p.y<h+40);
    if(confettiPieces.length)confettiFrame=requestAnimationFrame(tick);
  }
  tick();
  celebrateCorrect.timer=setTimeout(()=>{pop.classList.remove('show');setTimeout(()=>ctx.clearRect(0,0,w,h),220)},1100);
}
function currentQuestionForCelebration(){
  if(typeof filtered!=='function')return null;
  const list=filtered();
  return questions[list[pos]];
}
document.addEventListener('click',event=>{
  const choice=event.target.closest('.choice');
  if(!choice)return;
  const q=currentQuestionForCelebration();
  const letter=choice.querySelector('.letter')?.textContent.trim();
  if(q&&q.answer&&letter===q.answer)celebrateCorrect();
},true);
document.addEventListener('keydown',event=>{
  if(!/^[1-5]$/.test(event.key))return;
  const q=currentQuestionForCelebration();
  const option=q?.options?.[Number(event.key)-1];
  if(q&&option&&q.answer&&option.letter===q.answer)celebrateCorrect();
},true);
</script>
